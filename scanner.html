  document.getElementById('rcWhite').style.borderColor=c==='white'?'#27ae60':'transparent';
  document.getElementById('rcBlack').style.borderColor=c==='black'?'#27ae60':'transparent';
  if(rRect) redrawEc();
}
function setPdfColor(el,mode){
  pdfColorMode=mode;
  document.querySelectorAll('#pdfColorBtn,#pdfBWBtn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}

function undoEd(){
  if(history.length<=1)return;
  history.pop();
  invalidateBitmapCache();
  cropRect=null; quad=null; rRect=null;
  redrawEc();
}

function resetEd(){
  history=[];cropRect=null;quad=null;
  const img=new Image();
  img.onload=()=>{
    edW=img.width;edH=img.height;fitCanvas();
    ectx.drawImage(img,0,0,ec.width,ec.height);
    history.push(ec.toDataURL('image/jpeg',0.92));
  };
  img.src=pages[edIdx].orig;
}

function rotImg(deg){
  const src=history[history.length-1]||pages[edIdx].cur;
  const img=new Image();
  img.onload=()=>{
    const c=document.createElement('canvas');
    if(Math.abs(deg)===90){c.width=img.height;c.height=img.width;}
    else{c.width=img.width;c.height=img.height;}
    const ctx=c.getContext('2d');
    ctx.translate(c.width/2,c.height/2);
    ctx.rotate(deg*Math.PI/180);
    ctx.drawImage(img,-img.width/2,-img.height/2);
    const url=c.toDataURL('image/jpeg',0.92);
    history.push(url);
    invalidateBitmapCache();
    edW=c.width;edH=c.height;
    fitCanvas();
    const ni=new Image();
    ni.onload=()=>{ectx.clearRect(0,0,ec.width,ec.height);ectx.drawImage(ni,0,0,ec.width,ec.height);};
    ni.src=url;cropRect=null;
  };
  img.src=src;
}

/* ═══ SMART AUTO-DETECT (Canny + Quadrilateral Contour) ═══
 * Performs:
 *  1. Gaussian blur  → reduces noise
 *  2. Grayscale + Sobel gradient → edge magnitude & direction
 *  3. Non-maximum suppression → thin edges
 *  4. Double threshold + hysteresis → Canny binary edge map
 *  5. Probabilistic contour scan → finds the largest 4-sided polygon
 *     that resembles a document/page boundary
 *  6. Falls back to content-bbox if no quad found
 */
function cannyEdgeDetect(data, w, h){
  // --- Step 1: Grayscale ---
  const gray = new Float32Array(w*h);
  for(let i=0;i<w*h;i++){
    gray[i] = 0.299*data[i*4] + 0.587*data[i*4+1] + 0.114*data[i*4+2];
  }

  // --- Step 2: Gaussian blur (5x5, ayrılabilir: 1D yatay + 1D dikey ≈ 5x hızlı) ---
  const k1=[1,4,6,4,1], k1s=16;
  const tmp=new Float32Array(w*h);
  const blurred=new Float32Array(w*h);
  for(let y=0;y<h;y++){
    const row=y*w;
    for(let x=0;x<w;x++){
      let s=0;
      for(let k=-2;k<=2;k++){
        const nx=x+k<0?0:(x+k>=w?w-1:x+k);
        s+=k1[k+2]*gray[row+nx];
      }
      tmp[row+x]=s/k1s;
    }
  }
  for(let y=0;y<h;y++){
    for(let x=0;x<w;x++){
      let s=0;
      for(let k=-2;k<=2;k++){
        const ny=y+k<0?0:(y+k>=h?h-1:y+k);
        s+=k1[k+2]*tmp[ny*w+x];
      }
      blurred[y*w+x]=s/k1s;
    }
  }

  // --- Step 3: Sobel gradients ---
  const gx=new Float32Array(w*h), gy=new Float32Array(w*h);
  const mag=new Float32Array(w*h), dir=new Uint8Array(w*h);
  for(let y=1;y<h-1;y++) for(let x=1;x<w-1;x++){
    const p=(py,px)=>blurred[py*w+px];
    const sx=-p(y-1,x-1)-2*p(y,x-1)-p(y+1,x-1)+p(y-1,x+1)+2*p(y,x+1)+p(y+1,x+1);
    const sy=-p(y-1,x-1)-2*p(y-1,x)-p(y-1,x+1)+p(y+1,x-1)+2*p(y+1,x)+p(y+1,x+1);
    gx[y*w+x]=sx; gy[y*w+x]=sy;
    mag[y*w+x]=Math.sqrt(sx*sx+sy*sy);
    const a=Math.atan2(sy,sx)*180/Math.PI;
    const an=((a%180)+180)%180;
    dir[y*w+x]=an<22.5||an>=157.5?0:an<67.5?1:an<112.5?2:3;
  }

  // --- Step 4: Non-maximum suppression ---
  const nms=new Float32Array(w*h);
  for(let y=1;y<h-1;y++) for(let x=1;x<w-1;x++){
    const i=y*w+x, m=mag[i];
    let n1,n2;
    switch(dir[i]){
      case 0: n1=mag[i-1];       n2=mag[i+1];       break;
      case 1: n1=mag[(y-1)*w+x+1];n2=mag[(y+1)*w+x-1];break;
      case 2: n1=mag[(y-1)*w+x]; n2=mag[(y+1)*w+x]; break;
      default:n1=mag[(y-1)*w+x-1];n2=mag[(y+1)*w+x+1];
    }
    nms[i]=(m>=n1&&m>=n2)?m:0;
  }

  // --- Step 5: Double threshold + hysteresis ---
  // Adaptive thresholds based on median of non-zero magnitudes
  const nonzero=[]; for(let i=0;i<nms.length;i++) if(nms[i]>0) nonzero.push(nms[i]);
  nonzero.sort((a,b)=>a-b);
  const med = nonzero.length ? nonzero[Math.floor(nonzero.length*0.7)] : 50;
  const hi=med*1.4, lo=med*0.4;
  const edge=new Uint8Array(w*h);
  for(let i=0;i<nms.length;i++) edge[i]=nms[i]>=hi?2:nms[i]>=lo?1:0;
  // hysteresis: promote weak edges connected to strong
  for(let y=1;y<h-1;y++) for(let x=1;x<w-1;x++){
    if(edge[y*w+x]===1){
      let found=false;
      for(let dy=-1;dy<=1&&!found;dy++) for(let dx=-1;dx<=1;dx++){
        if(edge[(y+dy)*w+(x+dx)]===2){found=true;}
      }
      edge[y*w+x]=found?2:0;
    }
  }
  return edge; // 2 = edge pixel
}

/* ═══ Otomatik belge tespiti — Canny + köşe skoru ═══ */
function findDocumentQuad(edge, w, h){
  const step=Math.max(1,Math.round(Math.min(w,h)/400));
  const margin=Math.round(Math.min(w,h)*0.01);

  const pts=[];
  for(let y=margin;y<h-margin;y+=step) for(let x=margin;x<w-margin;x+=step){
    if(edge[y*w+x]===2) pts.push([x,y]);
  }
  if(pts.length<20) return null;

  let mnX=w,mnY=h,mxX=0,mxY=0;
  pts.forEach(([x,y])=>{
    if(x<mnX)mnX=x; if(y<mnY)mnY=y;
    if(x>mxX)mxX=x; if(y>mxY)mxY=y;
  });

  let tl=pts[0],tr=pts[0],bl=pts[0],br=pts[0];
  let tlS=-Infinity,trS=-Infinity,blS=-Infinity,brS=-Infinity;
  pts.forEach(p=>{
    const [x,y]=p;
    const nx=x/w, ny=y/h;
    const sTL=(1-nx)*(1-ny)*2-nx-ny; if(sTL>tlS){tlS=sTL;tl=p;}
    const sTR=nx*(1-ny)*2+nx-ny;     if(sTR>trS){trS=sTR;tr=p;}
    const sBL=(1-nx)*ny*2-nx+ny;     if(sBL>blS){blS=sBL;bl=p;}
    const sBR=nx*ny*2+nx+ny;         if(sBR>brS){brS=sBR;br=p;}
  });

  const area=quadArea(
    {x:tl[0],y:tl[1]},{x:tr[0],y:tr[1]},
    {x:bl[0],y:bl[1]},{x:br[0],y:br[1]}
  );
  if(area/(w*h)<0.08){
    const pad=Math.round(Math.min(w,h)*0.01);
    return {
      tl:{x:Math.max(0,mnX-pad), y:Math.max(0,mnY-pad)},
      tr:{x:Math.min(w,mxX+pad), y:Math.max(0,mnY-pad)},
      bl:{x:Math.max(0,mnX-pad), y:Math.min(h,mxY+pad)},
      br:{x:Math.min(w,mxX+pad), y:Math.min(h,mxY+pad)}
    };
  }
  return {
    tl:{x:tl[0],y:tl[1]}, tr:{x:tr[0],y:tr[1]},
    bl:{x:bl[0],y:bl[1]}, br:{x:br[0],y:br[1]}
  };
}

function quadArea(tl,tr,bl,br){
  // tl/tr/bl/br her ikisi de [x,y] array ya da {x,y} obje olabilir — normalize et
  function gx(p){return Array.isArray(p)?p[0]:p.x;}
  function gy(p){return Array.isArray(p)?p[1]:p.y;}
  const pts=[[gx(tl),gy(tl)],[gx(tr),gy(tr)],[gx(br),gy(br)],[gx(bl),gy(bl)]];
  let a=0;
  for(let i=0;i<4;i++){
    const j=(i+1)%4;
    a+=pts[i][0]*pts[j][1];
    a-=pts[j][0]*pts[i][1];
  }
  return Math.abs(a)/2;
}

/* Refine detected quad by snapping each corner to the nearest strong edge pixel */
function snapCornerToEdge(corner, edge, w, h, searchR){
  const {x,y}=corner;
  const r=Math.round(searchR);
  let best=null, bestMag=-1;
  for(let dy=-r;dy<=r;dy+=2) for(let dx=-r;dx<=r;dx+=2){
    const nx=Math.round(x+dx), ny=Math.round(y+dy);
    if(nx<0||ny<0||nx>=w||ny>=h) continue;
    if(edge[ny*w+nx]===2){
      const d=Math.hypot(dx,dy);
      const score=bestMag<0?1:(1/(d+1));
      if(score>bestMag){bestMag=score;best={x:nx,y:ny};}
    }
  }
  return best||corner;
}

/* ═══ Hough çizgi tabanlı belge tespiti ═══
 * Tekil kenar piksellerine güvenmek yerine, kenar haritasındaki BASKIN
 * DOĞRULARI bulur (Hough dönüşümü), yatay/dikey gruplara ayırır ve en iyi
 * 2 yatay + 2 dikey doğru kombinasyonunun kesişiminden belge dörtgenini
 * çıkarır. Böylece arka plandaki gürültü pikselleri köşe sanılmaz —
 * köşeler her zaman iki gerçek kenar çizgisinin kesişimidir. */
function houghDetectQuad(edge,w,h){
  const pts=[];
  for(let y=1;y<h-1;y++)for(let x=1;x<w-1;x++) if(edge[y*w+x]===2){pts.push(x,y);}
  const nPts=pts.length/2;
  if(nPts<60) return null;

  const D2R=Math.PI/180;
  const nTheta=180;
  const diag=Math.ceil(Math.hypot(w,h));
  const rhoRes=2;
  const nRho=Math.floor(2*diag/rhoRes)+1;
  const cosT=new Float32Array(nTheta), sinT=new Float32Array(nTheta);
  for(let t=0;t<nTheta;t++){cosT[t]=Math.cos(t*D2R);sinT[t]=Math.sin(t*D2R);}

  // Akümülatör (nokta sayısı çoksa örnekle)
  const acc=new Int32Array(nTheta*nRho);
  const skip=Math.max(1,Math.floor(nPts/7000));
  for(let i=0;i<nPts;i+=skip){
    const x=pts[i*2], y=pts[i*2+1];
    for(let t=0;t<nTheta;t++){
      const ri=Math.round((x*cosT[t]+y*sinT[t]+diag)/rhoRes);
      if(ri>=0&&ri<nRho) acc[t*nRho+ri]++;
    }
  }

  let maxV=0; for(let i=0;i<acc.length;i++) if(acc[i]>maxV)maxV=acc[i];
  if(maxV<15) return null;

  // Yerel maksimumlar (±3° / ±4 rho hücresi bastırma)
  const thr=Math.max(12,maxV*0.18);
  const cands=[];
  for(let t=0;t<nTheta;t++)for(let r=0;r<nRho;r++){
    const v=acc[t*nRho+r];
    if(v<thr) continue;
    let isMax=true;
    for(let dt=-3;dt<=3&&isMax;dt++){
      const tt=t+dt; if(tt<0||tt>=nTheta) continue;
      for(let dr=-4;dr<=4;dr++){
        const rr=r+dr; if(rr<0||rr>=nRho) continue;
        const v2=acc[tt*nRho+rr];
        if(v2>v||(v2===v&&(dt<0||(dt===0&&dr<0)))){isMax=false;break;}
      }
    }
    if(isMax) cands.push({t,rho:r*rhoRes-diag,v});
  }
  if(cands.length<4) return null;
  cands.sort((a,b)=>b.v-a.v);

  // Yataya yakın (üst/alt kenar adayları) ve dikeye yakın (sol/sağ) ayır
  const Hs=[],Vs=[];
  for(const c of cands){
    if(c.t>=45&&c.t<135){ if(Hs.length<10)Hs.push(c); }
    else if(Vs.length<10)Vs.push(c);
    if(Hs.length>=10&&Vs.length>=10) break;
  }
  if(Hs.length<2||Vs.length<2) return null;

  function inter(l1,l2){
    const det=cosT[l1.t]*sinT[l2.t]-sinT[l1.t]*cosT[l2.t];
    if(Math.abs(det)<1e-6) return null;
    return {
      x:(l1.rho*sinT[l2.t]-l2.rho*sinT[l1.t])/det,
      y:(l2.rho*cosT[l1.t]-l1.rho*cosT[l2.t])/det
    };
  }
  const tol=Math.min(w,h)*0.06;
  const inB=p=>p&&p.x>=-tol&&p.x<=w+tol&&p.y>=-tol&&p.y<=h+tol;
  const cross=(o,a,b)=>(a.x-o.x)*(b.y-o.y)-(a.y-o.y)*(b.x-o.x);
  const ang=(o,a,b)=>{
    const d1x=a.x-o.x,d1y=a.y-o.y,d2x=b.x-o.x,d2y=b.y-o.y;
    const m=Math.hypot(d1x,d1y)*Math.hypot(d2x,d2y);
    if(m<1e-6) return 0;
    return Math.acos(Math.max(-1,Math.min(1,(d1x*d2x+d1y*d2y)/m)))/D2R;
  };

  let best=null,bestScore=-Infinity;
  for(let i=0;i<Hs.length;i++)for(let j=i+1;j<Hs.length;j++)
  for(let k=0;k<Vs.length;k++)for(let l=k+1;l<Vs.length;l++){
    const h1=Hs[i],h2=Hs[j],v1=Vs[k],v2=Vs[l];
    const p1=inter(h1,v1),p2=inter(h1,v2),p3=inter(h2,v1),p4=inter(h2,v2);
    if(!inB(p1)||!inB(p2)||!inB(p3)||!inB(p4)) continue;
    // Köşeleri konuma göre sırala
    const ps=[p1,p2,p3,p4];
    let tl=ps[0],tr=ps[0],bl=ps[0],br=ps[0];
    for(const p of ps){
      if(p.x+p.y<tl.x+tl.y)tl=p;
      if(p.x+p.y>br.x+br.y)br=p;
      if(p.x-p.y>tr.x-tr.y)tr=p;
      if(p.x-p.y<bl.x-bl.y)bl=p;
    }
    if(new Set([tl,tr,bl,br]).size!==4) continue;
    // Dışbükeylik kontrolü
    const c1=cross(tl,tr,br),c2=cross(tr,br,bl),c3=cross(br,bl,tl),c4=cross(bl,tl,tr);
    if(!((c1>0&&c2>0&&c3>0&&c4>0)||(c1<0&&c2<0&&c3<0&&c4<0))) continue;
    // Alan makul olmalı (görüntünün %15–99.5'i)
    const ar=quadArea(tl,tr,bl,br)/(w*h);
    if(ar<0.15||ar>0.995) continue;
    // Köşe açıları perspektif payıyla 90°'ye yakın olmalı
    const a1=ang(tl,tr,bl),a2=ang(tr,tl,br),a3=ang(br,tr,bl),a4=ang(bl,tl,br);
    if(Math.min(a1,a2,a3,a4)<55||Math.max(a1,a2,a3,a4)>125) continue;
    // Skor: çizgi oyları × alan ağırlığı (metin satırları gibi iç çizgiler
    // güçlü olsa da küçük alan verdiği için sayfa sınırı kazanır)
    const score=(h1.v+h2.v+v1.v+v2.v)*Math.pow(ar,0.7);
    if(score>bestScore){bestScore=score;best={tl,tr,bl,br};}
  }
  if(!best) return null;
  const cl=p=>({x:Math.max(0,Math.min(w,p.x)),y:Math.max(0,Math.min(h,p.y))});
  return {tl:cl(best.tl),tr:cl(best.tr),bl:cl(best.bl),br:cl(best.br)};
}

/* ═══ Kâğıt maskesi (beyazlık tabanlı bölütleme) ═══
 * Açık renkli zeminlerde sayfa sınırının kontrastı Canny için çok zayıf
 * kalabilir (eşikler metnin güçlü kenarlarına göre ayarlanır, soluk sayfa
 * sınırı elenir). Ancak kâğıt hemen her zaman zeminden daha "beyaz"dır:
 * min(R,G,B) kâğıtta yüksek, renkli/koyu zeminde düşüktür.
 * Otsu eşiğiyle kâğıt bölgesi ayrılır, en büyük bileşenin DIŞ sınır
 * pikselleri temiz bir kenar haritası olarak döndürülür (içerideki metin
 * delikleri dış sınırı etkilemez). */
function paperMask(data,w,h){
  const N=w*h;
  const wht=new Uint8Array(N);
  const hist=new Int32Array(256);
  for(let i=0;i<N;i++){
    const r=data[i*4],g=data[i*4+1],b=data[i*4+2];
    const mn=r<g?(r<b?r:b):(g<b?g:b);
    wht[i]=mn; hist[mn]++;
  }
  // Otsu eşiği
  let sum=0; for(let t=0;t<256;t++) sum+=t*hist[t];
  let sumB=0,wB=0,maxVar=-1,thr=127;
  for(let t=0;t<256;t++){
    wB+=hist[t]; if(!wB) continue;
    const wF=N-wB; if(!wF) break;
    sumB+=t*hist[t];
    const mB=sumB/wB, mF=(sum-sumB)/wF;
    const v=wB*wF*(mB-mF)*(mB-mF);
    if(v>maxVar){maxVar=v;thr=t;}
  }
  const mask=new Uint8Array(N);
  for(let i=0;i<N;i++) mask[i]=wht[i]>thr?1:0;
  // Kutupluluk: belge genelde ortadadır — merkez bölge maskede olmalı
  const cx0=Math.floor(w*0.4),cx1=Math.ceil(w*0.6);
  const cy0=Math.floor(h*0.4),cy1=Math.ceil(h*0.6);
  let cIn=0,cTot=0;
  for(let y=cy0;y<cy1;y++)for(let x=cx0;x<cx1;x++){cTot++;if(mask[y*w+x])cIn++;}
  if(cIn<cTot*0.5){ for(let i=0;i<N;i++) mask[i]^=1; }
  // En büyük bağlı bileşen (merkeze değenlere öncelik)
  const label=new Int32Array(N);
  const qx=new Int32Array(N), qy=new Int32Array(N);
  let nextL=1, bestL=0, bestScore=-1, bestArea=0;
  for(let sy=0;sy<h;sy++)for(let sx=0;sx<w;sx++){
    const si=sy*w+sx;
    if(!mask[si]||label[si]) continue;
    const L=nextL++;
    let head=0,tail=0,area=0,touchesCenter=false;
    label[si]=L; qx[tail]=sx; qy[tail]=sy; tail++;
    while(head<tail){
      const x=qx[head],y=qy[head]; head++; area++;
      if(x>=cx0&&x<cx1&&y>=cy0&&y<cy1) touchesCenter=true;
      let ni;
      if(x>0  &&mask[ni=y*w+x-1]&&!label[ni]){label[ni]=L;qx[tail]=x-1;qy[tail]=y;tail++;}
      if(x<w-1&&mask[ni=y*w+x+1]&&!label[ni]){label[ni]=L;qx[tail]=x+1;qy[tail]=y;tail++;}
      if(y>0  &&mask[ni=(y-1)*w+x]&&!label[ni]){label[ni]=L;qx[tail]=x;qy[tail]=y-1;tail++;}
      if(y<h-1&&mask[ni=(y+1)*w+x]&&!label[ni]){label[ni]=L;qx[tail]=x;qy[tail]=y+1;tail++;}
    }
    const score=area*(touchesCenter?2:1);
    if(score>bestScore){bestScore=score;bestL=L;bestArea=area;}
  }
  if(!bestL) return null;
  const areaRatio=bestArea/N;
  if(areaRatio<0.1||areaRatio>0.99) return null;
  // Dışarıyı kenarlardan taşır (flood) — bileşen içindeki delikler sayılmaz
  const outside=new Uint8Array(N);
  let head=0,tail=0;
  const push=(x,y)=>{
    const i=y*w+x;
    if(!outside[i]&&label[i]!==bestL){outside[i]=1;qx[tail]=x;qy[tail]=y;tail++;}
  };
  for(let x=0;x<w;x++){push(x,0);push(x,h-1);}
  for(let y=0;y<h;y++){push(0,y);push(w-1,y);}
  while(head<tail){
    const x=qx[head],y=qy[head]; head++;
    if(x>0)push(x-1,y); if(x<w-1)push(x+1,y);
    if(y>0)push(x,y-1); if(y<h-1)push(x,y+1);
  }
  // Dış sınır: bileşende olup dışarıya (veya görüntü kenarına) komşu pikseller
  const edge=new Uint8Array(N);
  let cnt=0;
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    const i=y*w+x;
    if(label[i]!==bestL) continue;
    if(x===0||x===w-1||y===0||y===h-1||
       outside[i-1]||outside[i+1]||outside[i-w]||outside[i+w]){
      edge[i]=2; cnt++;
    }
  }
  if(cnt<60) return null;
  return {edge, areaRatio};
}

/* Dörtgenin her kenarının kenar haritasınca desteklenme oranı (en zayıf kenar).
 * Hough bazen gürültüden güçlü ama gerçekte var olmayan çizgi seçebilir;
 * gerçek bir belge sınırında dört kenarın da altında kenar pikselleri bulunur. */
function quadEdgeSupport(q,edge,w,h){
  const sides=[[q.tl,q.tr],[q.tr,q.br],[q.br,q.bl],[q.bl,q.tl]];
  let minSup=1;
  for(const [a,b] of sides){
    const N=40; let hit=0;
    for(let i=0;i<=N;i++){
      const x=Math.round(a.x+(b.x-a.x)*i/N);
      const y=Math.round(a.y+(b.y-a.y)*i/N);
      let found=false;
      for(let dy=-2;dy<=2&&!found;dy++)for(let dx=-2;dx<=2;dx++){
        const nx=x+dx, ny=y+dy;
        if(nx>=0&&ny>=0&&nx<w&&ny<h&&edge[ny*w+nx]===2){found=true;break;}
      }
      if(found)hit++;
    }
    minSup=Math.min(minSup,hit/(N+1));
  }
  return minSup;
}

/* ═══ Ortak belge tespiti (üç aşamalı) ═══
 * 1) Kâğıt maskesi sınırı + Hough  → açık/koyu her zeminde en sağlam yol
 * 2) Canny + Hough                 → maske ayrışmazsa (ör. beyaz zemin üstü beyaz kâğıt)
 * 3) Eski nokta tabanlı yöntem     → son çare
 * Dönen quad çalışma (küçültülmüş) koordinatlarındadır; bulunamazsa null. */
function detectDocQuad(imgData, sw, sh){
  try{
    const pm=paperMask(imgData.data,sw,sh);
    if(pm){
      let q=houghDetectQuad(pm.edge,sw,sh);
      if(q){
        const qa=quadArea(q.tl,q.tr,q.bl,q.br)/(sw*sh);
        // Dörtgen alanı maske alanıyla tutarlı olmalı (yanlış çizgi seçimine karşı)
        if(qa>pm.areaRatio*0.7&&qa<pm.areaRatio*1.35) return q;
      }
      // Maske sınırı gürültüsüz olduğundan köşe-skoru yöntemi de burada güvenilirdir
      q=findDocumentQuad(pm.edge,sw,sh);
      if(q) return q;
    }
    const edge=cannyEdgeDetect(imgData.data,sw,sh);
    let q=houghDetectQuad(edge,sw,sh);
    if(q&&quadEdgeSupport(q,edge,sw,sh)>=0.45) return q;
    q=findDocumentQuad(edge,sw,sh);
    if(q){
      const snap=r=>snapCornerToEdge(r,edge,sw,sh,8);
      return {tl:snap(q.tl),tr:snap(q.tr),bl:snap(q.bl),br:snap(q.br)};
    }
  }catch(err){ console.error('detectDocQuad error:',err); }
  return null;
}

function autoCrop(){
  tool='crop'; rRect=null; brushPoints=[];
  document.querySelectorAll('.etbtn').forEach(b=>b.classList.remove('on'));
  document.getElementById('tCrop').classList.add('on');
  document.getElementById('redactBar').style.display='none';

  const src=history[history.length-1]||pages[edIdx].cur;
  const img=new Image();
  img.onload=()=>{
    // Work at reduced size for speed, then scale results back.
    // 520px: metin/detay kenarları küçülmede kaybolur, sayfa sınırı belirgin kalır.
    const MAX=520;
    const scale=Math.min(1,MAX/Math.max(img.width,img.height));
    const sw=Math.round(img.width*scale), sh=Math.round(img.height*scale);

    const c=document.createElement('canvas');
    c.width=sw; c.height=sh;
    const ctx=c.getContext('2d');
    ctx.drawImage(img,0,0,sw,sh);

    try{
      const result=detectDocQuad(ctx.getImageData(0,0,sw,sh),sw,sh);

      if(result){
        // Scale back to full image coordinates
        const S=1/scale;
        const cl=(v,m)=>Math.max(0,Math.min(m,Math.round(v*S)));
        quad={
          tl:{x:cl(result.tl.x,img.width), y:cl(result.tl.y,img.height)},
          tr:{x:cl(result.tr.x,img.width), y:cl(result.tr.y,img.height)},
          bl:{x:cl(result.bl.x,img.width), y:cl(result.bl.y,img.height)},
          br:{x:cl(result.br.x,img.width), y:cl(result.br.y,img.height)},
        };
      } else {
        // Fallback: full image with small margin
        const m=Math.round(Math.min(img.width,img.height)*0.02);
        quad=rectToQuad(m,m,img.width-2*m,img.height-2*m);
      }
    } catch(err){
      console.error('autoCrop error:',err);
      // Hata durumunda güvenli fallback
      const m=Math.round(Math.min(img.width,img.height)*0.02);
      quad=rectToQuad(m,m,img.width-2*m,img.height-2*m);
    }
    cropRect=null;
    redrawEc();
  };
  img.src=src;
}

/* ═══ PERSPECTIVE TRANSFORM HELPERS ═══
 * Solves the 3x3 homography H such that H * [src] = [dst]
 * for 4 point correspondences, then applies inverse warp
 * pixel-by-pixel for correct perspective correction.
 */
function solveHomography(src, dst){
  // src and dst are arrays of 4 points [{x,y}, ...]
  // Returns 3x3 matrix as flat array [h00,h01,h02, h10,h11,h12, h20,h21,h22]
  // Using the standard DLT (Direct Linear Transform) method
  const A = [];
  for(let i=0;i<4;i++){
    const sx=src[i].x, sy=src[i].y;
    const dx=dst[i].x, dy=dst[i].y;
    A.push([-sx,-sy,-1, 0,0,0, dx*sx,dx*sy,dx]);
    A.push([0,0,0, -sx,-sy,-1, dy*sx,dy*sy,dy]);
  }
  // Solve using SVD-free approach: normalize and use Gaussian elimination
  // We have 8 equations, 8 unknowns (h22=1 fixed)
  // Rearrange: last column of each row moves to RHS
  const M = A.map(row => row.slice(0,8));
  const b = A.map(row => -row[8]);

  // Gaussian elimination with partial pivoting
  for(let col=0;col<8;col++){
    // Find pivot
    let maxRow=col;
    for(let row=col+1;row<8;row++){
      if(Math.abs(M[row][col])>Math.abs(M[maxRow][col])) maxRow=row;
    }
    [M[col],M[maxRow]]=[M[maxRow],M[col]];
    [b[col],b[maxRow]]=[b[maxRow],b[col]];
    if(Math.abs(M[col][col])<1e-10) continue;
    for(let row=0;row<8;row++){
      if(row===col) continue;
      const factor=M[row][col]/M[col][col];
      for(let c=col;c<8;c++) M[row][c]-=factor*M[col][c];
      b[row]-=factor*b[col];
    }
  }
  const h=new Array(9);
  for(let i=0;i<8;i++) h[i]=b[i]/M[i][i];
  h[8]=1;
  return h;
}

function applyHomography(H, x, y){
  const w = H[6]*x + H[7]*y + H[8];
  const ox = (H[0]*x + H[1]*y + H[2]) / w;
  const oy = (H[3]*x + H[4]*y + H[5]) / w;
  return {x:ox, y:oy};
}

/* ═══ Gerçek en/boy oranı kestirimi (Zhang, whiteboard rektifikasyonu) ═══
 * Açılı çekimde perspektif kısalması yüzünden dörtgenin kenar uzunlukları
 * belgenin GERÇEK oranını vermez → düzeltilen sayfa basık/uzamış görünür.
 * Bu fonksiyon iğne deliği kamera modeliyle (ana nokta görüntü merkezinde)
 * dikdörtgenin gerçek genişlik/yükseklik oranını kestirir.
 * Sentetik projeksiyon testlerinde 2°–40° eğimlerde hata %0.0'dır. */
function estimateQuadAspect(q, imgW, imgH){
  const u0=imgW/2, v0=imgH/2;
  const M=p=>[p.x-u0, p.y-v0, 1];
  const m1=M(q.tl), m2=M(q.tr), m3=M(q.bl), m4=M(q.br);
  const cross=(a,b)=>[a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]];
  const dot=(a,b)=>a[0]*b[0]+a[1]*b[1]+a[2]*b[2];
  const c14=cross(m1,m4);
  const den2=dot(cross(m2,m4),m3), den3=dot(cross(m3,m4),m2);
  if(Math.abs(den2)<1e-9||Math.abs(den3)<1e-9) return null;
  const k2=dot(c14,m3)/den2;
  const k3=dot(c14,m2)/den3;
  const n2=[k2*m2[0]-m1[0], k2*m2[1]-m1[1], k2*m2[2]-m1[2]];
  const n3=[k3*m3[0]-m1[0], k3*m3[1]-m1[1], k3*m3[2]-m1[2]];
  let ratio;
  if(Math.abs(n2[2])>1e-6&&Math.abs(n3[2])>1e-6){
    const f2=-(n2[0]*n3[0]+n2[1]*n3[1])/(n2[2]*n3[2]);   // odak uzaklığı²
    if(!(f2>0)) return null;
    // KARARLILIK KAPISI: dörtgen paralelkenara yakınsa payda gürültüden
    // ibarettir ve f² saçma çıkar (ör. 2e10 px) — köşedeki 1 piksellik fark
    // oranı uçurabilir. Kestirilen odak fiziksel olarak makul değilse
    // (kamera odağı görüntü boyutunun ~0.25–6 katı aralığındadır) güvenme.
    const f=Math.sqrt(f2), D=Math.max(imgW,imgH);
    if(f<0.25*D||f>6*D) return null;
    ratio=Math.sqrt((n2[0]*n2[0]+n2[1]*n2[1]+f2*n2[2]*n2[2])/
                    (n3[0]*n3[0]+n3[1]*n3[1]+f2*n3[2]*n3[2]));
  }else{
    // paralelkenara çok yakın: perspektif yok, kenar oranı zaten doğru
    ratio=Math.hypot(n2[0],n2[1])/Math.hypot(n3[0],n3[1]);
  }
  if(!isFinite(ratio)||ratio<0.15||ratio>7) return null;
  return ratio; // genişlik / yükseklik
}

/* Warp çıktı boyutu: kenar uzunluklarından başla, gerçek oranla düzelt.
 * Çözünürlük kaybetmemek için hep BÜYÜTEREK orana oturtulur. */
function quadOutSize(q, imgW, imgH){
  const topW  =Math.hypot(q.tr.x-q.tl.x, q.tr.y-q.tl.y);
  const botW  =Math.hypot(q.br.x-q.bl.x, q.br.y-q.bl.y);
  const leftH =Math.hypot(q.bl.x-q.tl.x, q.bl.y-q.tl.y);
  const rightH=Math.hypot(q.br.x-q.tr.x, q.br.y-q.tr.y);
  let outW=Math.max(topW,botW), outH=Math.max(leftH,rightH);
  const r=estimateQuadAspect(q,imgW,imgH);
  if(r){
    const cur=outW/outH;
    const dev=Math.abs(r-cur)/cur;
    // %4'ten küçük sapma: gürültü, dokunma.
    // %35'ten büyük sapma: kestirim kararsız demektir — el çekiminde
    // perspektif kısalması 40° eğimde bile ancak ~%27 oran hatası yaratır
    // (sentetik kalibrasyon). Bu durumda kenar oranına güvenmek daha doğru.
    if(dev>0.04&&dev<=0.35){
      if(r>cur) outW=outH*r;
      else      outH=outW/r;
    }
  }
  return {outW:Math.round(outW), outH:Math.round(outH)};
}

function perspectiveWarp(srcCanvas, srcQuad, outW, outH){
  // srcQuad: {tl,tr,bl,br} in source image coords
  // outW, outH: output dimensions
  // Returns a new canvas with the warped content
  const dst = [
    {x:0,     y:0},
    {x:outW,  y:0},
    {x:0,     y:outH},
    {x:outW,  y:outH}
  ];
  const srcPts = [srcQuad.tl, srcQuad.tr, srcQuad.bl, srcQuad.br];

  // Compute inverse homography: dst -> src (so we can do inverse mapping)
  const H_inv = solveHomography(dst, srcPts);

  const out = document.createElement('canvas');
  out.width = outW; out.height = outH;
  const octx = out.getContext('2d');

  // Get source pixel data
  const sctx = srcCanvas.getContext('2d');
  const srcData = sctx.getImageData(0, 0, srcCanvas.width, srcCanvas.height);
  const sd = srcData.data;
  const sw = srcCanvas.width, sh = srcCanvas.height;

  const outData = octx.createImageData(outW, outH);
  const od = outData.data;

  for(let dy=0; dy<outH; dy++){
    for(let dx=0; dx<outW; dx++){
      // Map output pixel back to source
      const sp = applyHomography(H_inv, dx+0.5, dy+0.5);
      const sx = sp.x, sy = sp.y;

      // Bilinear interpolation
      const x0=Math.floor(sx), y0=Math.floor(sy);
      const x1=x0+1, y1=y0+1;
      const fx=sx-x0, fy=sy-y0;

      if(x0<0||y0<0||x1>=sw||y1>=sh){
        // Out of bounds → white
        const oi=(dy*outW+dx)*4;
        od[oi]=od[oi+1]=od[oi+2]=255; od[oi+3]=255;
        continue;
      }

      const i00=(y0*sw+x0)*4;
      const i10=(y0*sw+x1)*4;
      const i01=(y1*sw+x0)*4;
      const i11=(y1*sw+x1)*4;

      const oi=(dy*outW+dx)*4;
      for(let c=0;c<3;c++){
        od[oi+c]=Math.round(
          sd[i00+c]*(1-fx)*(1-fy) +
          sd[i10+c]*fx*(1-fy) +
          sd[i01+c]*(1-fx)*fy +
          sd[i11+c]*fx*fy
        );
      }
      od[oi+3]=255;
    }
  }

  octx.putImageData(outData, 0, 0);
  return out;
}

/* ═══ APPLY EDIT ═══ */
function applyEd(){
  // OCR alan seçimi Apply ile sayfaya uygulanmaz — sadece mod kapanır
  if(tool==='ocrQuad'){ exitOcrMode(); return; }
  // commit any pending rect redact first
  if(rRect&&tool==='redactRect'){ commitRRect(); return; }
  const src=history[history.length-1]||pages[edIdx].cur;
  const img=new Image();
  img.onload=()=>{
    // Build source canvas from current history state
    const srcCanvas=document.createElement('canvas');
    srcCanvas.width=img.width; srcCanvas.height=img.height;
    srcCanvas.getContext('2d').drawImage(img,0,0);

    if(quad){
      // Çıktı boyutu: kenar uzunlukları + GERÇEK oran düzeltmesi (Zhang)
      // → açılı çekimler PDF'te basık/uzamış görünmez
      const {outW,outH}=quadOutSize(quad, img.width, img.height);

      if(outW>4 && outH>4){
        // Apply perspective warp — corrects skew/perspective to perfect rectangle
        const warped = perspectiveWarp(srcCanvas, quad, outW, outH);
        pages[edIdx].cur = warped.toDataURL('image/jpeg', 0.92);
        selectPage(edIdx);
        renderStrip();
        closeEd();
        return;
      }
    }

    // No quad: just save current state as-is
    pages[edIdx].cur = srcCanvas.toDataURL('image/jpeg', 0.92);
    selectPage(edIdx);
    renderStrip();
    closeEd();
  };
  img.src=src;
}

/* ═══ TÜMÜNÜ OTOMATİK KIRP (ana ekran ✨ Auto butonu) ═══
 * Seçim varsa yalnızca seçili sayfaları, yoksa tüm sayfaları sırayla
 * otomatik tespit edip perspektif düzeltmeyle kırpar.
 * pages[i].orig korunur → herhangi bir sayfa sonradan Edit ile açılıp
 * Reset'lenerek orijinaline döndürülebilir ve elle yeniden kırpılabilir. */
let autoAllBusy=false;

function autoCropPage(idx, cb){
  const img=new Image();
  img.onload=()=>{
    try{
      const MAX=520;
      const scale=Math.min(1,MAX/Math.max(img.width,img.height));
      const sw=Math.round(img.width*scale), sh=Math.round(img.height*scale);
      const c=document.createElement('canvas');
      c.width=sw; c.height=sh;
      const ctx=c.getContext('2d');
      ctx.drawImage(img,0,0,sw,sh);

      const q=detectDocQuad(ctx.getImageData(0,0,sw,sh),sw,sh);
      if(!q){ cb(false); return; }

      const S=1/scale;
      const cl=(v,m)=>Math.max(0,Math.min(m,Math.round(v*S)));
      const fq={
        tl:{x:cl(q.tl.x,img.width), y:cl(q.tl.y,img.height)},
        tr:{x:cl(q.tr.x,img.width), y:cl(q.tr.y,img.height)},
        bl:{x:cl(q.bl.x,img.width), y:cl(q.bl.y,img.height)},
        br:{x:cl(q.br.x,img.width), y:cl(q.br.y,img.height)},
      };

      // Neredeyse tam kadraj bulunduysa (muhtemelen zaten kırpılmış) dokunma
      const mrg=Math.min(img.width,img.height)*0.015;
      const nearFull=
        fq.tl.x<mrg && fq.tl.y<mrg &&
        fq.tr.x>img.width-mrg && fq.tr.y<mrg &&
        fq.bl.x<mrg && fq.bl.y>img.height-mrg &&
        fq.br.x>img.width-mrg && fq.br.y>img.height-mrg;
      if(nearFull){ cb(true); return; }

      // applyEd ile aynı hesap: kenar uzunlukları + gerçek oran düzeltmesi
      const {outW,outH}=quadOutSize(fq, img.width, img.height);
      if(outW<=4||outH<=4){ cb(false); return; }

      const srcCanvas=document.createElement('canvas');
      srcCanvas.width=img.width; srcCanvas.height=img.height;
      srcCanvas.getContext('2d').drawImage(img,0,0);
      const warped=perspectiveWarp(srcCanvas,fq,outW,outH);
      pages[idx].cur=warped.toDataURL('image/jpeg',0.92);
      cb(true);
    }catch(err){
      console.error('autoCropPage error:',err);
      cb(false);
    }
  };
  img.onerror=()=>cb(false);
  img.src=pages[idx].cur;
}

function autoCropAll(){
  if(autoAllBusy||!pages.length) return;
  autoAllBusy=true;

  // Seçim varsa sadece seçilenler, yoksa hepsi
  const idxs=selectedPages.size?[...selectedPages].sort((a,b)=>a-b)
                               :pages.map((_,i)=>i);
  const total=idxs.length;
  let done=0, okCnt=0, failCnt=0;

  const prog=document.getElementById('autoAllProg');
  const lbl =document.getElementById('autoAllLabel');
  const fill=document.getElementById('autoAllBarFill');
  prog.style.display='flex';
  fill.style.width='0%';

  function finish(){
    lbl.textContent=failCnt?('✓ '+okCnt+' cropped — '+failCnt+' skipped (edit manually)')
                           :('✓ '+okCnt+' page'+(okCnt>1?'s':'')+' auto-cropped');
    fill.style.width='100%';
    renderStrip();
    if(curIdx!==null&&pages.length) selectPage(Math.min(curIdx,pages.length-1));
    updateUI();
    setTimeout(()=>{ prog.style.display='none'; autoAllBusy=false; },1400);
  }

  function step(){
    if(done>=total||done>=idxs.length){ finish(); return; }
    const idx=idxs[done];
    lbl.textContent='Auto crop — page '+(idx+1)+'  ('+(done+1)+'/'+total+')';
    fill.style.width=Math.round(done/total*100)+'%';
    // UI'nin nefes alması için küçük gecikmeyle sırayla işle
    setTimeout(()=>{
      if(idx>=pages.length){ done++; step(); return; }
      autoCropPage(idx, ok=>{
        ok?okCnt++:failCnt++;
        done++;
        renderStrip();
        step();
      });
    },30);
  }
  step();
}

/* ═══ LOUPE (köşe aynası) ═══
 * Artık ed-canvas-area içinde position:absolute.
 * Sürüklenen köşe sol yarıdaysa loupe sağ üste,
 * sağ yarıdaysa sol üste sabitlenir — parmak görüşü engellemiyor.
 */
const loupeEl     = document.getElementById('loupe');
const loupeCanvas = document.getElementById('loupeCanvas');
const lctx        = loupeCanvas.getContext('2d');
const LOUPE_SIZE  = 110;  // px — CSS ile eşleşmeli
loupeCanvas.width  = LOUPE_SIZE;
loupeCanvas.height = LOUPE_SIZE;

// RAF throttle — loupe için
let _loupeRaf = null;

function showLoupe(touchClientX, _unused, imgX, imgY){
  // Hangi tarafta? → köşenin canvas-area içindeki ekran X pozisyonu
  const area = document.getElementById('edCanvasArea');
  const areaRect = area.getBoundingClientRect();
  const cornerRelX = touchClientX - areaRect.left;
  const isLeftHalf = cornerRelX < areaRect.width / 2;

  // Loupe'u karşı üst köşeye sabitle (CSS top:12px sabit, sadece left/right değişir)
  loupeEl.style.removeProperty('left');
  loupeEl.style.removeProperty('right');
  if(isLeftHalf){
    loupeEl.style.right = '12px';  // sol köşe sürükleniyorsa sağda göster
  } else {
    loupeEl.style.left  = '12px';  // sağ köşe sürükleniyorsa solda göster
  }

  // İçeriği RAF ile güncelle — flicker engellemek için sync çizim
  if(_loupeRaf) cancelAnimationFrame(_loupeRaf);
  _loupeRaf = requestAnimationFrame(()=>{
    if(!_cachedImg) return;
    // Zoom: 2× büyütme (köşeyi net görmek için)
    const zoom = 2.5;
    const srcSize = LOUPE_SIZE / (edSc * vZ * zoom);
    lctx.clearRect(0, 0, LOUPE_SIZE, LOUPE_SIZE);
    lctx.drawImage(
      _cachedImg,
      imgX - srcSize/2, imgY - srcSize/2, srcSize, srcSize,
      0, 0, LOUPE_SIZE, LOUPE_SIZE
    );
    // Overlay çizgilerini de üstüne koy (köşe konumunu görmek için)
    lctx.save();
    lctx.strokeStyle = 'rgb(0,0,0)';
    lctx.lineWidth = 1.5;
    lctx.beginPath();
    lctx.moveTo(LOUPE_SIZE/2, 0); lctx.lineTo(LOUPE_SIZE/2, LOUPE_SIZE);
    lctx.moveTo(0, LOUPE_SIZE/2); lctx.lineTo(LOUPE_SIZE, LOUPE_SIZE/2);
    lctx.stroke();
    lctx.restore();
    _loupeRaf = null;
  });

  loupeEl.style.display = 'block';
}

function hideLoupe(){
  loupeEl.style.display = 'none';
  if(_loupeRaf){ cancelAnimationFrame(_loupeRaf); _loupeRaf=null; }
}

/* ═══ CANVAS COORDS ═══ */
function canvasPt(clientX,clientY){
  const r=ec.getBoundingClientRect();
  const x=(clientX-r.left)*(ec.width/r.width);
  const y=(clientY-r.top)*(ec.height/r.height);
  return{x, y};
}
function nearQuadCorner(ix,iy){
  if(!quad)return null;
  const hs=30/(edSc*(vZ||1));   // ekranda ~30px sabit dokunma alanı (zoom dahil)
  let best=null,bd=hs;
  for(const name of['tl','tr','bl','br']){
    const p=quad[name];
    const d=Math.hypot(ix-p.x,iy-p.y);
    if(d<bd){bd=d;best=name;}    // yakın köşelerde EN YAKINI seçilir
  }
  return best;
}
function nearEdgeMid(ix,iy){
  if(!quad)return null;
  const hs=26/(edSc*(vZ||1));
  const{tl,tr,bl,br}=quad;
  const mids={
    top:   {x:(tl.x+tr.x)/2, y:(tl.y+tr.y)/2},
    right: {x:(tr.x+br.x)/2, y:(tr.y+br.y)/2},
    bottom:{x:(bl.x+br.x)/2, y:(bl.y+br.y)/2},
    left:  {x:(tl.x+bl.x)/2, y:(tl.y+bl.y)/2},
  };
  let best=null,bd=hs;
  for(const[name,p] of Object.entries(mids)){
    const d=Math.hypot(ix-p.x,iy-p.y);
    if(d<bd){bd=d;best=name;}
  }
  return best;
}
function moveEdgeMid(edgeName, ix, iy){
  if(!quad)return;
  const{tl,tr,bl,br}=quad;
  if(edgeName==='top'){
    const dy=iy-(tl.y+tr.y)/2;
    quad.tl={x:tl.x,y:tl.y+dy};
    quad.tr={x:tr.x,y:tr.y+dy};
  } else if(edgeName==='bottom'){
    const dy=iy-(bl.y+br.y)/2;
    quad.bl={x:bl.x,y:bl.y+dy};
    quad.br={x:br.x,y:br.y+dy};
  } else if(edgeName==='left'){
    const dx=ix-(tl.x+bl.x)/2;
    quad.tl={x:tl.x+dx,y:tl.y};
    quad.bl={x:bl.x+dx,y:bl.y};
  } else if(edgeName==='right'){
    const dx=ix-(tr.x+br.x)/2;
    quad.tr={x:tr.x+dx,y:tr.y};
    quad.br={x:br.x+dx,y:br.y};
  }
}
function isInsideQuad(ix,iy){
  if(!quad)return false;
  const{tl,tr,bl,br}=quad;
  const pts=[tl,tr,br,bl];
  let inside=false;
  for(let i=0,j=pts.length-1;i<pts.length;j=i++){
    const xi=pts[i].x,yi=pts[i].y,xj=pts[j].x,yj=pts[j].y;
    if(((yi>iy)!==(yj>iy))&&(ix<(xj-xi)*(iy-yi)/(yj-yi)+xi)) inside=!inside;
  }
  return inside;
}
function moveQuadCorner(name,ix,iy){
  if(!quad)return;
  quad[name]={x:ix,y:iy};
}
let brushPoints = [];
let rRect=null;
let _dragRaf=null;
let rRectDragCorner=null, rRectPanStart=null, rRectAtPan=null;

function commitBrushStroke(){
  if(!brushPoints.length) return;
  const pts=[...brushPoints];
  const r=brushRadius;
  brushPoints=[];
  const src=history[history.length-1]||pages[edIdx].cur;
  const img=new Image();
  img.onload=()=>{
    const c=document.createElement('canvas');
    c.width=img.width;c.height=img.height;
    const ctx=c.getContext('2d');ctx.drawImage(img,0,0);
    ctx.strokeStyle='#ffffff';
    ctx.lineWidth=r*2;
    ctx.lineCap='round';
    ctx.lineJoin='round';
    ctx.beginPath();
    ctx.moveTo(pts[0][0],pts[0][1]);
    pts.forEach(([bx,by])=>ctx.lineTo(bx,by));
    ctx.stroke();
    ctx.fillStyle='#fff';
    [pts[0],pts[pts.length-1]].forEach(([bx,by])=>{
      ctx.beginPath();ctx.arc(bx,by,r,0,Math.PI*2);ctx.fill();
    });
    const newUrl=c.toDataURL('image/jpeg',0.92);
    history.push(newUrl);
    invalidateBitmapCache();
    redrawEc(newUrl);
  };
  img.src=src;
}

function drawBrushLive(ix,iy){
  const r=brushRadius;
  const prev=brushPoints.length>1?brushPoints[brushPoints.length-2]:null;
  if(prev){
    ectx.strokeStyle='#ffffff';
    ectx.lineWidth=r*2;ectx.lineCap='round';ectx.lineJoin='round';
    ectx.beginPath();ectx.moveTo(prev[0],prev[1]);ectx.lineTo(ix,iy);ectx.stroke();
  } else {
    ectx.fillStyle='#ffffff';
    ectx.beginPath();ectx.arc(ix,iy,r,0,Math.PI*2);ectx.fill();
  }
}
function drawRRect(){
  if(!rRect) return;
  const{x,y,w,h}=rRect;
  const ovS=edSc*(vZ||1), px=v=>v/ovS;
  const fillC=redactColor==='black'?'rgba(0,0,0,0.6)':'rgba(255,255,255,0.6)';
  const strokeC=redactColor==='black'?'#333':'#ffffff';
  ectx.fillStyle=fillC;
  ectx.fillRect(x,y,w,h);
  ectx.strokeStyle=strokeC;
  ectx.lineWidth=px(2);
  ectx.setLineDash([px(8),px(4)]);
  ectx.strokeRect(x,y,w,h);
  ectx.setLineDash([]);
  const cs=Math.min(px(7),Math.max(px(3),Math.min(w,h)*0.25));
  [[x,y],[x+w,y],[x,y+h],[x+w,y+h]].forEach(([cx,cy])=>{
    ectx.fillStyle=strokeC;
    ectx.fillRect(cx-cs/2,cy-cs/2,cs,cs);
  });
  if(Math.min(w,h)*ovS>=56){
    const ccx=x+w/2, ccy=y+h/2;
    const arm=px(9);
    ectx.strokeStyle=redactColor==='black'?'rgba(255,255,255,0.7)':'rgba(0,0,0,0.5)';
    ectx.lineWidth=px(1.6);
    ectx.beginPath();
    ectx.moveTo(ccx-arm,ccy);ectx.lineTo(ccx+arm,ccy);
    ectx.moveTo(ccx,ccy-arm);ectx.lineTo(ccx,ccy+arm);
    ectx.stroke();
  }
}

/* OCR alan seçici — kenarları DÜZ ama gerekirse EĞİK dörtgen.
 * Köşeler bağımsız sürüklenir (açılı fotoğraflarda metne oturtulabilir),
 * içinden tutup taşınır, dışına çizerek yeniden başlanır.
 * Eğik seçimler taranmadan önce perspektif düzeltmeden geçer. */
function drawOcrQuad(){
  if(!quad) return;
  const{tl,tr,bl,br}=quad;
  const ovS=edSc*(vZ||1), px=v=>v/ovS;
  const path=()=>{
    ectx.beginPath();
    ectx.moveTo(tl.x,tl.y);ectx.lineTo(tr.x,tr.y);
    ectx.lineTo(br.x,br.y);ectx.lineTo(bl.x,bl.y);
    ectx.closePath();
  };
  ectx.save();
  ectx.lineJoin='round';
  // okunacak alan dışını karart
  ectx.beginPath();
  ectx.rect(0,0,ec.width,ec.height);
  ectx.moveTo(tl.x,tl.y);ectx.lineTo(tr.x,tr.y);
  ectx.lineTo(br.x,br.y);ectx.lineTo(bl.x,bl.y);ectx.closePath();
  ectx.fillStyle='rgba(0,0,0,0.45)';
  ectx.fill('evenodd');
  // ince çerçeve: beyaz hale + siyah çekirdek
  ectx.strokeStyle='rgba(255,255,255,0.9)';
  ectx.lineWidth=px(3.2);
  path();ectx.stroke();
  ectx.strokeStyle='#000';
  ectx.lineWidth=px(1.4);
  path();ectx.stroke();
  // köşe tutamaçları (küçük kare, beyaz haleli) — yakınlıkla daralır
  const pts=[tl,tr,br,bl];
  let minPair=Infinity;
  for(let i=0;i<4;i++)for(let j=i+1;j<4;j++)
    minPair=Math.min(minPair,Math.hypot(pts[i].x-pts[j].x,pts[i].y-pts[j].y));
  const cs=Math.min(px(9),Math.max(px(4),minPair*0.3));
  [tl,tr,bl,br].forEach(p=>{
    ectx.fillStyle='rgba(255,255,255,0.95)';
    ectx.fillRect(p.x-cs/2-px(1.2),p.y-cs/2-px(1.2),cs+px(2.4),cs+px(2.4));
    ectx.fillStyle='#000';
    ectx.fillRect(p.x-cs/2,p.y-cs/2,cs,cs);
  });
  // kenar ortası hapları — kenarı eğmek için (ekranda kısa kenarda gizli)
  [{a:tl,b:tr},{a:tr,b:br},{a:bl,b:br},{a:tl,b:bl}].forEach(({a,b})=>{
    const len=Math.hypot(b.x-a.x,b.y-a.y);
    if(len*ovS<46) return;
    const rw=Math.min(px(11),len*0.3), rh=px(4.4);
    const mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
    const angle=Math.atan2(b.y-a.y,b.x-a.x);
    ectx.save();
    ectx.translate(mx,my);ectx.rotate(angle);
    ectx.strokeStyle='rgba(255,255,255,0.9)';
    ectx.lineWidth=px(3);
    ectx.beginPath();roundRect(ectx,-rw/2,-rh/2,rw,rh,rh/2);ectx.stroke();
    ectx.strokeStyle='#000';
    ectx.lineWidth=px(1.3);
    ectx.beginPath();roundRect(ectx,-rw/2,-rh/2,rw,rh,rh/2);ectx.stroke();
    ectx.restore();
  });
  // ortada küçük taşıma işareti
  const wsp=Math.min(
    Math.hypot(tr.x-tl.x,tr.y-tl.y),Math.hypot(br.x-bl.x,br.y-bl.y),
    Math.hypot(bl.x-tl.x,bl.y-tl.y),Math.hypot(br.x-tr.x,br.y-tr.y)
  );
  if(wsp*ovS>=64){
    const ccx=(tl.x+tr.x+bl.x+br.x)/4, ccy=(tl.y+tr.y+bl.y+br.y)/4;
    const arm=px(6);
    const crossM=(col,lw)=>{
      ectx.strokeStyle=col; ectx.lineWidth=lw;
      ectx.beginPath();
      ectx.moveTo(ccx-arm,ccy);ectx.lineTo(ccx+arm,ccy);
      ectx.moveTo(ccx,ccy-arm);ectx.lineTo(ccx,ccy+arm);
      ectx.stroke();
    };
    crossM('rgba(255,255,255,0.9)',px(3));
    crossM('#000',px(1.3));
  }
  ectx.restore();
}
function nearRRectCorner(ix,iy){
  if(!rRect)return null;
  const hs=30/(edSc*(vZ||1));
  const{x,y,w,h}=rRect;
  const pts=[['tl',x,y],['tr',x+w,y],['bl',x,y+h],['br',x+w,y+h]];
  let best=null,bd=hs;
  for(const[n,cx,cy]of pts){
    const d=Math.hypot(ix-cx,iy-cy);
    if(d<bd){bd=d;best=n;}
  }
  return best;
}
function moveRRectCorner(name,ix,iy){
  if(!rRect)return;
  const r=rRect;
  if(name==='tl'){r.w+=r.x-ix;r.h+=r.y-iy;r.x=ix;r.y=iy;}
  else if(name==='tr'){r.w=ix-r.x;r.h+=r.y-iy;r.y=iy;}
  else if(name==='bl'){r.w+=r.x-ix;r.x=ix;r.h=iy-r.y;}
  else if(name==='br'){r.w=ix-r.x;r.h=iy-r.y;}
  if(r.w<0){r.x+=r.w;r.w=Math.abs(r.w);}
  if(r.h<0){r.y+=r.h;r.h=Math.abs(r.h);}
}
function isInsideRRect(ix,iy){
  if(!rRect)return false;
  return ix>=rRect.x&&ix<=rRect.x+rRect.w&&iy>=rRect.y&&iy<=rRect.y+rRect.h;
}
function commitRRect(){
  if(!rRect)return;
  const r={...rRect};
  rRect=null;
  const src=history[history.length-1]||pages[edIdx].cur;
  const img=new Image();
  img.onload=()=>{
    const c=document.createElement('canvas');
    c.width=img.width;c.height=img.height;
    const ctx=c.getContext('2d');ctx.drawImage(img,0,0);
    ctx.fillStyle=redactColor==='black'?'#000000':'#ffffff';
    ctx.fillRect(Math.round(r.x),Math.round(r.y),Math.round(r.w),Math.round(r.h));
    const newUrl=c.toDataURL('image/jpeg',0.92);
    history.push(newUrl);
    invalidateBitmapCache();
    redrawEc(newUrl);
  };
  img.src=src;
}
function drawLive(ix0,iy0,ix1,iy1){
  const sx=Math.min(ix0,ix1),sy=Math.min(iy0,iy1);
  const sw=Math.abs(ix1-ix0),sh=Math.abs(iy1-iy0);
  if(tool==='redact'){
    ectx.fillStyle='rgba(255,255,255,.45)';ectx.fillRect(sx,sy,sw,sh);
  }else if(tool==='crop'||tool==='ocrQuad'){
    ectx.strokeStyle='#1a2a4a';ectx.lineWidth=Math.max(2,3/edSc);ectx.setLineDash([10,5]);
    ectx.strokeRect(sx,sy,sw,sh);ectx.setLineDash([]);
  }
}

/* Touch */
ec.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===2){
    const t0=e.touches[0],t1=e.touches[1];
    pinch0=Math.hypot(t0.clientX-t1.clientX,t0.clientY-t1.clientY);
    pinchMidX=(t0.clientX+t1.clientX)/2;
    pinchMidY=(t0.clientY+t1.clientY)/2;
    drawing=false; dragCorner=null; panStart=null; vpanStart=null;
    return;
  }
  const p=canvasPt(e.touches[0].clientX,e.touches[0].clientY);
  if(tool==='redactRect'){
    rRectDragCorner=nearRRectCorner(p.x,p.y);
    if(rRectDragCorner) return;
    if(rRect && isInsideRRect(p.x,p.y)){
      rRectPanStart={x:p.x,y:p.y};
      rRectAtPan={...rRect};
      return;
    }
    rRect=null; drawing=true; px0=p.x; py0=p.y; px1=p.x; py1=p.y;
    return;
  }
  dragCorner=nearQuadCorner(p.x,p.y);
  if(dragCorner){
    dragEdge=null;
    showLoupe(e.touches[0].clientX, e.touches[0].clientY, p.x, p.y);
    return;
  }
  dragEdge=nearEdgeMid(p.x,p.y);
  if(dragEdge){ return; }
  if(quad && (tool==='crop'||tool==='ocrQuad') && isInsideQuad(p.x,p.y)){
    panStart={x:p.x,y:p.y};
    quadAtPanStart={tl:{...quad.tl},tr:{...quad.tr},bl:{...quad.bl},br:{...quad.br}};
    return;
  }
  if(tool==='none'){
    vpanStart={x:e.touches[0].clientX,y:e.touches[0].clientY};
    vXatPan=vX; vYatPan=vY;
    return;
  }
  drawing=true; px0=p.x; py0=p.y; px1=p.x; py1=p.y;
  if(tool==='redact') brushPoints=[[p.x,p.y]];
},{passive:false});

ec.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===2&&pinch0!==null){
    const t0=e.touches[0],t1=e.touches[1];
    const d=Math.hypot(t0.clientX-t1.clientX,t0.clientY-t1.clientY);
    const newZ=Math.max(0.5,Math.min(6,vZ*(d/pinch0)));
    const newMidX=(t0.clientX+t1.clientX)/2;
    const newMidY=(t0.clientY+t1.clientY)/2;
    vX += (newMidX-pinchMidX) + (newMidX - (parseFloat(ec.style.left)||0) - parseFloat(ec.style.width)/2) * (newZ/vZ-1);
    vY += (newMidY-pinchMidY) + (newMidY - (parseFloat(ec.style.top)||0)  - parseFloat(ec.style.height)/2) * (newZ/vZ-1);
    vZ=newZ;
    pinch0=d; pinchMidX=newMidX; pinchMidY=newMidY;
    applyViewport();
    if((quad||rRect)&&!_dragRaf){_dragRaf=requestAnimationFrame(()=>{redrawOverlayOnly();_dragRaf=null;});}
    return;
  }
  if(vpanStart){
    vX=vXatPan+(e.touches[0].clientX-vpanStart.x);
    vY=vYatPan+(e.touches[0].clientY-vpanStart.y);
    applyViewport(); return;
  }
  if(rRectDragCorner){
    const p=canvasPt(e.touches[0].clientX,e.touches[0].clientY);
    moveRRectCorner(rRectDragCorner,p.x,p.y);redrawEc();return;
  }
  if(rRectPanStart){
    const p=canvasPt(e.touches[0].clientX,e.touches[0].clientY);
    const dx=p.x-rRectPanStart.x,dy=p.y-rRectPanStart.y;
    rRect={x:rRectAtPan.x+dx,y:rRectAtPan.y+dy,w:rRectAtPan.w,h:rRectAtPan.h};
    redrawEc();return;
  }
  if(dragCorner){
    const p=canvasPt(e.touches[0].clientX,e.touches[0].clientY);
    moveQuadCorner(dragCorner,p.x,p.y);
    // RAF-throttled redraw: canvas kararmaz, 60fps akıcı sürükleme
    if(!_dragRaf){
      _dragRaf=requestAnimationFrame(()=>{
        redrawOverlayOnly();
        _dragRaf=null;
      });
    }
    showLoupe(e.touches[0].clientX, e.touches[0].clientY, p.x, p.y);
    return;
  }
  if(dragEdge){
    const p=canvasPt(e.touches[0].clientX,e.touches[0].clientY);
    moveEdgeMid(dragEdge,p.x,p.y);redrawEc();return;
  }
  if(panStart&&quadAtPanStart){
    const p=canvasPt(e.touches[0].clientX,e.touches[0].clientY);
    const dx=p.x-panStart.x,dy=p.y-panStart.y;
    quad={
      tl:{x:quadAtPanStart.tl.x+dx,y:quadAtPanStart.tl.y+dy},
      tr:{x:quadAtPanStart.tr.x+dx,y:quadAtPanStart.tr.y+dy},
      bl:{x:quadAtPanStart.bl.x+dx,y:quadAtPanStart.bl.y+dy},
      br:{x:quadAtPanStart.br.x+dx,y:quadAtPanStart.br.y+dy},
    };
    redrawEc();return;
  }
  if(drawing){
    const p=canvasPt(e.touches[0].clientX,e.touches[0].clientY);
    px1=p.x;py1=p.y;
    if(tool==='redact'){ brushPoints.push([p.x,p.y]); drawBrushLive(p.x,p.y); }
    else if(tool==='redactRect'){
      rRect={x:Math.min(px0,px1),y:Math.min(py0,py1),w:Math.abs(px1-px0),h:Math.abs(py1-py0)};
      redrawEc();
    }
    else{ redrawEc();drawLive(px0,py0,px1,py1); }
  }
},{passive:false});

ec.addEventListener('touchend',e=>{
  pinch0=null; vpanStart=null;
  const wasDragCorner = dragCorner;
  const wasDragEdge   = dragEdge;
  dragCorner=null; dragEdge=null;
  panStart=null; quadAtPanStart=null;
  rRectDragCorner=null; rRectPanStart=null;
  hideLoupe();
  // Köşe veya kenar bırakıldı — cache varsa sync çiz (kararma engeli)
  if(wasDragCorner || wasDragEdge){
    if(_cachedImg) redrawOverlayOnly();
    else redrawEc();
    return;
  }
  if(!drawing)return; drawing=false;
  const rw=Math.abs(px1-px0),rh=Math.abs(py1-py0);
  if(rw<5||rh<5)return;
  if(tool==='redact') commitBrushStroke();
  else if(tool==='redactRect'){
    rRect={x:Math.min(px0,px1),y:Math.min(py0,py1),w:rw,h:rh};
    redrawEc();
  }
  else if(tool==='crop'||tool==='ocrQuad'){
    quad=rectToQuad(Math.min(px0,px1),Math.min(py0,py1),rw,rh);
    cropRect=null; redrawEc();
  }
},{passive:false});

/* Mouse */
ec.addEventListener('mousedown',e=>{
  const p=canvasPt(e.clientX,e.clientY);
  if(tool==='redactRect'){
    rRectDragCorner=nearRRectCorner(p.x,p.y);
    if(rRectDragCorner) return;
    if(rRect && isInsideRRect(p.x,p.y)){
      rRectPanStart={x:p.x,y:p.y}; rRectAtPan={...rRect}; return;
    }
    rRect=null; drawing=true; px0=p.x; py0=p.y; px1=p.x; py1=p.y; return;
  }
  dragCorner=nearQuadCorner(p.x,p.y);
  if(dragCorner){ dragEdge=null; return; }
  dragEdge=nearEdgeMid(p.x,p.y);
  if(dragEdge) return;
  if(quad && (tool==='crop'||tool==='ocrQuad') && isInsideQuad(p.x,p.y)){
    panStart={x:p.x,y:p.y};
    quadAtPanStart={tl:{...quad.tl},tr:{...quad.tr},bl:{...quad.bl},br:{...quad.br}};
  } else if(tool==='none'){
    vpanStart={x:e.clientX,y:e.clientY}; vXatPan=vX; vYatPan=vY;
  } else {
    panStart=null;
    drawing=true;px0=p.x;py0=p.y;px1=p.x;py1=p.y;
    if(tool==='redact')brushPoints=[[p.x,p.y]];
  }
});
document.addEventListener('mousemove',e=>{
  if(vpanStart){
    vX=vXatPan+(e.clientX-vpanStart.x);
    vY=vYatPan+(e.clientY-vpanStart.y);
    applyViewport();return;
  }
  if(!drawing&&!dragCorner&&!dragEdge&&!panStart&&!rRectDragCorner&&!rRectPanStart)return;
  const p=canvasPt(e.clientX,e.clientY);
  if(rRectDragCorner){moveRRectCorner(rRectDragCorner,p.x,p.y);redrawEc();return;}
  if(rRectPanStart){
    const dx=p.x-rRectPanStart.x,dy=p.y-rRectPanStart.y;
    rRect={x:rRectAtPan.x+dx,y:rRectAtPan.y+dy,w:rRectAtPan.w,h:rRectAtPan.h};
    redrawEc();return;
  }
  if(dragCorner){
    moveQuadCorner(dragCorner,p.x,p.y);
    if(!_dragRaf){ _dragRaf=requestAnimationFrame(()=>{ redrawOverlayOnly(); _dragRaf=null; }); }
    showLoupe(e.clientX, e.clientY, p.x, p.y);
    return;
  }
  if(dragEdge){
    moveEdgeMid(dragEdge,p.x,p.y);
    if(!_dragRaf){ _dragRaf=requestAnimationFrame(()=>{ redrawOverlayOnly(); _dragRaf=null; }); }
    showLoupe(e.clientX, e.clientY, p.x, p.y);
    return;
  }
  if(panStart&&quadAtPanStart){
    const dx=p.x-panStart.x,dy=p.y-panStart.y;
    quad={
      tl:{x:quadAtPanStart.tl.x+dx,y:quadAtPanStart.tl.y+dy},
      tr:{x:quadAtPanStart.tr.x+dx,y:quadAtPanStart.tr.y+dy},
      bl:{x:quadAtPanStart.bl.x+dx,y:quadAtPanStart.bl.y+dy},
      br:{x:quadAtPanStart.br.x+dx,y:quadAtPanStart.br.y+dy},
    };
    redrawEc();return;
  }
  px1=p.x;py1=p.y;
  if(tool==='redact'){ brushPoints.push([p.x,p.y]); drawBrushLive(p.x,p.y); }
  else if(tool==='redactRect'){
    rRect={x:Math.min(px0,px1),y:Math.min(py0,py1),w:Math.abs(px1-px0),h:Math.abs(py1-py0)};
    redrawEc();
  }
  else{ redrawEc();drawLive(px0,py0,px1,py1); }
});
document.addEventListener('mouseup',e=>{
  hideLoupe();
  dragCorner=null; dragEdge=null;
  panStart=null; quadAtPanStart=null;
  vpanStart=null;
  rRectDragCorner=null; rRectPanStart=null;
  if(!drawing)return; drawing=false;
  const rw=Math.abs(px1-px0),rh=Math.abs(py1-py0);
  if(rw<5||rh<5)return;
  if(tool==='redact')commitBrushStroke();
  else if(tool==='redactRect'){
    rRect={x:Math.min(px0,px1),y:Math.min(py0,py1),w:rw,h:rh};
    redrawEc();
  }
  else if(tool==='crop'||tool==='ocrQuad'){
    quad=rectToQuad(Math.min(px0,px1),Math.min(py0,py1),rw,rh);
    cropRect=null;redrawEc();
  }
});

document.getElementById('edCanvasArea').addEventListener('wheel',e=>{
  e.preventDefault();
  const delta=e.deltaY>0?0.9:1.1;
  const newZ=Math.max(0.3,Math.min(8,vZ*delta));
  const area=document.getElementById('edCanvasArea');
  const r=area.getBoundingClientRect();
  const dispW=parseFloat(ec.style.width)||ec.width*edSc;
  const dispH=parseFloat(ec.style.height)||ec.height*edSc;
  const baseL=Math.round((area.clientWidth-dispW)/2);
  const baseT=Math.round((area.clientHeight-dispH)/2);
  const mx=e.clientX-r.left-(baseL+vX);
  const my=e.clientY-r.top -(baseT+vY);
  vX-=mx*(newZ/vZ-1);
  vY-=my*(newZ/vZ-1);
  vZ=newZ;
  applyViewport();
  if((quad||rRect)&&!_dragRaf){_dragRaf=requestAnimationFrame(()=>{redrawOverlayOnly();_dragRaf=null;});}
},{passive:false});

/* ═══ GÖRÜNTÜ OLARAK KAYDET ═══
 * PDF ile AYNI sıkıştırma adımlarını uygular (Small/Medium/High/Full):
 * Full → orijinal dataURL'e hiç dokunulmaz (format ve boyut aynen korunur),
 * diğer adımlarda PDF'teki maxD tablosuyla küçültülüp aynı JPEG kalitesiyle
 * kodlanır. Tek sayfa → doğrudan indirir; birden fazla → JSZip ile ZIP. */
function saveAsImages(){
  if(!pages.length) return;
  const stamp=new Date().toISOString().slice(0,10);
  const extOf=u=>{
    const m=/^data:image\/(\w+)/.exec(u);
    let e=m?m[1].toLowerCase():'jpeg';
    return e==='jpeg'?'jpg':e;
  };
  const dl=(url,name)=>{
    const a=document.createElement('a');
    a.href=url; a.download=name;
    document.body.appendChild(a); a.click(); a.remove();
  };
  // exportPDF ile birebir aynı adımlar
  const maxD={0.6:1200,0.8:1800,0.92:2400,1:99999}[pdfQ]||1800;
  const jq=pdfQ>=1?0.95:pdfQ;
  const prep=src=>new Promise((res,rej)=>{
    // Full + Original: dosyaya hiç dokunma (format/boyut aynen korunur).
    // B-W seçiliyse Full'de bile işlenmesi gerekir (yeniden kodlanır).
    if(pdfQ>=1&&pdfColorMode!=='bw'){ res(src); return; }
    const im=new Image();
    im.onload=()=>{
      const sc=Math.min(1,maxD/Math.max(im.width,im.height));
      const c=document.createElement('canvas');
      c.width=Math.max(1,Math.round(im.width*sc));
      c.height=Math.max(1,Math.round(im.height*sc));
      c.getContext('2d').drawImage(im,0,0,c.width,c.height);
      if(pdfColorMode==='bw') applyDocBW(c);   // PDF ile aynı S-B dönüşümü
      res(c.toDataURL('image/jpeg',jq));
    };
    im.onerror=()=>rej(new Error('Görüntü yüklenemedi'));
    im.src=src;
  });
  showPdfSt(pages.length===1?'Görüntü hazırlanıyor…':'ZIP hazırlanıyor…','');
  Promise.all(pages.map(p=>prep(p.cur))).then(list=>{
    // Orijinal (makinenin verdiği) adı kullan; uzantı gerçek çıktı formatından
    // gelir (Full'de orijinaliyle aynı, sıkıştırmalı adımlarda jpg olur)
    const baseOf=(n,i)=>n?n.replace(/\.[^.]+$/,''):('scan_'+String(i+1).padStart(2,'0'));
    if(list.length===1){
      dl(list[0], baseOf(pages[0].name,0)+'.'+extOf(list[0]));
      showPdfSt('✓ Görüntü indirildi','ok');
      return;
    }
    const load=()=>window.JSZip?Promise.resolve():new Promise((res,rej)=>{
      const sc=document.createElement('script');
      sc.src='https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js';
      sc.onload=res;
      sc.onerror=()=>rej(new Error('JSZip yüklenemedi — internet bağlantısını kontrol et'));
      document.head.appendChild(sc);
    });
    return load().then(()=>{
      const zip=new JSZip();
      const seen=new Map();   // aynı ad iki kez gelirse _2, _3 eklenir
      list.forEach((u,i)=>{
        let name=baseOf(pages[i].name,i)+'.'+extOf(u);
        if(seen.has(name)){
          const c=seen.get(name)+1; seen.set(name,c);
          name=name.replace(/(\.[^.]+)$/,'_'+c+'$1');
        } else seen.set(name,1);
        zip.file(name, u.split(',')[1], {base64:true});
      });
      return zip.generateAsync({type:'blob'});
    }).then(blob=>{
      const url=URL.createObjectURL(blob);
      dl(url,'scans_'+stamp+'.zip');
      setTimeout(()=>URL.revokeObjectURL(url),4000);
      showPdfSt('✓ '+pages.length+' görüntü ZIP olarak indirildi','ok');
    });
  }).catch(err=>{
    console.error('saveAsImages:',err);
    showPdfSt('Hata: '+(err&&err.message?err.message:err),'err');
  });
}

/* ═══ Belge tipi siyah-beyaz dönüşümü (PDF ve Image ortak) ═══
 * Karo bazlı yerel referans parlaklıkla normalize eder: gölgeli zeminde
 * bile kâğıt beyaza, metin koyuya oturur. Canvas'ı yerinde değiştirir. */
function applyDocBW(cnv){
  const sw=cnv.width, sh=cnv.height;
  const ctx=cnv.getContext('2d');
          const id=ctx.getImageData(0,0,sw,sh);
          const d=id.data;
          const gray=new Float32Array(sw*sh);
          for(let i=0;i<sw*sh;i++){
            gray[i]=0.299*d[i*4]+0.587*d[i*4+1]+0.114*d[i*4+2];
          }
          const tileW=Math.max(60,Math.round(sw/8));
          const tileH=Math.max(60,Math.round(sh/8));
          const cols=Math.ceil(sw/tileW);
          const rows=Math.ceil(sh/tileH);
          const tileRef=new Float32Array(cols*rows);
          for(let r=0;r<rows;r++){
            for(let c=0;c<cols;c++){
              const x0=c*tileW, y0=r*tileH;
              const x1=Math.min(x0+tileW,sw), y1=Math.min(y0+tileH,sh);
              const vals=[];
              for(let y=y0;y<y1;y++){
                for(let x=x0;x<x1;x++){
                  vals.push(gray[y*sw+x]);
                }
              }
              vals.sort((a,b)=>a-b);
              tileRef[r*cols+c]=vals[Math.floor(vals.length*0.90)]||200;
            }
          }
          for(let y=0;y<sh;y++){
            for(let x=0;x<sw;x++){
              const tc=(x/tileW)-0.5;
              const tr=(y/tileH)-0.5;
              const c0=Math.max(0,Math.floor(tc)), c1=Math.min(cols-1,c0+1);
              const r0=Math.max(0,Math.floor(tr)), r1=Math.min(rows-1,r0+1);
              const fc=tc-c0, fr=tr-r0;
              const ref=
                tileRef[r0*cols+c0]*(1-fc)*(1-fr)+
                tileRef[r0*cols+c1]*fc*(1-fr)+
                tileRef[r1*cols+c0]*(1-fc)*fr+
                tileRef[r1*cols+c1]*fc*fr;
              const localRef=Math.max(ref,120);
              const g=gray[y*sw+x];
              let norm=(g/localRef)*255;
              let final;
              if(norm>230)      final=255;
              else if(norm>185) final=Math.round(220+(norm-185)*(35/45));
              else if(norm>130) final=Math.round(norm*0.80);
              else if(norm>60)  final=Math.round(norm*0.60);
              else              final=Math.round(norm*0.40);
              final=Math.max(0,Math.min(255,final));
              const idx=(y*sw+x)*4;
              d[idx]=d[idx+1]=d[idx+2]=final;
            }
          }
          ctx.putImageData(id,0,0);
}

function exportPDF(mode='download'){
  if(!pages.length)return;
  const name=(document.getElementById('pdfName').value.trim()||'scan_'+Date.now())+'.pdf';
  showPdfSt('Generating…','info');
  const _sb=document.getElementById('btnShare');
  _sb.style.opacity='0.4'; _sb.style.pointerEvents='none';
  try{
    const{jsPDF}=window.jspdf;
    const a4w=595.28,a4h=841.89;
    let doc=null;
    let i=0;
    function next(){
      if(i>=pages.length){
        const blob=doc.output('blob');
        _lastPdfBlob=blob;
        _lastPdfName=name;
        if(mode==='preview'){
          const url=URL.createObjectURL(blob);
          window.open(url,'_blank');
          showPdfSt('✓ PDF açıldı','ok');
        } else {
          const a=document.createElement('a');
          a.href=URL.createObjectURL(blob);
          a.download=name;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          showPdfSt('✓ İndiriliyor: '+name,'ok');
        }
        const shareBtn=document.getElementById('btnShare');
        if(navigator.canShare){
          shareBtn.style.opacity='1';
          shareBtn.style.pointerEvents='auto';
        }
        setTimeout(()=>{if(mode==='download')closePDFModal();},2000);
        return;
      }
      const pg=pages[i++];
      const img=new Image();
      img.onload=()=>{
        const maxD={0.6:1200,0.8:1800,0.92:2400,1:99999}[pdfQ]||1800;
        let sw=img.naturalWidth, sh=img.naturalHeight;
        if(sw>maxD||sh>maxD){
          const ratio=Math.min(maxD/sw,maxD/sh);
          sw=Math.round(sw*ratio); sh=Math.round(sh*ratio);
        }
        const tmp=document.createElement('canvas');
        tmp.width=sw; tmp.height=sh;
        const tmpCtx=tmp.getContext('2d');
        tmpCtx.drawImage(img,0,0,sw,sh);

        if(pdfColorMode==='bw') applyDocBW(tmp);

        const reencoded=tmp.toDataURL('image/jpeg', pdfQ>=1 ? 0.95 : pdfQ);
        // Gerçek orana göre sayfa boyutu — A4'e zorlamaz
        // 72pt/inch, 96px/inch varsayımıyla px→pt
        // A4 oranı: 1:√2 = 1:1.4142
        // Görüntünün oranı A4'e %12 tolerans içindeyse → A4'e normalize et
        // Aksi halde kendi gerçek oranında bırak
        const A4_W=595.28, A4_H=841.89;
        const A4_RATIO = A4_H / A4_W; // ~1.4142
        const land = sw > sh;
        const imgRatio = land ? (sw/sh) : (sh/sw); // her zaman uzun/kısa
        const a4Ratio  = A4_RATIO;
        const ratioDiff = Math.abs(imgRatio - a4Ratio) / a4Ratio;

        let ptW, ptH;
        if(ratioDiff < 0.15){
          // A4'e yakın → tam A4 boyutuna sabitle
          ptW = land ? A4_H : A4_W;
          ptH = land ? A4_W : A4_H;
        } else {
          // Farklı belge (fiş, kare vb.) → gerçek oranını koru
          const PX2PT = 72/96;
          ptW = sw * PX2PT;
          ptH = sh * PX2PT;
          const MAX_PT = 841.89;
          if(ptW > MAX_PT || ptH > MAX_PT){
            const r = Math.min(MAX_PT/ptW, MAX_PT/ptH);
            ptW *= r; ptH *= r;
          }
        }
        if(!doc)doc=new jsPDF({orientation:land?'l':'p',unit:'pt',format:[ptW,ptH]});
        else doc.addPage([ptW,ptH],land?'l':'p');
        doc.addImage(reencoded,'JPEG',0,0,ptW,ptH,undefined,'FAST');
        next();
      };
      img.onerror=()=>next();
      img.src=pg.cur;
    }
    next();
  }catch(e){console.error(e);showPdfSt('Error: '+e.message,'err');}
}

/* ═══ OCR (uygulama içi — iOS Safari uyumlu) ═══
 * Eski yöntem (sessionStorage + window.open ile ayrı ocr.html) iPhone'da
 * çalışmaz: Safari yeni sekmeye sessionStorage kopyası AKTARMAZ ve ~5MB
 * kota telefon fotoğrafının dataURL'i için yetersizdir.
 * Yeni yöntem: Tesseract.js ilk kullanımda CDN'den yüklenir, OCR aynı
 * sayfada modal içinde çalışır. Crop aracıyla bir bölge seçiliyse (quad)
 * yalnızca o bölge okunur; seçim yoksa sayfanın tamamı okunur.
 * Kelime kutuları (bbox) lastOcrData'da saklanır — ileride alan çıkarımı
 * (tarih vb.) için temel oluşturur. */
let ocrWorker=null, ocrBusy=false, lastOcrData=null;

function ensureOcr(statusCb){
  if(ocrWorker) return Promise.resolve(ocrWorker);
  statusCb('OCR motoru indiriliyor… (ilk kullanımda bir kez)');
  const loadScript=()=>window.Tesseract?Promise.resolve():new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
    s.onload=res;
    s.onerror=()=>rej(new Error('Tesseract yüklenemedi — internet bağlantısını kontrol et'));
    document.head.appendChild(s);
  });
  return loadScript().then(()=>{
    statusCb('Dil verisi hazırlanıyor… (tur+eng)');
    return Tesseract.createWorker('tur+eng',1,{
      logger:m=>{
        if(m.status==='recognizing text')
          statusCb('Metin okunuyor… %'+Math.round(m.progress*100));
      }
    });
  }).then(w=>{ ocrWorker=w; return w; });
}

function openOcrPage(){

function ocrScanArea(){

function runOcr(region){
  if(edIdx===null||!pages[edIdx]||ocrBusy) return;
  ocrBusy=true;
  const modal=document.getElementById('ocrModal');
  const statusEl=document.getElementById('ocrStatus');
  const ta=document.getElementById('ocrText');
  ta.value='';
  modal.style.display='flex';
  const setS=t=>{statusEl.textContent=t;};
  setS('Hazırlanıyor…');

  const src=history[history.length-1]||pages[edIdx].cur;
  const img=new Image();
  img.onload=async()=>{
    try{
      let srcCanvas=document.createElement('canvas');
      srcCanvas.width=img.width; srcCanvas.height=img.height;
      srcCanvas.getContext('2d').drawImage(img,0,0);

      // Alan seçildiyse: dörtgen bölgeyi perspektif düzeltmeyle çıkar —
      // eğik seçimler düzleştirilerek okunur (açılı fotoğrafta isabet artar)
      if(region&&region.tl){
        const {outW,outH}=quadOutSize(region, img.width, img.height);
        if(outW>8&&outH>8){
          setS('Seçili bölge düzleştiriliyor…');
          srcCanvas=perspectiveWarp(srcCanvas, region, outW, outH);
        }
      }

      // Hız ve iOS bellek sınırı için en fazla 1600px
      const M=1600, sc=Math.min(1,M/Math.max(srcCanvas.width,srcCanvas.height));
      if(sc<1){
        const c2=document.createElement('canvas');
        c2.width=Math.round(srcCanvas.width*sc);
        c2.height=Math.round(srcCanvas.height*sc);
        c2.getContext('2d').drawImage(srcCanvas,0,0,c2.width,c2.height);
        srcCanvas=c2;
      }

      const worker=await ensureOcr(setS);
      setS('Metin okunuyor… %0');
      const {data}=await worker.recognize(srcCanvas);
      lastOcrData=data;
      ta.value=(data.text||'').trim();
      setS(ta.value?'✓ Bitti — metni düzenleyip kopyalayabilirsin':'Okunabilir metin bulunamadı');
    }catch(err){
      console.error('OCR error:',err);
      setS('OCR hatası: '+(err&&err.message?err.message:err));
    }finally{
      ocrBusy=false;
    }
  };
  img.onerror=()=>{ setS('Görüntü yüklenemedi'); ocrBusy=false; };
  img.src=src;
}

function closeOcr(){
  document.getElementById('ocrModal').style.display='none';
}

function ocrRemoveSpaces(){
  // OCR çıktısını akışkan metne çevirir:
  // • satır ORTASINDAKİ kaydırmalar (taranan sayfanın satır sonları) boşluğa döner
  // • boş satırla ayrılan gerçek paragraflar korunur
  // • satır sonu heceleme tiresi birleştirilir (keli-⏎mesi → kelimesi)
  // • çoklu boşluklar teke iner, noktalama önü boşluklar temizlenir
  const ta=document.getElementById('ocrText');
  if(!ta.value) return;
  let t=ta.value;
  t=t.replace(/\r/g,'');
  t=t.replace(/[ \t]+/g,' ');               // çoklu boşluk/sekme → tek
  t=t.replace(/ ?\n ?/g,'\n');              // satır kenarı boşlukları
  t=t.replace(/(\S)-\n(?=\S)/g,'$1');       // satır sonu heceleme tiresi
  t=t.replace(/\n{2,}/g,'\u0000');          // paragraf sınırlarını işaretle
  t=t.replace(/\n/g,' ');                   // satır kaydırmaları → boşluk
  t=t.replace(/\u0000/g,'\n\n');            // paragrafları geri koy
  t=t.replace(/ +([.,;:!?%)\]}])/g,'$1');   // noktalamadan önceki boşluk
  t=t.replace(/([({\[]) +/g,'$1');          // açma parantezi sonrası boşluk
  ta.value=t.trim();
  document.getElementById('ocrStatus').textContent='✓ Metin akışkan hale getirildi — düzenlenebilir';
}

function copyOcrText(){
  const ta=document.getElementById('ocrText');
  if(!ta.value) return;
  const okMsg=()=>{document.getElementById('ocrStatus').textContent='✓ Panoya kopyalandı';};
  const fallback=()=>{
    ta.focus(); ta.setSelectionRange(0,ta.value.length);
    try{ document.execCommand('copy'); okMsg(); }catch(e){}
  };
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(ta.value).then(okMsg,fallback);
  } else fallback();
}

/* ═══ ANA EKRAN SCROLL ZOOM ═══ */
(()=>{
  let scale=1, tx=0, ty=0;
  const bp=document.getElementById('bigPreview');
  const area=document.getElementById('previewArea');

  function clamp(){
    if(scale<=1){tx=0;ty=0;return;}
    const ar=area.getBoundingClientRect();
    const imgW=bp.offsetWidth*scale;
    const imgH=bp.offsetHeight*scale;
    const maxTx=Math.max(0,(imgW-ar.width)/2);
    const maxTy=Math.max(0,(imgH-ar.height)/2);
    tx=Math.max(-maxTx,Math.min(maxTx,tx));
    ty=Math.max(-maxTy,Math.min(maxTy,ty));
  }

  function applyTransform(){
    clamp();
    bp.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
    bp.style.transformOrigin='center center';
  }

  area.addEventListener('wheel',e=>{
    e.preventDefault();
    const delta=e.deltaY>0?0.85:1.18;
    const newScale=Math.max(0.5,Math.min(8,scale*delta));
    const r=area.getBoundingClientRect();
    const mx=e.clientX-r.left-r.width/2;
    const my=e.clientY-r.top-r.height/2;
    tx=(tx-mx)*(newScale/scale)+mx;
    ty=(ty-my)*(newScale/scale)+my;
    scale=newScale;
    applyTransform();
  },{passive:false});

  let dragging=false, dx=0, dy=0, txStart=0, tyStart=0;
  area.addEventListener('mousedown',e=>{
    if(scale<=1)return;
    dragging=true; dx=e.clientX; dy=e.clientY; txStart=tx; tyStart=ty;
    area.style.cursor='grabbing';
  });
  document.addEventListener('mousemove',e=>{
    if(!dragging)return;
    tx=txStart+(e.clientX-dx);
    ty=tyStart+(e.clientY-dy);
    applyTransform();
  });
  document.addEventListener('mouseup',()=>{
    dragging=false; area.style.cursor='';
  });

  let mPinch0=null, mPinchScale=1, mPinchTx=0, mPinchTy=0, mPinchMidX=0, mPinchMidY=0;
  let mPan=false, mPanStartX=0, mPanStartY=0, mPanTxStart=0, mPanTyStart=0;

  area.addEventListener('touchstart',e=>{
    if(e.touches.length===2){
      mPan=false;
      const t0=e.touches[0],t1=e.touches[1];
      mPinch0=Math.hypot(t0.clientX-t1.clientX,t0.clientY-t1.clientY);
      mPinchMidX=(t0.clientX+t1.clientX)/2;
      mPinchMidY=(t0.clientY+t1.clientY)/2;
      mPinchScale=scale; mPinchTx=tx; mPinchTy=ty;
      e.preventDefault();
    } else if(e.touches.length===1){
      mPinch0=null;
      mPan=true;
      mPanStartX=e.touches[0].clientX;
      mPanStartY=e.touches[0].clientY;
      mPanTxStart=tx; mPanTyStart=ty;
    }
  },{passive:false});

  area.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(e.touches.length===2&&mPinch0!==null){
      const t0=e.touches[0],t1=e.touches[1];
      const d=Math.hypot(t0.clientX-t1.clientX,t0.clientY-t1.clientY);
      const newScale=Math.max(0.5,Math.min(8,mPinchScale*(d/mPinch0)));
      const r=area.getBoundingClientRect();
      const newMidX=(t0.clientX+t1.clientX)/2;
      const newMidY=(t0.clientY+t1.clientY)/2;
      const midDx=newMidX-mPinchMidX;
      const midDy=newMidY-mPinchMidY;
      const originX=mPinchMidX-r.left-r.width/2;
      const originY=mPinchMidY-r.top-r.height/2;
      tx=mPinchTx + midDx + originX*(newScale/mPinchScale-1)*-1 + (newMidX-mPinchMidX);
      ty=mPinchTy + midDy + originY*(newScale/mPinchScale-1)*-1 + (newMidY-mPinchMidY);
      scale=newScale;
      applyTransform();
    } else if(e.touches.length===1&&mPan){
      tx=mPanTxStart+(e.touches[0].clientX-mPanStartX);
      ty=mPanTyStart+(e.touches[0].clientY-mPanStartY);
      applyTransform();
    }
  },{passive:false});

  area.addEventListener('touchend',e=>{
    if(e.touches.length<2) mPinch0=null;
    if(e.touches.length===0) mPan=false;
  });

  const origSelect=selectPage;
  window.selectPage=function(idx){
    origSelect(idx);
    scale=1;tx=0;ty=0;
    bp.style.transform='';
  };
})();
</script>
