<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>Report Template — CAP</title>
<link rel="stylesheet" href="core.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter+Tight:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <span class="brand-mark"></span>Report Template
    </div>
    <div class="topbar-actions">
      <button class="btn icon" id="btnNew" title="New / reset form" aria-label="New">
        <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      </button>
      <button class="btn icon" id="btnLoad" title="Load JSON" aria-label="Load">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
      </button>
      <button class="btn icon" id="btnSave" title="Save as JSON" aria-label="Save">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
      </button>
      <button class="btn primary" id="btnExport" title="Export Excel" aria-label="Export Excel">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M9 13l3 3 3-3M12 9v7"/></svg>
        Excel
      </button>
    </div>
  </div>
  <nav class="tabs" id="tabs">
    <button class="active" data-tab="info">Info</button>
    <button data-tab="docs">Docs</button>
    <button data-tab="bsci">BSCI</button>
    <button data-tab="ics">ICS</button>
    <button data-tab="sedex">Sedex</button>
  </nav>
</header>

<main>
  <div class="panel active" id="panel-info"></div>
  <div class="panel" id="panel-docs"></div>
  <div class="panel" id="panel-bsci"></div>
  <div class="panel" id="panel-ics"></div>
  <div class="panel" id="panel-sedex"></div>
</main>

<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<script src="core.js"></script>
</body>
</html>
