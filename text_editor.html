<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Text Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a2b40;--surface:#223349;--surface2:#2a3e58;
  --border:#344f6a;--border2:#4a6585;
  --accent:#4a9eff;--accent-glow:rgba(74,158,255,.14);
  --text:#eef2f8;--text2:#a0b4cc;--text3:#6a88a6;
  --success:#3ecf8e;--danger:#ff7070;--danger-bg:rgba(255,112,112,.1);
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace
}
[data-theme="light"]{
  --bg:#dde6f0;--surface:#e8eef6;--surface2:#f0f5fa;
  --border:#b8cde0;--border2:#8aaec8;
  --accent:#2175cc;--accent-glow:rgba(33,117,204,.12);
  --text:#1a2b3c;--text2:#3a5570;--text3:#6a88a6;
  --success:#1fa86a;--danger:#c94040;--danger-bg:rgba(201,64,64,.09)
}
body,html{background:var(--bg);font-family:var(--font);transition:background .25s,color .25s}
.shell{min-height:100vh;background:var(--bg);padding:0 0 2rem;transition:background .25s}
.content{padding:1.4rem 1.25rem 0}
.page-header{margin-bottom:1.25rem;display:flex;align-items:center;gap:9px}
.page-header-left{display:flex;align-items:center;gap:9px;flex:1}
.brand-icon{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#4a9eff,#2563eb);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-icon i{color:#fff;font-size:14px}
.page-title{font-size:20px;font-weight:600;color:var(--text);letter-spacing:-.02em;line-height:1}
.theme-btn{width:32px;height:32px;border-radius:8px;background:var(--surface);border:1px solid var(--border2);color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;flex-shrink:0}
.theme-btn:hover{background:var(--border);color:var(--text)}
.theme-btn:active{transform:scale(.93)}
.theme-btn i{font-size:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem 1rem .9rem;margin-bottom:1rem;transition:background .25s,border-color .25s}
.card-label-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.card-label{font-size:10px;font-weight:500;letter-spacing:.09em;text-transform:uppercase;color:var(--text3);display:flex;align-items:center;gap:5px}
.card-label i{font-size:13px}
.lang-toggle{display:flex;border:1px solid var(--border2);border-radius:6px;overflow:hidden}
.lang-btn{padding:3px 10px;font-size:11px;font-weight:500;font-family:var(--font);background:transparent;border:none;cursor:pointer;color:var(--text3);transition:all .15s;-webkit-tap-highlight-color:transparent}
.lang-btn.active{background:rgba(74,158,255,.18);color:var(--accent)}
[data-theme="light"] .lang-btn.active{background:rgba(33,117,204,.15);color:var(--accent)}
textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-size:15px;font-family:var(--mono);color:var(--text);resize:none;overflow:hidden;line-height:1.65;outline:none;-webkit-appearance:none;transition:border-color .15s,box-shadow .15s,background .25s,color .25s;caret-color:var(--accent);min-height:80px}
textarea::placeholder{color:var(--text3)}
textarea:focus{border-color:var(--border2);box-shadow:0 0 0 3px var(--accent-glow)}
.btn-row{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 14px;font-size:13px;font-family:var(--font);font-weight:500;border-radius:8px;cursor:pointer;white-space:nowrap;transition:all .15s;-webkit-tap-highlight-color:transparent}
.btn-default{background:var(--surface2);border:1px solid var(--border2);color:var(--text2)}
.btn-default:hover{background:var(--border);border-color:#5a7898;color:var(--text)}
.btn-default:active{transform:scale(.97)}
.btn-accent{background:rgba(74,158,255,.14);border:1px solid rgba(74,158,255,.3);color:var(--accent)}
.btn-accent:hover{background:rgba(74,158,255,.24);border-color:rgba(74,158,255,.5)}
[data-theme="light"] .btn-accent{background:rgba(33,117,204,.12);border-color:rgba(33,117,204,.3)}
[data-theme="light"] .btn-accent:hover{background:rgba(33,117,204,.22)}
.btn-accent:active{transform:scale(.97)}
.btn-danger{background:var(--danger-bg);border:1px solid rgba(255,112,112,.25);color:var(--danger)}
.btn-danger:hover{background:rgba(255,112,112,.18);border-color:rgba(255,112,112,.45)}
[data-theme="light"] .btn-danger{border-color:rgba(201,64,64,.25);color:var(--danger)}
[data-theme="light"] .btn-danger:hover{background:rgba(201,64,64,.14)}
.btn-danger:active{transform:scale(.97)}
.out-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.copy-ok{font-size:11px;color:var(--success);opacity:0;transition:opacity .3s;display:flex;align-items:center;gap:4px}

@media(max-width:768px){
  textarea{font-size:16px;padding:14px 16px;min-height:80px}
  .btn{padding:10px 16px;font-size:14px}
  .content{padding:1rem 1rem 0}
  .btn-row{display:grid;grid-template-columns:1fr 1fr;gap:7px}
}
</style>
</head>
<body>
<div class="shell" id="shell">
  <div class="content">
    <div class="page-header">
      <div class="page-header-left">
        <div class="brand-icon"><i class="ti ti-text-size"></i></div>
        <div class="page-title">Text Editor</div>
      </div>
      <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Temayı değiştir" aria-label="Temayı değiştir">
        <i class="ti ti-sun" id="themeIcon"></i>
      </button>
    </div>

    <div class="card">
      <div class="card-label-row">
        <div class="card-label"><i class="ti ti-pencil"></i>Input</div>
        <div class="lang-toggle" role="group" aria-label="Language selection">
          <button class="lang-btn active" id="btn-en" onclick="setLang('en')" aria-pressed="true">EN</button>
          <button class="lang-btn" id="btn-tr" onclick="setLang('tr')" aria-pressed="false">TR</button>
        </div>
      </div>
      <textarea id="inp" placeholder="Type or paste your text here…" aria-label="Input text"></textarea>
      <div class="btn-row" role="toolbar" aria-label="Text transformations">
        <button class="btn btn-default" onclick="transform('upper')">Uppercase</button>
        <button class="btn btn-default" onclick="transform('lower')">Lowercase</button>
        <button class="btn btn-default" onclick="transform('title')">Title Case</button>
        <button class="btn btn-default" onclick="transform('trim')">Remove Extra Spaces</button>
        <button class="btn btn-accent" onclick="pasteIn()">Paste</button>
        <button class="btn btn-danger" onclick="clearAll()">Clear All</button>
      </div>
    </div>

    <div class="card">
      <div class="out-header">
        <div class="card-label"><i class="ti ti-check"></i>Output</div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="copy-ok" id="cf"><i class="ti ti-check"></i>Copied!</span>
          <button class="btn btn-accent" onclick="copyOut()" aria-label="Copy output text"><i class="ti ti-copy"></i>Copy</button>
        </div>
      </div>
      <textarea id="out" placeholder="Transformed text will appear here, or type directly…" aria-label="Output text"></textarea>
    </div>
  </div>
</div>

<script>
if(sessionStorage.getItem('bulut_auth')!=='1') window.location.href='index.html';
const inp = document.getElementById('inp');
const out = document.getElementById('out');
const themeIcon = document.getElementById('themeIcon');
let lang = 'en';

function isMobile() { return window.innerWidth <= 768; }
let currentTheme = isMobile() ? 'light' : 'dark';

function applyTheme(theme) {
  currentTheme = theme;
  if (theme === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
    themeIcon.className = 'ti ti-moon';
  } else {
    document.documentElement.removeAttribute('data-theme');
    themeIcon.className = 'ti ti-sun';
  }
  try { localStorage.setItem('te-theme', theme); } catch(e){}
}

function toggleTheme() {
  applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
}

(function(){
  let saved = null;
  try { saved = localStorage.getItem('te-theme'); } catch(e){}
  applyTheme(saved || (isMobile() ? 'light' : 'dark'));
})();

function setLang(l) {
  lang = l;
  document.getElementById('btn-en').classList.toggle('active', l === 'en');
  document.getElementById('btn-tr').classList.toggle('active', l === 'tr');
  document.getElementById('btn-en').setAttribute('aria-pressed', l === 'en');
  document.getElementById('btn-tr').setAttribute('aria-pressed', l === 'tr');
}

function autoResize(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }
inp.addEventListener('input', () => autoResize(inp));
inp.addEventListener('keydown', () => setTimeout(() => autoResize(inp), 0));
out.addEventListener('input', () => autoResize(out));
out.addEventListener('keydown', () => setTimeout(() => autoResize(out), 0));

function removeExtraSpaces(text) {
  const paragraphs = text.split(/\n{2,}/);
  return paragraphs.map(para =>
    para.split('\n').map(l => l.trim()).filter(l => l.length > 0).join(' ').replace(/[ \t]+/g, ' ').trim()
  ).join('\n\n');
}

const EN_EXCEPTIONS = new Set(['of', 'on', 'and', 'in', 'at', 'to', 'for', 'or', 'nor']);
const TR_EXCEPTIONS = new Set(['ve']);

function toTitleCase(text) {
  if (lang === 'tr') {
    const words = text.split(/(\s+)/);
    return words.map((token, idx) => {
      if (/^\s+$/.test(token)) return token;
      const isFirstWord = words.slice(0, idx).every(t => /^\s+$/.test(t));
      const lower = token.toLocaleLowerCase('tr-TR');
      if (!isFirstWord && TR_EXCEPTIONS.has(lower)) return lower;
      const first = token.charAt(0);
      const rest = token.slice(1);
      let upper = first === 'i' ? 'İ' : first === 'ı' ? 'I' : first.toLocaleUpperCase('tr-TR');
      return upper + rest.toLocaleLowerCase('tr-TR');
    }).join('');
  }
  const words = text.split(/(\s+)/);
  return words.map((token, idx) => {
    if (/^\s+$/.test(token)) return token;
    const isFirstWord = words.slice(0, idx).every(t => /^\s+$/.test(t));
    const lower = token.toLowerCase();
    if (!isFirstWord && EN_EXCEPTIONS.has(lower)) return lower;
    return token.charAt(0).toUpperCase() + token.slice(1).toLowerCase();
  }).join('');
}

function toUpper(t) { return lang === 'tr' ? t.toLocaleUpperCase('tr-TR') : t.toUpperCase(); }
function toLower(t) { return lang === 'tr' ? t.toLocaleLowerCase('tr-TR') : t.toLowerCase(); }

function getSource() {
  const outVal = out.value.trim();
  return outVal.length > 0 ? out.value : inp.value;
}

function transform(type) {
  let t = getSource();
  if (!t.trim()) return;
  if (type === 'upper') t = toUpper(t);
  else if (type === 'lower') t = toLower(t);
  else if (type === 'title') t = toTitleCase(t);
  else if (type === 'trim') t = removeExtraSpaces(t);
  out.value = t;
  autoResize(out);
}

function clearAll() {
  inp.value = ''; out.value = '';
  inp.style.height = ''; out.style.height = '';
  inp.focus();
}

function pasteIn() {
  navigator.clipboard.readText().then(text => {
    if (!text) return;
    inp.value = text;
    autoResize(inp);
    inp.focus();
  }).catch(() => {
    inp.focus();
    document.execCommand('paste');
    autoResize(inp);
  });
}

function copyOut() {
  const val = out.value || inp.value;
  if (!val) return;
  navigator.clipboard.writeText(val).then(() => {
    const cf = document.getElementById('cf');
    cf.style.opacity = '1';
    setTimeout(() => cf.style.opacity = '0', 1500);
  }).catch(() => { out.select(); document.execCommand('copy'); });
}

autoResize(inp);
</script>
</body>
</html>
