<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Photo Stamper</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1a2a4a 0%, #0d1b35 100%);
  min-height: 100vh;
  padding: 24px 16px;
}

.top-bar {
  display: flex; align-items: center; gap: 12px;
  max-width: 700px; margin: 0 auto 16px;
}
.back-btn {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  color: #fff; border-radius: 8px;
  padding: 7px 14px; font-size: 13px;
  cursor: pointer; text-decoration: none; transition: background 0.15s;
}
.back-btn:hover { background: rgba(255,255,255,0.18); }
.top-bar h1 { font-size: 17px; font-weight: 600; color: #fff; }

.wrap { max-width: 700px; margin: 0 auto; }

.drop-zone {
  border: 1.5px dashed #3a5a8a;
  border-radius: 14px; padding: 2rem 1rem;
  text-align: center; cursor: pointer;
  background: #eef3fa; transition: background 0.15s;
}
.drop-zone:hover, .drop-zone.drag-over { background: #dce8f7; }
.drop-zone p { font-size: 15px; font-weight: 600; color: #1a3558; margin-bottom: 4px; }
.drop-zone span { font-size: 13px; color: #4a6a8a; }

.panel {
  background: #1a3558; border-radius: 14px;
  padding: 14px 16px; margin-top: 10px;
}
.panel-title {
  font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.07em;
  color: #7aafd4; margin-bottom: 10px;
}

/* Toggle switch */
.toggle-row { display: flex; align-items: center; gap: 10px; }
.toggle-label { font-size: 13px; color: #a8c8e8; }
.switch { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider-sw {
  position: absolute; inset: 0;
  background: #2a4a6a; border-radius: 99px; cursor: pointer; transition: background 0.2s;
}
.slider-sw:before {
  content: ''; position: absolute;
  width: 16px; height: 16px; left: 3px; top: 3px;
  background: #7aafd4; border-radius: 50%; transition: transform 0.2s, background 0.2s;
}
.switch input:checked + .slider-sw { background: #4a9edd; }
.switch input:checked + .slider-sw:before { transform: translateX(18px); background: #fff; }

.btn-group { display: flex; gap: 6px; flex-wrap: wrap; }
.opt-btn {
  height: 30px; padding: 0 14px; border-radius: 99px;
  border: 1px solid #3a6090; background: #243f60; color: #a8c8e8;
  font-size: 13px; cursor: pointer; transition: all 0.15s;
}
.opt-btn:hover { background: #2e5080; color: #d0e8f8; }
.opt-btn.active { background: #4a9edd; color: #fff; border-color: #4a9edd; }

.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }

.corner-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.corner-btn {
  height: 34px; border-radius: 10px;
  border: 1px solid #3a6090; background: #243f60; color: #a8c8e8;
  font-size: 12px; cursor: pointer; transition: all 0.15s;
}
.corner-btn:hover { background: #2e5080; color: #d0e8f8; }
.corner-btn.active { background: #4a9edd; color: #fff; border-color: #4a9edd; }

.ctrl-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.ctrl-row:last-child { margin-bottom: 0; }
.ctrl-label { font-size: 12px; color: #a8c8e8; flex: 1; }
.ctrl-val { font-size: 12px; color: #d0e8f8; min-width: 32px; text-align: right; }
input[type=range] { width: 80px; accent-color: #4a9edd; }
input[type=color] {
  width: 32px; height: 26px;
  border: 1px solid #3a6090; border-radius: 6px;
  padding: 1px 2px; cursor: pointer; background: #243f60;
}

.preview-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 10px; margin-top: 10px;
}
.preview-card {
  border: 1px solid #2a4f78; border-radius: 10px;
  overflow: hidden; background: #162d4a;
}
.preview-card canvas { width: 100%; display: block; }
.preview-info { padding: 6px 8px; font-size: 11px; color: #a8c8e8; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.preview-src { font-size: 10px; color: #5a8ab0; margin-top: 2px; }

.action-bar { display: flex; align-items: center; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.btn-dl {
  height: 36px; padding: 0 20px; border-radius: 10px; border: none;
  background: #4a9edd; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer;
  transition: background 0.15s;
}
.btn-dl:hover { background: #3a8ecc; }
.btn-dl:disabled { background: #2a5a80; color: #7aafd4; cursor: not-allowed; }
.btn-clear {
  height: 36px; padding: 0 16px; border-radius: 10px;
  border: 1px solid #3a6090; background: #243f60; color: #a8c8e8;
  font-size: 13px; cursor: pointer;
}
.btn-clear:hover { background: #2e5080; }
.count-tag { font-size: 12px; color: #5a8ab0; margin-left: auto; }
.progress-bar {
  height: 4px; background: #243f60; border-radius: 99px;
  margin-top: 10px; overflow: hidden; display: none;
}
.progress-fill { height: 100%; background: #4a9edd; border-radius: 99px; transition: width 0.2s; }

.collapsed { display: none; }
</style>
</head>
<body>

<div class="top-bar">
  <a class="back-btn" href="index.html">← Geri</a>
  <h1>📷 Photo Stamper</h1>
</div>

<div class="wrap">
  <div class="drop-zone" id="dropZone">
    <p>Fotoğraf seç veya sürükle</p>
    <span>iPhone EXIF tarihi otomatik okunur · Birden fazla fotoğraf seçilebilir</span>
    <input type="file" id="fileInput" accept="image/*" multiple style="display:none">
  </div>

  <div id="settingsArea" style="display:none">

    <!-- Özellikler: toggle + boyut -->
    <div class="panel">
      <div class="panel-title">Çıktı boyutu</div>
      <div class="btn-group" id="sizeBtns">
        <button class="opt-btn" data-size="small">Small</button>
        <button class="opt-btn active" data-size="medium">Medium</button>
        <button class="opt-btn" data-size="high">High</button>
        <button class="opt-btn" data-size="original">Original</button>
      </div>
      <div style="margin-top:6px;font-size:11px;color:#4a7aa0" id="sizeHint">~1600px uzun kenar · %75 kalite</div>
    </div>

    <!-- Tarih/saat toggle -->
    <div class="panel">
      <div class="toggle-row">
        <label class="switch">
          <input type="checkbox" id="stampToggle" checked>
          <span class="slider-sw"></span>
        </label>
        <span class="toggle-label">Tarih &amp; saat ekle</span>
      </div>
    </div>

    <!-- Tarih/saat ayarları — toggle kapalıysa gizlenir -->
    <div id="stampPanel">
      <div class="panel">
        <div class="panel-title">Tarih formatı</div>
        <div class="btn-group" id="formatBtns">
          <button class="opt-btn active" data-fmt="DD.MM.YYYY HH:mm">DD.MM.YYYY HH:mm</button>
          <button class="opt-btn" data-fmt="DD/MM/YYYY HH:mm">DD/MM/YYYY HH:mm</button>
          <button class="opt-btn" data-fmt="YYYY-MM-DD HH:mm">YYYY-MM-DD HH:mm</button>
          <button class="opt-btn" data-fmt="DD.MM.YYYY">Sadece tarih</button>
        </div>
      </div>

      <div class="row2">
        <div class="panel">
          <div class="panel-title">Konum</div>
          <div class="corner-grid">
            <button class="corner-btn" data-pos="top-left">↖ Sol üst</button>
            <button class="corner-btn" data-pos="top-right">Sağ üst ↗</button>
            <button class="corner-btn active" data-pos="bottom-left">↙ Sol alt</button>
            <button class="corner-btn" data-pos="bottom-right">Sağ alt ↘</button>
          </div>
        </div>

        <div class="panel">
          <div class="panel-title">Görünüm</div>
          <div class="ctrl-row">
            <span class="ctrl-label">Metin rengi</span>
            <input type="color" id="textColor" value="#ffffff">
          </div>
          <div class="ctrl-row">
            <span class="ctrl-label">Arkaplan</span>
            <input type="color" id="bgColor" value="#000000">
          </div>
          <div class="ctrl-row">
            <span class="ctrl-label">Opaklık</span>
            <input type="range" id="bgOpacity" min="0" max="100" value="55" step="5">
            <span class="ctrl-val" id="opacityVal">55%</span>
          </div>
          <div class="ctrl-row">
            <span class="ctrl-label">Yazı boyutu</span>
            <input type="range" id="fontSize" min="8" max="60" value="18">
            <span class="ctrl-val" id="fontSizeVal">18</span>
          </div>
          <div class="ctrl-row">
            <span class="ctrl-label">Kenar boşluğu</span>
            <input type="range" id="padding" min="4" max="60" value="14">
            <span class="ctrl-val" id="paddingVal">14</span>
          </div>
        </div>
      </div>
    </div>

    <div id="previewGrid" class="preview-grid"></div>

    <div class="action-bar">
      <button class="btn-dl" id="downloadBtn">İndir</button>
      <button class="btn-clear" id="clearAll">Temizle</button>
      <span class="count-tag" id="countTag">0 fotoğraf</span>
    </div>
    <div class="progress-bar" id="progressBar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>

  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/exif-js/2.3.0/exif.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
const state = {
  photos: [], format: 'DD.MM.YYYY HH:mm',
  textColor: '#ffffff', bgColor: '#000000',
  bgOpacity: 55, fontSize: 18, position: 'bottom-left', padding: 14,
  stampEnabled: true, size: 'medium'
};

const SIZE_MAP = {
  small:    { maxPx: 800,  quality: 0.60, hint: '~800px uzun kenar · %60 kalite' },
  medium:   { maxPx: 1600, quality: 0.75, hint: '~1600px uzun kenar · %75 kalite' },
  high:     { maxPx: 2400, quality: 0.88, hint: '~2400px uzun kenar · %88 kalite' },
  original: { maxPx: null, quality: 0.93, hint: 'Orijinal boyut · %93 kalite' }
};

function fmt(date, f) {
  const p = n => String(n).padStart(2,'0');
  return f.replace('YYYY',date.getFullYear()).replace('MM',p(date.getMonth()+1))
    .replace('DD',p(date.getDate())).replace('HH',p(date.getHours())).replace('mm',p(date.getMinutes()));
}

function hexRgb(hex) {
  return { r:parseInt(hex.slice(1,3),16), g:parseInt(hex.slice(3,5),16), b:parseInt(hex.slice(5,7),16) };
}

function processCanvas(img, date, opts) {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const { maxPx } = SIZE_MAP[opts.size];
  let w = img.naturalWidth, h = img.naturalHeight;
  if (maxPx) {
    const longest = Math.max(w, h);
    if (longest > maxPx) { const r = maxPx / longest; w = Math.round(w*r); h = Math.round(h*r); }
  }
  canvas.width = w; canvas.height = h;
  ctx.drawImage(img, 0, 0, w, h);

  if (opts.stampEnabled) {
    const scale = Math.max(w, h) / 1000;
    const fs = Math.max(opts.fontSize, 8) * scale;
    const pad = opts.padding * scale;
    ctx.font = `bold ${fs}px Arial, sans-serif`;
    const label = fmt(date, opts.format);
    const tw = ctx.measureText(label).width;
    const lh = fs * 1.5;
    const pos = opts.position;
    const x = pos.includes('right') ? w - tw - pad*2 : pad;
    const y = pos.includes('top') ? pad : h - lh - pad;
    const {r,g,b} = hexRgb(opts.bgColor);
    ctx.fillStyle = `rgba(${r},${g},${b},${opts.bgOpacity/100})`;
    ctx.beginPath();
    ctx.roundRect(x - pad*0.5, y - fs*0.15, tw + pad, lh, pad*0.4);
    ctx.fill();
    ctx.fillStyle = opts.textColor;
    ctx.fillText(label, x, y + fs*0.88);
  }
  return canvas;
}

function refreshPreviews() {
  const grid = document.getElementById('previewGrid');
  grid.innerHTML = '';
  state.photos.forEach(p => {
    const card = document.createElement('div');
    card.className = 'preview-card';
    const canvas = processCanvas(p.img, p.date, state);
    const info = document.createElement('div');
    info.className = 'preview-info';
    info.textContent = p.name;
    const src = document.createElement('div');
    src.className = 'preview-src';
    src.textContent = (state.stampEnabled ? fmt(p.date,'DD.MM.YYYY HH:mm') + (p.exif ? ' · EXIF' : ' · dosya tarihi') : 'Tarih eklenmeyecek');
    info.appendChild(src);
    card.appendChild(canvas); card.appendChild(info);
    grid.appendChild(card);
  });
  document.getElementById('countTag').textContent = state.photos.length + ' fotoğraf';
}

async function getExifDate(file, img) {
  return new Promise(resolve => {
    try {
      EXIF.getData(img, function() {
        const dt = EXIF.getTag(this,'DateTimeOriginal') || EXIF.getTag(this,'DateTime');
        if (dt) {
          const [dp,tp] = dt.split(' ');
          const [y,m,d] = dp.split(':');
          const [h,mn] = (tp||'00:00').split(':');
          resolve({ date: new Date(y,m-1,d,h,mn), exif:true });
        } else resolve({ date: new Date(file.lastModified), exif:false });
      });
    } catch { resolve({ date: new Date(file.lastModified), exif:false }); }
  });
}

async function loadFiles(files) {
  for (const file of files) {
    if (!file.type.startsWith('image/')) continue;
    await new Promise(res => {
      const img = new Image();
      img.onload = async () => {
        const { date, exif } = await getExifDate(file, img);
        state.photos.push({ img, name: file.name, date, exif });
        res();
      };
      img.src = URL.createObjectURL(file);
    });
  }
  document.getElementById('settingsArea').style.display = 'block';
  refreshPreviews();
}

// Drop zone
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => loadFiles(e.target.files));
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); loadFiles(e.dataTransfer.files); });

// Stamp toggle
document.getElementById('stampToggle').addEventListener('change', e => {
  state.stampEnabled = e.target.checked;
  document.getElementById('stampPanel').style.display = e.target.checked ? 'block' : 'none';
  refreshPreviews();
});

// Size buttons
document.getElementById('sizeBtns').addEventListener('click', e => {
  const btn = e.target.closest('.opt-btn'); if (!btn) return;
  document.querySelectorAll('#sizeBtns .opt-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  state.size = btn.dataset.size;
  document.getElementById('sizeHint').textContent = SIZE_MAP[state.size].hint;
  refreshPreviews();
});

// Format buttons
document.getElementById('formatBtns').addEventListener('click', e => {
  const btn = e.target.closest('.opt-btn'); if (!btn) return;
  document.querySelectorAll('#formatBtns .opt-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); state.format = btn.dataset.fmt; refreshPreviews();
});

// Corner buttons
document.querySelectorAll('.corner-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.corner-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); state.position = btn.dataset.pos; refreshPreviews();
  });
});

document.getElementById('textColor').addEventListener('input', e => { state.textColor = e.target.value; refreshPreviews(); });
document.getElementById('bgColor').addEventListener('input', e => { state.bgColor = e.target.value; refreshPreviews(); });
document.getElementById('bgOpacity').addEventListener('input', e => { state.bgOpacity = +e.target.value; document.getElementById('opacityVal').textContent = e.target.value+'%'; refreshPreviews(); });
document.getElementById('fontSize').addEventListener('input', e => { state.fontSize = +e.target.value; document.getElementById('fontSizeVal').textContent = e.target.value; refreshPreviews(); });
document.getElementById('padding').addEventListener('input', e => { state.padding = +e.target.value; document.getElementById('paddingVal').textContent = e.target.value; refreshPreviews(); });

// Download
document.getElementById('downloadBtn').addEventListener('click', async () => {
  if (!state.photos.length) return;
  const quality = SIZE_MAP[state.size].quality;

  if (state.photos.length === 1) {
    const p = state.photos[0];
    const canvas = processCanvas(p.img, p.date, state);
    const a = document.createElement('a');
    a.download = p.name.replace(/\.[^.]+$/, '') + '.jpg';
    a.href = canvas.toDataURL('image/jpeg', quality);
    a.click();
    return;
  }

  const btn = document.getElementById('downloadBtn');
  const bar = document.getElementById('progressBar');
  const fill = document.getElementById('progressFill');
  btn.textContent = 'Hazırlanıyor...'; btn.disabled = true;
  bar.style.display = 'block'; fill.style.width = '0%';

  const zip = new JSZip();
  const total = state.photos.length;
  for (let i = 0; i < total; i++) {
    const p = state.photos[i];
    const canvas = processCanvas(p.img, p.date, state);
    const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', quality));
    zip.file(p.name.replace(/\.[^.]+$/, '') + '.jpg', blob);
    fill.style.width = Math.round((i+1)/total*100) + '%';
    btn.textContent = `İşleniyor ${i+1}/${total}...`;
    await new Promise(r => setTimeout(r, 10));
  }

  const zipBlob = await zip.generateAsync({ type:'blob', compression:'DEFLATE', compressionOptions:{level:3} });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(zipBlob);
  a.download = 'photos.zip';
  a.click();

  btn.textContent = 'İndir'; btn.disabled = false;
  setTimeout(() => { bar.style.display = 'none'; fill.style.width = '0%'; }, 2000);
});

document.getElementById('clearAll').addEventListener('click', () => {
  state.photos = [];
  document.getElementById('previewGrid').innerHTML = '';
  document.getElementById('settingsArea').style.display = 'none';
  document.getElementById('countTag').textContent = '0 fotoğraf';
  fileInput.value = '';
});
</script>
</body>
</html>
