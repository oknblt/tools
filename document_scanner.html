<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Document Scanner</title>
<script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Segoe UI',sans-serif;background:#111;color:#fff;display:flex;flex-direction:column;}

/* ── TOP BAR ── */
.topbar{
  background:#1a2a4a;
  padding:10px 14px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.topbar h1{font-size:15px;font-weight:700;}
.topbar a{color:rgba(255,255,255,.6);font-size:11px;text-decoration:none;}

/* ── MAIN PREVIEW ── */
.preview-area{
  flex:1;
  position:relative;
  overflow:hidden;
  background:#1a1a1a;
  display:flex;align-items:center;justify-content:center;
}
/* Empty state */
.empty-state{
  display:flex;flex-direction:column;align-items:center;gap:16px;
  opacity:.5;
}
.empty-state svg{width:64px;height:64px;fill:#fff;}
.empty-state p{font-size:13px;}

/* Big page preview */
#bigPreview{
  max-width:100%;max-height:100%;
  object-fit:contain;
  display:none;
  user-select:none;
  -webkit-user-drag:none;
}

/* Page counter badge */
#pgBadge{
  position:absolute;top:10px;left:10px;
  background:rgba(0,0,0,.65);color:#fff;
  font-size:11px;font-weight:700;
  padding:4px 10px;border-radius:20px;
  display:none;
}

/* Prev / Next arrows */
.nav-btn{
  position:absolute;top:50%;transform:translateY(-50%);
  background:rgba(0,0,0,.5);border:none;color:#fff;
  width:36px;height:60px;border-radius:6px;
  font-size:20px;cursor:pointer;display:none;
  align-items:center;justify-content:center;
}
#btnPrev{left:4px;}
#btnNext{right:4px;}

/* ── THUMBNAIL STRIP ── */
.strip{
  height:72px;
  background:#0d1b35;
  display:flex;align-items:center;
  gap:6px;padding:6px 8px;
  overflow-x:auto;
  flex-shrink:0;
  -webkit-overflow-scrolling:touch;
}
.strip:empty::after{content:'No pages yet';color:rgba(255,255,255,.3);font-size:11px;margin:auto;}
.thumb{
  position:relative;flex-shrink:0;
  width:44px;height:60px;
  border-radius:4px;overflow:hidden;
  border:2px solid transparent;
  cursor:pointer;
}
.thumb.active{border-color:#27ae60;}
.thumb img{width:100%;height:100%;object-fit:cover;}
.thumb .t-num{
  position:absolute;bottom:0;left:0;right:0;
  background:rgba(0,0,0,.6);color:#fff;
  font-size:8px;font-weight:700;text-align:center;padding:2px;
}
.thumb .t-chk{
  position:absolute;top:2px;right:2px;
  width:14px;height:14px;
  accent-color:#27ae60;cursor:pointer;
  opacity:0.85;
}
#batchBar{
  background:#0d1b35;padding:4px 8px;
  display:none;align-items:center;gap:6px;
  flex-shrink:0;border-top:1px solid rgba(255,255,255,.1);
}
#batchBar.show{display:flex;}
#batchBar button{
  padding:5px 10px;font-size:11px;font-weight:700;border:none;
  border-radius:6px;cursor:pointer;background:#1a2a4a;color:#fff;
}
#batchBar button.green{background:#27ae60;}
/* Add button in strip */
.thumb-add{
  flex-shrink:0;width:44px;height:60px;border-radius:4px;
  background:rgba(255,255,255,.1);border:1.5px dashed rgba(255,255,255,.3);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;color:rgba(255,255,255,.6);font-size:20px;gap:2px;
}
.thumb-add span{font-size:8px;}

/* ── BOTTOM TOOLBAR ── */
.toolbar{
  background:#1a2a4a;
  padding:8px 10px;
  display:flex;align-items:center;justify-content:space-around;
  flex-shrink:0;
  gap:6px;
}
.tbtn{
  flex:1;
  padding:9px 4px;
  background:rgba(255,255,255,.08);
  border:none;border-radius:8px;
  color:#fff;font-size:11px;font-weight:600;
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:3px;
}
.tbtn .ico{font-size:18px;line-height:1;}
.tbtn:disabled{opacity:.3;}
.tbtn.primary{background:#27ae60;}
.tbtn.green{background:#27ae60;}

/* ── EDITOR MODAL ── */
#edModal{
  display:none;position:fixed;inset:0;z-index:9999;
  background:#000;flex-direction:column;
}
#edModal.open{display:flex;}
.ed-hdr{
  background:#1a2a4a;padding:8px 12px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.ed-hdr span{font-size:13px;font-weight:600;}
.ed-hdr button{background:none;border:none;color:#fff;font-size:26px;cursor:pointer;line-height:1;}
.ed-tools{
  background:#0d1b35;padding:7px 8px;
  display:flex;gap:5px;flex-wrap:wrap;flex-shrink:0;
}
.etbtn{
  padding:7px 11px;border:1.5px solid rgba(255,255,255,.3);
  border-radius:6px;font-size:12px;font-weight:600;
  cursor:pointer;background:transparent;color:#fff;white-space:nowrap;
}
.etbtn.on{background:#27ae60;border-color:#27ae60;}
.ed-canvas-area{
  flex:1;position:relative;overflow:hidden;
  background:#111;display:flex;align-items:center;justify-content:center;
}
#ec{display:block;position:absolute;touch-action:none;max-width:100%;max-height:100%;}
.ed-ftr{
  background:#1a2a4a;padding:8px 12px;
  display:flex;gap:8px;justify-content:space-between;flex-shrink:0;
}



/* ── PDF MODAL ── */
#pdfModal{
  display:none;position:fixed;inset:0;z-index:9998;
  background:rgba(0,0,0,.7);align-items:flex-end;
}
#pdfModal.open{display:flex;}
.pdf-sheet{
  background:#1a2a4a;border-radius:16px 16px 0 0;
  padding:20px 16px 32px;width:100%;
}
.pdf-sheet h3{font-size:14px;font-weight:700;margin-bottom:16px;}
.pdf-sheet input{
  width:100%;padding:10px 12px;border-radius:8px;
  border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);
  color:#fff;font-size:14px;margin-bottom:12px;outline:none;
}
.q-row{display:flex;gap:6px;margin-bottom:16px;}
.q-btn{
  flex:1;padding:8px 4px;font-size:11px;border-radius:6px;
  border:1.5px solid rgba(255,255,255,.3);background:transparent;
  color:#fff;cursor:pointer;font-weight:600;text-align:center;
}
.q-btn.active{background:#27ae60;border-color:#27ae60;}
.pdf-btns{display:flex;gap:8px;}
.pdf-btns button{flex:1;padding:12px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;}
.pdf-cancel{background:rgba(255,255,255,.15);color:#fff;}
.pdf-go{background:#27ae60;color:#fff;}
.st{padding:9px;border-radius:7px;font-size:12px;font-weight:600;text-align:center;margin-top:10px;display:none;}
.st.show{display:block;}
.st.ok{background:#d4edda;color:#155724;}
.st.err{background:#f8d7da;color:#721c24;}
.st.info{background:#d1ecf1;color:#0c5460;}



/* Generic small btn */
.gbtn{
  padding:6px 12px;border:none;border-radius:6px;
  font-size:11px;font-weight:600;cursor:pointer;
}
.gbtn-danger{background:#c0392b;color:#fff;}
.gbtn-light{background:rgba(255,255,255,.15);color:#fff;}
#redactBar{display:none;}
#redactBar.show{display:flex;}

/* ── LOUPE (köşe önizleme — canvas area içinde float) ── */
#loupe{
  display:none;
  position:absolute;
  z-index:200;
  width:110px;height:110px;
  border-radius:10px;
  border:2px solid rgba(255,255,255,0.55);
  box-shadow:0 4px 18px rgba(0,0,0,0.7);
  overflow:hidden;
  pointer-events:none;
  background:#111;
  top:12px;
}
#loupe canvas{display:block;width:100%;height:100%;}
#loupe::after{
  content:'';
  position:absolute;inset:0;
  background:
    linear-gradient(rgba(255,255,255,.3) 1px,transparent 1px) 0 50%/100% 1px no-repeat,
    linear-gradient(90deg,rgba(255,255,255,.3) 1px,transparent 1px) 50% 0/1px 100% no-repeat;
  pointer-events:none;
}


</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <h1>📄 Document Scanner V.2.1 <span style="font-weight:400;opacity:0.5;font-size:11px">— Bulut Projects</span></h1>
  <a href="index.html">← Home</a>
</div>

<!-- MAIN PREVIEW -->
<div class="preview-area" id="previewArea">
  <div class="empty-state" id="emptyState">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM6 20V4h5v7h7v9H6z"/></svg>
    <p style="font-size:16px;font-weight:700;opacity:1;">Welcome</p>
    <p style="font-size:12px;opacity:0.7;margin-top:-8px;">Document Scanner — Bulut Projects</p>
  </div>
  <img id="bigPreview" alt="page preview">
  <div id="pgBadge"></div>
  <button class="nav-btn" id="btnPrev" onclick="navigate(-1)">‹</button>
  <button class="nav-btn" id="btnNext" onclick="navigate(1)">›</button>
</div>

<!-- THUMBNAIL STRIP -->
<div class="strip" id="strip"></div>

<!-- BATCH ACTION BAR -->
<div id="batchBar">
  <span style="font-size:11px;color:rgba(255,255,255,.7)" id="batchLabel">0 selected</span>
  <button onclick="batchSelectAll()">All</button>
  <button onclick="batchClearSel()">✕ Deselect</button>
    <div style="flex:1"></div>
</div>
<!-- BOTTOM TOOLBAR -->
<div class="toolbar">
  <button class="tbtn" id="tbAdd" onclick="triggerAdd()">
    <span class="ico">➕</span><span>Add</span>
  </button>
  <button class="tbtn" id="tbDel" onclick="delCurrent()" disabled>
    <span class="ico">🗑</span><span>Delete</span>
  </button>
  <button class="tbtn" id="tbEdit" onclick="openEd(curIdx)" disabled>
    <span class="ico">✏️</span><span>Edit</span>
  </button>
  <button class="tbtn" id="tbRotate" onclick="selectedPages.size?batchRotate():rotateCurrent()" disabled>
    <span class="ico">↻</span><span>Rotate</span>
  </button>
  <button class="tbtn green" id="tbPDF" onclick="openPDFModal()" disabled>
    <span class="ico">📄</span><span>PDF</span>
  </button>
</div>



<input type="file" id="fi" accept="image/*" multiple style="display:none" onchange="addPages(event)">

<!-- EDITOR MODAL -->
<div id="edModal">
  <div class="ed-hdr">
    <span id="edTitle">Edit</span>
    <button onclick="closeEd()">×</button>
  </div>
  <div class="ed-tools" style="flex-wrap:nowrap;overflow-x:auto;justify-content:flex-start;padding-left:8px;">
    <button class="etbtn" id="tCrop"       onclick="setTool('crop')"       style="white-space:nowrap">✂️ Crop</button>
    <button class="etbtn"                  onclick="autoCrop()"             style="white-space:nowrap">Auto</button>
    <button class="etbtn" id="tRedact"     onclick="setTool('redact')"     style="white-space:nowrap">Brush</button>
    <button class="etbtn" id="tRedactRect" onclick="setTool('redactRect')" style="white-space:nowrap">Redact</button>
    <button class="etbtn"                  onclick="undoEd()"               style="white-space:nowrap">Undo</button>
    <button class="etbtn"                  onclick="rotImg(90)"             style="white-space:nowrap">↻ Rotate</button>
    <button class="etbtn" id="tOcrRect"    onclick="openOcrPage()"         style="white-space:nowrap">OCR</button>
  </div>
  <div id="redactBar" style="display:none;background:#0d1b35;padding:6px 14px;align-items:center;gap:10px;flex-shrink:0;">
    <span style="color:#fff;font-size:11px;white-space:nowrap;">🖌</span>
    <input type="range" id="brushSize" min="4" max="100" value="20"
      style="flex:1;accent-color:#27ae60;"
      oninput="brushRadius=parseInt(this.value);document.getElementById('brushSizeVal').textContent=this.value">
    <span id="brushSizeVal" style="color:#fff;font-size:11px;min-width:28px;text-align:right">20px</span>
    <button onclick="document.getElementById('redactBar').style.display='none'" style="background:none;border:none;color:rgba(255,255,255,.5);font-size:16px;cursor:pointer;padding:0 4px">✕</button>
  </div>
  <!-- Redact color bar: shown when redactRect tool is active -->
  <div id="redactColorBar" style="display:none;background:#0d1b35;padding:5px 14px;align-items:center;gap:10px;flex-shrink:0;">
    <span style="color:#fff;font-size:11px;white-space:nowrap;">Fill:</span>
    <button id="rcWhite" onclick="setRedactColor('white')" style="background:#fff;color:#000;border:2px solid #27ae60;border-radius:5px;padding:3px 14px;font-size:11px;font-weight:700;cursor:pointer;">White</button>
    <button id="rcBlack" onclick="setRedactColor('black')" style="background:#111;color:#fff;border:2px solid transparent;border-radius:5px;padding:3px 14px;font-size:11px;font-weight:700;cursor:pointer;">Black</button>
    <button onclick="document.getElementById('redactColorBar').style.display='none'" style="background:none;border:none;color:rgba(255,255,255,.5);font-size:16px;cursor:pointer;padding:0 4px;margin-left:auto;">✕</button>
  </div>
  <div class="ed-canvas-area" id="edCanvasArea">
    <canvas id="ec"></canvas>
    <!-- Loupe — canvas area içinde sabit, parmak görüşü engellemiyor -->
    <div id="loupe"><canvas id="loupeCanvas"></canvas></div>
  </div>
  <div class="ed-ftr">
    <div style="display:flex;gap:6px">
      <button class="gbtn gbtn-light" onclick="resetEd()">Reset</button>
    </div>
    <div style="display:flex;gap:6px">
      <button class="gbtn gbtn-light" onclick="closeEd()">Cancel</button>
      <button class="gbtn" style="background:#27ae60;color:#fff" onclick="applyEd()">✓ Apply</button>
    </div>
  </div>
</div>



<!-- PDF MODAL -->
<div id="pdfModal" onclick="if(event.target===this)closePDFModal()">
  <div class="pdf-sheet">
    <h3>📄 Export PDF</h3>
    <input type="text" id="pdfName" value="" placeholder="File name">
    <div class="q-row">
      <div class="q-btn" data-q="0.6" onclick="setQ(this)">Small</div>
      <div class="q-btn active" data-q="0.8" onclick="setQ(this)">Medium</div>
      <div class="q-btn" data-q="0.92" onclick="setQ(this)">High</div>
      <div class="q-btn" data-q="1" onclick="setQ(this)">Full</div>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:16px;">
      <div class="q-btn active" id="pdfColorBtn" onclick="setPdfColor(this,'color')">Original</div>
      <div class="q-btn" id="pdfBWBtn" onclick="setPdfColor(this,'bw')">Black-White</div>
    </div>
    <div class="pdf-btns" style="flex-direction:column;gap:8px;">
      <div style="display:flex;gap:8px;">
        <button class="pdf-cancel" onclick="closePDFModal()">Cancel</button>
        <button class="pdf-go" onclick="exportPDF('download')">Generate</button>
      </div>
      <button id="btnShare" class="pdf-go" style="background:#075e54;display:block;width:100%;opacity:0.4;pointer-events:none;" onclick="sharePDF()">↗ Share</button>
    </div>
    <div class="st" id="pdfSt"></div>
  </div>
</div>



<script>
if(sessionStorage.getItem('bulut_auth')!=='1') window.location.href='index.html';

/* ═══ STATE ═══ */
const pages = [];
let curIdx  = null;
let pdfQ    = 0.8;
let pdfColorMode = 'color'; // 'color' or 'bw'
let redactColor  = 'white'; // 'white' or 'black'
let tReady  = false;
const selectedPages = new Set();

/* ═══ EXIF + AUTO-ROTATE ═══ */
function applyOrientation(img, ori, cb){
  const c=document.createElement('canvas'), ctx=c.getContext('2d');
  const w=img.width, h=img.height;
  if(ori>=5&&ori<=8){c.width=h;c.height=w;}
  else{c.width=w;c.height=h;}
  switch(ori){
    case 2:ctx.translate(w,0);ctx.scale(-1,1);break;
    case 3:ctx.translate(w,h);ctx.rotate(Math.PI);break;
    case 4:ctx.translate(0,h);ctx.scale(1,-1);break;
    case 5:ctx.rotate(.5*Math.PI);ctx.scale(1,-1);break;
    case 6:ctx.rotate(.5*Math.PI);ctx.translate(0,-h);break;
    case 7:ctx.rotate(.5*Math.PI);ctx.translate(w,-h);ctx.scale(-1,1);break;
    case 8:ctx.rotate(-.5*Math.PI);ctx.translate(-w,0);break;
  }
  ctx.drawImage(img,0,0,w,h);
  cb(c.toDataURL('image/jpeg',0.92));
}

function autoRotLeft(dataUrl, cb){
  const img=new Image();
  img.onload=()=>{
    const c=document.createElement('canvas');
    c.width=img.height; c.height=img.width;
    const ctx=c.getContext('2d');
    ctx.translate(c.width/2,c.height/2);
    ctx.rotate(-Math.PI/2);
    ctx.drawImage(img,-img.width/2,-img.height/2);
    cb(c.toDataURL('image/jpeg',0.92));
  };
  img.src=dataUrl;
}

function loadAndFix(file, cb){
  const r=new FileReader();
  r.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      try{
        EXIF.getData(img,function(){
          const ori=EXIF.getTag(this,'Orientation')||1;
          applyOrientation(img,ori,fixed=>{
            autoRotLeft(fixed,cb);
          });
        });
      }catch(err){
        autoRotLeft(e.target.result,cb);
      }
    };
    img.src=e.target.result;
  };
  r.readAsDataURL(file);
}

/* ═══ PAGE MANAGEMENT ═══ */
function triggerAdd(){
  const f=document.getElementById('fi');
  f.removeAttribute('capture');
  f.value=''; f.click();
}
function delCurrent(){
  if(selectedPages.size>0){
    batchDelete();
    return;
  }
  if(curIdx===null||!pages.length) return;
  pages.splice(curIdx,1);
  if(pages.length===0){ curIdx=null; showEmpty(); }
  else{ curIdx=Math.min(curIdx,pages.length-1); selectPage(curIdx); }
  renderStrip();
  updateUI();
}
function batchDelete(){
  if(!selectedPages.size) return;
  const idxs=[...selectedPages].sort((a,b)=>b-a); // büyükten küçüğe sil
  idxs.forEach(idx=>pages.splice(idx,1));
  selectedPages.clear();
  if(pages.length===0){ curIdx=null; showEmpty(); }
  else{ curIdx=Math.min(curIdx??0, pages.length-1); selectPage(curIdx); }
  renderStrip();
  updateBatchBar();
  updateUI();
}
function showEmpty(){
  document.getElementById('bigPreview').style.display='none';
  const es=document.getElementById('emptyState');
  es.innerHTML='<svg viewBox="0 0 24 24" style="width:64px;height:64px;fill:#fff"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM6 20V4h5v7h7v9H6z"/></svg><p style="font-size:16px;font-weight:700;opacity:1;">Welcome</p><p style="font-size:12px;opacity:0.7;margin-top:-8px;">Document Scanner \u2014 Bulut Projects</p>';
  es.style.display='flex';
  document.getElementById('pgBadge').style.display='none';
  document.getElementById('btnPrev').style.display='none';
  document.getElementById('btnNext').style.display='none';
}

function addPages(ev){
  const files=Array.from(ev.target.files); ev.target.value='';
  if(!files.length)return;
  const results=new Array(files.length).fill(null);
  let done=0;
  files.forEach((f,i)=>{
    loadAndFix(f,url=>{
      results[i]=url;
      if(++done===files.length){
        results.forEach(url=>pages.push({orig:url,cur:url}));
        selectPage(pages.length-1);
        renderStrip();
        updateUI();
      }
    });
  });
}

function selectPage(idx){
  if(idx<0||idx>=pages.length)return;
  curIdx=idx;
  const bp=document.getElementById('bigPreview');
  bp.src=pages[idx].cur;
  bp.style.display='block';
  document.getElementById('emptyState').style.display='none';
  document.getElementById('pgBadge').textContent=(idx+1)+' / '+pages.length;
  document.getElementById('pgBadge').style.display='block';
  document.getElementById('btnPrev').style.display=idx>0?'flex':'none';
  document.getElementById('btnNext').style.display=idx<pages.length-1?'flex':'none';
  document.querySelectorAll('.thumb').forEach((t,i)=>t.classList.toggle('active',i===idx));
  updateUI();
}

function navigate(dir){
  if(curIdx===null)return;
  selectPage(curIdx+dir);
}

function batchRotate(){
  const idxs=[...selectedPages];
  if(!idxs.length) return;
  let done=0;
  idxs.forEach(idx=>{
    const src=pages[idx].cur;
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');
      c.width=img.height; c.height=img.width;
      const ctx=c.getContext('2d');
      ctx.translate(c.width/2,c.height/2);
      ctx.rotate(Math.PI/2);
      ctx.drawImage(img,-img.width/2,-img.height/2);
      const url=c.toDataURL('image/jpeg',pdfQ);
      pages[idx]={orig:url,cur:url};
      if(++done===idxs.length){
        renderStrip();
        if(curIdx!==null) selectPage(curIdx);
      }
    };
    img.src=src;
  });
}
function batchClearSel(){
  selectedPages.clear();
  renderStrip();
  updateBatchBar();
}
function batchSelectAll(){
  pages.forEach((_,i)=>selectedPages.add(i));
  renderStrip();
  updateBatchBar();
}
function updateBatchBar(){
  const bar=document.getElementById('batchBar');
  const n=selectedPages.size;
  if(n>0){
    bar.classList.add('show');
    document.getElementById('batchLabel').textContent=n+' selected';
  } else {
    bar.classList.remove('show');
  }
}
function rotateCurrent(){
  if(curIdx===null)return;
  const src=pages[curIdx].cur;
  const img=new Image();
  img.onload=()=>{
    const c=document.createElement('canvas');
    c.width=img.height; c.height=img.width;
    const ctx=c.getContext('2d');
    ctx.translate(c.width/2,c.height/2);
    ctx.rotate(Math.PI/2);
    ctx.drawImage(img,-img.width/2,-img.height/2);
    const url=c.toDataURL('image/jpeg',pdfQ);
    pages[curIdx]={orig:url,cur:url};
    selectPage(curIdx);
    renderStrip();
  };
  img.src=src;
}

// Drag-sort state
let dragSrcIdx=null;

function renderStrip(){
  const strip=document.getElementById('strip');
  strip.innerHTML='';
  pages.forEach((pg,idx)=>{
    const t=document.createElement('div');
    t.className='thumb'+(idx===curIdx?' active':'');
    t.onclick=()=>{ if(!dragSrcIdx&&dragSrcIdx!==0) selectPage(idx); };

    t.draggable=true;
    t.addEventListener('dragstart',e=>{
      dragSrcIdx=idx;
      t.style.opacity='0.4';
      e.dataTransfer.effectAllowed='move';
    });
    t.addEventListener('dragend',e=>{ t.style.opacity=''; dragSrcIdx=null; });
    t.addEventListener('dragover',e=>{ e.preventDefault(); e.dataTransfer.dropEffect='move'; });
    t.addEventListener('dragenter',e=>{ t.style.outline='2px solid #27ae60'; });
    t.addEventListener('dragleave',e=>{ t.style.outline=''; });
    t.addEventListener('drop',e=>{
      e.preventDefault(); t.style.outline='';
      if(dragSrcIdx===null||dragSrcIdx===idx) return;
      const moved=pages.splice(dragSrcIdx,1)[0];
      pages.splice(idx,0,moved);
      curIdx=idx;
      renderStrip();
      selectPage(curIdx);
      dragSrcIdx=null;
    });

    let touchDragTimer=null, touchDragActive=false, touchDragClone=null;
    t.addEventListener('touchstart',e=>{
      touchDragTimer=setTimeout(()=>{
        touchDragActive=true;
        dragSrcIdx=idx;
        touchDragClone=t.cloneNode(true);
        touchDragClone.style.cssText='position:fixed;z-index:9999;opacity:0.7;pointer-events:none;width:44px;height:60px;border-radius:4px;overflow:hidden;';
        document.body.appendChild(touchDragClone);
        t.style.opacity='0.3';
      },400);
    },{passive:true});
    t.addEventListener('touchmove',e=>{
      if(!touchDragActive) return;
      e.preventDefault();
      const touch=e.touches[0];
      if(touchDragClone){
        touchDragClone.style.left=(touch.clientX-22)+'px';
        touchDragClone.style.top=(touch.clientY-30)+'px';
      }
      document.querySelectorAll('.thumb').forEach((el,i)=>{
        const r=el.getBoundingClientRect();
        el.style.outline=(touch.clientX>=r.left&&touch.clientX<=r.right&&touch.clientY>=r.top&&touch.clientY<=r.bottom&&i!==dragSrcIdx)?'2px solid #27ae60':'';
      });
    },{passive:false});
    t.addEventListener('touchend',e=>{
      clearTimeout(touchDragTimer);
      if(touchDragClone){touchDragClone.remove();touchDragClone=null;}
      t.style.opacity='';
      document.querySelectorAll('.thumb').forEach(el=>el.style.outline='');
      if(!touchDragActive){ touchDragActive=false; dragSrcIdx=null; return; }
      touchDragActive=false;
      const touch=e.changedTouches[0];
      let targetIdx=null;
      document.querySelectorAll('.thumb').forEach((el,i)=>{
        const r=el.getBoundingClientRect();
        if(touch.clientX>=r.left&&touch.clientX<=r.right&&touch.clientY>=r.top&&touch.clientY<=r.bottom) targetIdx=i;
      });
      if(targetIdx!==null&&targetIdx!==dragSrcIdx){
        const moved=pages.splice(dragSrcIdx,1)[0];
        pages.splice(targetIdx,0,moved);
        curIdx=targetIdx;
        renderStrip();
        selectPage(curIdx);
      }
      dragSrcIdx=null;
    },{passive:true});

    const img=document.createElement('img');
    img.src=pg.cur;
    const num=document.createElement('div');
    num.className='t-num'; num.textContent=idx+1;
    const chk=document.createElement('input');
    chk.type='checkbox'; chk.className='t-chk';
    chk.checked=selectedPages.has(idx);
    chk.addEventListener('change',ev=>{
      ev.stopPropagation();
      if(chk.checked) selectedPages.add(idx);
      else selectedPages.delete(idx);
      updateBatchBar();
    });
    chk.addEventListener('click',ev=>ev.stopPropagation());
    t.append(img,num,chk);
    strip.appendChild(t);
  });
  const add=document.createElement('div');
  add.className='thumb-add';
  add.innerHTML='<span style="font-size:22px">+</span><span>Add</span>';
  add.onclick=()=>triggerAdd();
  strip.appendChild(add);
}

function fitCanvas(){
  const area=document.getElementById('edCanvasArea');
  const ww=area.clientWidth, wh=area.clientHeight;
  ec.width  = edW;
  ec.height = edH;
  edSc = Math.min((ww-8)/edW, (wh-8)/edH, 1);
  const dispW = Math.round(edW * edSc);
  const dispH = Math.round(edH * edSc);
  ec.style.width  = dispW + 'px';
  ec.style.height = dispH + 'px';
  vZ=1; vX=0; vY=0;
  applyViewport();
}
function applyViewport(){
  const area=document.getElementById('edCanvasArea');
  const ww=area.clientWidth, wh=area.clientHeight;
  const dispW=parseFloat(ec.style.width)||ec.width*edSc;
  const dispH=parseFloat(ec.style.height)||ec.height*edSc;
  const baseL=Math.round((ww-dispW)/2);
  const baseT=Math.round((wh-dispH)/2);
  ec.style.left=(baseL+vX)+'px';
  ec.style.top =(baseT+vY)+'px';
  ec.style.transform='scale('+vZ+')';
  ec.style.transformOrigin='top left';
}

/* Önbellek: decode edilmiş Image nesnesi (sync drawImage için) */
let _cachedImg = null;
let _cachedSrc = null;

/* Sadece overlay'i yeniden çiz — image yok, tamamen sync.
   Sürükleme sırasında kullan: hızlı, hiç async yok. */
function redrawOverlayOnly(){
  if(!_cachedImg) return;
  ectx.clearRect(0,0,ec.width,ec.height);
  ectx.drawImage(_cachedImg,0,0,ec.width,ec.height);
  drawCropOverlay();
  if(tool==='redactRect') drawRRect();
}

function _drawFromImg(img){
  ectx.clearRect(0,0,ec.width,ec.height);
  ectx.drawImage(img,0,0,ec.width,ec.height);
  drawCropOverlay();
  if(tool==='redactRect') drawRRect();
}

function redrawEc(srcOverride){
  const src=srcOverride||(history.length?history[history.length-1]:null)||pages[edIdx].cur;

  // Cache hit — tamamen sync
  if(_cachedImg && _cachedSrc === src){
    _drawFromImg(_cachedImg);
    return;
  }

  // Cache miss — bir kere yükle, cache'e al
  const img=new Image();
  img.onload=()=>{
    _cachedImg = img;
    _cachedSrc = src;
    _drawFromImg(img);
  };
  img.src=src;
}

function invalidateBitmapCache(){
  _cachedImg = null;
  _cachedSrc = null;
}

function rectToQuad(x,y,w,h){
  return{tl:{x,y},tr:{x:x+w,y},bl:{x,y:y+h},br:{x:x+w,y:y+h}};
}
function drawCropOverlay(){
  if(!quad)return;
  const{tl,tr,bl,br}=quad;
  const lw=Math.max(1,2/edSc);
  const navy='#000000';

  ectx.save();
  ectx.strokeStyle='rgba(255,255,255,0.7)';
  ectx.lineWidth=lw+4; ectx.setLineDash([]);
  ectx.beginPath();
  ectx.moveTo(tl.x,tl.y);ectx.lineTo(tr.x,tr.y);
  ectx.lineTo(br.x,br.y);ectx.lineTo(bl.x,bl.y);
  ectx.closePath();ectx.stroke();
  ectx.strokeStyle=navy;
  ectx.lineWidth=lw+1; ectx.setLineDash([]);
  ectx.beginPath();
  ectx.moveTo(tl.x,tl.y);ectx.lineTo(tr.x,tr.y);
  ectx.lineTo(br.x,br.y);ectx.lineTo(bl.x,bl.y);
  ectx.closePath();ectx.stroke();
  ectx.restore();

  const cr=Math.max(6,8/edSc);
  [tl,tr,bl,br].forEach(p=>{
    ectx.save();
    ectx.strokeStyle='rgba(255,255,255,0.8)';
    ectx.lineWidth=Math.max(2,4/edSc)+2;
    ectx.beginPath();ectx.arc(p.x,p.y,cr,0,Math.PI*2);ectx.stroke();
    ectx.strokeStyle=navy;
    ectx.lineWidth=Math.max(2,4/edSc);
    ectx.beginPath();ectx.arc(p.x,p.y,cr,0,Math.PI*2);ectx.stroke();
    ectx.restore();
  });

  const edges=[
    {a:tl,b:tr},{a:tr,b:br},{a:bl,b:br},{a:tl,b:bl},
  ];
  const rw=Math.max(12,17/edSc), rh=Math.max(6,8/edSc);
  edges.forEach(({a,b})=>{
    const mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
    const angle=Math.atan2(b.y-a.y,b.x-a.x);
    ectx.save();
    ectx.translate(mx,my);ectx.rotate(angle);
    ectx.strokeStyle='rgba(255,255,255,0.8)';
    ectx.lineWidth=Math.max(2,3/edSc)+2;
    ectx.beginPath();
    roundRect(ectx,-rw/2,-rh/2,rw,rh,rh/2);
    ectx.stroke();
    ectx.strokeStyle=navy;
    ectx.lineWidth=Math.max(2,3/edSc);
    ectx.beginPath();
    roundRect(ectx,-rw/2,-rh/2,rw,rh,rh/2);
    ectx.stroke();
    ectx.restore();
  });

  const ccx=(tl.x+tr.x+bl.x+br.x)/4;
  const ccy=(tl.y+tr.y+bl.y+br.y)/4;
  const ccr=Math.max(11,14/edSc);
  ectx.save();
  ectx.strokeStyle='rgba(255,255,255,0.8)';
  ectx.lineWidth=Math.max(2,4/edSc)+2;
  ectx.beginPath();ectx.arc(ccx,ccy,ccr,0,Math.PI*2);ectx.stroke();
  ectx.strokeStyle=navy;
  ectx.lineWidth=Math.max(2,3/edSc);
  ectx.beginPath();ectx.arc(ccx,ccy,ccr,0,Math.PI*2);ectx.stroke();
  const arm=ccr*0.55;
  ectx.beginPath();
  ectx.moveTo(ccx-arm,ccy);ectx.lineTo(ccx+arm,ccy);
  ectx.moveTo(ccx,ccy-arm);ectx.lineTo(ccx,ccy+arm);
  ectx.stroke();
  ectx.restore();
}

function roundRect(ctx,x,y,w,h,r){
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

/* ═══ SMART AUTO-DETECT (Canny + Quadrilateral Contour) ═══
 * Performs:
 *  1. Gaussian blur  → reduces noise
 *  2. Grayscale + Sobel gradient → edge magnitude & direction
 *  3. Non-maximum suppression → thin edges
 *  4. Double threshold + hysteresis → Canny binary edge map
 *  5. Probabilistic contour scan → finds the largest 4-sided polygon
 *     that resembles a document/page boundary
 *  6. Falls back to content-bbox if no quad found
 */
function cannyEdgeDetect(data, w, h){
  // --- Step 1: Grayscale ---
  const gray = new Float32Array(w*h);
  for(let i=0;i<w*h;i++){
    gray[i] = 0.299*data[i*4] + 0.587*data[i*4+1] + 0.114*data[i*4+2];
  }

  // --- Step 2: Gaussian blur (5x5 kernel) ---
  const kernel=[2,4,5,4,2, 4,9,12,9,4, 5,12,15,12,5, 4,9,12,9,4, 2,4,5,4,2];
  const kSum=159;
  const blurred=new Float32Array(w*h);
  for(let y=0;y<h;y++) for(let x=0;x<w;x++){
    let s=0;
    for(let ky=0;ky<5;ky++) for(let kx=0;kx<5;kx++){
      const ny=Math.max(0,Math.min(h-1,y+ky-2));
      const nx=Math.max(0,Math.min(w-1,x+kx-2));
      s+=kernel[ky*5+kx]*gray[ny*w+nx];
    }
    blurred[y*w+x]=s/kSum;
  }

  // --- Step 3: Sobel gradients ---
  const gx=new Float32Array(w*h), gy=new Float32Array(w*h);
  const mag=new Float32Array(w*h), dir=new Uint8Array(w*h);
  for(let y=1;y<h-1;y++) for(let x=1;x<w-1;x++){
    const p=(py,px)=>blurred[py*w+px];
    const sx=-p(y-1,x-1)-2*p(y,x-1)-p(y+1,x-1)+p(y-1,x+1)+2*p(y,x+1)+p(y+1,x+1);
    const sy=-p(y-1,x-1)-2*p(y-1,x)-p(y-1,x+1)+p(y+1,x-1)+2*p(y+1,x)+p(y+1,x+1);
    gx[y*w+x]=sx; gy[y*w+x]=sy;
    mag[y*w+x]=Math.sqrt(sx*sx+sy*sy);
    const a=Math.atan2(sy,sx)*180/Math.PI;
    const an=((a%180)+180)%180;
    dir[y*w+x]=an<22.5||an>=157.5?0:an<67.5?1:an<112.5?2:3;
  }

  // --- Step 4: Non-maximum suppression ---
  const nms=new Float32Array(w*h);
  for(let y=1;y<h-1;y++) for(let x=1;x<w-1;x++){
    const i=y*w+x, m=mag[i];
    let n1,n2;
    switch(dir[i]){
      case 0: n1=mag[i-1];       n2=mag[i+1];       break;
      case 1: n1=mag[(y-1)*w+x+1];n2=mag[(y+1)*w+x-1];break;
      case 2: n1=mag[(y-1)*w+x]; n2=mag[(y+1)*w+x]; break;
      default:n1=mag[(y-1)*w+x-1];n2=mag[(y+1)*w+x+1];
    }
    nms[i]=(m>=n1&&m>=n2)?m:0;
  }

  // --- Step 5: Double threshold + hysteresis ---
  // Adaptive thresholds based on median of non-zero magnitudes
  const nonzero=[]; for(let i=0;i<nms.length;i++) if(nms[i]>0) nonzero.push(nms[i]);
  nonzero.sort((a,b)=>a-b);
  const med = nonzero.length ? nonzero[Math.floor(nonzero.length*0.7)] : 50;
  const hi=med*1.4, lo=med*0.4;
  const edge=new Uint8Array(w*h);
  for(let i=0;i<nms.length;i++) edge[i]=nms[i]>=hi?2:nms[i]>=lo?1:0;
  // hysteresis: promote weak edges connected to strong
  for(let y=1;y<h-1;y++) for(let x=1;x<w-1;x++){
    if(edge[y*w+x]===1){
      let found=false;
      for(let dy=-1;dy<=1&&!found;dy++) for(let dx=-1;dx<=1;dx++){
        if(edge[(y+dy)*w+(x+dx)]===2){found=true;}
      }
      edge[y*w+x]=found?2:0;
    }
  }
  return edge; // 2 = edge pixel
}

/* ═══ Otomatik belge tespiti — Canny + köşe skoru ═══ */
function findDocumentQuad(edge, w, h){
  const step=Math.max(1,Math.round(Math.min(w,h)/400));
  const margin=Math.round(Math.min(w,h)*0.01);

  const pts=[];
  for(let y=margin;y<h-margin;y+=step) for(let x=margin;x<w-margin;x+=step){
    if(edge[y*w+x]===2) pts.push([x,y]);
  }
  if(pts.length<20) return null;

  let mnX=w,mnY=h,mxX=0,mxY=0;
  pts.forEach(([x,y])=>{
    if(x<mnX)mnX=x; if(y<mnY)mnY=y;
    if(x>mxX)mxX=x; if(y>mxY)mxY=y;
  });

  let tl=pts[0],tr=pts[0],bl=pts[0],br=pts[0];
  let tlS=-Infinity,trS=-Infinity,blS=-Infinity,brS=-Infinity;
  pts.forEach(p=>{
    const [x,y]=p;
    const nx=x/w, ny=y/h;
    const sTL=(1-nx)*(1-ny)*2-nx-ny; if(sTL>tlS){tlS=sTL;tl=p;}
    const sTR=nx*(1-ny)*2+nx-ny;     if(sTR>trS){trS=sTR;tr=p;}
    const sBL=(1-nx)*ny*2-nx+ny;     if(sBL>blS){blS=sBL;bl=p;}
    const sBR=nx*ny*2+nx+ny;         if(sBR>brS){brS=sBR;br=p;}
  });

  const area=quadArea(
    {x:tl[0],y:tl[1]},{x:tr[0],y:tr[1]},
    {x:bl[0],y:bl[1]},{x:br[0],y:br[1]}
  );
  if(area/(w*h)<0.08){
    const pad=Math.round(Math.min(w,h)*0.01);
    return {
      tl:{x:Math.max(0,mnX-pad), y:Math.max(0,mnY-pad)},
      tr:{x:Math.min(w,mxX+pad), y:Math.max(0,mnY-pad)},
      bl:{x:Math.max(0,mnX-pad), y:Math.min(h,mxY+pad)},
      br:{x:Math.min(w,mxX+pad), y:Math.min(h,mxY+pad)}
    };
  }
  return {
    tl:{x:tl[0],y:tl[1]}, tr:{x:tr[0],y:tr[1]},
    bl:{x:bl[0],y:bl[1]}, br:{x:br[0],y:br[1]}
  };
}

function quadArea(tl,tr,bl,br){
  // tl/tr/bl/br her ikisi de [x,y] array ya da {x,y} obje olabilir — normalize et
  function gx(p){return Array.isArray(p)?p[0]:p.x;}
  function gy(p){return Array.isArray(p)?p[1]:p.y;}
  const pts=[[gx(tl),gy(tl)],[gx(tr),gy(tr)],[gx(br),gy(br)],[gx(bl),gy(bl)]];
  let a=0;
  for(let i=0;i<4;i++){
    const j=(i+1)%4;
    a+=pts[i][0]*pts[j][1];
    a-=pts[j][0]*pts[i][1];
  }
  return Math.abs(a)/2;
}

/* Refine detected quad by snapping each corner to the nearest strong edge pixel */
function snapCornerToEdge(corner, edge, w, h, searchR){
  const {x,y}=corner;
  const r=Math.round(searchR);
  let best=null, bestMag=-1;
  for(let dy=-r;dy<=r;dy+=2) for(let dx=-r;dx<=r;dx+=2){
    const nx=Math.round(x+dx), ny=Math.round(y+dy);
    if(nx<0||ny<0||nx>=w||ny>=h) continue;
    if(edge[ny*w+nx]===2){
      const d=Math.hypot(dx,dy);
      const score=bestMag<0?1:(1/(d+1));
      if(score>bestMag){bestMag=score;best={x:nx,y:ny};}
    }
  }
  return best||corner;
}

function autoCrop(){
  tool='crop'; rRect=null; brushPoints=[];
  document.querySelectorAll('.etbtn').forEach(b=>b.classList.remove('on'));
  document.getElementById('tCrop').classList.add('on');
  document.getElementById('redactBar').style.display='none';

  const src=history[history.length-1]||pages[edIdx].cur;
  const img=new Image();
  img.onload=()=>{
    // Work at reduced size for speed, then scale results back
    const MAX=800;
    const scale=Math.min(1,MAX/Math.max(img.width,img.height));
    const sw=Math.round(img.width*scale), sh=Math.round(img.height*scale);

    const c=document.createElement('canvas');
    c.width=sw; c.height=sh;
    const ctx=c.getContext('2d');
    ctx.drawImage(img,0,0,sw,sh);
    const imgData=ctx.getImageData(0,0,sw,sh);

    try{
      // Run Canny edge detection
      const edge=cannyEdgeDetect(imgData.data,sw,sh);

      // Find document quad — hem edge hem renk verisi geçiliyor (Seçenek B)
      const q=findDocumentQuad(edge,sw,sh);

      if(q){
        // Scale back to full image coordinates
        const S=1/scale;
        const snap=r=>snapCornerToEdge(r,edge,sw,sh,Math.round(30*scale));
        const tls=snap(q.tl), trs=snap(q.tr), bls=snap(q.bl), brs=snap(q.br);

        quad={
          tl:{x:Math.round(tls.x*S), y:Math.round(tls.y*S)},
          tr:{x:Math.round(trs.x*S), y:Math.round(trs.y*S)},
          bl:{x:Math.round(bls.x*S), y:Math.round(bls.y*S)},
          br:{x:Math.round(brs.x*S), y:Math.round(brs.y*S)},
        };
      } else {
        // Fallback: full image with small margin
        const m=Math.round(Math.min(img.width,img.height)*0.02);
        quad=rectToQuad(m,m,img.width-2*m,img.height-2*m);
      }
    } catch(err){
      console.error('autoCrop error:',err);
      // Hata durumunda güvenli fallback
      const m=Math.round(Math.min(img.width,img.height)*0.02);
      quad=rectToQuad(m,m,img.width-2*m,img.height-2*m);
    }
    cropRect=null;
    redrawEc();
  };
  img.src=src;
}

/* ═══ PERSPECTIVE TRANSFORM HELPERS ═══
 * Solves the 3x3 homography H such that H * [src] = [dst]
 * for 4 point correspondences, then applies inverse warp
 * pixel-by-pixel for correct perspective correction.
 */
function solveHomography(src, dst){
  // src and dst are arrays of 4 points [{x,y}, ...]
  // Returns 3x3 matrix as flat array [h00,h01,h02, h10,h11,h12, h20,h21,h22]
  // Using the standard DLT (Direct Linear Transform) method
  const A = [];
  for(let i=0;i<4;i++){
    const sx=src[i].x, sy=src[i].y;
    const dx=dst[i].x, dy=dst[i].y;
    A.push([-sx,-sy,-1, 0,0,0, dx*sx,dx*sy,dx]);
    A.push([0,0,0, -sx,-sy,-1, dy*sx,dy*sy,dy]);
  }
  // Solve using SVD-free approach: normalize and use Gaussian elimination
  // We have 8 equations, 8 unknowns (h22=1 fixed)
  // Rearrange: last column of each row moves to RHS
  const M = A.map(row => row.slice(0,8));
  const b = A.map(row => -row[8]);

  // Gaussian elimination with partial pivoting
  for(let col=0;col<8;col++){
    // Find pivot
    let maxRow=col;
    for(let row=col+1;row<8;row++){
      if(Math.abs(M[row][col])>Math.abs(M[maxRow][col])) maxRow=row;
    }
    [M[col],M[maxRow]]=[M[maxRow],M[col]];
    [b[col],b[maxRow]]=[b[maxRow],b[col]];
    if(Math.abs(M[col][col])<1e-10) continue;
    for(let row=0;row<8;row++){
      if(row===col) continue;
      const factor=M[row][col]/M[col][col];
      for(let c=col;c<8;c++) M[row][c]-=factor*M[col][c];
      b[row]-=factor*b[col];
    }
  }
  const h=new Array(9);
  for(let i=0;i<8;i++) h[i]=b[i]/M[i][i];
  h[8]=1;
  return h;
}

function applyHomography(H, x, y){
  const w = H[6]*x + H[7]*y + H[8];
  const ox = (H[0]*x + H[1]*y + H[2]) / w;
  const oy = (H[3]*x + H[4]*y + H[5]) / w;
  return {x:ox, y:oy};
}

function perspectiveWarp(srcCanvas, srcQuad, outW, outH){
  // srcQuad: {tl,tr,bl,br} in source image coords
  // outW, outH: output dimensions
  // Returns a new canvas with the warped content
  const dst = [
    {x:0,     y:0},
    {x:outW,  y:0},
    {x:0,     y:outH},
    {x:outW,  y:outH}
  ];
  const srcPts = [srcQuad.tl, srcQuad.tr, srcQuad.bl, srcQuad.br];

  // Compute inverse homography: dst -> src (so we can do inverse mapping)
  const H_inv = solveHomography(dst, srcPts);

  const out = document.createElement('canvas');
  out.width = outW; out.height = outH;
  const octx = out.getContext('2d');

  // Get source pixel data
  const sctx = srcCanvas.getContext('2d');
  const srcData = sctx.getImageData(0, 0, srcCanvas.width, srcCanvas.height);
  const sd = srcData.data;
  const sw = srcCanvas.width, sh = srcCanvas.height;

  const outData = octx.createImageData(outW, outH);
  const od = outData.data;

  for(let dy=0; dy<outH; dy++){
    for(let dx=0; dx<outW; dx++){
      // Map output pixel back to source
      const sp = applyHomography(H_inv, dx+0.5, dy+0.5);
      const sx = sp.x, sy = sp.y;

      // Bilinear interpolation
      const x0=Math.floor(sx), y0=Math.floor(sy);
      const x1=x0+1, y1=y0+1;
      const fx=sx-x0, fy=sy-y0;

      if(x0<0||y0<0||x1>=sw||y1>=sh){
        // Out of bounds → white
        const oi=(dy*outW+dx)*4;
        od[oi]=od[oi+1]=od[oi+2]=255; od[oi+3]=255;
        continue;
      }

      const i00=(y0*sw+x0)*4;
      const i10=(y0*sw+x1)*4;
      const i01=(y1*sw+x0)*4;
      const i11=(y1*sw+x1)*4;

      const oi=(dy*outW+dx)*4;
      for(let c=0;c<3;c++){
        od[oi+c]=Math.round(
          sd[i00+c]*(1-fx)*(1-fy) +
          sd[i10+c]*fx*(1-fy) +
          sd[i01+c]*(1-fx)*fy +
          sd[i11+c]*fx*fy
        );
      }
      od[oi+3]=255;
    }
  }

  octx.putImageData(outData, 0, 0);
  return out;
}

/* ═══ APPLY EDIT ═══ */
function applyEd(){
  // commit any pending rect redact first
  if(rRect){ commitRRect(); return; }
  const src=history[history.length-1]||pages[edIdx].cur;
  const img=new Image();
  img.onload=()=>{
    // Build source canvas from current history state
    const srcCanvas=document.createElement('canvas');
    srcCanvas.width=img.width; srcCanvas.height=img.height;
    srcCanvas.getContext('2d').drawImage(img,0,0);

    if(quad){
      const{tl,tr,bl,br}=quad;
      // Compute output size: use max of opposite edge lengths
      const topW   = Math.hypot(tr.x-tl.x, tr.y-tl.y);
      const botW   = Math.hypot(br.x-bl.x, br.y-bl.y);
      const leftH  = Math.hypot(bl.x-tl.x, bl.y-tl.y);
      const rightH = Math.hypot(br.x-tr.x, br.y-tr.y);
      const outW = Math.round(Math.max(topW, botW));
      const outH = Math.round(Math.max(leftH, rightH));

      if(outW>4 && outH>4){
        // Apply perspective warp — corrects skew/perspective to perfect rectangle
        const warped = perspectiveWarp(srcCanvas, quad, outW, outH);
        pages[edIdx].cur = warped.toDataURL('image/jpeg', 0.92);
        selectPage(edIdx);
        renderStrip();
        closeEd();
        return;
      }
    }

    // No quad: just save current state as-is
    pages[edIdx].cur = srcCanvas.toDataURL('image/jpeg', 0.92);
    selectPage(edIdx);
    renderStrip();
    closeEd();
  };
  img.src=src;
}

/* ═══ LOUPE (köşe aynası) ═══
 * Artık ed-canvas-area içinde position:absolute.
 * Sürüklenen köşe sol yarıdaysa loupe sağ üste,
 * sağ yarıdaysa sol üste sabitlenir — parmak görüşü engellemiyor.
 */
const loupeEl     = document.getElementById('loupe');
const loupeCanvas = document.getElementById('loupeCanvas');
const lctx        = loupeCanvas.getContext('2d');
const LOUPE_SIZE  = 110;  // px — CSS ile eşleşmeli
loupeCanvas.width  = LOUPE_SIZE;
loupeCanvas.height = LOUPE_SIZE;

// RAF throttle — loupe için
let _loupeRaf = null;

function showLoupe(touchClientX, _unused, imgX, imgY){
  // Hangi tarafta? → köşenin canvas-area içindeki ekran X pozisyonu
  const area = document.getElementById('edCanvasArea');
  const areaRect = area.getBoundingClientRect();
  const cornerRelX = touchClientX - areaRect.left;
  const isLeftHalf = cornerRelX < areaRect.width / 2;

  // Loupe'u karşı üst köşeye sabitle (CSS top:12px sabit, sadece left/right değişir)
  loupeEl.style.removeProperty('left');
  loupeEl.style.removeProperty('right');
  if(isLeftHalf){
    loupeEl.style.right = '12px';  // sol köşe sürükleniyorsa sağda göster
  } else {
    loupeEl.style.left  = '12px';  // sağ köşe sürükleniyorsa solda göster
  }

  // İçeriği RAF ile güncelle — flicker engellemek için sync çizim
  if(_loupeRaf) cancelAnimationFrame(_loupeRaf);
  _loupeRaf = requestAnimationFrame(()=>{
    if(!_cachedImg) return;
    // Zoom: 2× büyütme (köşeyi net görmek için)
    const zoom = 2.5;
    const srcSize = LOUPE_SIZE / (edSc * vZ * zoom);
    lctx.clearRect(0, 0, LOUPE_SIZE, LOUPE_SIZE);
    lctx.drawImage(
      _cachedImg,
      imgX - srcSize/2, imgY - srcSize/2, srcSize, srcSize,
      0, 0, LOUPE_SIZE, LOUPE_SIZE
    );
    // Overlay çizgilerini de üstüne koy (köşe konumunu görmek için)
    lctx.save();
    lctx.strokeStyle = 'rgb(0,0,0)';
    lctx.lineWidth = 1.5;
    lctx.beginPath();
    lctx.moveTo(LOUPE_SIZE/2, 0); lctx.lineTo(LOUPE_SIZE/2, LOUPE_SIZE);
    lctx.moveTo(0, LOUPE_SIZE/2); lctx.lineTo(LOUPE_SIZE, LOUPE_SIZE/2);
    lctx.stroke();
    lctx.restore();
    _loupeRaf = null;
  });

  loupeEl.style.display = 'block';
}

function hideLoupe(){
  loupeEl.style.display = 'none';
  if(_loupeRaf){ cancelAnimationFrame(_loupeRaf); _loupeRaf=null; }
}

/* ═══ CANVAS COORDS ═══ */
function canvasPt(clientX,clientY){
  const r=ec.getBoundingClientRect();
  const x=(clientX-r.left)*(ec.width/r.width);
  const y=(clientY-r.top)*(ec.height/r.height);
  return{x, y};
}
function nearQuadCorner(ix,iy){
  if(!quad)return null;
  const hs=Math.max(22,32/edSc);
  for(const name of['tl','tr','bl','br']){
    const p=quad[name];
    if(Math.hypot(ix-p.x,iy-p.y)<hs) return name;
  }
  return null;
}
function nearEdgeMid(ix,iy){
  if(!quad)return null;
  const hs=Math.max(22,32/edSc);
  const{tl,tr,bl,br}=quad;
  const mids={
    top:   {x:(tl.x+tr.x)/2, y:(tl.y+tr.y)/2},
    right: {x:(tr.x+br.x)/2, y:(tr.y+br.y)/2},
    bottom:{x:(bl.x+br.x)/2, y:(bl.y+br.y)/2},
    left:  {x:(tl.x+bl.x)/2, y:(tl.y+bl.y)/2},
  };
  for(const[name,p] of Object.entries(mids)){
    if(Math.hypot(ix-p.x,iy-p.y)<hs) return name;
  }
  return null;
}
function moveEdgeMid(edgeName, ix, iy){
  if(!quad)return;
  const{tl,tr,bl,br}=quad;
  if(edgeName==='top'){
    const dy=iy-(tl.y+tr.y)/2;
    quad.tl={x:tl.x,y:tl.y+dy};
    quad.tr={x:tr.x,y:tr.y+dy};
  } else if(edgeName==='bottom'){
    const dy=iy-(bl.y+br.y)/2;
    quad.bl={x:bl.x,y:bl.y+dy};
    quad.br={x:br.x,y:br.y+dy};
  } else if(edgeName==='left'){
    const dx=ix-(tl.x+bl.x)/2;
    quad.tl={x:tl.x+dx,y:tl.y};
    quad.bl={x:bl.x+dx,y:bl.y};
  } else if(edgeName==='right'){
    const dx=ix-(tr.x+br.x)/2;
    quad.tr={x:tr.x+dx,y:tr.y};
    quad.br={x:br.x+dx,y:br.y};
  }
}
function isInsideQuad(ix,iy){
  if(!quad)return false;
  const{tl,tr,bl,br}=quad;
  const pts=[tl,tr,br,bl];
  let inside=false;
  for(let i=0,j=pts.length-1;i<pts.length;j=i++){
    const xi=pts[i].x,yi=pts[i].y,xj=pts[j].x,yj=pts[j].y;
    if(((yi>iy)!==(yj>iy))&&(ix<(xj-xi)*(iy-yi)/(yj-yi)+xi)) inside=!inside;
  }
  return inside;
}
function moveQuadCorner(name,ix,iy){
  if(!quad)return;
  quad[name]={x:ix,y:iy};
}
let brushPoints = [];
let rRect=null;
let _dragRaf=null;
let rRectDragCorner=null, rRectPanStart=null, rRectAtPan=null;

function commitBrushStroke(){
  if(!brushPoints.length) return;
  const pts=[...brushPoints];
  const r=brushRadius;
  brushPoints=[];
  const src=history[history.length-1]||pages[edIdx].cur;
  const img=new Image();
  img.onload=()=>{
    const c=document.createElement('canvas');
    c.width=img.width;c.height=img.height;
    const ctx=c.getContext('2d');ctx.drawImage(img,0,0);
    ctx.strokeStyle='#ffffff';
    ctx.lineWidth=r*2;
    ctx.lineCap='round';
    ctx.lineJoin='round';
    ctx.beginPath();
    ctx.moveTo(pts[0][0],pts[0][1]);
    pts.forEach(([bx,by])=>ctx.lineTo(bx,by));
    ctx.stroke();
    ctx.fillStyle='#fff';
    [pts[0],pts[pts.length-1]].forEach(([bx,by])=>{
      ctx.beginPath();ctx.arc(bx,by,r,0,Math.PI*2);ctx.fill();
    });
    const newUrl=c.toDataURL('image/jpeg',0.92);
    history.push(newUrl);
    invalidateBitmapCache();
    redrawEc(newUrl);
  };
  img.src=src;
}

function drawBrushLive(ix,iy){
  const r=brushRadius;
  const prev=brushPoints.length>1?brushPoints[brushPoints.length-2]:null;
  if(prev){
    ectx.strokeStyle='#ffffff';
    ectx.lineWidth=r*2;ectx.lineCap='round';ectx.lineJoin='round';
    ectx.beginPath();ectx.moveTo(prev[0],prev[1]);ectx.lineTo(ix,iy);ectx.stroke();
  } else {
    ectx.fillStyle='#ffffff';
    ectx.beginPath();ectx.arc(ix,iy,r,0,Math.PI*2);ectx.fill();
  }
}
function drawRRect(){
  if(!rRect) return;
  const{x,y,w,h}=rRect;
  const fillC=redactColor==='black'?'rgba(0,0,0,0.6)':'rgba(255,255,255,0.6)';
  const strokeC=redactColor==='black'?'#333':'#ffffff';
  ectx.fillStyle=fillC;
  ectx.fillRect(x,y,w,h);
  ectx.strokeStyle=strokeC;
  ectx.lineWidth=Math.max(2,3/edSc);
  ectx.setLineDash([8,4]);
  ectx.strokeRect(x,y,w,h);
  ectx.setLineDash([]);
  const cs=Math.max(5,8/edSc);
  [[x,y],[x+w,y],[x,y+h],[x+w,y+h]].forEach(([cx,cy])=>{
    ectx.fillStyle=strokeC;
    ectx.fillRect(cx-cs/2,cy-cs/2,cs,cs);
  });
  const ccx=x+w/2, ccy=y+h/2;
  const arm=Math.max(10,16/edSc);
  ectx.strokeStyle=redactColor==='black'?'rgba(255,255,255,0.7)':'rgba(0,0,0,0.5)';
  ectx.lineWidth=Math.max(1.5,2/edSc);
  ectx.beginPath();
  ectx.moveTo(ccx-arm,ccy);ectx.lineTo(ccx+arm,ccy);
  ectx.moveTo(ccx,ccy-arm);ectx.lineTo(ccx,ccy+arm);
  ectx.stroke();
}
function nearRRectCorner(ix,iy){
  if(!rRect)return null;
  const hs=Math.max(22,30/edSc);
  const{x,y,w,h}=rRect;
  const pts=[['tl',x,y],['tr',x+w,y],['bl',x,y+h],['br',x+w,y+h]];
  for(const[n,cx,cy]of pts) if(Math.abs(ix-cx)<hs&&Math.abs(iy-cy)<hs) return n;
  return null;
}
function moveRRectCorner(name,ix,iy){
  if(!rRect)return;
  const r=rRect;
  if(name==='tl'){r.w+=r.x-ix;r.h+=r.y-iy;r.x=ix;r.y=iy;}
  else if(name==='tr'){r.w=ix-r.x;r.h+=r.y-iy;r.y=iy;}
  else if(name==='bl'){r.w+=r.x-ix;r.x=ix;r.h=iy-r.y;}
  else if(name==='br'){r.w=ix-r.x;r.h=iy-r.y;}
  if(r.w<0){r.x+=r.w;r.w=Math.abs(r.w);}
  if(r.h<0){r.y+=r.h;r.h=Math.abs(r.h);}
}
function isInsideRRect(ix,iy){
  if(!rRect)return false;
  return ix>=rRect.x&&ix<=rRect.x+rRect.w&&iy>=rRect.y&&iy<=rRect.y+rRect.h;
}
function commitRRect(){
  if(!rRect)return;
  const r={...rRect};
  rRect=null;
  const src=history[history.length-1]||pages[edIdx].cur;
  const img=new Image();
  img.onload=()=>{
    const c=document.createElement('canvas');
    c.width=img.width;c.height=img.height;
    const ctx=c.getContext('2d');ctx.drawImage(img,0,0);
    ctx.fillStyle=redactColor==='black'?'#000000':'#ffffff';
    ctx.fillRect(Math.round(r.x),Math.round(r.y),Math.round(r.w),Math.round(r.h));
    const newUrl=c.toDataURL('image/jpeg',0.92);
    history.push(newUrl);
    invalidateBitmapCache();
    redrawEc(newUrl);
  };
  img.src=src;
}
function drawLive(ix0,iy0,ix1,iy1){
  const sx=Math.min(ix0,ix1),sy=Math.min(iy0,iy1);
  const sw=Math.abs(ix1-ix0),sh=Math.abs(iy1-iy0);
  if(tool==='redact'){
    ectx.fillStyle='rgba(255,255,255,.45)';ectx.fillRect(sx,sy,sw,sh);
  }else if(tool==='crop'){
    ectx.strokeStyle='#1a2a4a';ectx.lineWidth=Math.max(2,3/edSc);ectx.setLineDash([10,5]);
    ectx.strokeRect(sx,sy,sw,sh);ectx.setLineDash([]);
  }
}

/* Touch */
ec.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===2){
    const t0=e.touches[0],t1=e.touches[1];
    pinch0=Math.hypot(t0.clientX-t1.clientX,t0.clientY-t1.clientY);
    pinchMidX=(t0.clientX+t1.clientX)/2;
    pinchMidY=(t0.clientY+t1.clientY)/2;
    drawing=false; dragCorner=null; panStart=null; vpanStart=null;
    return;
  }
  const p=canvasPt(e.touches[0].clientX,e.touches[0].clientY);
  if(tool==='redactRect'){
    rRectDragCorner=nearRRectCorner(p.x,p.y);
    if(rRectDragCorner) return;
    if(rRect && isInsideRRect(p.x,p.y)){
      rRectPanStart={x:p.x,y:p.y};
      rRectAtPan={...rRect};
      return;
    }
    rRect=null; drawing=true; px0=p.x; py0=p.y; px1=p.x; py1=p.y;
    return;
  }
  dragCorner=nearQuadCorner(p.x,p.y);
  if(dragCorner){
    dragEdge=null;
    showLoupe(e.touches[0].clientX, e.touches[0].clientY, p.x, p.y);
    return;
  }
  dragEdge=nearEdgeMid(p.x,p.y);
  if(dragEdge){ return; }
  if(quad && tool==='crop' && isInsideQuad(p.x,p.y)){
    panStart={x:p.x,y:p.y};
    quadAtPanStart={tl:{...quad.tl},tr:{...quad.tr},bl:{...quad.bl},br:{...quad.br}};
    return;
  }
  if(tool==='none'){
    vpanStart={x:e.touches[0].clientX,y:e.touches[0].clientY};
    vXatPan=vX; vYatPan=vY;
    return;
  }
  drawing=true; px0=p.x; py0=p.y; px1=p.x; py1=p.y;
  if(tool==='redact') brushPoints=[[p.x,p.y]];
},{passive:false});

ec.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===2&&pinch0!==null){
    const t0=e.touches[0],t1=e.touches[1];
    const d=Math.hypot(t0.clientX-t1.clientX,t0.clientY-t1.clientY);
    const newZ=Math.max(0.5,Math.min(6,vZ*(d/pinch0)));
    const newMidX=(t0.clientX+t1.clientX)/2;
    const newMidY=(t0.clientY+t1.clientY)/2;
    vX += (newMidX-pinchMidX) + (newMidX - (parseFloat(ec.style.left)||0) - parseFloat(ec.style.width)/2) * (newZ/vZ-1);
    vY += (newMidY-pinchMidY) + (newMidY - (parseFloat(ec.style.top)||0)  - parseFloat(ec.style.height)/2) * (newZ/vZ-1);
    vZ=newZ;
    pinch0=d; pinchMidX=newMidX; pinchMidY=newMidY;
    applyViewport(); return;
  }
  if(vpanStart){
    vX=vXatPan+(e.touches[0].clientX-vpanStart.x);
    vY=vYatPan+(e.touches[0].clientY-vpanStart.y);
    applyViewport(); return;
  }
  if(rRectDragCorner){
    const p=canvasPt(e.touches[0].clientX,e.touches[0].clientY);
    moveRRectCorner(rRectDragCorner,p.x,p.y);redrawEc();return;
  }
  if(rRectPanStart){
    const p=canvasPt(e.touches[0].clientX,e.touches[0].clientY);
    const dx=p.x-rRectPanStart.x,dy=p.y-rRectPanStart.y;
    rRect={x:rRectAtPan.x+dx,y:rRectAtPan.y+dy,w:rRectAtPan.w,h:rRectAtPan.h};
    redrawEc();return;
  }
  if(dragCorner){
    const p=canvasPt(e.touches[0].clientX,e.touches[0].clientY);
    moveQuadCorner(dragCorner,p.x,p.y);
    // RAF-throttled redraw: canvas kararmaz, 60fps akıcı sürükleme
    if(!_dragRaf){
      _dragRaf=requestAnimationFrame(()=>{
        redrawOverlayOnly();
        _dragRaf=null;
      });
    }
    showLoupe(e.touches[0].clientX, e.touches[0].clientY, p.x, p.y);
    return;
  }
  if(dragEdge){
    const p=canvasPt(e.touches[0].clientX,e.touches[0].clientY);
    moveEdgeMid(dragEdge,p.x,p.y);redrawEc();return;
  }
  if(panStart&&quadAtPanStart){
    const p=canvasPt(e.touches[0].clientX,e.touches[0].clientY);
    const dx=p.x-panStart.x,dy=p.y-panStart.y;
    quad={
      tl:{x:quadAtPanStart.tl.x+dx,y:quadAtPanStart.tl.y+dy},
      tr:{x:quadAtPanStart.tr.x+dx,y:quadAtPanStart.tr.y+dy},
      bl:{x:quadAtPanStart.bl.x+dx,y:quadAtPanStart.bl.y+dy},
      br:{x:quadAtPanStart.br.x+dx,y:quadAtPanStart.br.y+dy},
    };
    redrawEc();return;
  }
  if(drawing){
    const p=canvasPt(e.touches[0].clientX,e.touches[0].clientY);
    px1=p.x;py1=p.y;
    if(tool==='redact'){ brushPoints.push([p.x,p.y]); drawBrushLive(p.x,p.y); }
    else if(tool==='redactRect'){
      rRect={x:Math.min(px0,px1),y:Math.min(py0,py1),w:Math.abs(px1-px0),h:Math.abs(py1-py0)};
      redrawEc();
    }
    else{ redrawEc();drawLive(px0,py0,px1,py1); }
  }
},{passive:false});

ec.addEventListener('touchend',e=>{
  pinch0=null; vpanStart=null;
  const wasDragCorner = dragCorner;
  const wasDragEdge   = dragEdge;
  dragCorner=null; dragEdge=null;
  panStart=null; quadAtPanStart=null;
  rRectDragCorner=null; rRectPanStart=null;
  hideLoupe();
  // Köşe veya kenar bırakıldı — cache varsa sync çiz (kararma engeli)
  if(wasDragCorner || wasDragEdge){
    if(_cachedImg) redrawOverlayOnly();
    else redrawEc();
    return;
  }
  if(!drawing)return; drawing=false;
  const rw=Math.abs(px1-px0),rh=Math.abs(py1-py0);
  if(rw<5||rh<5)return;
  if(tool==='redact') commitBrushStroke();
  else if(tool==='redactRect'){
    rRect={x:Math.min(px0,px1),y:Math.min(py0,py1),w:rw,h:rh};
    redrawEc();
  }
  else if(tool==='crop'){
    quad=rectToQuad(Math.min(px0,px1),Math.min(py0,py1),rw,rh);
    cropRect=null; redrawEc();
  }
},{passive:false});

/* Mouse */
ec.addEventListener('mousedown',e=>{
  const p=canvasPt(e.clientX,e.clientY);
  if(tool==='redactRect'){
    rRectDragCorner=nearRRectCorner(p.x,p.y);
    if(rRectDragCorner) return;
    if(rRect && isInsideRRect(p.x,p.y)){
      rRectPanStart={x:p.x,y:p.y}; rRectAtPan={...rRect}; return;
    }
    rRect=null; drawing=true; px0=p.x; py0=p.y; px1=p.x; py1=p.y; return;
  }
  dragCorner=nearQuadCorner(p.x,p.y);
  if(dragCorner){ dragEdge=null; return; }
  dragEdge=nearEdgeMid(p.x,p.y);
  if(dragEdge) return;
  if(quad && tool==='crop' && isInsideQuad(p.x,p.y)){
    panStart={x:p.x,y:p.y};
    quadAtPanStart={tl:{...quad.tl},tr:{...quad.tr},bl:{...quad.bl},br:{...quad.br}};
  } else if(tool==='none'){
    vpanStart={x:e.clientX,y:e.clientY}; vXatPan=vX; vYatPan=vY;
  } else {
    panStart=null;
    drawing=true;px0=p.x;py0=p.y;px1=p.x;py1=p.y;
    if(tool==='redact')brushPoints=[[p.x,p.y]];
  }
});
document.addEventListener('mousemove',e=>{
  if(vpanStart){
    vX=vXatPan+(e.clientX-vpanStart.x);
    vY=vYatPan+(e.clientY-vpanStart.y);
    applyViewport();return;
  }
  if(!drawing&&!dragCorner&&!dragEdge&&!panStart&&!rRectDragCorner&&!rRectPanStart)return;
  const p=canvasPt(e.clientX,e.clientY);
  if(rRectDragCorner){moveRRectCorner(rRectDragCorner,p.x,p.y);redrawEc();return;}
  if(rRectPanStart){
    const dx=p.x-rRectPanStart.x,dy=p.y-rRectPanStart.y;
    rRect={x:rRectAtPan.x+dx,y:rRectAtPan.y+dy,w:rRectAtPan.w,h:rRectAtPan.h};
    redrawEc();return;
  }
  if(dragCorner){moveQuadCorner(dragCorner,p.x,p.y);redrawEc();return;}
  if(dragEdge){moveEdgeMid(dragEdge,p.x,p.y);redrawEc();return;}
  if(panStart&&quadAtPanStart){
    const dx=p.x-panStart.x,dy=p.y-panStart.y;
    quad={
      tl:{x:quadAtPanStart.tl.x+dx,y:quadAtPanStart.tl.y+dy},
      tr:{x:quadAtPanStart.tr.x+dx,y:quadAtPanStart.tr.y+dy},
      bl:{x:quadAtPanStart.bl.x+dx,y:quadAtPanStart.bl.y+dy},
      br:{x:quadAtPanStart.br.x+dx,y:quadAtPanStart.br.y+dy},
    };
    redrawEc();return;
  }
  px1=p.x;py1=p.y;
  if(tool==='redact'){ brushPoints.push([p.x,p.y]); drawBrushLive(p.x,p.y); }
  else if(tool==='redactRect'){
    rRect={x:Math.min(px0,px1),y:Math.min(py0,py1),w:Math.abs(px1-px0),h:Math.abs(py1-py0)};
    redrawEc();
  }
  else{ redrawEc();drawLive(px0,py0,px1,py1); }
});
document.addEventListener('mouseup',e=>{
  dragCorner=null; dragEdge=null;
  panStart=null; quadAtPanStart=null;
  vpanStart=null;
  rRectDragCorner=null; rRectPanStart=null;
  if(!drawing)return; drawing=false;
  const rw=Math.abs(px1-px0),rh=Math.abs(py1-py0);
  if(rw<5||rh<5)return;
  if(tool==='redact')commitBrushStroke();
  else if(tool==='redactRect'){
    rRect={x:Math.min(px0,px1),y:Math.min(py0,py1),w:rw,h:rh};
    redrawEc();
  }
  else if(tool==='crop'){
    quad=rectToQuad(Math.min(px0,px1),Math.min(py0,py1),rw,rh);
    cropRect=null;redrawEc();
  }
});

/* ═══ DESKTOP SCROLL ZOOM ═══ */
document.getElementById('edCanvasArea').addEventListener('wheel',e=>{
  e.preventDefault();
  const delta=e.deltaY>0?0.9:1.1;
  const newZ=Math.max(0.3,Math.min(8,vZ*delta));
  const area=document.getElementById('edCanvasArea');
  const r=area.getBoundingClientRect();
  const dispW=parseFloat(ec.style.width)||ec.width*edSc;
  const dispH=parseFloat(ec.style.height)||ec.height*edSc;
  const baseL=Math.round((area.clientWidth-dispW)/2);
  const baseT=Math.round((area.clientHeight-dispH)/2);
  const mx=e.clientX-r.left-(baseL+vX);
  const my=e.clientY-r.top -(baseT+vY);
  vX-=mx*(newZ/vZ-1);
  vY-=my*(newZ/vZ-1);
  vZ=newZ;
  applyViewport();
},{passive:false});

/* ═══ PDF ═══ */
function openPDFModal(){
  const now=new Date();
  const pad=n=>String(n).padStart(2,'0');
  const ts=`${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
  const inp=document.getElementById('pdfName');
  inp.value=ts;
  document.getElementById('pdfModal').classList.add('open');
  requestAnimationFrame(()=>{
    inp.focus();
    inp.setSelectionRange(0, inp.value.length);
  });
}
function closePDFModal(){document.getElementById('pdfModal').classList.remove('open');}
function setPdfColor(el,mode){
  pdfColorMode=mode;
  document.querySelectorAll('#pdfColorBtn,#pdfBWBtn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}
function setQ(el){
  document.querySelectorAll('.q-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');pdfQ=parseFloat(el.dataset.q);
}
function showPdfSt(msg,type){
  const el=document.getElementById('pdfSt');
  el.textContent=msg;el.className='st show '+type;
  setTimeout(()=>el.className='st',4000);
}
let _lastPdfBlob=null, _lastPdfName='';
function sharePDF(){
  if(!_lastPdfBlob) return;
  const file=new File([_lastPdfBlob],_lastPdfName,{type:'application/pdf'});
  if(navigator.canShare&&navigator.canShare({files:[file]})){
    navigator.share({files:[file],title:_lastPdfName}).catch(()=>{});
  } else {
    showPdfSt('Share bu cihazda desteklenmiyor','err');
  }
}
function exportPDF(mode='download'){
  if(!pages.length)return;
  const name=(document.getElementById('pdfName').value.trim()||'scan_'+Date.now())+'.pdf';
  showPdfSt('Generating…','info');
  const _sb=document.getElementById('btnShare');
  _sb.style.opacity='0.4'; _sb.style.pointerEvents='none';
  try{
    const{jsPDF}=window.jspdf;
    const a4w=595.28,a4h=841.89;
    let doc=null;
    let i=0;
    function next(){
      if(i>=pages.length){
        const blob=doc.output('blob');
        _lastPdfBlob=blob;
        _lastPdfName=name;
        if(mode==='preview'){
          const url=URL.createObjectURL(blob);
          window.open(url,'_blank');
          showPdfSt('✓ PDF açıldı','ok');
        } else {
          const a=document.createElement('a');
          a.href=URL.createObjectURL(blob);
          a.download=name;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          showPdfSt('✓ İndiriliyor: '+name,'ok');
        }
        const shareBtn=document.getElementById('btnShare');
        if(navigator.canShare){
          shareBtn.style.opacity='1';
          shareBtn.style.pointerEvents='auto';
        }
        setTimeout(()=>{if(mode==='download')closePDFModal();},2000);
        return;
      }
      const pg=pages[i++];
      const img=new Image();
      img.onload=()=>{
        const maxD={0.6:1200,0.8:1800,0.92:2400,1:99999}[pdfQ]||1800;
        let sw=img.naturalWidth, sh=img.naturalHeight;
        if(sw>maxD||sh>maxD){
          const ratio=Math.min(maxD/sw,maxD/sh);
          sw=Math.round(sw*ratio); sh=Math.round(sh*ratio);
        }
        const tmp=document.createElement('canvas');
        tmp.width=sw; tmp.height=sh;
        const tmpCtx=tmp.getContext('2d');
        tmpCtx.drawImage(img,0,0,sw,sh);

        if(pdfColorMode==='bw'){
          const id=tmpCtx.getImageData(0,0,sw,sh);
          const d=id.data;
          const gray=new Float32Array(sw*sh);
          for(let i=0;i<sw*sh;i++){
            gray[i]=0.299*d[i*4]+0.587*d[i*4+1]+0.114*d[i*4+2];
          }
          const tileW=Math.max(60,Math.round(sw/8));
          const tileH=Math.max(60,Math.round(sh/8));
          const cols=Math.ceil(sw/tileW);
          const rows=Math.ceil(sh/tileH);
          const tileRef=new Float32Array(cols*rows);
          for(let r=0;r<rows;r++){
            for(let c=0;c<cols;c++){
              const x0=c*tileW, y0=r*tileH;
              const x1=Math.min(x0+tileW,sw), y1=Math.min(y0+tileH,sh);
              const vals=[];
              for(let y=y0;y<y1;y++){
                for(let x=x0;x<x1;x++){
                  vals.push(gray[y*sw+x]);
                }
              }
              vals.sort((a,b)=>a-b);
              tileRef[r*cols+c]=vals[Math.floor(vals.length*0.90)]||200;
            }
          }
          for(let y=0;y<sh;y++){
            for(let x=0;x<sw;x++){
              const tc=(x/tileW)-0.5;
              const tr=(y/tileH)-0.5;
              const c0=Math.max(0,Math.floor(tc)), c1=Math.min(cols-1,c0+1);
              const r0=Math.max(0,Math.floor(tr)), r1=Math.min(rows-1,r0+1);
              const fc=tc-c0, fr=tr-r0;
              const ref=
                tileRef[r0*cols+c0]*(1-fc)*(1-fr)+
                tileRef[r0*cols+c1]*fc*(1-fr)+
                tileRef[r1*cols+c0]*(1-fc)*fr+
                tileRef[r1*cols+c1]*fc*fr;
              const localRef=Math.max(ref,120);
              const g=gray[y*sw+x];
              let norm=(g/localRef)*255;
              let final;
              if(norm>230)      final=255;
              else if(norm>185) final=Math.round(220+(norm-185)*(35/45));
              else if(norm>130) final=Math.round(norm*0.80);
              else if(norm>60)  final=Math.round(norm*0.60);
              else              final=Math.round(norm*0.40);
              final=Math.max(0,Math.min(255,final));
              const idx=(y*sw+x)*4;
              d[idx]=d[idx+1]=d[idx+2]=final;
            }
          }
          tmpCtx.putImageData(id,0,0);
        }

        const reencoded=tmp.toDataURL('image/jpeg', pdfQ>=1 ? 0.95 : pdfQ);
        // Gerçek orana göre sayfa boyutu — A4'e zorlamaz
        // 72pt/inch, 96px/inch varsayımıyla px→pt
        // A4 oranı: 1:√2 = 1:1.4142
        // Görüntünün oranı A4'e %12 tolerans içindeyse → A4'e normalize et
        // Aksi halde kendi gerçek oranında bırak
        const A4_W=595.28, A4_H=841.89;
        const A4_RATIO = A4_H / A4_W; // ~1.4142
        const land = sw > sh;
        const imgRatio = land ? (sw/sh) : (sh/sw); // her zaman uzun/kısa
        const a4Ratio  = A4_RATIO;
        const ratioDiff = Math.abs(imgRatio - a4Ratio) / a4Ratio;

        let ptW, ptH;
        if(ratioDiff < 0.15){
          // A4'e yakın → tam A4 boyutuna sabitle
          ptW = land ? A4_H : A4_W;
          ptH = land ? A4_W : A4_H;
        } else {
          // Farklı belge (fiş, kare vb.) → gerçek oranını koru
          const PX2PT = 72/96;
          ptW = sw * PX2PT;
          ptH = sh * PX2PT;
          const MAX_PT = 841.89;
          if(ptW > MAX_PT || ptH > MAX_PT){
            const r = Math.min(MAX_PT/ptW, MAX_PT/ptH);
            ptW *= r; ptH *= r;
          }
        }
        if(!doc)doc=new jsPDF({orientation:land?'l':'p',unit:'pt',format:[ptW,ptH]});
        else doc.addPage([ptW,ptH],land?'l':'p');
        doc.addImage(reencoded,'JPEG',0,0,ptW,ptH,undefined,'FAST');
        next();
      };
      img.onerror=()=>next();
      img.src=pg.cur;
    }
    next();
  }catch(e){console.error(e);showPdfSt('Error: '+e.message,'err');}
}

/* ═══ ANA EKRAN SCROLL ZOOM ═══ */
(()=>{
  let scale=1, tx=0, ty=0;
  const bp=document.getElementById('bigPreview');
  const area=document.getElementById('previewArea');

  function clamp(){
    if(scale<=1){tx=0;ty=0;return;}
    const ar=area.getBoundingClientRect();
    const imgW=bp.offsetWidth*scale;
    const imgH=bp.offsetHeight*scale;
    const maxTx=Math.max(0,(imgW-ar.width)/2);
    const maxTy=Math.max(0,(imgH-ar.height)/2);
    tx=Math.max(-maxTx,Math.min(maxTx,tx));
    ty=Math.max(-maxTy,Math.min(maxTy,ty));
  }

  function applyTransform(){
    clamp();
    bp.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
    bp.style.transformOrigin='center center';
  }

  area.addEventListener('wheel',e=>{
    e.preventDefault();
    const delta=e.deltaY>0?0.85:1.18;
    const newScale=Math.max(0.5,Math.min(8,scale*delta));
    const r=area.getBoundingClientRect();
    const mx=e.clientX-r.left-r.width/2;
    const my=e.clientY-r.top-r.height/2;
    tx=(tx-mx)*(newScale/scale)+mx;
    ty=(ty-my)*(newScale/scale)+my;
    scale=newScale;
    applyTransform();
  },{passive:false});

  let dragging=false, dx=0, dy=0, txStart=0, tyStart=0;
  area.addEventListener('mousedown',e=>{
    if(scale<=1)return;
    dragging=true; dx=e.clientX; dy=e.clientY; txStart=tx; tyStart=ty;
    area.style.cursor='grabbing';
  });
  document.addEventListener('mousemove',e=>{
    if(!dragging)return;
    tx=txStart+(e.clientX-dx);
    ty=tyStart+(e.clientY-dy);
    applyTransform();
  });
  document.addEventListener('mouseup',()=>{
    dragging=false; area.style.cursor='';
  });

  let mPinch0=null, mPinchScale=1, mPinchTx=0, mPinchTy=0, mPinchMidX=0, mPinchMidY=0;
  let mPan=false, mPanStartX=0, mPanStartY=0, mPanTxStart=0, mPanTyStart=0;

  area.addEventListener('touchstart',e=>{
    if(e.touches.length===2){
      mPan=false;
      const t0=e.touches[0],t1=e.touches[1];
      mPinch0=Math.hypot(t0.clientX-t1.clientX,t0.clientY-t1.clientY);
      mPinchMidX=(t0.clientX+t1.clientX)/2;
      mPinchMidY=(t0.clientY+t1.clientY)/2;
      mPinchScale=scale; mPinchTx=tx; mPinchTy=ty;
      e.preventDefault();
    } else if(e.touches.length===1){
      mPinch0=null;
      mPan=true;
      mPanStartX=e.touches[0].clientX;
      mPanStartY=e.touches[0].clientY;
      mPanTxStart=tx; mPanTyStart=ty;
    }
  },{passive:false});

  area.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(e.touches.length===2&&mPinch0!==null){
      const t0=e.touches[0],t1=e.touches[1];
      const d=Math.hypot(t0.clientX-t1.clientX,t0.clientY-t1.clientY);
      const newScale=Math.max(0.5,Math.min(8,mPinchScale*(d/mPinch0)));
      const r=area.getBoundingClientRect();
      const newMidX=(t0.clientX+t1.clientX)/2;
      const newMidY=(t0.clientY+t1.clientY)/2;
      const midDx=newMidX-mPinchMidX;
      const midDy=newMidY-mPinchMidY;
      const originX=mPinchMidX-r.left-r.width/2;
      const originY=mPinchMidY-r.top-r.height/2;
      tx=mPinchTx + midDx + originX*(newScale/mPinchScale-1)*-1 + (newMidX-mPinchMidX);
      ty=mPinchTy + midDy + originY*(newScale/mPinchScale-1)*-1 + (newMidY-mPinchMidY);
      scale=newScale;
      applyTransform();
    } else if(e.touches.length===1&&mPan){
      tx=mPanTxStart+(e.touches[0].clientX-mPanStartX);
      ty=mPanTyStart+(e.touches[0].clientY-mPanStartY);
      applyTransform();
    }
  },{passive:false});

  area.addEventListener('touchend',e=>{
    if(e.touches.length<2) mPinch0=null;
    if(e.touches.length===0) mPan=false;
  });

  const origSelect=selectPage;
  window.selectPage=function(idx){
    origSelect(idx);
    scale=1;tx=0;ty=0;
    bp.style.transform='';
  };
})();
