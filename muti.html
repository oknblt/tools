<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1a1a;color:#fff;display:flex;flex-direction:column}
.header{background:#001f3f;padding:3px 8px;padding-top:max(3px,env(safe-area-inset-top));box-shadow:0 2px 10px rgba(0,0,0,.3);flex-shrink:0}
.header-row{display:flex;align-items:center;justify-content:space-between;gap:6px;flex-wrap:wrap}
.header h1{font-size:13px;display:flex;align-items:center;gap:4px;white-space:nowrap}
.brand-tag{font-size:9px;color:#7aafd4;letter-spacing:.08em;text-transform:uppercase}
@media(max-width:520px){.brand-tag{display:none}}
.controls{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.btn{padding:4px 9px;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:12px;transition:background .2s;min-height:28px;white-space:nowrap}
.btn-layout{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.25)}
.btn-layout.active{background:#4CAF50;border-color:#4CAF50}
.btn-action{background:#fff;color:#001f3f}
.btn-action:active{background:#ddd}
.btn-voice{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.25);border-radius:6px;padding:4px 9px;font-size:15px;min-height:28px;cursor:pointer;transition:background .15s,box-shadow .15s;display:flex;align-items:center;gap:4px}
.btn-voice.listening{background:rgba(220,50,50,.7);border-color:#f66;animation:pulse-mic 1.2s ease-in-out infinite}
@keyframes pulse-mic{0%,100%{box-shadow:0 0 0 3px rgba(220,50,50,.3)}50%{box-shadow:0 0 0 7px rgba(220,50,50,.1)}}
.grid-container{flex:1;padding:6px;display:grid;gap:6px;min-height:0;overflow:hidden}
.grid-1x1{grid-template-columns:1fr;grid-template-rows:1fr}
.grid-1x2{grid-template-columns:1fr;grid-template-rows:repeat(2,1fr)}
.grid-2x2{grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(2,1fr)}
@media(min-width:700px) and (orientation:landscape){.grid-1x2{grid-template-columns:repeat(2,1fr);grid-template-rows:1fr}}
.tv-box{background:#2a2a2a;border-radius:8px;overflow:hidden;display:flex;flex-direction:column;border:1px solid #3a3a3a;min-height:0;min-width:0;position:relative}
.tv-header{background:#2f2f2f;padding:5px 6px;display:flex;justify-content:space-between;align-items:center;gap:6px;flex-shrink:0}
.tv-header select{background:#444;color:#fff;border:1px solid #555;padding:6px 8px;border-radius:5px;cursor:pointer;font-size:12px;flex:1;min-width:0;min-height:32px}
.tv-header select:focus{outline:none;border-color:#667eea}
.tv-screen{flex:1;background:#000;position:relative;display:flex;align-items:center;justify-content:center;min-height:0;overflow:hidden}
.tv-screen video{width:100%;height:100%;object-fit:contain;background:#000;display:block}
.overlay-controls{position:absolute;top:6px;right:6px;display:flex;gap:5px;z-index:10;opacity:.85}
.overlay-btn{background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.25);color:#fff;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;padding:0;backdrop-filter:blur(4px)}
.overlay-btn:active{background:rgba(102,126,234,.9)}
.placeholder{color:#888;font-size:13px;text-align:center;padding:16px}
.loading{color:#667eea;font-size:13px;display:flex;flex-direction:column;align-items:center;gap:8px}
.spinner{border:3px solid rgba(255,255,255,.2);border-top:3px solid #667eea;border-radius:50%;width:36px;height:36px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-message{color:#ff5252;text-align:center;padding:20px;font-size:13px}
.error-message button{margin-top:8px;background:#333;color:#fff;border:none;padding:6px 14px;border-radius:6px;cursor:pointer}
/* Channel nav bar */
.channel-nav{display:none;flex-shrink:0;align-items:center;justify-content:center;gap:6px;padding:6px 10px;padding-bottom:max(12px,env(safe-area-inset-bottom));background:#111;border-top:1px solid #2a2a2a}
.channel-nav.visible{display:flex}
.nav-btn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.75);width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:background .15s,color .15s;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.nav-btn:active,.nav-btn:hover{background:rgba(102,126,234,.35);border-color:rgba(102,126,234,.6);color:#fff}
.nav-btn.nav-edge{width:30px;font-size:11px;opacity:.65}
.drum-picker{flex:1;max-width:210px;height:36px;position:relative;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none;cursor:grab}
.drum-picker::before,.drum-picker::after{content:'';position:absolute;left:0;right:0;height:10px;z-index:3;pointer-events:none}
.drum-picker::before{top:0;background:linear-gradient(to bottom,#111,transparent)}
.drum-picker::after{bottom:0;background:linear-gradient(to top,#111,transparent)}
.drum-sel{position:absolute;top:50%;left:0;right:0;transform:translateY(-50%);height:28px;background:rgba(102,126,234,.15);border-top:1px solid rgba(102,126,234,.4);border-bottom:1px solid rgba(102,126,234,.4);border-radius:5px;pointer-events:none;z-index:2}
.drum-track{position:absolute;left:0;right:0;top:0;will-change:transform}
.drum-track.animated{transition:transform .2s cubic-bezier(.25,.46,.45,.94)}
.drum-item{height:36px;display:flex;align-items:center;justify-content:center;font-size:11.5px;color:rgba(255,255,255,.3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 6px;z-index:1}
.drum-item.active{color:#fff;font-size:12.5px;font-weight:600}
.drum-item.near{color:rgba(255,255,255,.6)}
/* Volume control */
.vol-control{display:flex;align-items:center;gap:6px;flex-shrink:0;padding-left:2px}
.vol-ico{font-size:16px;cursor:pointer;width:22px;text-align:center;line-height:1;-webkit-tap-highlight-color:transparent;user-select:none}
.vol-slider{-webkit-appearance:none;appearance:none;width:74px;height:4px;border-radius:3px;outline:none;cursor:pointer;background:linear-gradient(to right,#667eea 0%,#667eea var(--vol,100%),rgba(255,255,255,.18) var(--vol,100%),rgba(255,255,255,.18) 100%)}
.vol-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;border-radius:50%;background:#fff;border:2px solid #667eea;cursor:pointer;box-shadow:0 0 4px rgba(0,0,0,.4)}
.vol-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:#fff;border:2px solid #667eea;cursor:pointer;box-shadow:0 0 4px rgba(0,0,0,.4)}
/* Peer panel */
.peer-panel{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 92px);right:10px;background:rgba(15,15,25,.94);border:1px solid rgba(76,175,80,.5);border-radius:11px;padding:6px 10px;text-align:center;z-index:998;backdrop-filter:blur(10px);min-width:84px}
.peer-label{font-size:8px;color:#888;letter-spacing:.07em;text-transform:uppercase;margin-bottom:2px}
.peer-code{font-size:19px;font-weight:800;letter-spacing:.14em;color:#4CAF50;font-family:monospace}
.peer-hint{font-size:8px;color:#4CAF50;margin-top:2px}
/* Tap-to-unmute / tap-to-start hint on a TV box */
.unmute-hint{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(102,126,234,.92);border:1px solid rgba(255,255,255,.35);color:#fff;padding:9px 18px;border-radius:22px;font-size:13px;font-weight:600;cursor:pointer;z-index:12;display:none;white-space:nowrap;box-shadow:0 2px 12px rgba(0,0,0,.5)}
.unmute-hint.show{display:block}
/* CSS pseudo-fullscreen (triggered from the remote) */
.tv-box.pfull{position:fixed;inset:0;z-index:600;border:none;border-radius:0}
.tv-box.pfull .tv-header{display:none}
.tv-screen:fullscreen .overlay-controls{display:none!important}
.tv-screen:-webkit-full-screen .overlay-controls{display:none!important}
body.has-pfull .header,body.has-pfull .channel-nav{display:none}
/* Live captions */
#ccWrap{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(env(safe-area-inset-bottom,0px) + 68px);width:min(94vw,900px);z-index:700;display:none;flex-direction:column;gap:6px;pointer-events:none;--cc-fs:21px;--cc-op:.7;--cc-lines:2}
#ccWrap.on{display:flex}
body.has-pfull #ccWrap{bottom:26px}
.cc-panel{background:rgba(0,0,0,var(--cc-op));border-radius:10px;padding:7px 14px;color:#fff;font-size:var(--cc-fs);line-height:1.35;text-align:center;overflow:hidden;display:none;align-items:flex-end;justify-content:center;max-height:calc(var(--cc-fs) * 1.35 * var(--cc-lines) + 14px);text-shadow:0 1px 3px rgba(0,0,0,.9)}
.cc-panel.vis{display:flex}
.cc-panel>div{display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:var(--cc-lines);overflow:hidden}
.cc-tr{color:#ffd54f}
#ccSettings{position:fixed;right:10px;bottom:calc(env(safe-area-inset-bottom,0px) + 68px);background:rgba(15,15,25,.97);border:1px solid #333;border-radius:12px;padding:12px 14px;z-index:701;display:none;width:240px;font-size:13px;backdrop-filter:blur(8px)}
#ccSettings label{display:flex;justify-content:space-between;align-items:center;margin:7px 0;gap:8px;color:#ccc}
#ccSettings input[type=range]{width:110px}
#ccBtn.cc-on{background:#4CAF50;color:#fff}
/* multi-screen mode: captions live INSIDE the sounded box */
#ccWrap.inbox{position:absolute;left:3%;right:3%;bottom:8px;top:auto;width:auto;height:auto;transform:none}
#ccWrap.inbox.fs{bottom:78px} /* clear the native control bar */
/* Toast */
#voiceToast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(20,20,30,.92);color:#fff;padding:10px 18px;border-radius:22px;font-size:13px;border:1px solid rgba(102,126,234,.4);backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:999;max-width:80vw;text-align:center}
#voiceToast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="header">
  <div class="header-row">
    <h1>&#128250; <span>Muti</span></h1>
    <span class="brand-tag">Bulut Projects</span>
    <div class="controls">
      <button class="btn btn-layout active" data-layout="1x1" onclick="setGrid('1x1',this)">1</button>
      <button class="btn btn-layout" data-layout="1x2" onclick="setGrid('1x2',this)">1&#xD7;2</button>
      <button class="btn btn-layout" data-layout="2x2" onclick="setGrid('2x2',this)">2&#xD7;2</button>
      <button class="btn btn-action" onclick="muteAll()">&#128263; Mute All</button>
      <button class="btn btn-action" onclick="refreshAll()">&#128260;</button>
      <button class="btn btn-action" id="ccBtn" onclick="ccToggle()" title="Canli altyazi (Whisper)">CC</button>
      <button class="btn btn-action" id="ccGearBtn" onclick="ccSettingsToggle()" title="Altyazi ayarlari" style="display:none">&#9881;</button>
      <button class="btn-voice" id="voiceBtn" onclick="toggleVoice()" title="Sesli komut">&#127897;</button>
    </div>
  </div>
</div>
<div id="gridContainer" class="grid-container grid-1x1"></div>

<!-- Live caption panels (EN + TR), shown when CC is on -->
<div id="ccWrap">
  <div class="cc-panel cc-en" id="ccEn"></div>
  <div class="cc-panel cc-tr" id="ccTr"></div>
</div>
<!-- Caption settings -->
<div id="ccSettings">
  <div style="font-weight:700;color:#fff;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">Altyazı Ayarları <span onclick="ccSettingsToggle()" style="cursor:pointer;color:#888">&#10005;</span></div>
  <label><span>&#127468;&#127463; İngilizce</span><input type="checkbox" id="ccChkEn" checked onchange="ccApplySettings()"></label>
  <label><span>&#127481;&#127479; Türkçe çeviri</span><input type="checkbox" id="ccChkTr" onchange="ccApplySettings()"></label>
  <label><span>Yazı boyutu</span><input type="range" id="ccFs" min="14" max="40" value="21" oninput="ccApplySettings()"></label>
  <label><span>Arka plan</span><input type="range" id="ccOp" min="10" max="100" value="70" oninput="ccApplySettings()"></label>
  <label><span>Satır sayısı</span><input type="range" id="ccLines" min="1" max="5" value="2" oninput="ccApplySettings()"></label>
  <label><span>Konuşma dili</span><select id="ccLang" onchange="ccApplySettings()" style="background:#1a1a28;color:#fff;border:1px solid #333;border-radius:6px;padding:3px 6px"><option value="en">İngilizce</option><option value="de">Almanca</option></select></label>
</div>
<div class="channel-nav" id="channelNav">
  <button class="nav-btn nav-edge" onclick="navChannel('first')">&#8676;</button>
  <button class="nav-btn" onclick="navChannel('prev')">&#8592;</button>
  <div class="drum-picker" id="drumPicker">
    <div class="drum-sel"></div>
    <div class="drum-track" id="drumTrack"></div>
  </div>
  <button class="nav-btn" onclick="navChannel('next')">&#8594;</button>
  <button class="nav-btn nav-edge" onclick="navChannel('last')">&#8677;</button>
  <div class="vol-control" id="volControl">
    <span class="vol-ico" id="volIco" onclick="toggleVolMute()" title="Sesi kapat/ac">&#128266;</span>
    <input type="range" class="vol-slider" id="volSlider" min="0" max="100" value="100" oninput="onVolInput(this.value)" title="Ses seviyesi">
  </div>
</div>
<div id="voiceToast"></div>

// ================================================================
// HELPERS
// ================================================================
// --- HTTPS / mixed-content fix -----------------------------------
// When this page is served over HTTPS (e.g. GitHub Pages), the browser
// BLOCKS any plain "http://" stream ("mixed content"), which is why some
// channels work when you open the file locally but not on GitHub.
// We route those through an HTTPS proxy so the browser only sees HTTPS.
//
// PROXY LIST: tried in order; if one fails the next is tried
// automatically. The first entry is a THIRD-PARTY worker (not yours!):
// it forwards the browser's identity to the stream source, and some
// IPTV sources block Chrome/Opera identities while allowing Safari —
// which is why the same channel can work in Safari but not Chrome.
// FIX: deploy the included worker.js to your own free Cloudflare
// account (sends a neutral identity + rewrites playlists) and put its
// address FIRST in this list, e.g.:
//   var STREAM_PROXIES = ['https://SIZIN-ADINIZ.workers.dev/',
//                         'https://tatatam.trt1sultanfatihss.workers.dev/'];
var STREAM_PROXIES = [
  'https://tatatam.trt1sultanfatihss.workers.dev/'
];
// Channels to force through the proxy even if they are already https
// (use this for streams blocked by CORS/region rather than mixed content):
var FORCE_PROXY = ['Summer'];

// Cloudflare Workers REFUSE to fetch literal-IP origins ("direct IP
// access not allowed"). NatGeo / NatGeo Wild live on a bare IP
// (http://185.102.171.218/...), which is why they still failed while
// hostname streams (prosto.tv etc.) worked. nip.io is a free wildcard
// DNS service: "185.102.171.218.nip.io" resolves to that same IP, so
// swapping the host lets the proxy reach it.
function deIP(url) {
  return url.replace(/^(https?:\/\/)(\d{1,3}(?:\.\d{1,3}){3})(?=[:\/])/i, '$1$2.nip.io');
}

function isProxied(url) {
  for (var i = 0; i < STREAM_PROXIES.length; i++) {
    if (url.indexOf(STREAM_PROXIES[i]) === 0) return true;
  }
  return false;
}

function channelNeedsProxy(url, name) {
  return location.protocol === 'https:' &&
         (/^http:\/\//i.test(url) || (name && FORCE_PROXY.indexOf(name) !== -1)) &&
         !isProxied(url);
}

function resolveStreamUrl(url, name, proxyIdx) {
  if (!url) return url;
  // Only rewrite when WE are on https; locally everything stays as-is
  // so the original (working) behaviour is preserved.
  if (location.protocol !== 'https:') return url;
  if (channelNeedsProxy(url, name)) {
    return STREAM_PROXIES[proxyIdx || 0] + deIP(url);
  }
  return url;
}

// iOS / iPadOS detection (iPad reports as "MacIntel" with touch support)
var IS_IOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
             (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
// Touch devices in general: "tap to unmute" hints only make sense here.
var HAS_TOUCH = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

// --- Deep mixed-content fix -------------------------------------
// Proxying only the master .m3u8 is NOT enough: many streams (NatGeo,
// prosto.tv channels like Relaxon/Fire/Kamintv/Nature...) put ABSOLUTE
// "http://" URLs inside the playlist for their sub-playlists and .ts
// segments. hls.js then requests those directly and the browser blocks
// them on GitHub Pages (https). This custom loader rewrites EVERY
// request hls.js makes, so segments go through the proxy too.
function makeProxyLoader(proxyIdx) {
  if (location.protocol !== 'https:' || !window.Hls) return null;
  var base = STREAM_PROXIES[proxyIdx || 0];
  var Base = Hls.DefaultConfig.loader;
  function ProxyLoader(config) {
    var inner = new Base(config);
    this.load = function(context, cfg, callbacks) {
      if (/^http:\/\//i.test(context.url) && !isProxied(context.url)) {
        context.url = base + deIP(context.url);
      }
      inner.load(context, cfg, callbacks);
    };
    this.abort = function() { inner.abort(); };
    this.destroy = function() { inner.destroy(); };
    Object.defineProperty(this, 'stats', { get: function(){ return inner.stats; } });
    Object.defineProperty(this, 'context', { get: function(){ return inner.context; } });
  }
  return ProxyLoader;
}

  });
  container.innerHTML = '';
  tvBoxes = [];
  soloIndex = -1;
  pfullIndex = -1;
  document.body.classList.remove('has-pfull');
  for (var i = 0; i < count; i++) {
    var box = document.createElement('div');
    box.className = 'tv-box';
    box.innerHTML =
      '<div class="tv-header">' +
        '<select id="sel-' + i + '" onchange="changeChannel(' + i + ',this.value)">' + generateChannelOptions() + '</select>' +
      '</div>' +
      '<div class="tv-screen" id="scr-' + i + '">' +
        '<div class="overlay-controls">' +
          '<button class="overlay-btn" id="mute-' + i + '" onclick="toggleSolo(' + i + ')">&#128263;</button>' +
          '<button class="overlay-btn" onclick="fullscreen(' + i + ')">&#9638;</button>' +
        '</div>' +
        '<button class="unmute-hint" id="hint-' + i + '" onclick="tapUnmute(' + i + ')">&#128266; Ses i&ccedil;in dokun</button>' +
        '<div class="placeholder">&#128250; Kanal secin</div>' +
      '</div>';
    container.appendChild(box);

    // ONE persistent <video> per box, reused for every channel.
    // Safari grants "may play with sound" PER ELEMENT after a user tap;
    // recreating the element on each channel change threw that
    // permission away (why iPad went silent again after 1-2 zaps).
    var video = document.createElement('video');
    video.autoplay = true;
    video.muted = true;
    video.playsInline = true;
    video.setAttribute('playsinline', '');
    video.setAttribute('webkit-playsinline', '');
    video.style.cssText = 'width:100%;height:100%;object-fit:contain;display:none';
    (function(idx){ video.addEventListener('click', function(){ if (video.controls) return; toggleSolo(idx); }); })(i);
    var screen = box.querySelector('#scr-' + i);
    screen.appendChild(video);

    tvBoxes.push({
      element: box,
      screen: screen,
      select: box.querySelector('#sel-' + i),
      muteBtn: box.querySelector('#mute-' + i),
      hintBtn: box.querySelector('#hint-' + i),
      currentChannel: null, video: video, hls: null
    });
  }
  remoteTarget = Math.max(0, Math.min(remoteTarget, tvBoxes.length - 1));
  updateMuteButtons();
}

function changeChannel(boxIndex, channelName) {
  var box = tvBoxes[boxIndex];
  var channel = TV_CHANNELS[channelName];
  var video = box.video;

  var reqId = Date.now();
  box._reqId = reqId;          // set FIRST so stale listeners no-op below
  box._userPaused = false;

  if (box.hls) { try { box.hls.destroy(); } catch(e){} box.hls = null; }
  try { video.pause(); video.removeAttribute('src'); video.load(); } catch(e){}
  clearScreenMsgs(box);
  hideHint(box);
  video.style.display = 'none';

  if (!channel || !channelName) {
    box.screen.insertAdjacentHTML('beforeend', '<div class="placeholder">&#128250; Kanal secin</div>');
    box.currentChannel = null;
    if (soloIndex === boxIndex) soloIndex = -1;
    updateMuteButtons();
    updateChannelNav();
    peerSendState();
    return;
  }

  box.screen.insertAdjacentHTML('beforeend',
    '<div class="loading"><div class="spinner"></div><div>Yukleniyor...</div><small style="color:#999">' + channelName + '</small></div>');

  // "Bless" the element while we may still be inside a user gesture
  // (select change / button tap). Safari & Chrome then allow later
  // programmatic unmuted play() on this same element.
  try { var bless = video.play(); if (bless && bless.catch) bless.catch(function(){}); } catch(e) {}

  var onReady = function() {
    if (box._reqId !== reqId) return;
    var loader = box.screen.querySelector('.loading');
    if (loader) loader.remove();
    video.style.display = 'block';
    // ALWAYS start muted first: muted+playsinline autoplay is allowed
    // everywhere (this fixes "channel opens but does not play").
    video.muted = true;
    var p = video.play();
    if (p && p.then) {
      p.then(function() {
        if (box._reqId !== reqId) return;
        updateMuteButtons(); // will try to unmute the solo box safely
      }).catch(function() {
        if (box._reqId !== reqId) return;
        // Even muted autoplay was blocked (rare: Low Power Mode etc.)
        showHint(box, '\u25B6\uFE0F Ba\u015Flatmak i\u00E7in dokun', true);
      });
    } else {
      updateMuteButtons();
    }
  };

  var onError = function(msg) {
    if (box._reqId !== reqId) return;
    var loader = box.screen.querySelector('.loading');
    if (loader) loader.remove();
    box.screen.insertAdjacentHTML('beforeend',
      '<div class="error-message">&#10060; ' + msg + '<br>' +
      '<button onclick="changeChannel(' + boxIndex + ',\'' + channelName.replace(/'/g, "\\'") + '\')">&#128260; Tekrar dene</button></div>');
  };

  var needsProxy = channelNeedsProxy(channel.url, channelName);
  var proxyIdx = 0;

  function tryNextProxy(oldHls) {
    if (box._reqId !== reqId) return false;
    if (oldHls) { try { oldHls.destroy(); } catch(x){} }
    if (box.hls === oldHls) box.hls = null;
    if (needsProxy && proxyIdx + 1 < STREAM_PROXIES.length) {
      proxyIdx++;
      showToast('\uD83D\uDD01 Yedek proxy deneniyor\u2026');
      startStream();
      return true;
    }
    return false;
  }

  function startStream() {
    var streamUrl = resolveStreamUrl(channel.url, channelName, proxyIdx);

    if (window.Hls && Hls.isSupported()) {
      var hlsCfg = { enableWorker: true, lowLatencyMode: false,
        manifestLoadingTimeOut: 12000, manifestLoadingMaxRetry: 2,
        fragLoadingTimeOut: 20000, fragLoadingMaxRetry: 3 };
      var PL = makeProxyLoader(proxyIdx);
      if (PL) hlsCfg.loader = PL;
      var hls = new Hls(hlsCfg);
      var netFatals = 0;
      hls.loadSource(streamUrl);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, onReady);
      hls.on(Hls.Events.ERROR, function(e, data) {
        if (!data.fatal) return;
        if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
          netFatals++;
          if (netFatals <= 2) { try { hls.startLoad(); } catch(x){} return; }
          if (!tryNextProxy(hls)) onError('Yayin yuklenemedi');
        }
        else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) { try { hls.recoverMediaError(); } catch(x){} }
        else { if (!tryNextProxy(hls)) onError('Yayin yuklenemedi'); }
      });
      box.hls = hls;
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = streamUrl;
      video.addEventListener('loadedmetadata', onReady, { once: true });
      video.addEventListener('error', function(){
        if (box._reqId !== reqId) return;
        if (!tryNextProxy(null)) onError('Video yuklenemedi');
      }, { once: true });
    } else {
      onError('HLS desteklenmiyor');
    }
  }

  startStream();

  if (!IS_IOS) { try { video.volume = currentVolume / 100; } catch(e){} }
  box.currentChannel = channelName;
  if (soloIndex === -1 && !userMutedAll) soloIndex = boxIndex;
  updateChannelNav();
  peerSendState();
}

function toggleSolo(boxIndex) {
  if (soloIndex === boxIndex) { soloIndex = -1; userMutedAll = true; }
  else { soloIndex = boxIndex; userMutedAll = false; }
  updateMuteButtons();
}

function showHint(box, txt, force) {
  if (!box || !box.hintBtn) return;
  // Desktop browsers (Chrome etc.) don't need these tap prompts —
  // audio unlocks fine there, so only show them on touch devices.
  if (!HAS_TOUCH && !force) return;
  if (txt) box.hintBtn.innerHTML = txt;
  box.hintBtn.classList.add('show');
  clearTimeout(box._hintT);
  box._hintT = setTimeout(function(){ hideHint(box); }, 3000);
}
function hideHint(box) {
  if (!box || !box.hintBtn) return;
  clearTimeout(box._hintT);
  box.hintBtn.classList.remove('show');
}

// CSS pseudo-fullscreen for the remote. Real requestFullscreen() needs
// a user gesture, and a WebRTC message from the phone doesn't count —
// browsers would silently reject it. Expanding the box with CSS works
// from any code path, and channels can still be changed while "full".
function togglePseudoFull() {
  if (pfullIndex >= 0) { setPseudoFull(-1); showToast('\u26F6 Tam ekran kapatildi'); return; }
  var i = remoteTargetIdx();
  setPseudoFull(i);
  showToast('\u26F6 Tam ekran \u2014 TV' + (i + 1));
}

// Apply the desired audio state to one box WITHOUT ever pausing it.
// Browsers (esp. Safari) pause or reject when JS unmutes a video with
// no user gesture — this was the cause of "vol-up stops the video" and
// "plays but stays silent". We unmute + play(); if that is rejected we
// fall back to muted playback and show a one-tap unmute hint.
function applyAudio(box, wantSound) {
  var v = box.video;
  if (!v) return;
  if (!wantSound) {
    v.muted = true;
    hideHint(box);
    if (v.paused && !box._userPaused) { var p0 = v.play(); if (p0 && p0.catch) p0.catch(function(){}); }
    return;
  }
  box._userPaused = false;
  v.muted = false;
  var p = v.play();
  if (p && p.catch) {
    p.catch(function() {
      // Autoplay policy refused unmuted playback: keep the picture
      // running muted and ask for one tap.
      v.muted = true;
      var p2 = v.play(); if (p2 && p2.catch) p2.catch(function(){});
      showHint(box, '\uD83D\uDD0A Ses i\u00E7in dokun');
    });
  }
}

function tapUnmute(boxIndex) {
  var box = tvBoxes[boxIndex];
  if (!box || !box.video) return;
  soloIndex = boxIndex; userMutedAll = false;
  box.video.muted = false;
  var p = box.video.play(); if (p && p.catch) p.catch(function(){});
  hideHint(box);
  updateMuteButtons();
}

// Any real user gesture anywhere on the page: use it to unlock audio
// on the box that is supposed to have sound.
function gestureUnlock() {
  if (cc.pending && cc.on) ccStart();
  tvBoxes.forEach(function(box, i) {
    if (!box.video || box._userPaused) return;
    if (soloIndex === i && (box.video.muted || box.video.paused)) {
      box.video.muted = false;
      var p = box.video.play(); if (p && p.catch) p.catch(function(){});
      hideHint(box);
    }
  });
}

function updateMuteButtons() {
  tvBoxes.forEach(function(box, i) {
    var isSolo = (soloIndex === i);
    if (box.video) applyAudio(box, isSolo);
    if (box.muteBtn) {
      box.muteBtn.textContent = isSolo ? '\uD83D\uDD0A' : '\uD83D\uDD07';
      box.muteBtn.style.background = isSolo ? 'rgba(191,196,197,.85)' : 'rgba(0,0,0,.6)';
    }
  });
  if (cc.ctx) { ccAttachBoxes(); ccUpdateTaps(); }
  ccPlace();
}

function muteAll() { soloIndex = -1; userMutedAll = true; updateMuteButtons(); }

function setPseudoFull(i) { // -1 closes
  if (pfullIndex >= 0 && tvBoxes[pfullIndex]) tvBoxes[pfullIndex].element.classList.remove('pfull');
  document.body.classList.remove('has-pfull');
  pfullIndex = -1;
  if (i >= 0 && tvBoxes[i]) {
    tvBoxes[i].element.classList.add('pfull');
    document.body.classList.add('has-pfull');
    pfullIndex = i;
  }
}

// Screen button = the browser's REAL fullscreen (Picture-in-Picture,
// pause/seek and other native niceties work there). The remote's
// fullscreen stays CSS pseudo-full: a WebRTC message is not a user
// gesture, so real fullscreen would be rejected — and pseudo-full is
// also the mode where captions remain visible.
function fullscreen(boxIndex) {
  var box = tvBoxes[boxIndex];
  if (!box || !box.video) return;
  var v = box.video;
  if (v.webkitEnterFullscreen && IS_IOS) { try { v.webkitEnterFullscreen(); return; } catch(e){} }
  // Fullscreen the screen CONTAINER, not the bare <video>: same look,
  // PiP still available, but now captions can render inside it too.
  var el = box.screen;
  if (el.requestFullscreen) el.requestFullscreen().catch(function(){});
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  else if (v.webkitEnterFullscreen) { try { v.webkitEnterFullscreen(); } catch(e){} }
}

// Exit EVERY fullscreen level (exitFullscreen pops only one; with the
// container + nested video that left the screen stuck fullscreen).
function exitAllFullscreen() {
  var d = document;
  var cur = d.fullscreenElement || d.webkitFullscreenElement;
  if (!cur) return;
  var fn = d.exitFullscreen || d.webkitExitFullscreen;
  if (!fn) return;
  try {
    var p = fn.call(d);
    var again = function(){ if (d.fullscreenElement || d.webkitFullscreenElement) exitAllFullscreen(); };
    if (p && p.then) p.then(again).catch(function(){});
    else setTimeout(again, 60);
  } catch(e){}
}

function refreshAll() {
  tvBoxes.forEach(function(box, i) { if (box.currentChannel) changeChannel(i, box.currentChannel); });
}

function resumeAll() {
  tvBoxes.forEach(function(box, i) {
    box._userPaused = false;
    if (box.video && box.video.paused) applyAudio(box, soloIndex === i);
  });
}

function setGrid(layout, btn) {
  currentGrid = layout;
  document.getElementById('gridContainer').className = 'grid-container grid-' + layout;
  document.querySelectorAll('.btn-layout').forEach(function(b){ b.classList.remove('active'); });
  if (btn) btn.classList.add('active');
  var previous = tvBoxes.map(function(b){ return b.currentChannel; });
  var counts = { '1x1': 1, '1x2': 2, '2x2': 4 };
  createTVBoxes(counts[layout] || 1);
  for (var i = 0; i < Math.min(tvBoxes.length, previous.length); i++) {
    if (previous[i]) { tvBoxes[i].select.value = previous[i]; changeChannel(i, previous[i]); }
  }
  updateChannelNav();
  peerSendState();
}

// ================================================================
// DRUM ROLL PICKER
// ================================================================
function drumBuild() {
  drumChannels = getFlatChannelList();
  var track = document.getElementById('drumTrack');
  if (!track) return;
  track.innerHTML = '';
  var ghost = function(){ var d = document.createElement('div'); d.className = 'drum-item'; return d; };
  track.appendChild(ghost());
  drumChannels.forEach(function(name, i) {
    var el = document.createElement('div');
    el.className = 'drum-item';
    el.textContent = name;
    el.dataset.idx = String(i);
    track.appendChild(el);
  });
  track.appendChild(ghost());
  drumSetTo(0, false);
}

function drumSetTo(idx, animate) {
  idx = Math.max(0, Math.min(drumChannels.length - 1, idx));
  drumIdx = idx;
  drumOffset = -((1 + idx) * ITEM_H);
  var track = document.getElementById('drumTrack');
  if (!track) return;
  if (animate) track.classList.add('animated');
  else track.classList.remove('animated');
  track.style.transform = 'translateY(' + drumOffset + 'px)';
  drumHighlight(idx);
}

function drumHighlight(idx) {
  var items = document.querySelectorAll('#drumTrack .drum-item[data-idx]');
  items.forEach(function(el) {
    var d = Math.abs(parseInt(el.dataset.idx) - idx);
    el.classList.toggle('active', d === 0);
    el.classList.toggle('near', d === 1);
  });
}

function drumSetActive(channelName) {
  var i = drumChannels.indexOf(channelName);
  if (i >= 0) drumSetTo(i, true);
}

function drumCommit(idx) {
  var name = drumChannels[idx];
  if (!name || !tvBoxes[0] || name === tvBoxes[0].currentChannel) return;
  tvBoxes[0].select.value = name;
  changeChannel(0, name);
}

function drumPointerStart(e) {
  drumDragging = true;
  drumStartY = e.touches ? e.touches[0].clientY : e.clientY;
  drumStartOffset = drumOffset;
  clearTimeout(drumCommitTimer);
  var track = document.getElementById('drumTrack');
  if (track) track.classList.remove('animated');
  e.preventDefault();
}

function drumPointerMove(e) {
  if (!drumDragging) return;
  var y = e.touches ? e.touches[0].clientY : e.clientY;
  var delta = y - drumStartY;
  var minOff = -((1 + drumChannels.length - 1) * ITEM_H);
  var maxOff = -(1 * ITEM_H);
  drumOffset = Math.max(minOff, Math.min(maxOff, drumStartOffset + delta));
  var track = document.getElementById('drumTrack');
  if (track) track.style.transform = 'translateY(' + drumOffset + 'px)';
  var near = Math.max(0, Math.min(drumChannels.length - 1, Math.round((-drumOffset / ITEM_H) - 1)));
  drumHighlight(near);
  e.preventDefault();
}

function drumPointerEnd() {
  if (!drumDragging) return;
  drumDragging = false;
  var snapped = Math.max(0, Math.min(drumChannels.length - 1, Math.round((-drumOffset / ITEM_H) - 1)));
  drumSetTo(snapped, true);
  clearTimeout(drumCommitTimer);
  drumCommitTimer = setTimeout(function(){ drumCommit(snapped); }, 300);
}

function drumAttachEvents() {
  var picker = document.getElementById('drumPicker');
  if (!picker) return;
  picker.addEventListener('touchstart', drumPointerStart, { passive: false });
  picker.addEventListener('touchmove', drumPointerMove, { passive: false });
  picker.addEventListener('touchend', drumPointerEnd, { passive: false });
  picker.addEventListener('mousedown', drumPointerStart);
  window.addEventListener('mousemove', drumPointerMove);
  window.addEventListener('mouseup', drumPointerEnd);
}

function updateChannelNav() {
  var nav = document.getElementById('channelNav');
  if (!nav) return;
  if (currentGrid === '1x1') {
    nav.classList.add('visible');
    var ch = tvBoxes[0] && tvBoxes[0].currentChannel;
    if (ch) drumSetActive(ch);
  } else {
    nav.classList.remove('visible');
  }
}

function navChannel(direction) {
  var t = (currentGrid === '1x1') ? 0 : Math.max(0, Math.min(remoteTarget, tvBoxes.length - 1));
  var box = tvBoxes[t];
  if (!box) return;
  var flat = getFlatChannelList();
  if (!flat.length) return;
  var current = box.currentChannel;
  var idx = current ? flat.indexOf(current) : 0;
  if (direction === 'first') idx = 0;
  else if (direction === 'last') idx = flat.length - 1;
  else if (direction === 'next') idx = (idx + 1) % flat.length;
  else if (direction === 'prev') idx = (idx - 1 + flat.length) % flat.length;
  var name = flat[idx];
  box.select.value = name;
  changeChannel(t, name);
  if (currentGrid === '1x1') drumSetTo(idx, true);
}

// ================================================================
// VOLUME CONTROL
// ================================================================
function volTargetIndex() {
  if (soloIndex >= 0 && tvBoxes[soloIndex]) return soloIndex;
  return remoteTargetIdx();
}

function remoteTargetIdx() {
  return Math.max(0, Math.min(remoteTarget, tvBoxes.length - 1));
}

// Type a channel number on the keyboard (e.g. 1 then 5 -> channel 15);
// opens after a short pause, on the remote's target box in multi-grid.
var keyNumBuf = '', keyNumTimer = null;
function keyNumPress(d) {
  keyNumBuf = (keyNumBuf + d).slice(-2);
  showToast('Kanal: ' + keyNumBuf + '…');
  clearTimeout(keyNumTimer);
  keyNumTimer = setTimeout(keyNumGo, 1200);
}
function keyNumGo() {
  clearTimeout(keyNumTimer);
  var n = parseInt(keyNumBuf, 10);
  keyNumBuf = '';
  if (!n) return;
  var flat = getFlatChannelList();
  var name = flat[n - 1];
  if (!name) { showToast('Kanal ' + n + ' bulunamadi'); return; }
  var t = (currentGrid === '1x1') ? 0 : remoteTargetIdx();
  if (tvBoxes[t]) { tvBoxes[t].select.value = name; changeChannel(t, name); }
  if (currentGrid === '1x1') drumSetTo(n - 1, true);
  showToast(String(n).padStart(2, '0') + ' ' + name);
}

function updateVolIcon(v) {
  var ico = document.getElementById('volIco');
  if (!ico) return;
  if (v <= 0) ico.innerHTML = '&#128263;';          // muted
  else if (v < 34) ico.innerHTML = '&#128264;';      // low
  else if (v < 67) ico.innerHTML = '&#128265;';      // medium
  else ico.innerHTML = '&#128266;';                  // high
}

function setVolume(v, fromSlider) {
  v = Math.max(0, Math.min(100, Math.round(v)));
  currentVolume = v;
  if (v > 0) lastVolume = v;
  var slider = document.getElementById('volSlider');
  if (slider) {
    if (!fromSlider) slider.value = v;
    slider.style.setProperty('--vol', v + '%');
  }
  var i = volTargetIndex();
  var box = tvBoxes[i];
  if (box && box.video) {
    // iOS/iPadOS: HTMLMediaElement.volume is READ-ONLY (hardware buttons
    // control the level). We can only mute / unmute programmatically.
    if (!IS_IOS) { try { box.video.volume = v / 100; } catch(e){} }
    if (v > 0) {           // volume up also un-mutes that box (safely)
      soloIndex = i; userMutedAll = false;
      updateMuteButtons();
    } else if (IS_IOS) {   // volume 0 on iOS = mute
      soloIndex = -1; userMutedAll = true;
      updateMuteButtons();
    }
  }
  updateVolIcon(v);
}

function onVolInput(val) { setVolume(parseInt(val, 10), true); }

function toggleVolMute() {
  if (currentVolume > 0) setVolume(0);
  else setVolume(lastVolume || 100);
}

// ================================================================
// PEER-TO-PEER REMOTE (PeerJS — no server needed)
// ================================================================
function peerInit() {
  var script = document.createElement('script');
  script.src = 'https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js';
  script.onload = function() { _peerStart(); };
  script.onerror = function() { console.warn('PeerJS CDN failed'); };
  document.head.appendChild(script);
}

function _peerStart() {
  var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  var shortId = '';
  for (var i = 0; i < 4; i++) shortId += chars[Math.floor(Math.random() * chars.length)];
  peer = new Peer(shortId, { debug: 0 });
  peer.on('open', function(id) { showPeerCode(id, false); });
  peer.on('connection', function(conn) {
    peerConn = conn;
    // Panel stays visible (user closes it with X); just mark as connected.
    showPeerCode(peer.id, true);
    showToast('📡 Kumanda bağlandı!', 3000);
    conn.on('open', function() { peerSendChannels(); peerSendState(); });
    conn.on('data', function(data) {
      try { handleRemoteCommand(typeof data === 'string' ? JSON.parse(data) : data); } catch(e) {}
    });
    conn.on('close', function() {
      peerConn = null;
      showToast('📡 Kumanda bağlantısı kesildi');
      showPeerCode(peer.id, false);
    });
    // Some browsers fire 'connection' after the channel is already open
    if (conn.open) { peerSendChannels(); peerSendState(); }
  });
  peer.on('error', function(e) { showToast('⚠ P2P hata: ' + e.type); });
}

// Send the TV's real channel list so the remote's numbers ALWAYS match.
function peerSendChannels() {
  if (!peerConn) return;
  var groups = CHANNEL_GROUPS.map(function(g) {
    return { label: g.label, channels: g.channels.filter(function(n){
      return TV_CHANNELS[n] && TV_CHANNELS[n].url;
    }) };
  });
  try { peerConn.send({ action: 'channels', groups: groups }); } catch(e) {}
}

function peerSendState() {
  if (!peerConn) return;
  var t = Math.max(0, Math.min(remoteTarget, tvBoxes.length - 1));
  var ch = tvBoxes[t] && tvBoxes[t].currentChannel;
  try { peerConn.send({ action: 'state', channel: ch || '', target: t + 1, screens: tvBoxes.length }); } catch(e) {}
}

function showPeerCode(id, connected) {
  var panel = document.getElementById('peerPanel');
  var wasHidden = panel && panel.style.display === 'none';
  if (!panel) {
    panel = document.createElement('div');
    panel.id = 'peerPanel';
    panel.className = 'peer-panel';
    document.body.appendChild(panel);
  }
  panel.innerHTML =
    '<div style="display:flex;justify-content:space-between;align-items:center;gap:6px;margin-bottom:1px">' +
      '<div class="peer-label">📱 KOD</div>' +
      '<button onclick="document.getElementById(\'peerPanel\').style.display=\'none\'" style="background:none;border:none;color:#666;font-size:13px;cursor:pointer;padding:0 2px;line-height:1">✕</button>' +
    '</div>' +
    '<div class="peer-code">' + id + '</div>' +
    (connected ? '<div class="peer-hint">✓ kumanda bağlı</div>' : '');
  // Respect the user's choice: if they closed it with X, keep it closed.
  if (!wasHidden) panel.style.display = 'block';
}

// ================================================================
// WEBSOCKET (server.js fallback)
// ================================================================
function wsConnect() {
  var host = location.hostname;
  if (!host || host === '') return;
  try {
    ws = new WebSocket('ws://' + host + ':8765');
    ws.onopen = function() { ws.send(JSON.stringify({ type: 'register', role: 'tv' })); };
    ws.onmessage = function(e) { try { handleRemoteCommand(JSON.parse(e.data)); } catch(x){} };
    ws.onclose = function() { ws = null; wsReconnectTimer = setTimeout(wsConnect, 4000); };
    ws.onerror = function() { try { ws.close(); } catch(x){} };
  } catch(e) {}
}

// ================================================================
// REMOTE COMMAND HANDLER (shared by PeerJS + WebSocket)
// ================================================================
function handleRemoteCommand(cmd) {
  switch (cmd.action) {
    case 'next':   navChannel('next'); showToast('\u23ED Sonraki kanal'); break;
    case 'prev':   navChannel('prev'); showToast('\u23EE Onceki kanal'); break;
    case 'first':  navChannel('first'); showToast('\u23EE\u23EE Ilk kanal'); break;
    case 'last':   navChannel('last'); showToast('\u23ED\u23ED Son kanal'); break;
    case 'mute':   muteAll(); showToast('\uD83D\uDD07 Ses kapatildi'); break;
    case 'unmute':
      // BUG FIX: this used volTargetIndex(), which returns the box that
      // ALREADY has sound — so sound could never move off TV1. Sound must
      // follow the remote's selected target screen.
      soloIndex = remoteTargetIdx(); userMutedAll = false; updateMuteButtons();
      showToast('\uD83D\uDD0A TV' + (soloIndex + 1) + ' ses acildi'); break;
    case 'vol_up':
      if (IS_IOS) {
        soloIndex = remoteTargetIdx(); userMutedAll = false; updateMuteButtons();
        showToast('\uD83D\uDD0A TV' + (soloIndex + 1) + ' ses acik \u2014 seviye icin cihaz tuslari');
      } else {
        soloIndex = remoteTargetIdx(); userMutedAll = false;
        setVolume(currentVolume + 10);
        showToast('\uD83D\uDD0A TV' + (soloIndex + 1) + ': ' + currentVolume + '%');
      }
      break;
    case 'vol_down':
      if (IS_IOS) {
        muteAll();
        showToast('\uD83D\uDD07 Sessiz \u2014 seviye icin cihaz tuslari');
      } else {
        setVolume(currentVolume - 10);
        showToast('\uD83D\uDD09 ' + currentVolume + '%');
      }
      break;
    case 'pause':
      tvBoxes.forEach(function(b){ b._userPaused = true; if (b.video) b.video.pause(); });
      showToast('\u23F8 Durduruldu'); break;
    case 'play':
      resumeAll(); showToast('\u25B6 Devam ediyor'); break;
    case 'seek':
      tvBoxes.forEach(function(b) {
        if (b.video && isFinite(b.video.duration))
          b.video.currentTime = Math.max(0, Math.min(b.video.duration, b.video.currentTime + (cmd.delta || 0)));
      });
      showToast((cmd.delta > 0 ? '\u23E9 ' : '\u23EA ') + Math.abs(cmd.delta) + 'sn'); break;
    case 'channel':
      if (cmd.name && TV_CHANNELS[cmd.name]) {
        var t = Math.max(0, Math.min(remoteTarget, tvBoxes.length - 1));
        var flat = getFlatChannelList();
        var idx = flat.indexOf(cmd.name);
        if (tvBoxes[t]) { tvBoxes[t].select.value = cmd.name; changeChannel(t, cmd.name); }
        if (currentGrid === '1x1' && idx >= 0) drumSetTo(idx, true);
        showToast('\uD83D\uDCFA TV' + (t + 1) + ': ' + cmd.name);
      } break;
    case 'target':
      var ti = Math.max(0, Math.min(tvBoxes.length - 1, (cmd.index | 0)));
      remoteTarget = ti;
      showToast('\uD83C\uDFAF Kumanda \u2192 TV' + (ti + 1));
      peerSendState();
      break;
    case 'fullscreen':
      togglePseudoFull();
      break;
    case 'cc':
      ccToggle();
      break;
    case 'cc_en':
      var ce = document.getElementById('ccChkEn'); ce.checked = !ce.checked;
      ccApplySettings();
      showToast('EN altyazi: ' + (cc.en ? 'acik' : 'kapali'));
      break;
    case 'cc_tr':
      var ct = document.getElementById('ccChkTr'); ct.checked = !ct.checked;
      ccApplySettings();
      showToast('TR ceviri: ' + (cc.tr ? 'acik' : 'kapali'));
      break;
    case 'cc_fs':
      var fEl = document.getElementById('ccFs');
      fEl.value = Math.max(14, Math.min(40, (+fEl.value) + (cmd.delta || 0)));
      ccApplySettings();
      showToast('Yazi boyutu: ' + cc.fs + 'px');
      break;
    case 'cc_lang':
      var lEl = document.getElementById('ccLang');
      lEl.value = (lEl.value === 'en') ? 'de' : 'en';
      ccApplySettings();
      showToast('Konusma dili: ' + (cc.lang === 'de' ? 'Almanca' : 'Ingilizce'));
      break;
    case 'code':
      var pp = document.getElementById('peerPanel');
      if (pp) {
        var hidden = pp.style.display === 'none';
        pp.style.display = hidden ? 'block' : 'none';
        showToast(hidden ? 'Kod paneli acildi' : 'Kod paneli gizlendi');
      }
      break;
    case 'layout':
      if (cmd.layout) {
        var btn = document.querySelector('[data-layout="' + cmd.layout + '"]');
        setGrid(cmd.layout, btn);
        showToast('\uD83D\uDCCF ' + cmd.layout);
      } break;
  }
}

// ================================================================
// LIVE CAPTIONS (CC) — Whisper in a WEB WORKER + free translation
// ----------------------------------------------------------------
// Inference now runs OFF the main thread (a dedicated worker), so the
// page never freezes and Chrome's "page unresponsive" prompt is gone.
// EN uses whisper-tiny.en (the good first version); choosing German
// swaps to multilingual whisper-tiny in the background.
// ================================================================
var cc = {
  on:false, en:true, tr:false, fs:21, op:70, lines:2, lang:'en',
  ctx:null, mixer:null, proc:null,
  worker:null, ready:false, pending:false, busy:false,
  buf:[], bufLen:0, enSegs:[], trSegs:[], lastText:'', lastRender:0
};
var CC_CHUNK_SEC = 7;      // start recognizing after this much audio
var CC_MAX_SEND_SEC = 10;  // never feed bigger pieces (big pieces cause
                           // the "like like like..." repetition loops)
var CC_BACKLOG_SEC = 12;

function ccModelFor(lang) {
  return lang === 'de' ? 'Xenova/whisper-tiny' : 'Xenova/whisper-tiny.en';
}

function ccSupported() {
  // WebKit (iPhone/iPad Safari) does not expose MSE-fed video audio to
  // Web Audio — the model loads but hears silence. No reliable workaround.
  if (IS_IOS) return false;
  return !!(window.Hls && Hls.isSupported()) && !!window.Worker;
}

function ccToggle() {
  if (!ccSupported()) {
    showToast('\u274C iPhone/iPad Safari video sesini sayfaya vermiyor \u2014 CC bilgisayarda kullanilabilir', 3500);
    return;
  }
  if (cc.on) { ccStop(); return; }
  cc.on = true;
  ccClearText();
  ccUiSync();
  ccStart();
}

function ccStop() {
  cc.on = false;
  cc.buf = []; cc.bufLen = 0;
  ccClearText();
  document.getElementById('ccSettings').style.display = 'none';
  ccUiSync();
  showToast('CC kapatildi');
}

function ccUiSync() {
  var wrap = document.getElementById('ccWrap');
  var btn = document.getElementById('ccBtn');
  var gear = document.getElementById('ccGearBtn');
  wrap.classList.toggle('on', cc.on);
  btn.classList.toggle('cc-on', cc.on);
  gear.style.display = cc.on ? '' : 'none';
  document.getElementById('ccEn').classList.toggle('vis', cc.on && cc.en);
  document.getElementById('ccTr').classList.toggle('vis', cc.on && cc.tr);
}

function ccSettingsToggle() {
  var s = document.getElementById('ccSettings');
  s.style.display = (s.style.display === 'block') ? 'none' : 'block';
}

function ccApplySettings() {
  cc.en = document.getElementById('ccChkEn').checked;
  cc.tr = document.getElementById('ccChkTr').checked;
  if (!cc.en && !cc.tr) { cc.en = true; document.getElementById('ccChkEn').checked = true; }
  cc.fs = +document.getElementById('ccFs').value;
  cc.op = +document.getElementById('ccOp').value;
  cc.lines = +document.getElementById('ccLines').value;
  var newLang = document.getElementById('ccLang').value;
  var langChanged = (newLang !== cc.lang);
  cc.lang = newLang;
  var w = document.getElementById('ccWrap');
  w.style.setProperty('--cc-fs', cc.fs + 'px');
  w.style.setProperty('--cc-op', (cc.op / 100));
  w.style.setProperty('--cc-lines', cc.lines);
  try { localStorage.setItem('ccSettings', JSON.stringify({en:cc.en,tr:cc.tr,fs:cc.fs,op:cc.op,lines:cc.lines,lang:cc.lang})); } catch(e){}
  if (langChanged && cc.worker) { ccClearText(); ccLoadModel(); }
  ccUiSync();
}

function ccLoadSettings() {
  try {
    var s = JSON.parse(localStorage.getItem('ccSettings') || 'null');
    if (s) {
      document.getElementById('ccChkEn').checked = s.en !== false;
      document.getElementById('ccChkTr').checked = !!s.tr;
      document.getElementById('ccFs').value = s.fs || 21;
      document.getElementById('ccOp').value = s.op || 70;
      document.getElementById('ccLines').value = s.lines || 2;
      if (s.lang) document.getElementById('ccLang').value = s.lang;
    }
  } catch(e){}
  ccApplySettings();
}

function ccStatus(t) {
  document.getElementById('ccEn').innerHTML = '<div>' + t + '</div>';
}

// The worker: loads transformers.js from the CDN and answers
// {type:'load'} / {type:'run'} messages. Runs fully off-thread.
var CC_WORKER_SRC = [
  "import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';",
  "env.allowLocalModels = false;",
  "let asr = null, model = '';",
  "self.onmessage = async (e) => {",
  "  const m = e.data;",
  "  if (m.type === 'load') {",
  "    if (model === m.model && asr) { self.postMessage({type:'ready'}); return; }",
  "    asr = null; model = m.model;",
  "    try {",
  "      asr = await pipeline('automatic-speech-recognition', m.model, { quantized: true,",
  "        progress_callback: p => { if (p && p.status === 'progress' && p.total)",
  "          self.postMessage({type:'progress', pct: Math.round(100 * p.loaded / p.total)}); } });",
  "      self.postMessage({type:'ready'});",
  "    } catch (err) { self.postMessage({type:'error', msg: String(err && err.message || err)}); }",
  "  } else if (m.type === 'run') {",
  "    if (!asr) { self.postMessage({type:'result', text:''}); return; }",
  "    try { const out = await asr(m.audio, m.opts || {});",
  "      self.postMessage({type:'result', text: (out && out.text) || ''});",
  "    } catch (err) { self.postMessage({type:'result', text:''}); }",
  "  }",
  "};"
].join('\n');

function ccLoadModel() {
  cc.ready = false; cc.busy = false;
  ccStatus('CC modeli y\u00FCkleniyor\u2026');
  cc.worker.postMessage({ type: 'load', model: ccModelFor(cc.lang) });
}

async function ccStart() {
  // Audio graph needs a running AudioContext; browsers require a user
  // gesture to start one. The header CC button IS a gesture; a remote
  // toggle is not — then we wait for one tap on the screen.
  if (!cc.ctx) {
    var AC = window.AudioContext || window.webkitAudioContext;
    cc.ctx = new AC();
    cc.mixer = cc.ctx.createGain();
    cc.proc = cc.ctx.createScriptProcessor(4096, 1, 1);
    var sink = cc.ctx.createGain(); sink.gain.value = 0; // pulls the chain silently
    cc.mixer.connect(cc.proc); cc.proc.connect(sink); sink.connect(cc.ctx.destination);
    cc.proc.onaudioprocess = ccOnAudio;
  }
  try { await cc.ctx.resume(); } catch(e){}
  if (cc.ctx.state !== 'running') {
    cc.pending = true;
    ccStatus('\uD83D\uDC46 Ba\u015Flatmak i\u00E7in ekrana bir kez dokunun');
    return;
  }
  cc.pending = false;
  ccAttachBoxes();
  ccUpdateTaps();

  if (!cc.worker) {
    try {
      var blob = new Blob([CC_WORKER_SRC], { type: 'text/javascript' });
      cc.worker = new Worker(URL.createObjectURL(blob), { type: 'module' });
    } catch (e) {
      ccStatus('Bu tarayici worker modunu desteklemiyor');
      return;
    }
    cc.worker.onmessage = function(e) {
      var m = e.data;
      if (m.type === 'progress') ccStatus('CC modeli indiriliyor\u2026 %' + m.pct + ' (ilk sefer)');
      else if (m.type === 'ready') { cc.ready = true; if (cc.on) ccStatus('\uD83C\uDFA7 Dinleniyor\u2026'); }
      else if (m.type === 'error') ccStatus('Model y\u00FCklenemedi \u2014 ba\u011Flant\u0131y\u0131 kontrol edin');
      else if (m.type === 'result') ccResult(m.text);
    };
    cc.worker.onerror = function() { ccStatus('CC hatasi \u2014 sayfayi yenileyin'); };
    ccLoadModel();
  } else if (cc.ready) {
    ccStatus('\uD83C\uDFA7 Dinleniyor\u2026');
  }
}

// Route every box's persistent <video> into WebAudio ONCE, keep it
// connected to the speakers, and tap it through a per-box gain whose
// level we flip so only the SOUNDED screen feeds the recognizer.
function ccAttachBoxes() {
  if (!cc.ctx || cc.ctx.state !== 'running') return;
  tvBoxes.forEach(function(box) {
    if (!box.video || box._ccSrc) return;
    try {
      var src = cc.ctx.createMediaElementSource(box.video);
      src.connect(cc.ctx.destination);          // keep normal sound
      var tap = cc.ctx.createGain();
      tap.gain.value = 0;
      src.connect(tap); tap.connect(cc.mixer);  // feed to recognizer
      box._ccSrc = src; box._ccTap = tap;
    } catch(e){}
  });
}

function ccUpdateTaps() {
  tvBoxes.forEach(function(box, i) {
    if (box._ccTap) box._ccTap.gain.value = (soloIndex === i) ? 1 : 0;
  });
}

// In multi-screen layouts the caption block moves INSIDE the sounded
// box so it never covers the other screens; in 1x1 it sits fixed at
// the bottom (no dragging — kept intentionally simple and stable).
function ccPlace() {
  var wrap = document.getElementById('ccWrap');
  var target = null;
  // Real fullscreen paints over the page, so captions must live INSIDE
  // the fullscreened screen to stay visible.
  var fsEl = document.fullscreenElement || document.webkitFullscreenElement;
  if (fsEl) {
    for (var fi = 0; fi < tvBoxes.length; fi++) {
      if (tvBoxes[fi].screen === fsEl || fsEl.contains(tvBoxes[fi].screen)) { target = tvBoxes[fi].screen; break; }
    }
  }
  wrap.classList.toggle('fs', !!(fsEl && target));
  if (!target) target = (currentGrid !== '1x1' && soloIndex >= 0 && tvBoxes[soloIndex])
    ? tvBoxes[soloIndex].screen : null;
  if (target) {
    if (wrap.parentNode !== target) target.appendChild(wrap);
    wrap.classList.add('inbox');
  } else {
    if (wrap.parentNode !== document.body) document.body.appendChild(wrap);
    wrap.classList.remove('inbox');
  }
}

function ccOnAudio(ev) {
  if (!cc.on || !cc.ready) return;
  var d = ev.inputBuffer.getChannelData(0);
  cc.buf.push(new Float32Array(d));
  cc.bufLen += d.length;
  // Never DROP audio while the recognizer is busy (dropping caused the
  // missing sentences) — but cap the backlog and the piece size we send
  // (oversized pieces caused repetition loops and memory spikes).
  var sr = cc.ctx.sampleRate;
  var maxLen = sr * CC_BACKLOG_SEC;
  while (cc.bufLen > maxLen && cc.buf.length) { cc.bufLen -= cc.buf[0].length; cc.buf.shift(); }
  if (!cc.busy && cc.bufLen >= sr * CC_CHUNK_SEC) {
    var need = Math.min(cc.bufLen, sr * CC_MAX_SEND_SEC);
    var all = new Float32Array(cc.bufLen), off = 0;
    for (var i = 0; i < cc.buf.length; i++) { all.set(cc.buf[i], off); off += cc.buf[i].length; }
    var piece = all.subarray(0, need);
    var rest = all.subarray(need);
    cc.buf = rest.length ? [new Float32Array(rest)] : [];
    cc.bufLen = rest.length;
    // energy gate: skip near-silent pieces (prevents hallucinated text)
    var e2 = 0;
    for (var qi = 0; qi < piece.length; qi += 4) e2 += piece[qi] * piece[qi];
    if (Math.sqrt(e2 / (piece.length / 4)) < 0.0015) return;
    var mono16 = ccResample(piece, sr, 16000);
    cc.busy = true;
    var opts = (cc.lang === 'de') ? { language: 'german', task: 'transcribe' } : {};
    cc.worker.postMessage({ type: 'run', audio: mono16, opts: opts }, [mono16.buffer]);
  }
}

function ccResample(f32, from, to) {
  if (from === to) return new Float32Array(f32);
  var ratio = from / to, n = Math.floor(f32.length / ratio), out = new Float32Array(n);
  for (var i = 0; i < n; i++) {
    var pos = i * ratio, lo = Math.floor(pos), hi = Math.min(lo + 1, f32.length - 1), f = pos - lo;
    out[i] = f32[lo] * (1 - f) + f32[hi] * f;
  }
  return out;
}

// Collapse "like like like like..." style loops; junk pure-loop output.
function ccDedup(t) {
  var words = t.split(/\s+/);
  var out = [], run = 0;
  for (var i = 0; i < words.length; i++) {
    var w = words[i];
    if (out.length && w.toLowerCase() === out[out.length - 1].toLowerCase()) {
      run++;
      if (run >= 1) continue; // keep at most 2 consecutive repeats total
    } else run = 0;
    out.push(w);
  }
  var uniq = {};
  words.forEach(function(w){ uniq[w.toLowerCase().replace(/[^a-z\u00E4\u00F6\u00FC\u00DF']/g,'')] = 1; });
  if (words.length >= 6 && Object.keys(uniq).length <= 2) return ''; // pure loop garbage
  return out.join(' ');
}

async function ccResult(text) {
  cc.busy = false;
  if (!cc.on) return;
  var t = ccDedup((text || '').trim());
  if (t && t !== cc.lastText && !/^[\s.\-\u266A\[\](){}!,]*$/.test(t) &&
      !(t.length < 15 && /^(thank you|thanks|you|bye|okay|like)[.!]?$/i.test(t))) {
    cc.lastText = t;
    cc.enSegs.push(t); if (cc.enSegs.length > 2) cc.enSegs.shift();
    ccRender(true);
    if (cc.tr) {
      var tr = await ccTranslate(t);
      if (tr) { cc.trSegs.push(tr); if (cc.trSegs.length > 2) cc.trSegs.shift(); ccRender(true); }
    }
  }
}

function ccRender(isNew) {
  if (isNew) cc.lastRender = Date.now();
  var en = cc.enSegs.join(' '), tr = cc.trSegs.join(' ');
  document.getElementById('ccEn').innerHTML = '<div>' + ccEsc(en.slice(-400)) + '</div>';
  document.getElementById('ccTr').innerHTML = '<div>' + ccEsc(tr.slice(-400)) + '</div>';
}

function ccClearText() {
  cc.enSegs = []; cc.trSegs = []; cc.lastText = '';
  document.getElementById('ccEn').innerHTML = '';
  document.getElementById('ccTr').innerHTML = '';
}

// Captions arrive late, so they must also LEAVE quickly: wipe the
// panels ~4s after the last new line so stale text never lingers.
setInterval(function() {
  if (cc.on && cc.lastRender && Date.now() - cc.lastRender > 4000 &&
      (cc.enSegs.length || cc.trSegs.length)) {
    cc.enSegs = []; cc.trSegs = [];
    ccRender(false);
  }
}, 1000);

function ccEsc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;'); }

async function ccTranslate(text) {
  try { // free, no-key Google endpoint (best-effort)
    var r = await fetch('https://translate.googleapis.com/translate_a/single?client=gtx&sl=' + (cc.lang || 'en') + '&tl=tr&dt=t&q=' + encodeURIComponent(text));
    if (r.ok) { var j = await r.json(); return j[0].map(function(x){ return x[0]; }).join(''); }
  } catch(e){}
  try { // fallback: MyMemory (daily free quota)
    var r2 = await fetch('https://api.mymemory.translated.net/get?q=' + encodeURIComponent(text) + '&langpair=' + (cc.lang || 'en') + '|tr');
    if (r2.ok) { var j2 = await r2.json(); if (j2.responseData) return j2.responseData.translatedText; }
  } catch(e){}
  return null;
}

// ================================================================
// VOICE COMMAND ENGINE
// ================================================================
var VOICE_ALIASES = {
  'halk': 'Halk TV', 'ntv': 'NTV', 'sozcu': 'Sözcü TV', 'sözcü': 'Sözcü TV',
  'haberturk': 'Habertürk', 'habertürk': 'Habertürk', 'haber turk': 'Habertürk',
  'haber global': 'Haber Global', 'global': 'Haber Global',
  'tv 100': 'TV 100', 'bloomberg ht': 'Bloomberg HT',
  'bbc': 'BBC News', 'bbc news': 'BBC News',
  'dw': 'DW TV English', 'france 24': 'France 24 English', 'france': 'France 24 English',
  'sky': 'Sky News', 'sky news': 'Sky News',
  'tele 1': 'Tele 1', 'cnn': 'CNN Türk', 'cnn turk': 'CNN Türk',
  'trt': 'TRT 1', 'trt 1': 'TRT 1', 'trt bir': 'TRT 1',
  'trt 2': 'TRT 2', 'trt iki': 'TRT 2',
  'trt haber': 'TRT Haber', 'trt spor': 'TRT Spor',
  'trt belgesel': 'TRT Belgesel', 'trt muzik': 'TRT Muzik', 'trt world': 'TRT World',
  'now': 'NOW', 'kanal d': 'Kanal D', 'show': 'Show TV', 'show tv': 'Show TV',
  'atv': 'ATV', 'tv 8': 'TV8', 'tv sekiz': 'TV8',
  'teve': 'Teve2', 'beyaz': 'Beyaz TV', 'star': 'Star TV', 'star tv': 'Star TV',
  'ht spor': 'HT Spor', 'a spor': 'A Spor', 'aspor': 'A Spor', 'sports tv': 'Sports TV',
  'red bull': 'Redbull TV', 'redbull': 'Redbull TV', 'dmax': 'DMAX', 'tlc': 'TLC'
};

function matchChannel(t) {
  var keys = Object.keys(VOICE_ALIASES).sort(function(a,b){ return b.length - a.length; });
  for (var i = 0; i < keys.length; i++) {
    if (t.includes(keys[i])) return VOICE_ALIASES[keys[i]];
  }
  return null;
}

function handleVoiceCommand(transcript) {
  var t = transcript.toLowerCase().trim();
  showToast('\uD83C\uDF99 "' + transcript + '"', 3000);
  if (/ses kapat|mute|sustur/.test(t)) { muteAll(); showToast('\uD83D\uDD07 Ses kapatildi'); return; }
  if (/ses ac|unmute|sesi ac/.test(t)) {
    if (soloIndex === -1) { soloIndex = 0; userMutedAll = false; updateMuteButtons(); }
    showToast('\uD83D\uDD0A Ses acildi'); return;
  }
  if (/ses artir|volume up|sesi yuksel/.test(t)) { handleRemoteCommand({ action:'vol_up' }); return; }
  if (/ses azalt|volume down|sesi azalt/.test(t)) { handleRemoteCommand({ action:'vol_down' }); return; }
  if (/sonraki|next/.test(t)) { navChannel('next'); showToast('\u23ED Sonraki'); return; }
  if (/onceki|önceki|previous/.test(t)) { navChannel('prev'); showToast('\u23EE Onceki'); return; }
  if (/ilk kanal|first/.test(t)) { navChannel('first'); showToast('\u23EE\u23EE Ilk kanal'); return; }
  if (/son kanal|last/.test(t)) { navChannel('last'); showToast('\u23ED\u23ED Son kanal'); return; }
  if (/durdur|pause/.test(t)) { tvBoxes.forEach(function(b){ b._userPaused = true; if(b.video) b.video.pause(); }); showToast('\u23F8 Durduruldu'); return; }
  if (/devam|play|oynat/.test(t)) { resumeAll(); showToast('\u25B6 Devam'); return; }
  if (/tam ekran|fullscreen/.test(t)) { fullscreen(0); showToast('\u26F6 Tam ekran'); return; }
  if (/geri sar|rewind/.test(t)) { tvBoxes.forEach(function(b){ if(b.video && isFinite(b.video.duration)) b.video.currentTime = Math.max(0, b.video.currentTime - SEEK_STEP); }); showToast('\u23EA ' + SEEK_STEP + 'sn'); return; }
  if (/ileri sar|forward/.test(t)) { tvBoxes.forEach(function(b){ if(b.video && isFinite(b.video.duration)) b.video.currentTime = Math.min(b.video.duration, b.video.currentTime + SEEK_STEP); }); showToast('\u23E9 ' + SEEK_STEP + 'sn'); return; }
  var ch = matchChannel(t);
  if (ch) {
    var flat = getFlatChannelList();
    var idx = flat.indexOf(ch);
    if (tvBoxes[0]) { tvBoxes[0].select.value = ch; changeChannel(0, ch); }
    if (idx >= 0) drumSetTo(idx, true);
    showToast('\uD83D\uDCFA ' + ch); return;
  }
  showToast('\u2753 Komut anlasilamadi');
}

function initVoice() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('\u26A0 Tarayici sesli komutu desteklemiyor', 4000); return null; }
  var r = new SR();
  r.lang = 'tr-TR'; r.continuous = false; r.interimResults = false; r.maxAlternatives = 3;
  r.onresult = function(e) { handleVoiceCommand(e.results[0][0].transcript); };
  r.onerror = function(e) {
    if (e.error === 'no-speech') showToast('\uD83C\uDF99 Ses algilanamadi');
    else if (e.error === 'not-allowed') showToast('\u26A0 Mikrofon izni reddedildi', 4000);
    else showToast('\u26A0 Hata: ' + e.error);
    stopVoice();
  };
  r.onend = stopVoice;
  return r;
}

function toggleVoice() {
  if (voiceActive) { stopVoice(); return; }
  if (!recognition) recognition = initVoice();
  if (!recognition) return;
  try {
    recognition.start(); voiceActive = true;
    document.getElementById('voiceBtn').classList.add('listening');
    showToast('\uD83C\uDF99 Dinleniyor...', 8000);
  } catch(e) { showToast('\u26A0 Mikrofon baslatillamadi'); }
}

function stopVoice() {
  voiceActive = false;
  var btn = document.getElementById('voiceBtn');
  if (btn) btn.classList.remove('listening');
  try { if (recognition) recognition.stop(); } catch(e) {}
}

// ================================================================
// INIT
// ================================================================
function init() {
  createTVBoxes(1);
  drumBuild();
  drumAttachEvents();
  updateChannelNav();
  peerInit();
  wsConnect();
  // iOS: the volume level cannot be changed by a web page (read-only
  // property; only hardware buttons work), so the slider is misleading —
  // hide it and keep the speaker icon as a mute/unmute toggle.
  if (IS_IOS) {
    var s = document.getElementById('volSlider');
    if (s) s.style.display = 'none';
  }
  // Any tap/click anywhere unlocks audio for the active box
  document.addEventListener('click', gestureUnlock, true);
  document.addEventListener('touchend', gestureUnlock, true);
  document.addEventListener('keydown', function(e){ if (e.key === 'Escape' && pfullIndex >= 0) setPseudoFull(-1); });
  function onFsChange() {
    var fsEl = document.fullscreenElement || document.webkitFullscreenElement;
    if (fsEl && fsEl.tagName === 'VIDEO') { exitAllFullscreen(); return; }
    tvBoxes.forEach(function(box) {
      if (!box.video) return;
      // Native controls only while that box's screen is fullscreen
      box.video.controls = !!(fsEl && (fsEl === box.screen || fsEl.contains(box.screen)));
    });
    ccPlace();
  }
  document.addEventListener('fullscreenchange', onFsChange);
  document.addEventListener('webkitfullscreenchange', onFsChange);
  // Keyboard: Space = play/pause, arrows = seek 10s
  document.addEventListener('keydown', function(e) {
    var tag = (e.target && e.target.tagName) || '';
    if (/INPUT|SELECT|TEXTAREA|VIDEO/.test(tag)) return; // typing / native controls
    if (e.ctrlKey || e.metaKey || e.altKey) return;
    if (e.code === 'Space') {
      e.preventDefault();
      var anyPlaying = tvBoxes.some(function(b){ return b.video && !b.video.paused; });
      handleRemoteCommand({ action: anyPlaying ? 'pause' : 'play' });
    } else if (e.key === 'ArrowRight') {
      e.preventDefault();
      handleRemoteCommand({ action: 'seek', delta: 10 });
    } else if (e.key === 'ArrowLeft') {
      e.preventDefault();
      handleRemoteCommand({ action: 'seek', delta: -10 });
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      navChannel('next');
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      navChannel('prev');
    } else if (e.key === 'Enter') {
      e.preventDefault();
      var fsNow = document.fullscreenElement || document.webkitFullscreenElement;
      if (fsNow) exitAllFullscreen();
      else fullscreen((currentGrid === '1x1') ? 0 : remoteTargetIdx());
    } else if (/^[0-9]$/.test(e.key)) {
      keyNumPress(e.key);
    }
  });
  ccLoadSettings();
}

document.addEventListener('DOMContentLoaded', init);
</script>
