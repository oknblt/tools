<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Audit Program</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<style>
:root{
  --bg:#f0f3f8;--surface:#fff;--surface2:#f4f6fb;--border:#d5dae6;--border-light:#e8ecf4;
  --text:#1a1f2e;--muted:#6b7280;--accent:#1b4f8a;--accent-l:#e8f0fb;
  --g2:#0f6e56;--g2-l:#e1f5ee;--warn:#854f0b;--warn-l:#faeeda;
  --danger:#a32d2d;--danger-l:#fcebeb;
  --r:8px;--rlg:12px;--font:'Segoe UI',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;display:flex;flex-direction:column;height:100vh;overflow:hidden;}

/* ── HEADER ── */
.app-header{background:var(--accent);color:#fff;padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:48px;flex-shrink:0;box-shadow:0 2px 8px rgba(27,79,138,.22);z-index:50;}
.brand{display:flex;align-items:center;gap:10px;}
.brand svg{width:20px;height:20px;}
.brand h1{font-size:14px;font-weight:600;}
.brand small{font-size:10px;opacity:.6;margin-left:4px;}
.hbtn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);color:#fff;padding:4px 11px;border-radius:var(--r);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px;white-space:nowrap;transition:background .15s;}
.hbtn:hover{background:rgba(255,255,255,.22);}
.hactions{display:flex;gap:5px;}

/* ── FORM PANEL ── */
.form-panel{background:var(--surface);border-bottom:1.5px solid var(--border);flex-shrink:0;overflow:hidden;transition:max-height .32s cubic-bezier(.4,0,.2,1),opacity .25s;max-height:290px;opacity:1;}
.form-panel.collapsed{max-height:0;opacity:0;pointer-events:none;}
.form-inner{padding:10px 20px 8px;}
.fsections{display:flex;gap:14px;align-items:flex-start;}
.fsec{flex:1;min-width:0;}
.fsec-title{font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;padding-bottom:4px;border-bottom:1.5px solid var(--accent-l);}
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:6px;}
.field label{display:block;font-size:10px;font-weight:500;color:var(--muted);margin-bottom:2px;}
.field input,.field select,.field textarea{width:100%;padding:5px 8px;font-size:12px;font-family:var(--font);border:1px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--text);transition:border-color .15s,box-shadow .15s;}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(27,79,138,.10);}
.field input[readonly]{background:var(--surface2);color:var(--accent);font-weight:700;cursor:default;}
.field textarea{resize:none;height:44px;}

/* ── FORM ACTION BAR ── */
.form-actions{display:flex;align-items:center;gap:6px;padding:6px 20px;background:var(--surface);border-bottom:1.5px solid var(--border);flex-shrink:0;flex-wrap:wrap;}
.form-toggle-btn{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:var(--r);font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--accent);transition:background .12s;white-space:nowrap;}
.form-toggle-btn:hover{background:var(--accent-l);}
.form-toggle-btn svg{width:13px;height:13px;transition:transform .3s;}
.form-toggle-btn.open svg{transform:rotate(180deg);}
.spacer{flex:1;}
.btn{padding:5px 13px;border-radius:var(--r);font-size:12px;font-weight:700;cursor:pointer;border:none;display:flex;align-items:center;gap:4px;transition:opacity .15s,transform .1s;white-space:nowrap;}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{opacity:.88;}
.btn-clear{background:var(--surface);color:var(--muted);border:1px solid var(--border);}
.btn-clear:hover{background:var(--border-light);}
.btn-del{background:var(--danger-l);color:var(--danger);border:1px solid #f7c1c1;}
.btn-del:hover{background:#f7c1c1;}

/* ── TABLE AREA ── */
.table-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* ── COL MANAGER BAR ── */
.col-manager-bar{padding:5px 16px;background:var(--surface2);border-bottom:1px solid var(--border-light);display:flex;align-items:center;gap:8px;flex-shrink:0;overflow:hidden;transition:max-height .28s cubic-bezier(.4,0,.2,1),opacity .22s,padding .22s;max-height:40px;opacity:1;}
.col-manager-bar.collapsed{max-height:0;opacity:0;pointer-events:none;padding-top:0;padding-bottom:0;border-bottom-width:0;}
.col-manager-bar span{font-size:11px;color:var(--muted);}
.col-tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;background:var(--accent-l);color:var(--accent);border:1px solid #b5d4f4;cursor:pointer;user-select:none;transition:opacity .12s;}
.col-tag.hidden-col{background:var(--surface);color:var(--muted);border-color:var(--border);opacity:.6;}
.col-tag:hover{opacity:.8;}

/* ── TABLE ── */
.table-wrap{flex:1;overflow:auto;}
table{width:max-content;min-width:100%;border-collapse:collapse;}

/* TH with filter popup */
thead th{background:var(--surface2);border-bottom:1.5px solid var(--border);padding:0;text-align:left;position:sticky;top:0;z-index:10;user-select:none;white-space:nowrap;}
.th-inner{display:flex;align-items:center;gap:0;padding:7px 10px;cursor:pointer;}
.th-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;flex:1;}
thead th:hover .th-label{color:var(--accent);}
thead th.sorted .th-label{color:var(--accent);}
.sort-ind{font-size:9px;color:var(--accent);margin-left:2px;min-width:8px;}
.th-filter-btn{display:flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:4px;cursor:pointer;color:var(--muted);font-size:10px;transition:background .1s;flex-shrink:0;position:relative;}
.th-filter-btn:hover{background:var(--border-light);color:var(--accent);}
.th-filter-btn.has-filter{color:var(--accent);background:var(--accent-l);}
.th-filter-btn svg{width:11px;height:11px;pointer-events:none;}

/* Filter popup */
.filter-popup{
  position:fixed;z-index:1000;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--rlg);box-shadow:0 8px 32px rgba(0,0,0,.15);
  width:260px;padding:14px;display:none;flex-direction:column;gap:10px;
}
.filter-popup.open{display:flex;}
.fp-title{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.07em;}
.fp-sort-row{display:flex;gap:6px;}
.fp-sort-btn{flex:1;padding:5px 8px;border-radius:var(--r);font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:background .12s;display:flex;align-items:center;justify-content:center;gap:4px;}
.fp-sort-btn:hover{background:var(--accent-l);color:var(--accent);}
.fp-sort-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.fp-search{width:100%;padding:6px 9px;font-size:12px;border:1px solid var(--border);border-radius:var(--r);font-family:var(--font);}
.fp-search:focus{outline:none;border-color:var(--accent);}
.fp-list{max-height:200px;overflow-y:auto;border:1px solid var(--border-light);border-radius:var(--r);}
/* date range */
.fp-date-pair{display:flex;flex-direction:column;gap:6px;}
.fp-date-pair label{font-size:10px;color:var(--muted);font-weight:600;}
.fp-date-pair input{width:100%;padding:5px 8px;font-size:12px;border:1px solid var(--border);border-radius:var(--r);font-family:var(--font);}
.fp-date-pair input:focus{outline:none;border-color:var(--accent);}
/* checkbox item */
.fp-item{display:flex;align-items:center;gap:8px;padding:6px 10px;cursor:pointer;transition:background .08s;font-size:12px;}
.fp-item:hover{background:var(--accent-l);}
.fp-item input[type=checkbox]{width:14px;height:14px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;}
.fp-item-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.fp-item-count{font-size:10px;color:var(--muted);}
/* group header */
.fp-group{background:var(--surface2);padding:5px 10px;font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.04em;display:flex;align-items:center;gap:6px;cursor:pointer;}
.fp-month{background:#f8f9fc;font-weight:600;font-size:11px;text-transform:none;color:var(--text);padding-left:18px;}
.fp-day{}
.fp-group input[type=checkbox]{width:13px;height:13px;accent-color:var(--accent);}
.fp-footer{display:flex;gap:6px;}
.fp-foot-btn{flex:1;padding:5px 8px;border-radius:var(--r);font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:background .12s;}
.fp-foot-btn:hover{background:var(--surface2);}
.fp-foot-btn.apply{background:var(--accent);color:#fff;border-color:var(--accent);}
.fp-foot-btn.apply:hover{opacity:.88;}

tbody tr{border-bottom:1px solid var(--border-light);transition:background .08s;}
tbody tr:hover{background:var(--accent-l);}
tbody tr.selected{background:#dde8f7;}
tbody td{padding:7px 10px;font-size:12px;white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis;}
/* Action cell */
td.action-cell{padding:4px 8px;white-space:nowrap;width:60px;}
.row-edit-btn,.row-del-btn{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:6px;cursor:pointer;border:none;background:transparent;transition:background .1s;}
.row-edit-btn:hover{background:var(--accent-l);color:var(--accent);}
.row-del-btn:hover{background:var(--danger-l);color:var(--danger);}
.row-edit-btn svg,.row-del-btn svg{width:13px;height:13px;pointer-events:none;}

.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;}
.b-blue{background:var(--accent-l);color:var(--accent);}
.b-green{background:var(--g2-l);color:var(--g2);}
.b-amber{background:var(--warn-l);color:var(--warn);}
.b-yes{background:#e1f5ee;color:#0f6e56;}
.b-no{background:#fcebeb;color:#a32d2d;}
.no-data{padding:50px 20px;text-align:center;color:var(--muted);}

/* ── COL RESIZE HANDLE ── */
.col-resize-handle{
  position:absolute;right:0;top:0;bottom:0;width:5px;cursor:col-resize;
  z-index:5;background:transparent;user-select:none;touch-action:none;
}
.col-resize-handle:hover,.col-resize-handle.resizing{background:var(--accent);opacity:.4;}
thead th{position:relative;}
/* DRAG INDICATOR */
thead th.drag-over{border-left:3px solid var(--accent);}
thead th.dragging{opacity:.4;}

/* ── TABLE FOOTER ── */
.table-footer{padding:4px 16px;background:var(--surface2);border-top:1px solid var(--border-light);font-size:11px;color:var(--muted);flex-shrink:0;display:flex;align-items:center;gap:8px;}
.filter-active-badge{font-size:10px;background:var(--accent);color:#fff;padding:1px 7px;border-radius:20px;font-weight:600;}
.clear-filter-link{font-size:10px;color:var(--danger);cursor:pointer;font-weight:600;}
.clear-filter-link:hover{text-decoration:underline;}

/* ── TOAST / MODAL ── */
.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--text);color:#fff;padding:8px 14px;border-radius:var(--r);font-size:12px;font-weight:500;display:flex;align-items:center;gap:7px;box-shadow:0 4px 16px rgba(0,0,0,.15);animation:sup .2s ease;min-width:180px;}
.toast.success{background:var(--g2);}
.toast.warn{background:var(--warn);}
@keyframes sup{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:500;display:flex;align-items:center;justify-content:center;}
.modal{background:var(--surface);border-radius:var(--rlg);padding:24px 28px;min-width:320px;box-shadow:0 8px 32px rgba(0,0,0,.15);}
.modal h3{font-size:15px;font-weight:700;margin-bottom:6px;}
.modal p{font-size:13px;color:var(--muted);margin-bottom:18px;}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;}
.modal-btns button{padding:6px 16px;border-radius:var(--r);font-size:13px;font-weight:700;cursor:pointer;border:1px solid var(--border);}
.modal-btns .mcancel{background:var(--surface);}
.modal-btns .mconfirm{background:var(--danger);color:#fff;border-color:var(--danger);}
/* ── HIGHLIGHT ── */
.hl-green{
  display:inline-block;
  background:#c6f0df;color:#0b5c3e;
  border-radius:4px;padding:1px 0;
  font-size:inherit;font-weight:inherit;
  line-height:1.4;
  white-space:nowrap;
}

/* ── PRIVACY TOGGLE ACTIVE ── */
.privacy-toggle.active{color:var(--accent);border-color:var(--accent);background:var(--accent-l);}

::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-thumb{background:#c5cad6;border-radius:4px;}

/* ── DATE GROUP COLLAPSE ── */
.fp-group{cursor:pointer;position:relative;}
.fp-group .fp-collapse-icon{font-size:9px;color:var(--muted);margin-left:4px;display:inline-block;transition:transform .18s;user-select:none;}
.fp-group.collapsed-group .fp-collapse-icon{transform:rotate(-90deg);}
.fp-group-children{overflow:hidden;transition:max-height .22s cubic-bezier(.4,0,.2,1);}
.fp-group-children.hidden{display:none;}

/* ── MOBILE FORM BUTTONS ── */
.mobile-form-btns{display:none;}

/* ── DESKTOP FORM BUTTONS (under Other 2) ── */
.desktop-form-btns{display:flex;gap:6px;align-items:center;margin-top:4px;}
.desktop-form-btns .btn{flex:1;}

/* ── WEEK STRIPE ── */
tbody tr.week-stripe{background:#e0e0e0;}
tbody tr.week-stripe:hover{background:#e4e8f4;}
tbody tr.week-stripe.selected{background:#ccd8ef;}


@media(max-width:768px){
  body{height:auto;overflow-y:auto;overflow-x:hidden;min-height:100dvh;display:block;}
  .app-header{
    height:auto;padding:8px 12px;flex-wrap:nowrap;gap:6px;
    position:sticky;top:0;z-index:100;
  }
  .brand h1{font-size:13px;white-space:nowrap;}
  .brand small{display:none;}
  .hactions{gap:4px;flex-shrink:0;}
  .hbtn{padding:4px 7px;font-size:10px;gap:2px;}
  .hbtn svg{display:none;}
  .form-panel{
    max-height:none!important;height:auto!important;
    overflow:visible!important;
    transition:none!important;
  }
  .form-panel.collapsed{max-height:0!important;overflow:hidden!important;opacity:0!important;}
  .form-inner{padding:8px 12px 6px;}
  .fsections{flex-direction:column;gap:10px;}
  .fsec{flex:none!important;width:100%!important;}
  .fsec .fgrid{grid-template-columns:1fr 1fr!important;}
  .fsec .fgrid .field[style*="max-width"]{max-width:100%!important;}
  .fgrid .field[style*="grid-column"]{grid-column:1/-1!important;}
  .form-actions{padding:6px 12px;gap:5px;position:sticky;top:0;z-index:50;flex-wrap:nowrap;}
  .table-area{display:block;overflow:visible;}
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;max-width:100vw;}
  .col-manager-bar{overflow-x:auto;padding:5px 12px;flex-wrap:nowrap;white-space:nowrap;}
  .filter-popup{width:240px;max-height:60vh;overflow-y:auto;}
  .fp-list{max-height:140px;}
  table{font-size:11px;}
  thead th{font-size:10px;}
  tbody td{padding:5px 8px;font-size:11px;}
  .privacy-toggle span:last-child{display:none;}
  .table-footer{position:sticky;bottom:0;background:var(--surface2);flex-wrap:wrap;gap:4px;}
  /* Mobile form buttons */
  .mobile-form-btns{display:flex;gap:6px;align-items:center;margin-top:4px;}
  .mobile-form-btns .btn{flex:1;}
  /* Hide desktop-only action bar buttons on mobile */
  .desktop-action-btns{display:none!important;}
  /* Hide desktop form buttons on mobile */
  .desktop-form-btns{display:none!important;}
}
</style>
</head>
<body>

<header class="app-header">
  <div class="brand">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>
    <h1>Audit Program<small> Tracking &amp; Management</small></h1>
  </div>
  <div class="hactions">
    <button class="hbtn" onclick="saveJSON()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/></svg>Save
    </button>
    <button class="hbtn" onclick="document.getElementById('jsonIn').click()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M3 15v4c0 1.1.9 2 2 2h14a2 2 0 002-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>Load
    </button>
    <button class="hbtn" onclick="document.getElementById('xlsxIn').click()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M3 15v4c0 1.1.9 2 2 2h14a2 2 0 002-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>Import
    </button>
    <button class="hbtn" onclick="exportExcel()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>Export
    </button>
    <button class="hbtn" onclick="exportPDF()" style="background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.3);">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/></svg>PDF
    </button>
  </div>
</header>
<input type="file" id="jsonIn" accept=".json" style="display:none" onchange="loadJSON(event)"/>
<input type="file" id="xlsxIn" accept=".xlsx,.xls" style="display:none" onchange="importExcel(event)"/>

<!-- FORM -->
<div class="form-panel" id="formPanel">
  <div class="form-inner">
    <div class="fsections">
      <div class="fsec" style="flex:0 0 auto;min-width:0;width:260px;">
        <div class="fsec-title">Schedule</div>
        <div class="fgrid" style="grid-template-columns:1fr 1fr;">
          <div class="field"><label>Start Date</label><input type="date" id="f_startDate" onchange="calcDays()"/></div>
          <div class="field"><label>End Date</label><input type="date" id="f_endDate" onchange="calcDays()"/></div>
          <div class="field" style="grid-column:1/-1;max-width:120px;"><label>Days (Auto)</label><input type="text" id="f_totalDay" readonly placeholder="—"/></div>
        </div>
      </div>
      <div class="fsec" style="flex:2.2">
        <div class="fsec-title">Program Details</div>
        <div class="fgrid">
         <div class="field"><label>Program</label>     
         <select id="f_program1">
      <option value="">-- Select --</option>
      <option>AMAZON</option><option>BSCI</option><option>CHEMMAP</option><option>GOTS/TE</option><option>HIGG FDM</option><option>HIGG FEM</option><option>HUGO BOSS</option><option>ICS COC</option><option>ICS ENV</option><option>MSA-C</option><option>MSA-E</option><option>SMETA</option><option>SLCP</option>
          </select>
     </div>
          <div class="field"><label>Program 2</label><input type="text" id="f_program2" placeholder="Program name"/></div>

          <div class="field"><label>Scope</label>
<select id="f_scope">
      <option value="">-- Select --</option>
      <option>4P</option><option>SPA</option><option>Small factory</option></select>
</div>
          <div class="field"><label>Type</label>
            <select id="f_auditType">
              <option value="">-- Select --</option>
              <option>Initial</option><option>Reaudit</option><option>Periodic</option><option>Follow-up</option>
            </select>
          </div>
          <div class="field"><label>Brand</label><input type="text" id="f_brand" /></div>
          <div class="field"><label>Report No</label><input type="text" id="f_reportNo" /></div>
          <div class="field"><label>Manday</label><input type="number" id="f_manday"  step="0.5" min="0"/></div>
          <div class="field"><label>Report</label>
            <select id="f_reportWriting">
              <option value="">-- Select --</option>
              <option value="YES">Yes</option><option value="NO">No</option>
            </select>
          </div>
          <div class="field"><label>Transportation</label><input type="text" id="f_transportation"/></div>
        </div>
      </div>
      <div class="fsec" style="flex:1.5">

<script>
if(sessionStorage.getItem('bulut_auth')!=='1') window.location.href='index.html';

// ── COLUMN DEFINITIONS ────────────────────────────────────────
const COL_DEFS = [
  {key:'startDate',  label:'Start Date',          type:'date', width:130},
  {key:'endDate',    label:'End Date',             type:'date', width:130},
  {key:'city',       label:'City',                 type:'text', width:100},
  {key:'totalDay',   label:'Day',            type:'text', width:80},
  {key:'program1',   label:'Program',            type:'text', width:110},
  {key:'program2',   label:'Program 2',            type:'text', width:110},
  {key:'scope',      label:'Scope',                type:'text', width:110},
  {key:'auditType',  label:'Type',           type:'select', width:110},
  {key:'brand',      label:'Brand',                type:'text', width:90},
  {key:'reportNo',   label:'Report No',            type:'text', width:100},
  {key:'manday',     label:'Manday',              type:'text', width:75},
  {key:'reportWriting',label:'Report',     type:'select', width:110},
  {key:'transportation',label:'Transportation',    type:'text', width:130},
  {key:'factoryName',label:'Factory Name',         type:'text', width:160},
  {key:'sector',     label:'Sector',               type:'text', width:100},
  {key:'address',    label:'Address',              type:'text', width:150},
  {key:'leadAuditor',label:'Lead / Team',  type:'text', width:140},
  {key:'otherAuditor',label:'Other',       type:'text', width:130},
  {key:'otherAuditor2',label:'Other 2',    type:'text', width:130},
];

const FIELDS = COL_DEFS.map(c=>c.key);
const XL_HEADERS = [
  'Start Date','End Date','City','Day','Program','Program 2','Scope',
  'Type','Brand','Report No','Manday','Report','Transportation',
  'Factory Name','Sector','Address','Lead / Team','Other','Other 2'
];

// ── STATE ─────────────────────────────────────────────────────
let records=[], editId=null;
let sortField=null, sortAsc=true;
let formVisible=true;
// colOrder: array of keys in display order
let colOrder = FIELDS.slice();
// hiddenCols: set of hidden keys
let hiddenCols = new Set();
// colWidths: key -> px width (overrides COL_DEFS default)
let colWidths = {};
// activeFilters: key -> {selected: Set | null, dateFrom, dateTo}
let activeFilters = {};
// drag state
let dragSrcKey=null;
// popup state
let fpCol=null;

// ── DATE HELPERS ──────────────────────────────────────────────
function excelSerial(s){return new Date(Math.round((s-25569)*86400*1000));}
function fmtDate(val){
  if(!val&&val!==0)return'—';
  let d;
  if(typeof val==='number')d=excelSerial(val);
  else if(typeof val==='string'){
    if(/^\d{4}-\d{2}-\d{2}$/.test(val)){const[y,m,dy]=val.split('-').map(Number);d=new Date(y,m-1,dy);}
    else if(/^\d{1,2}[.\/-]\d{1,2}[.\/-]\d{4}$/.test(val)){const p=val.split(/[.\/-]/);d=new Date(+p[2],+p[1]-1,+p[0]);}
    else d=new Date(val);
  } else return'—';
  if(!d||isNaN(d))return val.toString();
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const dd=String(d.getDate()).padStart(2,'0');
  const mm=String(d.getMonth()+1).padStart(2,'0');
  const yyyy=d.getFullYear();
  const dow=days[d.getDay()];
  return`${dd}.${mm}.${yyyy} ${dow}`;
}
function toISO(val){
  if(!val&&val!==0)return'';
  let d;
  if(typeof val==='number')d=excelSerial(val);
  else if(typeof val==='string'){
    if(/^\d{4}-\d{2}-\d{2}$/.test(val))return val;
    if(/^\d{1,2}[.\/-]\d{1,2}[.\/-]\d{4}$/.test(val)){const p=val.split(/[.\/-]/);d=new Date(+p[2],+p[1]-1,+p[0]);}
    else d=new Date(val);
  } else return'';
  if(!d||isNaN(d))return'';
  return d.toISOString().slice(0,10);
}

// ── FORM TOGGLE ───────────────────────────────────────────────
function calcTotalDay(startISO, endISO){
  if(!startISO||!endISO)return'';
  const s=new Date(startISO), e=new Date(endISO);
  if(isNaN(s)||isNaN(e)||e<s)return'';
  return String(Math.round((e-s)/(86400*1000))+1);
}
function calcDays(){
  const s=document.getElementById('f_startDate').value;
  const e=document.getElementById('f_endDate').value;
  document.getElementById('f_totalDay').value=calcTotalDay(s,e)||'';
}
function toggleForm(){
  formVisible=!formVisible;
  document.getElementById('formPanel').classList.toggle('collapsed',!formVisible);
  document.getElementById('toggleBtn').classList.toggle('open',formVisible);
  document.getElementById('toggleLabel').textContent=formVisible?'Hide':'Show';
}
function togglePin(){} // kept for compat, no-op

// ── FORM HELPERS ──────────────────────────────────────────────
function getFormData(){const o={};FIELDS.forEach(f=>{const el=document.getElementById('f_'+f);o[f]=el?el.value.trim():'';});return o;}
function setFormData(rec){FIELDS.forEach(f=>{const el=document.getElementById('f_'+f);if(!el)return;if(f==='startDate'||f==='endDate')el.value=toISO(rec[f]);else el.value=rec[f]??'';});}
function clearForm(){
  FIELDS.forEach(f=>{const el=document.getElementById('f_'+f);if(el&&!el.readOnly)el.value='';});
  document.getElementById('f_totalDay').value='';
  editId=null;
  ['btnDeleteDesktop','btnDeleteMobile'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='none';});
  ['btnLabelDesktop','btnLabelMobile'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent='Add';});
  renderTable();
}
function saveRecord(){
  const data=getFormData();
  if(!data.startDate&&!data.factoryName&&!data.reportNo){toast('Fill at least Start Date, Factory Name or Report No.','warn');return;}
  data.totalDay=calcTotalDay(data.startDate,data.endDate);
  if(editId!==null){
    const i=records.findIndex(r=>r.id===editId);
    if(i>-1)records[i]={...records[i],...data};
    toast('Record updated.','success');
  } else {
    records.push({id:Date.now(),...data});
    toast('Record added.','success');
  }
  clearForm();
  {formVisible=false;document.getElementById('formPanel').classList.add('collapsed');document.getElementById('toggleBtn').classList.remove('open');document.getElementById('toggleLabel').textContent='Show';}
}
function editRecord(id){
  const rec=records.find(r=>r.id===id);if(!rec)return;
  editId=id;setFormData(rec);
  ['btnDeleteDesktop','btnDeleteMobile'].forEach(bid=>{const el=document.getElementById(bid);if(el)el.style.display='';});
  ['btnLabelDesktop','btnLabelMobile'].forEach(bid=>{const el=document.getElementById(bid);if(el)el.textContent='Update';});
  if(!formVisible){formVisible=true;document.getElementById('formPanel').classList.remove('collapsed');document.getElementById('toggleBtn').classList.add('open');document.getElementById('toggleLabel').textContent='Hide';}
  renderTable();
}
let pendingDeleteId=null;
function requestDelete(id){pendingDeleteId=id;document.getElementById('delModal').style.display='flex';}
function doDelete(){
  const id=pendingDeleteId??editId;
  if(id===null)return;
  records=records.filter(r=>r.id!==id);
  if(id===editId)clearForm();
  pendingDeleteId=null;
  document.getElementById('delModal').style.display='none';
  renderTable();toast('Record deleted.');
}

// ── COLUMN MANAGER ────────────────────────────────────────────
function buildColManager(){
  const bar=document.getElementById('colManagerBar');
  // keep "Columns:" label
  const tags=bar.querySelectorAll('.col-tag');
  tags.forEach(t=>t.remove());
  colOrder.forEach(key=>{
    const def=COL_DEFS.find(c=>c.key===key);if(!def)return;
    const tag=document.createElement('span');
    tag.className='col-tag'+(hiddenCols.has(key)?' hidden-col':'');
    tag.textContent=def.label;
    tag.title='Click to show/hide';
    tag.onclick=()=>{
      if(hiddenCols.has(key))hiddenCols.delete(key);
      else hiddenCols.add(key);
      buildColManager();buildTableHeader();renderTable();
    };
    bar.appendChild(tag);
  });
}

// ── TABLE HEADER ─────────────────────────────────────────────
let resizingKey=null, resizeStartX=0, resizeStartW=0;

function buildTableHeader(){
  const tr=document.getElementById('theadRow');
  tr.innerHTML='';
  // actions column
  const thA=document.createElement('th');
  thA.style.cssText='min-width:64px;width:64px;';
  thA.innerHTML='<div class="th-inner"><span class="th-label">Actions</span></div>';
  tr.appendChild(thA);
  // data columns
  colOrder.forEach(key=>{
    if(hiddenCols.has(key))return;
    const def=COL_DEFS.find(c=>c.key===key);if(!def)return;
    const th=document.createElement('th');
    th.dataset.key=key;
    const w=colWidths[key]||def.width;
    th.style.minWidth=w+'px';
    th.style.width=w+'px';
    th.draggable=true;
    const hasF=!!(activeFilters[key]&&activeFilters[key].selected&&activeFilters[key].selected.size>0);
    const sortInd=sortField===key?(sortAsc?' ▲':' ▼'):'';
    if(sortField===key)th.classList.add('sorted');
    th.innerHTML=`<div class="th-inner">
      <span class="th-label" onclick="sortBy('${key}')">${def.label}<span class="sort-ind">${sortInd}</span></span>
      <span class="th-filter-btn${hasF?' has-filter':''}" onclick="openFilterPopup(event,'${key}')" title="Filter">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
      </span>
    </div>
    <div class="col-resize-handle" data-key="${key}"></div>`;

    // ── DESKTOP DRAG (column reorder) ──
    th.addEventListener('dragstart',e=>{
      if(e.target.classList.contains('col-resize-handle'))return;
      dragSrcKey=key;th.classList.add('dragging');e.dataTransfer.effectAllowed='move';
    });
    th.addEventListener('dragend',()=>{th.classList.remove('dragging');document.querySelectorAll('thead th').forEach(t=>t.classList.remove('drag-over'));});
    th.addEventListener('dragover',e=>{e.preventDefault();th.classList.add('drag-over');});
    th.addEventListener('dragleave',()=>th.classList.remove('drag-over'));
    th.addEventListener('drop',e=>{
      e.preventDefault();th.classList.remove('drag-over');
      if(!dragSrcKey||dragSrcKey===key)return;
      const fromIdx=colOrder.indexOf(dragSrcKey),toIdx=colOrder.indexOf(key);
      if(fromIdx<0||toIdx<0)return;
      colOrder.splice(fromIdx,1);colOrder.splice(toIdx,0,dragSrcKey);
      buildColManager();buildTableHeader();renderTable();
    });

    // ── RESIZE HANDLE ──
    const handle=th.querySelector('.col-resize-handle');
    // Mouse
    handle.addEventListener('mousedown',e=>{
      e.preventDefault();e.stopPropagation();
      resizingKey=key;resizeStartX=e.clientX;resizeStartW=colWidths[key]||def.width;
      handle.classList.add('resizing');
      document.body.style.cursor='col-resize';
      document.body.style.userSelect='none';
    });
    // Touch (mobile resize)
    handle.addEventListener('touchstart',e=>{
      e.stopPropagation();
      resizingKey=key;resizeStartX=e.touches[0].clientX;resizeStartW=colWidths[key]||def.width;
      handle.classList.add('resizing');
    },{passive:true});

    // ── MOBILE TOUCH DRAG (column reorder) ──
    let touchDragKey=null, touchClone=null, touchOverKey=null;
    th.addEventListener('touchstart',e=>{
      if(e.target.classList.contains('col-resize-handle'))return;
      // long-press to start drag
      touchDragKey=null;
      const startX=e.touches[0].clientX, startY=e.touches[0].clientY;
      th._touchTimer=setTimeout(()=>{
        touchDragKey=key;
        th.classList.add('dragging');
        // ghost clone
        touchClone=th.cloneNode(true);
        touchClone.style.cssText=`position:fixed;opacity:.7;pointer-events:none;z-index:9999;background:var(--accent-l);border:1px solid var(--accent);border-radius:4px;padding:4px 8px;font-size:10px;font-weight:700;color:var(--accent);white-space:nowrap;`;
        touchClone.style.left=startX+'px';touchClone.style.top=startY-30+'px';
        document.body.appendChild(touchClone);
      },400);
    },{passive:true});
    th.addEventListener('touchmove',e=>{
      clearTimeout(th._touchTimer);
      if(!touchDragKey)return;
      e.preventDefault();
      const x=e.touches[0].clientX,y=e.touches[0].clientY;
      if(touchClone){touchClone.style.left=x-20+'px';touchClone.style.top=y-30+'px';}
      // find th under finger
      const el=document.elementFromPoint(x,y);
      const overTh=el?.closest('th[data-key]');
      const overKey=overTh?.dataset?.key;
      if(overKey&&overKey!==touchDragKey){
        if(touchOverKey!==overKey){
          document.querySelectorAll('thead th').forEach(t=>t.classList.remove('drag-over'));
          overTh.classList.add('drag-over');
          touchOverKey=overKey;
        }
      }
    },{passive:false});
    th.addEventListener('touchend',e=>{
      clearTimeout(th._touchTimer);
      if(touchClone){touchClone.remove();touchClone=null;}
      th.classList.remove('dragging');
      document.querySelectorAll('thead th').forEach(t=>t.classList.remove('drag-over'));
      if(touchDragKey&&touchOverKey&&touchDragKey!==touchOverKey){
        const fromIdx=colOrder.indexOf(touchDragKey),toIdx=colOrder.indexOf(touchOverKey);
        if(fromIdx>=0&&toIdx>=0){
          colOrder.splice(fromIdx,1);colOrder.splice(toIdx,0,touchDragKey);
          buildColManager();buildTableHeader();renderTable();
        }
      }
      touchDragKey=null;touchOverKey=null;
    });

    tr.appendChild(th);
  });
}

let fpOpen=false;
function openFilterPopup(e,key){
  e.stopPropagation();
  const popup=document.getElementById('filterPopup');

  fpCol=key;fpOpen=true;
  const def=COL_DEFS.find(c=>c.key===key);

  document.getElementById('fp-search').value='';

  const btn=e.currentTarget;

  popup.style.display='flex';

  if(top+ph>window.innerHeight)top=rect.top-ph-4;
  popup.style.left=left+'px';popup.style.top=top+'px';
  popup.classList.add('open');
}

// month names for date grouping
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTHS_FULL=['January','February','March','April','May','June','July','August','September','October','November','December'];

function fpRenderList(){
  if(!fpCol)return;
  const def=COL_DEFS.find(c=>c.key===fpCol);
  const q=(document.getElementById('fp-search').value||'').toLowerCase();
  const f=activeFilters[fpCol]||{};
  const sel=f.selected||null;
  const list=document.getElementById('fp-list');

  if(def.type==='date'){
    // Cross-filter: use records filtered by all OTHER active filters
    const crossFiltered = records.filter(r=>{
      for(const key of Object.keys(activeFilters)){
        if(key===fpCol) continue; // skip own column
        const af=activeFilters[key];
        const colDef=COL_DEFS.find(c=>c.key===key);
        if(!af.selected) continue;
        if(colDef.type==='date'){
          const iso=toISO(r[key])||'';
          if(!af.selected.has(iso)) return false;
        } else {
          const raw=r[key];
          const disp=key==='reportWriting'
            ?((raw||'').toString().trim().toUpperCase()||'—')
            :((raw||'').toString().trim()||'—');
          if(!af.selected.has(disp)) return false;
        }
      }
      return true;
    });
    const isoSet={};
    crossFiltered.forEach(r=>{
      const iso=toISO(r[fpCol]);
      if(!iso)return;
      isoSet[iso]=(isoSet[iso]||0)+1;
    });
    const allISO=Object.keys(isoSet).filter(iso=>!q||iso.includes(q)||fmtDate(iso).toLowerCase().includes(q));
    const tree={};
    allISO.forEach(iso=>{
      const[y,m,d]=iso.split('-');
      if(!tree[y])tree[y]={};
      if(!tree[y][m])tree[y][m]=[];
      tree[y][m].push({iso,count:isoSet[iso]});
    });
    const sortedYears=Object.keys(tree).sort((a,b)=>b-a);
    // Build DOM manually for collapse support
    list.innerHTML='';
    if(!sortedYears.length){list.innerHTML='<div style="padding:10px;font-size:12px;color:var(--muted);">No dates found</div>';return;}
    sortedYears.forEach(y=>{
      const months=Object.keys(tree[y]).sort((a,b)=>b-a);
      const yearISOs=months.flatMap(m=>tree[y][m].map(d=>d.iso));
      const yearAll=yearISOs.every(iso=>!sel||sel.has(iso));
      const yearSome=yearISOs.some(iso=>!sel||sel.has(iso));
      const yearCount=yearISOs.reduce((s,iso)=>s+isoSet[iso],0);

      // Year row
      const yearDiv=document.createElement('div');
      yearDiv.className='fp-group';
      yearDiv.dataset.level='year';
      yearDiv.dataset.key=y;
      yearDiv.innerHTML=`<input type="checkbox" data-scope="year" data-year="${y}" ${yearAll?'checked':''} ${(!yearAll&&yearSome)?'data-indeterminate="1"':''} onchange="fpGroupChange(this)"/><span style="font-weight:700;">Year ${y}</span><span style="margin-left:auto;font-size:10px;color:var(--muted)">(${yearCount})</span><span class="fp-collapse-icon">▾</span>`;
      list.appendChild(yearDiv);

      // Year children container
      const yearChildren=document.createElement('div');
      yearChildren.className='fp-group-children hidden';
      yearChildren.dataset.year=y;
      list.appendChild(yearChildren);
      yearDiv.classList.add('collapsed-group');

      months.forEach(m=>{
        const days=tree[y][m].sort((a,b)=>b.iso.localeCompare(a.iso));
        const mISOs=days.map(d=>d.iso);
        const mAll=mISOs.every(iso=>!sel||sel.has(iso));
        const mSome=mISOs.some(iso=>!sel||sel.has(iso));
        const mCount=mISOs.reduce((s,iso)=>s+isoSet[iso],0);
        const mLabel=MONTHS_FULL[parseInt(m,10)-1]+' '+y;

        // Month row
        const monthDiv=document.createElement('div');
        monthDiv.className='fp-group fp-month';
        monthDiv.dataset.level='month';
        monthDiv.dataset.year=y;
        monthDiv.dataset.month=m;
        monthDiv.innerHTML=`<input type="checkbox" data-scope="month" data-year="${y}" data-month="${m}" ${mAll?'checked':''} ${(!mAll&&mSome)?'data-indeterminate="1"':''} onchange="fpGroupChange(this)"/><span style="padding-left:8px;">${mLabel}</span><span style="margin-left:auto;font-size:10px;color:var(--muted)">(${mCount})</span><span class="fp-collapse-icon">▾</span>`;
        yearChildren.appendChild(monthDiv);

        // Month children container
        const monthChildren=document.createElement('div');
        monthChildren.className='fp-group-children';
        monthChildren.dataset.year=y;
        monthChildren.dataset.month=m;
        yearChildren.appendChild(monthChildren);

        days.forEach(({iso,count})=>{
          const[,, dd]=iso.split('-');
          const checked=(!sel||sel.has(iso));
          const dayDiv=document.createElement('div');
          dayDiv.className='fp-item fp-day';
          dayDiv.innerHTML=`<input type="checkbox" value="${iso}" data-scope="day" ${checked?'checked':''} onchange="fpDayChange()"/><span class="fp-item-label" style="padding-left:16px;">${parseInt(dd,10)} ${MONTHS[parseInt(m,10)-1]} ${y}</span><span class="fp-item-count">${count}</span>`;
          monthChildren.appendChild(dayDiv);
        });

        // Month toggle click
        monthDiv.addEventListener('click',e=>{
          if(e.target.tagName==='INPUT')return;
          const isCollapsed=monthChildren.classList.toggle('hidden');
          monthDiv.classList.toggle('collapsed-group',isCollapsed);
        });
      });

      // Year toggle click
      yearDiv.addEventListener('click',e=>{
        if(e.target.tagName==='INPUT')return;
        const isCollapsed=yearChildren.classList.toggle('hidden');
        yearDiv.classList.toggle('collapsed-group',isCollapsed);
      });
    });
    // set indeterminate state
    list.querySelectorAll('input[data-indeterminate="1"]').forEach(cb=>{cb.indeterminate=true;});
  } else {
    // plain list — cross-filter: exclude own column's filter
    const crossFiltered = records.filter(r=>{
      for(const key of Object.keys(activeFilters)){
        if(key===fpCol) continue;
        const af=activeFilters[key];
        const colDef=COL_DEFS.find(c=>c.key===key);
        if(!af.selected) continue;
        if(colDef.type==='date'){
          const iso=toISO(r[key])||'';
          if(!af.selected.has(iso)) return false;
        } else {
          const raw=r[key];
          const disp=key==='reportWriting'
            ?((raw||'').toString().trim().toUpperCase()||'—')
            :((raw||'').toString().trim()||'—');
          if(!af.selected.has(disp)) return false;
        }
      }
      return true;
    });
    const valMap={};
    crossFiltered.forEach(r=>{
      const raw=r[fpCol];
      // For reportWriting normalise to uppercase
      let disp = fpCol==='reportWriting'
        ? ((raw||'').toString().trim().toUpperCase()||'—')
        : ((raw||'').toString().trim()||'—');
      valMap[disp]=(valMap[disp]||0)+1;
    });
    let items=Object.entries(valMap).filter(([d])=>!q||d.toLowerCase().includes(q));
    items.sort((a,b)=>a[0].localeCompare(b[0]));
    list.innerHTML=items.map(([disp,count])=>`<div class="fp-item">
      <input type="checkbox" value="${escQ(disp)}" ${(!sel||sel.has(disp))?'checked':''}/>
      <span class="fp-item-label">${disp}</span>
      <span class="fp-item-count">${count}</span>
    </div>`).join('')||'<div style="padding:10px;font-size:12px;color:var(--muted);">No values</div>';
  }
}

function escQ(s){return(s||'').replace(/"/g,'&quot;');}

function fpGroupChange(cb){
  const scope=cb.dataset.scope;
  const list=document.getElementById('fp-list');
  if(scope==='year'){
    const y=cb.dataset.year;
    list.querySelectorAll(`input[data-scope="month"][data-year="${y}"]`).forEach(c=>{c.checked=cb.checked;c.indeterminate=false;});
    list.querySelectorAll(`input[data-scope="day"]`).forEach(c=>{
      // belong to this year?
      if(c.value.startsWith(y+'-'))c.checked=cb.checked;
    });
  } else if(scope==='month'){
    const y=cb.dataset.year,m=cb.dataset.month;
    list.querySelectorAll(`input[data-scope="day"]`).forEach(c=>{
      if(c.value.startsWith(y+'-'+m+'-'))c.checked=cb.checked;
    });

}

function fpDayChange(){
  const list=document.getElementById('fp-list');
  // update month and year checkboxes
  list.querySelectorAll('input[data-scope="month"]').forEach(mcb=>{
    const y=mcb.dataset.year,m=mcb.dataset.month;
    const days=[...list.querySelectorAll(`input[data-scope="day"]`)].filter(c=>c.value.startsWith(y+'-'+m+'-'));
    const allC=days.every(c=>c.checked),someC=days.some(c=>c.checked);

  const days=[...list.querySelectorAll(`input[data-scope="day"]`)].filter(c=>c.value.startsWith(y+'-'));

  ycb.checked=allC;ycb.indeterminate=!allC&&someC;

// ── WEEK KEY HELPER ───────────────────────────────────────────
// Returns a string "YYYY-WNN" representing ISO week of a date value
function isoWeekKey(val){
  const iso=toISO(val);
  if(!iso)return null;
  const [y,m,d]=iso.split('-').map(Number);
  const dt=new Date(y,m-1,d);
  // ISO week: Thursday of the week determines the year
  const tmp=new Date(dt);
  tmp.setHours(0,0,0,0);
  tmp.setDate(tmp.getDate()+3-(tmp.getDay()+6)%7);
  const week1=new Date(tmp.getFullYear(),0,4);
  const weekNum=1+Math.round(((tmp-week1)/86400000-3+(week1.getDay()+6)%7)/7);
  return`${tmp.getFullYear()}-W${String(weekNum).padStart(2,'0')}`;
}

// ── RENDER TABLE ─────────────────────────────────────────────
function filterData(){
  return records.filter(r=>{
    for(const key of Object.keys(activeFilters)){
      const f=activeFilters[key];
      const def=COL_DEFS.find(c=>c.key===key);
      if(def.type==='date'){
        // selected is a Set of ISO strings
        if(f.selected){
          const iso=toISO(r[key])||'';
          if(!f.selected.has(iso))return false;
        }
      } else {
        // text/select: selected is a Set of display strings
        if(f.selected){
          const raw=r[key];
          const disp=key==='reportWriting'
            ?((raw||'').toString().trim().toUpperCase()||'—')
            :((raw||'').toString().trim()||'—');
          if(!f.selected.has(disp))return false;
        }
      }
    }
    return true;
  });
}
function sortData(data){
  if(!sortField)return data;
  return [...data].sort((a,b)=>{
    let va=a[sortField]??'',vb=b[sortField]??'';
    const def=COL_DEFS.find(c=>c.key===sortField);
    if(def&&def.type==='date'){va=toISO(va);vb=toISO(vb);}
    else if(sortField==='reportWriting'){va=va.toString().trim().toUpperCase();vb=vb.toString().trim().toUpperCase();}
    else if(!isNaN(va)&&!isNaN(vb)&&va!==''&&vb!==''){va=Number(va);vb=Number(vb);}
    if(va<vb)return sortAsc?-1:1;
    if(va>vb)return sortAsc?1:-1;
    return 0;
  });
}
function maskFactory(name){
  if(!name)return'—';
  return name.split(/\s+/).map(w=>{
    if(!w)return w;
    return w[0]+'***';
  }).join(' ');
}

function istanbulHighlight(val){
  const v=(val||'').toString().trim();
  if(!v)return'—';
  // Normalize: replace Turkish İ→I and ı→i for comparison
  const norm=v.replace(/İ/g,'I').replace(/ı/g,'i').toLowerCase();
  if(norm==='istanbul'){
    return`<span class="hl-green">${escHTML(v)}</span>`;
  }
  return escHTML(v);
}

function escHTML(s){return(s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function factoryHighlight(name, factoryCount, seenFactories){
  if(!name)return'—';
  const key=name.trim().toLowerCase();
  const isDup=(factoryCount[key]||0)>1;
  seenFactories.add(key);
  if(isDup) return`<span class="hl-green">${escHTML(name)}</span>`;
  return escHTML(name);
}

function renderTable(){
  const data=sortData(filterData());
  const active=Object.keys(activeFilters).length>0;
  document.getElementById('filterActiveBadge').style.display=active?'':'none';
  document.getElementById('clearFilterLink').style.display=active?'':'none';
  const tbody=document.getElementById('tableBody');
  const noData=document.getElementById('noData');

  // Compute totals
  let totalDaySum=0, totalMandaySum=0;
  data.forEach(r=>{
    const d=parseFloat(r.totalDay);if(!isNaN(d))totalDaySum+=d;
    const m=parseFloat(r.manday);if(!isNaN(m))totalMandaySum+=m;
  });
  const tdEl=document.getElementById('totalDayStat');
  const tmEl=document.getElementById('totalMandayStat');
  if(data.length>0){
    tdEl.textContent=`· ${totalDaySum} total day`;tdEl.style.display='';
    tmEl.textContent=`· ${totalMandaySum.toFixed(1)} total manday`;tmEl.style.display='';
  } else {
    tdEl.style.display='none';tmEl.style.display='none';
  }

  if(data.length===0){tbody.innerHTML='';noData.style.display='';}
  else{
    noData.style.display='none';

    // Pre-scan to find factories that appear more than once (duplicates)
    const factoryCount={};
    data.forEach(r=>{const k=(r.factoryName||'').trim().toLowerCase();if(k)factoryCount[k]=(factoryCount[k]||0)+1;});
    const seenFactories=new Set();

    // Week stripe: alternating band per ISO week in display order.
    // First encountered week → band 1 (grey), next → 0, next → 1, …
    let weekBand=0, lastWeekKey=null;
    const weekBands=data.map(r=>{
      const wk=isoWeekKey(r.startDate)||isoWeekKey(r.endDate)||'';
      if(wk&&wk!==lastWeekKey){
        weekBand=lastWeekKey===null?1:1-weekBand;
        lastWeekKey=wk;
      }
      return weekBand;
    });

    tbody.innerHTML=data.map((r,i)=>{
      const visibleKeys=colOrder.filter(k=>!hiddenCols.has(k));
      const cells=visibleKeys.map(key=>{
        const def=COL_DEFS.find(c=>c.key===key);
        let val;
        if(def.type==='date') val=fmtDate(r[key]);
        else if(key==='totalDay') val=r[key]?`<span class="badge b-blue">${escHTML(r[key])}</span>`:'—';
        else if(key==='auditType') val=escHTML(r[key]||'—');
        else if(key==='reportNo') val=escHTML(r[key]||'—');
        else if(key==='reportWriting'){
          const raw=r[key]||'';
          const display = raw.toString().trim().toUpperCase() === 'YES' ? 'Yes' : 
                          raw.toString().trim().toUpperCase() === 'NO' ? 'No' : raw;
          val=escHTML(display);
        }
        else if(key==='city') val=istanbulHighlight(r[key]);
        else if(key==='factoryName'){
          const displayName=privacyMode?maskFactory(r[key]):r[key];
          if(privacyMode) val=displayName?escHTML(displayName):'—';
          else val=factoryHighlight(r[key],factoryCount,seenFactories);
        }
        else if(key==='address') val=`<span title="${escHTML(r[key]||'')}">${escHTML((r[key]||'—').substring(0,30))}</span>`;
        else val=escHTML((r[key]||'').toString().trim()||'—');
        return `<td>${val}</td>`;
      }).join('');
      const stripeClass=weekBands[i]===1?'week-stripe':'';
      return `<tr class="${[r.id===editId?'selected':'',stripeClass].filter(Boolean).join(' ')}">
        <td class="action-cell">
          <button class="row-edit-btn" onclick="editRecord(${r.id})" title="Edit">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="row-del-btn" onclick="requestDelete(${r.id})" title="Delete">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </td>
        ${cells}
      </tr>`;
    }).join('');
  }
  const total=records.length,shown=data.length;
  document.getElementById('recCount').textContent=active?`${shown} of ${total} records`:`${total} record${total!==1?'s':''}`;
}

function sortBy(key){
  if(sortField===key)sortAsc=!sortAsc;else{sortField=key;sortAsc=true;}
  buildTableHeader();renderTable();
}

// ── EXCEL EXPORT ─────────────────────────────────────────────
function exportExcel(){
  if(!records.length){toast('No records to export.','warn');return;}
  const data=sortData(filterData());
  const visCols=colOrder.filter(k=>!hiddenCols.has(k));
  const headers=visCols.map(k=>COL_DEFS.find(c=>c.key===k).label);
  const rows=data.map(r=>visCols.map(k=>{
    if(k==='startDate'||k==='endDate')return fmtDate(r[k]);
    if(k==='factoryName'&&privacyMode)return maskFactory(r[k]);
    if(k==='reportWriting'){
      const raw=r[k]||'';
      return raw.toString().trim().toUpperCase() === 'YES' ? 'Yes' : 
             raw.toString().trim().toUpperCase() === 'NO' ? 'No' : raw;
    }
    return r[k]??'';
  }));

  // Compute week band per row
  let xlBand=0,xlLastWk=null;
  const xlBands=data.map(r=>{
    const wk=isoWeekKey(r.startDate)||isoWeekKey(r.endDate)||'';
    if(wk&&wk!==xlLastWk){xlBand=xlLastWk===null?1:1-xlBand;xlLastWk=wk;}
    return xlBand;
  });

  const ws=XLSX.utils.aoa_to_sheet([headers,...rows]);
  ws['!cols']=headers.map(()=>({wch:20}));

  // Apply grey fill to stripe rows (band===1). Row 1 = header, data starts at row 2.
  const greyFill={patternType:'solid',fgColor:{rgb:'EEF0F6'}};
  const headerFill={patternType:'solid',fgColor:{rgb:'1B4F8A'}};
  const colCount=headers.length;

  // Style header row
  for(let c=0;c<colCount;c++){
    const addr=XLSX.utils.encode_cell({r:0,c});
    if(!ws[addr])ws[addr]={v:headers[c],t:'s'};
    ws[addr].s={fill:headerFill,font:{bold:true,color:{rgb:'FFFFFF'}},alignment:{horizontal:'center'}};
  }
  // Style data rows
  xlBands.forEach((band,i)=>{
    if(band!==1)return;
    for(let c=0;c<colCount;c++){
      const addr=XLSX.utils.encode_cell({r:i+1,c});
      if(!ws[addr])ws[addr]={v:'',t:'s'};
      if(!ws[addr].s)ws[addr].s={};
      ws[addr].s.fill=greyFill;
    }
  });

  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Audit Records');
  XLSX.writeFile(wb,`audit_records_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('Excel exported.','success');
}

// ── EXCEL IMPORT ─────────────────────────────────────────────
function importExcel(ev){
  const file=ev.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array',cellDates:false});
      const ws=wb.Sheets['Program']||wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:true});
      if(rows.length<2){toast('No data found.','warn');return;}
      const headers=rows[0].map(h=>(h||'').toString().trim());
      // Map each FIELD key to its column index by header name
      const headerMap={
        startDate:'Start Date', endDate:'End Date', city:'City', totalDay:'Day',
        program1:'Program', program2:'Program 2', scope:'Scope', auditType:'Type',
        brand:'Brand', reportNo:'Report No', manday:'Manday', reportWriting:'Report',
        transportation:'Transportation',
        factoryName:'Factory Name', sector:'Sector', address:'Address',
        leadAuditor:'Lead / Team', otherAuditor:'Other', otherAuditor2:'Other 2'
      };
      const mapIdx={};
      FIELDS.forEach(f=>{
        const hdr=headerMap[f]||f;
        mapIdx[f]=headers.indexOf(hdr);
      });
      const trMonths={'Ocak':'01','Şubat':'02','Mart':'03','Nisan':'04','Mayıs':'05',
        'Haziran':'06','Temmuz':'07','Ağustos':'08','Eylül':'09','Ekim':'10','Kasım':'11','Aralık':'12'};
      let imported=0;
      rows.slice(1).forEach(row=>{
        if(!row||row.every(c=>c===''||c===null||c===undefined))return;
        const rec={id:Date.now()+Math.random()};
        FIELDS.forEach(f=>{
          let val=mapIdx[f]>=0?row[mapIdx[f]]:'';
          if(f==='startDate'||f==='endDate'){
            if(typeof val==='number'){
              val=toISO(val);
            } else if(typeof val==='string'&&val.trim()){
              val=val.trim().replace(/(\d{1,2})\s+(\w+)\s+(\d{4}).*/,(_,d,m,y)=>{
                const mo=trMonths[m];return mo?`${y}-${mo}-${d.padStart(2,'0')}`:_;
              });
              val=toISO(val)||val;
            } else val='';
          }
          if(f==='reportWriting'){const s=(val||'').toString().trim().toUpperCase();val=(s==='YES'||s==='NO')?s:'';}
          rec[f]=(val??'').toString().trim();
        });
        rec.totalDay=calcTotalDay(rec.startDate,rec.endDate)||rec.totalDay;
        records.push(rec);imported++;
      });
      buildTableHeader();renderTable();
      toast(`Imported ${imported} records.`,'success');
    } catch(err){toast('Error reading Excel file.','warn');console.error(err);}
  };
  reader.readAsArrayBuffer(file);ev.target.value='';
}

// ── JSON ─────────────────────────────────────────────────────
function saveJSON(){
  if(!records.length){toast('No records to save.','warn');return;}
  // Serialize activeFilters (Sets → arrays)
  const filtersSerial={};
  Object.entries(activeFilters).forEach(([k,f])=>{
    filtersSerial[k]={selected:f.selected?[...f.selected]:null};
  });
  const state={
    version:4,
    records,
    colOrder,
    hiddenCols:[...hiddenCols],
    colWidths,
    sortField,
    sortAsc,
    activeFilters:filtersSerial,
    formVisible
  };
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`audit_records_${new Date().toISOString().slice(0,10)}.json`;a.click();
  toast('JSON saved.','success');
}
function loadJSON(ev){
  const file=ev.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const obj=JSON.parse(e.target.result);
      records=Array.isArray(obj)?obj:(obj.records||[]);
      if(obj.colOrder)colOrder=obj.colOrder;
      if(obj.hiddenCols)hiddenCols=new Set(obj.hiddenCols);
      if(obj.colWidths)colWidths=obj.colWidths;
      if(obj.sortField!==undefined)sortField=obj.sortField;
      if(obj.sortAsc!==undefined)sortAsc=obj.sortAsc;
      if(obj.activeFilters){
        activeFilters={};
        Object.entries(obj.activeFilters).forEach(([k,f])=>{
          activeFilters[k]={selected:f.selected?new Set(f.selected):null};
        });
      }
      if(obj.formVisible!==undefined){
        formVisible=obj.formVisible;
        document.getElementById('formPanel').classList.toggle('collapsed',!formVisible);
        document.getElementById('toggleBtn').classList.toggle('open',formVisible);
        document.getElementById('toggleLabel').textContent=formVisible?'Hide':'Show';
      }
      records.forEach(r=>{if(!r.id)r.id=Date.now()+Math.random();});
      clearForm();buildColManager();buildTableHeader();renderTable();
      toast(`Loaded ${records.length} records.`,'success');
    } catch(e){console.error(e);toast('Error reading JSON.','warn');}
  };
  reader.readAsText(file);ev.target.value='';
}

// ── PDF EXPORT ────────────────────────────────────────────────
function exportPDF(){
  if(!records.length){toast('No records to export.','warn');return;}
  const data=sortData(filterData());
  if(!data.length){toast('No records match current filters.','warn');return;}
  const visCols=colOrder.filter(k=>!hiddenCols.has(k));

  // Active filter summary
  let filterDesc='';
  const filterParts=[];
  Object.entries(activeFilters).forEach(([k,f])=>{
    if(!f.selected||!f.selected.size)return;
    const def=COL_DEFS.find(c=>c.key===k);
    const label=def?def.label:k;
    if(def&&def.type==='date'){
      // summarise years/months
      const years=[...new Set([...f.selected].map(iso=>iso.slice(0,4)))].sort();
      filterParts.push(`${label}: ${years.join(', ')}`);
    } else {
      filterParts.push(`${label}: ${[...f.selected].join(', ')}`);
    }
  });
  if(filterParts.length)filterDesc=filterParts.join(' | ');

  // Build HTML for print window
  const colDefs=visCols.map(k=>COL_DEFS.find(c=>c.key===k));
  const headerRow=colDefs.map(d=>`<th>${d.label}</th>`).join('');

  // Compute week stripes for PDF rows
  let pdfBand=0,pdfLastWk=null;
  const pdfBands=data.map(r=>{
    const wk=isoWeekKey(r.startDate)||isoWeekKey(r.endDate)||'';
    if(wk&&wk!==pdfLastWk){pdfBand=pdfLastWk===null?1:1-pdfBand;pdfLastWk=wk;}
    return pdfBand;
  });

  const bodyRows=data.map((r,i)=>{
    const cells=visCols.map(k=>{
      const def=COL_DEFS.find(c=>c.key===k);
      let v='';
      if(def.type==='date')v=fmtDate(r[k])||'—';
      else if(k==='factoryName'&&privacyMode)v=maskFactory(r[k])||'—';
      else if(k==='reportWriting'){
        const raw=r[k]||'';
        v=raw.toString().trim().toUpperCase() === 'YES' ? 'Yes' : 
           raw.toString().trim().toUpperCase() === 'NO' ? 'No' : raw;
      }
      else v=(r[k]||'').toString().trim()||'—';
      return`<td>${v}</td>`;
    }).join('');
    return`<tr class="${pdfBands[i]===1?'ws':''}">${cells}</tr>`;
  }).join('');

  const now=new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"/>
  <title>Audit Records – ${now}</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Segoe UI',system-ui,sans-serif;font-size:10px;color:#1a1f2e;padding:16px;}
    h2{font-size:14px;font-weight:700;color:#1b4f8a;margin-bottom:2px;}
    .meta{font-size:9px;color:#6b7280;margin-bottom:${filterDesc?'4px':'12px'};}
    .filter-info{font-size:9px;color:#854f0b;background:#faeeda;padding:3px 8px;border-radius:4px;margin-bottom:10px;display:inline-block;}
    table{width:100%;border-collapse:collapse;table-layout:fixed;}
    thead th{background:#1b4f8a;color:#fff;padding:5px 6px;text-align:left;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;word-break:break-word;}
    tbody tr{background:#fff;}
    tbody tr.ws{background:#eff1f7;}
    tbody td{padding:4px 6px;border-bottom:1px solid #e8ecf4;font-size:9px;word-break:break-word;vertical-align:top;}
    @page{size:A4 landscape;margin:12mm 8mm;}
    @media print{body{padding:0;}}
  </style></head><body>
  <h2>Audit Program – Records</h2>
  <div class="meta">Generated: ${now} &nbsp;·&nbsp; ${data.length} record${data.length!==1?'s':''} &nbsp;·&nbsp; ${records.length} total</div>
  ${filterDesc?`<div class="filter-info">🔍 Filters active: ${filterDesc}</div>`:''}
  <table><thead><tr>${headerRow}</tr></thead><tbody>${bodyRows}</tbody></table>
  </body></html>`;

  const win=window.open('','_blank','width=900,height=650');
  if(!win){toast('Pop-up blocked. Allow pop-ups and try again.','warn');return;}
  win.document.write(html);
  win.document.close();
  win.focus();
  win.print();
  toast(`PDF ready – ${data.length} records.`,'success');
}

// ── TOAST ─────────────────────────────────────────────────────
function toast(msg,type=''){
  const t=document.createElement('div');
  t.className='toast'+(type?' '+type:'');
  t.innerHTML=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>${msg}`;
  document.getElementById('toastWrap').appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

// ── PRIVACY ────────────────────────────────────────────────────
let privacyMode=false;
function togglePrivacy(){
  privacyMode=document.getElementById('privacyChk').checked;
  const eye=document.getElementById('privacyEye');
  eye.textContent=privacyMode?'🙈':'🙈';
  const lbl=eye.parentElement;
  lbl.style.color=privacyMode?'var(--accent)':'var(--muted)';
  lbl.style.borderColor=privacyMode?'var(--accent)':'var(--border)';
  lbl.style.background=privacyMode?'var(--accent-l)':'var(--surface)';
  renderTable();
}
