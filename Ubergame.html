<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Übergame · Tinder-style German Flashcards</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .game-container {
            max-width: 550px;
            width: 100%;
            margin: 0 auto;
            background: white;
            border-radius: 36px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.4);
            overflow: hidden;
            position: relative;
        }

        .header {
            background: #063970;
            color: white;
            padding: 20px 20px;
            text-align: center;
        }
        .header h1 { font-size: 26px; letter-spacing: -0.5px; }
        .header p { font-size: 13px; opacity: 0.9; }

        .content {
            padding: 20px;
        }

        /* stats row */
        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 10px;
            flex-wrap: wrap;
        }
        .badge {
            background: #eef2ff;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            color: #063970;
        }

        /* SWIPE CARD ZONE */
        .swipe-zone {
            position: relative;
            touch-action: pan-y pinch-zoom;  /* allow vertical scroll but horizontal swipe detected */
            margin-bottom: 20px;
            cursor: grab;
        }
        .swipe-zone:active { cursor: grabbing; }

        .flashcard {
            background: #063970;
            background-image: radial-gradient(circle at 10% 20%, rgba(255,255,255,0.1) 2%, transparent 2.5%);
            background-size: 28px 28px;
            border-radius: 32px;
            padding: 40px 20px;
            min-height: 360px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-shadow: 0 20px 30px -10px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
            position: relative;
            user-select: none;
            color: white;
        }

        .speak-icon {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.35);
            backdrop-filter: blur(6px);
            width: 44px;
            height: 44px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            cursor: pointer;
            z-index: 12;
            transition: 0.2s;
        }
        .speak-icon:active { background: rgba(0,0,0,0.6); transform: scale(0.96);}

        .card-front {
            font-size: 32px;
            font-weight: 800;
            word-break: break-word;
            line-height: 1.3;
            margin-bottom: 12px;
        }

        .card-translation {
            font-size: 24px;
            background: rgba(255,255,255,0.2);
            padding: 12px 18px;
            border-radius: 60px;
            display: inline-block;
            font-weight: 500;
            margin-top: 12px;
        }

        .pronunciation-hint {
            font-size: 15px;
            opacity: 0.8;
            font-style: italic;
            margin-top: 8px;
            letter-spacing: 0.3px;
        }

        .card-badge {
            position: absolute;
            bottom: 16px;
            right: 18px;
            background: rgba(0,0,0,0.4);
            font-size: 11px;
            padding: 4px 12px;
            border-radius: 40px;
            font-weight: 500;
        }

        .swipe-instruction {
            background: #f1f5f9;
            border-radius: 40px;
            padding: 8px 12px;
            text-align: center;
            font-size: 13px;
            font-weight: 500;
            color: #1e293b;
            margin: 12px 0;
        }

        .action-buttons {
            display: flex;
            gap: 18px;
            margin: 12px 0 16px;
        }
        .swipe-action {
            flex: 1;
            padding: 14px 0;
            border-radius: 60px;
            font-weight: 700;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: none;
            background: #f1f5f9;
            color: #0f172a;
            cursor: pointer;
            transition: all 0.2s;
        }
        .swipe-action.left { background: #fee2e2; color: #991b1b; }
        .swipe-action.right { background: #dcfce7; color: #166534; }
        .swipe-action:active { transform: scale(0.97);}

        .reset-group {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        .reset-group button {
            flex: 1;
            padding: 12px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            background: #e9ecef;
            font-size: 14px;
        }

        button { cursor: pointer; }
        .btn-primary { background: #063970; color: white; }

        /* modals / screens */
        #setupScreen, #gameScreen, #loginScreen {
            display: none;
        }
        .active-screen { display: block !important; }

        .login-form { max-width: 300px; margin: 20px auto; }
        .login-form input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 14px; border: 1px solid #ccc; }
    </style>
</head>
<body>
<div class="game-container" id="appRoot">
    <div class="header">
        <h1>🃏 Übergame</h1>
        <p>swipe · learn · repeat</p>
    </div>

    <!-- LOGIN SCREEN (admin only features) -->
    <div id="loginScreen" class="content">
        <div class="login-form">
            <h3 style="color:#063970;">🔐 Admin zone</h3>
            <input type="text" id="adminUser" placeholder="Username">
            <input type="password" id="adminPass" placeholder="Password">
            <button class="btn-primary" id="adminLoginBtn" style="margin-top: 8px;">Login</button>
            <button id="cancelAdminBtn" style="margin-top: 8px; background:#e2e8f0;">Cancel</button>
            <p id="loginFailMsg" style="color:red; font-size:12px; margin-top: 8px; display:none;">Wrong credentials</p>
        </div>
    </div>

    <!-- SETUP SCREEN -->
    <div id="setupScreen" class="content">
        <div style="margin-bottom: 20px;">
            <label style="font-weight:600;">📚 Word group</label>
            <select id="groupSelect" style="width:100%; padding:12px; margin-top:6px; border-radius: 16px;"></select>
        </div>
        <div style="margin-bottom: 20px;">
            <label style="font-weight:600;">🔄 Direction</label>
            <div style="display:flex; gap:12px; margin-top:8px;">
                <label style="background:#eef2ff; padding:8px 16px; border-radius:40px;"><input type="radio" name="dir" value="de-en" checked> DE → EN</label>
                <label style="background:#eef2ff; padding:8px 16px; border-radius:40px;"><input type="radio" name="dir" value="en-de"> EN → DE</label>
            </div>
        </div>
        <div style="margin-bottom: 20px;">
            <label><input type="checkbox" id="showPronounceCheckbox"> 🔊 Show pronunciation</label>
        </div>
        <div id="adminExtra" style="display:none; margin-bottom: 20px; background:#f1f5f9; padding:12px; border-radius: 24px;">
            <label><input type="checkbox" id="mixedModeCheckbox" checked> 🎲 Mixed mode (shuffle deck)</label>
        </div>
        <button id="startGameBtn" class="btn-primary" style="width:100%;">✨ Start swiping ✨</button>
        <button id="viewGrammarBtn" style="width:100%; margin-top:12px; background:#e9ecef;">📖 Grammar notes</button>
        <div id="logoutDiv" style="display:none; margin-top:12px;">
            <button id="logoutBtn" style="width:100%; background:#f1f5f9;">🚪 Logout</button>
        </div>
    </div>

    <!-- GAME SCREEN (swipe) -->
    <div id="gameScreen" class="content">
        <div class="stats-row">
            <span class="badge" id="remainingCount">📇 0 cards</span>
            <span class="badge" id="dirBadge">🇩🇪 → 🇬🇧</span>
        </div>

        <div class="swipe-zone" id="swipeZone">
            <div class="flashcard" id="flashcard">
                <div class="speak-icon" id="speakCardBtn">🔊</div>
                <div class="card-front" id="frontText">Loading...</div>
                <div id="translationContainer" style="display: none;">
                    <div class="card-translation" id="translationText"></div>
                </div>
                <div class="pronunciation-hint" id="pronunciationHint"></div>
                <div class="card-badge" id="cardHintBadge">👇 tap to reveal</div>
            </div>
        </div>

        <div class="swipe-instruction">
            ⬅️ LEFT swipe = needs practice (back to deck) &nbsp;&nbsp;|&nbsp;&nbsp;
            ➡️ RIGHT swipe = learned ✅
        </div>

        <div class="action-buttons">
            <button class="swipe-action left" id="leftSwipeBtn">↩️ Needs practice</button>
            <button class="swipe-action right" id="rightSwipeBtn">✔️ Learned</button>
        </div>

        <div class="reset-group">
            <button id="backToSetupBtn">📋 Change group</button>
            <button id="resetDeckBtn">🔄 Reset deck</button>
        </div>
    </div>

    <!-- simple grammar modal (inline) -->
    <div id="grammarPanel" style="display:none; padding:20px; background:white; border-top:1px solid #ddd;">
        <h3 style="color:#063970;">📘 Grammar snippets</h3>
        <div id="grammarDynamicContent">loading notes...</div>
        <button id="closeGrammarBtn" style="margin-top:16px; width:100%;">← Back to setup</button>
    </div>
</div>

<script>
    // ---------- VOCAB (WORDS_DATA embedded from your original file) ----------
    const WORDS_DATA = [
    {"group": "Exclamations", "german": "Hilfe!", "english": "Help!", "pronunciation": "hil-fe"},
    {"group": "Exclamations", "german": "Halt!", "english": "Stop!", "pronunciation": "halt"},
    {"group": "Exclamations", "german": "Vorsicht!", "english": "Careful!", "pronunciation": "for-ziht"},
    {"group": "Greetings", "german": "Guten Morgen!", "english": "Good morning!", "pronunciation": "gu-tın mor-gen"},
    {"group": "Greetings", "german": "Ich heiße _.", "english": "My name is _.", "pronunciation": "ih hay-se"},
    {"group": "Feelings & States", "german": "Ich habe Hunger.", "english": "I'm hungry.", "pronunciation": "ih haa-be hun-ger"},
    {"group": "Feelings & States", "german": "Ich liebe dich.", "english": "I love you.", "pronunciation": "ih lii-be dih"},
    {"group": "Daily conversation", "german": "Wie viel kostet das?", "english": "How much does that cost?", "pronunciation": "vii fiil kos-tet das"},
    {"group": "Daily conversation", "german": "Ich verstehe dich nicht.", "english": "I don't understand you.", "pronunciation": "ih fer-ştee-e dih niht"},
    {"group": "Time", "german": "Wie spät ist es?", "english": "What time is it?", "pronunciation": "vii şpeet ist es?"},
    {"group": "Time", "german": "Es ist zehn Uhr.", "english": "It is ten o'clock.", "pronunciation": "es ist tseen uur"},
    {"group": "the adjective", "german": "groß", "english": "big / tall", "pronunciation": "groos"},
    {"group": "the noun", "german": "das Buch", "english": "the book", "pronunciation": "das buuh"},
    {"group": "the noun - days", "german": "der Montag", "english": "Monday", "pronunciation": "deyr mo:n-tag"},
    {"group": "the verb", "german": "sprechen", "english": "to speak", "pronunciation": "şpre-hen"},
    {"group": "the adverb", "german": "heute", "english": "today", "pronunciation": "hoy-te"},
    {"group": "the number", "german": "eins", "english": "one", "pronunciation": "aynts"},
    {"group": "the pronoun", "german": "Ich bin", "english": "I am", "pronunciation": "ih bin"}
    ];
    // Grammar dummy notes (compatibility)
    const GRAMMAR_NOTES = [{title:"Basic Word Order", content:"Verb second in main clauses."},{title:"Nominative Case", content:"Subject of the sentence."}];
    const REFERENCE_TABLES = [{title:"Personal Pronouns", data:[["ich","I","ikh"],["du","you","du"]]}];

    // ---------- GAME STATE ----------
    let activeDeck = [];           // remaining cards (objects)
    let currentCardObj = null;
    let showingAnswer = false;
    let showPronounce = false;
    let direction = "de-en";
    let isAdmin = false;
    let mixedModeAdmin = true;
    let selectedGroup = "All";

    // DOM elements
    const setupDiv = document.getElementById('setupScreen');
    const gameDiv = document.getElementById('gameScreen');
    const loginDiv = document.getElementById('loginScreen');
    const grammarPanel = document.getElementById('grammarPanel');
    const frontEl = document.getElementById('frontText');
    const translationContainer = document.getElementById('translationContainer');
    const translationText = document.getElementById('translationText');
    const pronunciationHint = document.getElementById('pronunciationHint');
    const remainingSpan = document.getElementById('remainingCount');
    const dirBadge = document.getElementById('dirBadge');

    // Helper: Shuffle
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // Build fresh deck based on group + admin shuffle setting
    function buildDeck() {
        let filtered = WORDS_DATA.filter(w => selectedGroup === "All" ? true : w.group === selectedGroup);
        if (filtered.length === 0) return [];
        const shouldShuffle = isAdmin ? mixedModeAdmin : true;
        const deckCopy = [...filtered];
        return shouldShuffle ? shuffleArray(deckCopy) : deckCopy;
    }

    function getFrontText(word) { return direction === "de-en" ? word.german : word.english; }
    function getBackText(word) { return direction === "de-en" ? word.english : word.german; }

    function updateCardUI() {
        if (!currentCardObj) return;
        const front = getFrontText(currentCardObj);
        const back = getBackText(currentCardObj);
        if (!showingAnswer) {
            frontEl.style.display = "block";
            frontEl.innerText = front;
            translationContainer.style.display = "none";
        } else {
            frontEl.style.display = "none";
            translationContainer.style.display = "block";
            translationText.innerText = back;
        }
        // pronunciation
        if (showPronounce && currentCardObj.pronunciation) {
            pronunciationHint.innerText = `[${currentCardObj.pronunciation}]`;
            pronunciationHint.style.display = "block";
        } else {
            pronunciationHint.innerText = "";
            pronunciationHint.style.display = "none";
        }
        // update badge
        document.getElementById('cardHintBadge').innerText = showingAnswer ? "👆 tap to hide? (swipe to continue)" : "👇 tap to reveal answer";
        dirBadge.innerText = direction === "de-en" ? "🇩🇪 → 🇬🇧" : "🇬🇧 → 🇩🇪";
    }

    function loadNextCard() {
        if (activeDeck.length === 0) {
            // game finished
            frontEl.style.display = "block";
            frontEl.innerText = "🏆✨ PERFEKT! ✨🏆\nAll cards learned!";
            translationContainer.style.display = "none";
            pronunciationHint.innerText = "";
            remainingSpan.innerText = "🎉 Complete! 0 cards";
            currentCardObj = null;
            return;
        }
        showingAnswer = false;
        currentCardObj = activeDeck[0];
        updateCardUI();
        updateRemainingUI();
    }

    function updateRemainingUI() {
        remainingSpan.innerText = `📚 ${activeDeck.length} card${activeDeck.length !== 1 ? 's' : ''} left`;
    }

    // Swipe actions
    function swipeLeft() {  // needs practice -> move to end
        if (!currentCardObj || activeDeck.length === 0) return;
        const moved = activeDeck.shift();
        activeDeck.push(moved);
        loadNextCard();
    }
    function swipeRight() { // learned -> remove permanently
        if (!currentCardObj || activeDeck.length === 0) return;
        activeDeck.shift();   // remove current
        loadNextCard();
    }

    // reveal answer on tap
    function toggleAnswer() {
        if (!currentCardObj || activeDeck.length === 0) return;
        showingAnswer = !showingAnswer;
        updateCardUI();
    }

    // speak
    function speakCurrent() {
        if (!currentCardObj) return;
        const text = direction === "de-en" ? currentCardObj.german : currentCardObj.english;
        const lang = direction === "de-en" ? "de-DE" : "en-US";
        const synth = window.speechSynthesis;
        synth.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = lang;
        utterance.rate = 0.85;
        setTimeout(() => synth.speak(utterance), 50);
    }

    // start game from settings
    function startGameFromSettings() {
        direction = document.querySelector('input[name="dir"]:checked').value;
        showPronounce = document.getElementById('showPronounceCheckbox').checked;
        if (isAdmin) mixedModeAdmin = document.getElementById('mixedModeCheckbox').checked;
        activeDeck = buildDeck();
        if (activeDeck.length === 0) {
            alert("⚠️ No words in this group. Please select another group.");
            return;
        }
        showingAnswer = false;
        loadNextCard();
        showScreen('gameScreen');
    }

    function resetDeck() {
        activeDeck = buildDeck();
        if (activeDeck.length === 0) {
            alert("No words available after reset.");
            return;
        }
        showingAnswer = false;
        loadNextCard();
    }

    function showScreen(screen) {
        setupDiv.classList.remove('active-screen');
        gameDiv.classList.remove('active-screen');
        loginDiv.classList.remove('active-screen');
        grammarPanel.style.display = 'none';
        if (screen === 'setup') setupDiv.classList.add('active-screen');
        else if (screen === 'game') gameDiv.classList.add('active-screen');
        else if (screen === 'login') loginDiv.classList.add('active-screen');
    }

    // populate groups
    function populateGroups() {
        const groups = new Set();
        WORDS_DATA.forEach(w => { if(w.group) groups.add(w.group); });
        const select = document.getElementById('groupSelect');
        select.innerHTML = '<option value="All">All</option>';
        Array.from(groups).sort().forEach(g => {
            const opt = document.createElement('option');
            opt.value = g;
            opt.textContent = g;
            select.appendChild(opt);
        });
        select.addEventListener('change', (e) => { selectedGroup = e.target.value; });
    }

    // grammar dummy
    function showGrammar() {
        let html = `<div class="grammar-note"><h3>📌 Quick grammar notes</h3><p>Verb second rule, Nominative case, basic sentence structure.</p></div>`;
        if (GRAMMAR_NOTES) GRAMMAR_NOTES.forEach(n => { html += `<div class="grammar-note"><h3>${n.title}</h3><p>${n.content}</p></div>`; });
        if (REFERENCE_TABLES) {
            REFERENCE_TABLES.forEach(t => {
                html += `<div><h4>${t.title}</h4><table style="width:100%; border-collapse:collapse;"><tr><th>German</th><th>English</th></tr>`;
                t.data.forEach(row => { html += `<tr><td>${row[0]}</td><td>${row[1]}</td></tr>`; });
                html += `</table></div>`;
            });
        }
        document.getElementById('grammarDynamicContent').innerHTML = html;
        grammarPanel.style.display = 'block';
        setupDiv.classList.remove('active-screen');
        gameDiv.classList.remove('active-screen');
    }

    // ADMIN LOGIC
    function setupAdmin() {
        const adminLoginBtn = document.getElementById('adminLoginBtn');
        const cancelAdmin = document.getElementById('cancelAdminBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const viewGrammar = document.getElementById('viewGrammarBtn');
        const adminExtraDiv = document.getElementById('adminExtra');
        const logoutDiv = document.getElementById('logoutDiv');

        adminLoginBtn.onclick = () => {
            const user = document.getElementById('adminUser').value;
            const pwd = document.getElementById('adminPass').value;
            if (user === 'Patron' && pwd === '724.Uber') {
                isAdmin = true;
                adminExtraDiv.style.display = 'block';
                logoutDiv.style.display = 'block';
                showScreen('setup');
                document.getElementById('loginFailMsg').style.display = 'none';
            } else {
                document.getElementById('loginFailMsg').style.display = 'block';
            }
        };
        cancelAdmin.onclick = () => { showScreen('setup'); document.getElementById('loginFailMsg').style.display = 'none'; };
        logoutBtn.onclick = () => {
            isAdmin = false;
            adminExtraDiv.style.display = 'none';
            logoutDiv.style.display = 'none';
            showScreen('setup');
        };
        viewGrammar.onclick = () => { showGrammar(); };
        document.getElementById('closeGrammarBtn').onclick = () => { showScreen('setup'); grammarPanel.style.display = 'none'; };
    }

    // ----- SWIPE TOUCH DETECTION (fully working) -----
    function initSwipeDetection() {
        const zone = document.getElementById('swipeZone');
        let touchStartX = 0, touchEndX = 0;
        const minDist = 60;

        zone.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: false });
        zone.addEventListener('touchmove', (e) => {
            // prevent vertical scroll when swiping horizontally
            if (touchStartX) {
                const deltaX = Math.abs(e.changedTouches[0].screenX - touchStartX);
                if (deltaX > 15) e.preventDefault();
            }
        }, { passive: false });
        zone.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            const diff = touchEndX - touchStartX;
            if (Math.abs(diff) >= minDist) {
                if (diff > 0) swipeRight();
                else swipeLeft();
                e.preventDefault();
            }
            touchStartX = 0;
        });
    }

    // add all button listeners
    function bindUI() {
        document.getElementById('startGameBtn').onclick = () => { startGameFromSettings(); };
        document.getElementById('backToSetupBtn').onclick = () => { showScreen('setup'); };
        document.getElementById('resetDeckBtn').onclick = () => { resetDeck(); };
        document.getElementById('leftSwipeBtn').onclick = () => { swipeLeft(); };
        document.getElementById('rightSwipeBtn').onclick = () => { swipeRight(); };
        document.getElementById('speakCardBtn').onclick = (e) => { e.stopPropagation(); speakCurrent(); };
        const cardDiv = document.getElementById('flashcard');
        cardDiv.addEventListener('click', (e) => {
            if (e.target.classList.contains('speak-icon')) return;
            toggleAnswer();
        });
        // floating admin button inside setup? we have login button at top? we add a floating button?
        const loginFloater = document.createElement('button');
        loginFloater.innerText = '🔐';
        loginFloater.style.position = 'fixed';
        loginFloater.style.bottom = '24px';
        loginFloater.style.right = '24px';
        loginFloater.style.backgroundColor = '#063970';
        loginFloater.style.color = 'white';
        loginFloater.style.border = 'none';
        loginFloater.style.borderRadius = '50px';
        loginFloater.style.width = '52px';
        loginFloater.style.height = '52px';
        loginFloater.style.fontSize = '24px';
        loginFloater.style.boxShadow = '0 6px 14px rgba(0,0,0,0.3)';
        loginFloater.style.cursor = 'pointer';
        loginFloater.style.zIndex = '999';
        loginFloater.onclick = () => { showScreen('login'); };
        document.body.appendChild(loginFloater);
        // ensure grammar back button works after panel
        const closeGrammar = document.getElementById('closeGrammarBtn');
        if(closeGrammar) closeGrammar.onclick = () => { grammarPanel.style.display = 'none'; showScreen('setup'); };
    }

    // initial load
    function init() {
        populateGroups();
        setupAdmin();
        bindUI();
        initSwipeDetection();
        showScreen('setup');
        // default direction badge
        dirBadge.innerText = "🇩🇪 → 🇬🇧";
        selectedGroup = 'All';
        document.getElementById('groupSelect').value = 'All';
    }
    init();
</script>
</body>
</html>
