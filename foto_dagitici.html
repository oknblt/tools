<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Foto Dağıtıcı</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#eef1f5;color:#1c2733;display:flex;flex-direction:column;overflow:hidden;}
button{font-family:inherit;border:none;cursor:pointer;}

/* ---------- header ---------- */
.top{background:#1a3a5c;color:#fff;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0;}
.top .title{font-size:15px;font-weight:700;}
.top .prog{font-size:13px;background:rgba(255,255,255,.15);padding:4px 10px;border-radius:12px;white-space:nowrap;}
.top .icon-btn{background:rgba(255,255,255,.15);color:#fff;border-radius:8px;padding:6px 10px;font-size:13px;font-weight:600;}

/* ---------- screens ---------- */
.screen{flex:1;display:none;flex-direction:column;overflow:hidden;}
.screen.active{display:flex;}

/* ---------- start ---------- */
#startScreen{justify-content:center;align-items:center;padding:24px;gap:14px;text-align:center;}
#startScreen h1{font-size:20px;color:#1a3a5c;}
#startScreen p{font-size:14px;color:#5a6b7d;max-width:320px;line-height:1.5;}
.big-btn{background:#1a3a5c;color:#fff;font-size:16px;font-weight:700;padding:16px 28px;border-radius:12px;width:100%;max-width:340px;}
.big-btn.secondary{background:#fff;color:#1a3a5c;border:2px solid #1a3a5c;}
.big-btn:disabled{opacity:.5;}
#ingestStatus{font-size:13px;color:#5a6b7d;}

/* ---------- sorter ---------- */
#photoBox{flex-shrink:0;height:34vh;background:#0d1620;display:flex;align-items:center;justify-content:center;position:relative;}
#photoBox img{max-width:100%;max-height:100%;object-fit:contain;}
#photoBox .badge{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.55);color:#fff;font-size:12px;padding:3px 9px;border-radius:10px;}
#photoBox .assigned-tag{position:absolute;bottom:8px;left:8px;right:8px;background:rgba(26,58,92,.9);color:#fff;font-size:13px;font-weight:600;padding:5px 10px;border-radius:8px;text-align:center;display:none;}
.quick-row{display:flex;gap:6px;padding:8px 10px 0 10px;flex-shrink:0;}
.quick-row button{flex:1;padding:10px 6px;border-radius:10px;font-size:13px;font-weight:700;}
#sameBtn{background:#0d7a4f;color:#fff;flex:2.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#sameBtn:disabled{background:#b9c4cf;}
#undoBtn{background:#fff;color:#1a3a5c;border:1.5px solid #b9c4cf;}
#skipBtn{background:#fff;color:#1a3a5c;border:1.5px solid #b9c4cf;}
.search-wrap{padding:8px 10px;flex-shrink:0;}
#search{width:100%;font-size:16px;padding:12px 14px;border:2px solid #1a3a5c;border-radius:12px;background:#fff;outline:none;}
#folderList{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 10px 14px 10px;display:flex;flex-direction:column;gap:6px;}
.folder-btn{background:#fff;border:1px solid #d5dde5;border-radius:10px;padding:12px 14px;font-size:15px;text-align:left;color:#1c2733;flex-shrink:0;}
.folder-btn b{color:#0d7a4f;}
.folder-btn .cnt{float:right;color:#8394a5;font-size:13px;}
.folder-btn.recent{border-left:4px solid #0d7a4f;}
.add-folder-btn{background:#fff7e6;border:1.5px dashed #d49a2a;border-radius:10px;padding:12px 14px;font-size:14px;font-weight:600;color:#8a6410;text-align:left;flex-shrink:0;}
.list-label{font-size:12px;font-weight:700;color:#8394a5;text-transform:uppercase;letter-spacing:.5px;padding:6px 2px 0 2px;flex-shrink:0;}

/* ---------- review ---------- */
#reviewList{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;align-content:start;}
.rev-item{background:#fff;border-radius:10px;overflow:hidden;border:1px solid #d5dde5;position:relative;}
.rev-item img{width:100%;aspect-ratio:1;object-fit:cover;display:block;}
.rev-item .lbl{font-size:10px;padding:4px 5px;line-height:1.25;color:#1c2733;min-height:30px;word-break:break-word;}
.rev-item.unassigned .lbl{color:#c0392b;font-weight:700;}
.rev-bar{padding:10px;flex-shrink:0;display:flex;gap:8px;}
.rev-bar button{flex:1;padding:13px;border-radius:10px;font-size:14px;font-weight:700;}

/* ---------- done ---------- */
#doneScreen{justify-content:center;align-items:center;padding:24px;gap:12px;text-align:center;}
#doneScreen h2{color:#1a3a5c;font-size:19px;}
#doneSummary{font-size:14px;color:#5a6b7d;line-height:1.5;max-height:30vh;overflow-y:auto;background:#fff;border-radius:10px;padding:10px 14px;width:100%;max-width:340px;text-align:left;}
#zipStatus{font-size:13px;color:#5a6b7d;min-height:18px;}
</style>
</head>
<body>

<div class="top">
  <div class="title">Foto Dağıtıcı</div>
  <div class="prog" id="progress">–</div>
  <button class="icon-btn" id="reviewBtn" style="display:none;">Liste</button>
</div>

<!-- START -->
<div class="screen active" id="startScreen">
  <h1>Fotoğrafları klasörlere dağıt</h1>
  <p>Galeriden fotoğrafları seçin, her birine klasörünü atayın, sonunda klasörlü ZIP olarak indirin.</p>
  <input type="file" id="fileInput" accept="image/*" multiple style="display:none;">
  <button class="big-btn" id="pickBtn">Galeriden fotoğraf seç</button>
  <button class="big-btn secondary" id="resumeBtn" style="display:none;"></button>
  <div id="ingestStatus"></div>
</div>

<!-- SORTER -->
<div class="screen" id="sortScreen">
  <div id="photoBox">
    <img id="curPhoto" alt="">
    <div class="badge" id="photoBadge"></div>
    <div class="assigned-tag" id="assignedTag"></div>
  </div>
  <div class="quick-row">
    <button id="undoBtn">↩ Geri al</button>
    <button id="sameBtn" disabled>Öncekiyle aynı</button>
    <button id="skipBtn">Atla ›</button>
  </div>
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Klasör ara (baş harfi yazın)…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
  </div>
  <div id="folderList"></div>
</div>

<!-- REVIEW -->
<div class="screen" id="reviewScreen">
  <div id="reviewList"></div>
  <div class="rev-bar">
    <button style="background:#fff;color:#1a3a5c;border:1.5px solid #b9c4cf;" id="backToSortBtn">‹ Dağıtıma dön</button>
    <button style="background:#fff;color:#1a3a5c;border:1.5px solid #b9c4cf;" id="addMoreBtn">+ Foto ekle</button>
    <button style="background:#1a3a5c;color:#fff;" id="finishBtn">Bitir → ZIP</button>
  </div>
</div>

<!-- DONE -->
<div class="screen" id="doneScreen">
  <h2>Dağıtım tamamlandı</h2>
  <div id="doneSummary"></div>
  <div id="zipStatus"></div>
  <button class="big-btn" id="zipBtn">ZIP indir</button>
  <button class="big-btn secondary" id="backBtn">‹ Geri dön</button>
  <button class="big-btn secondary" id="newSessionBtn" style="border-color:#c0392b;color:#c0392b;">Yeni oturum (her şeyi sil)</button>
</div>

<script>
/* ===================== FOLDERS ===================== */
const FOLDERS = [
"Air conditioning","An employee with his PPE","Anti-slippery bands","Assembly point",
"Body and eye wash station","Boiler room","BSCI COC","BSCI Speak for Change poster",
"Chemical spill kit","Chemical warehouse","Compressor room","Cutting section",
"Disinfectant","Doctor room","Dye preparation section","Dyeing section",
"Ear plugs","Electricity panel","Embroidery section","Emergency case equipment",
"Emergency exit door","Emergency exit route","Emergency exit sign","Emergency lighting",
"Emergency stop button","Evacuation plan","Eye guard on overlock machine","Eye wash solutions",
"Eye wash station","Facility sign","Finger guard on sewing machine","Finishing section",
"Fire alarm button","Fire alarm control panel","Fire extinguisher","Fire hose cabinet",
"Fire hydrant","Fire-escape stairs","Firefighting system for the hood","First aid box",
"First aid materials","Fixing machine","Gas dedector","Generator",
"Hazardous waste storage area","Ironing section","Kitchen","Knitting section",
"Locker room","Lunch hall","MSDS","Non-hazardous waste storage area",
"Notice board","Packaging section","Potable water","PPE",
"Prayer room","Printing section","Production area","Quality control section",
"Refrigant gas","Refrigerant device","Rest area","Sampling section",
"SDS summaries","Secondary containment","Sewing section","Smoke detector",
"Spraying section","Sprinkler system","Stain removing section","Steel glove",
"Steel toe shoes","Stenter","Storage area","Stretcher",
"Suggestion box","The lateral view of the facility","The out view of the facility","The rear view of the facility",
"Time recording device","Toilet","Turnstiles with time recording device","Ventilation system",
"Visual fire alarm","Warehouse","Warning signs","Washing section",
"Waste boxes","Wastewater treatment unit","Weaving section","Yarn production",
"Yarn removing section"
];
let customFolders = [];   // eklenen yeni klasörler
const MAX_SIDE = 1400, JPEG_Q = 0.82;

/* ===================== STATE ===================== */
let photos = [];          // {id, blob, url, folder|null, order}
let curIdx = -1;
let lastFolder = null;
let recents = [];         // en son kullanılan klasörler
let undoStack = [];       // {photoId, prevFolder}

const $ = id => document.getElementById(id);
const screens = ['startScreen','sortScreen','reviewScreen','doneScreen'];
function showScreen(name){
  screens.forEach(s => $(s).classList.toggle('active', s===name));
  $('reviewBtn').style.display = (name==='sortScreen') ? '' : 'none';
}

/* ===================== INDEXEDDB (otomatik kayıt) ===================== */
let db = null;
function openDB(){
  return new Promise((res)=>{
    const rq = indexedDB.open('fotoDagitici', 1);
    rq.onupgradeneeded = e => {
      const d = e.target.result;
      if(!d.objectStoreNames.contains('photos')) d.createObjectStore('photos',{keyPath:'id'});
      if(!d.objectStoreNames.contains('meta')) d.createObjectStore('meta',{keyPath:'k'});
    };
    rq.onsuccess = e => { db = e.target.result; res(true); };
    rq.onerror = () => res(false);
  });
}
function dbPut(store, obj){ if(!db) return; try{ db.transaction(store,'readwrite').objectStore(store).put(obj); }catch(e){} }
function dbDel(store, key){ if(!db) return; try{ db.transaction(store,'readwrite').objectStore(store).delete(key); }catch(e){} }
function dbAll(store){
  return new Promise(res=>{
    if(!db){ res([]); return; }
    try{
      const rq = db.transaction(store,'readonly').objectStore(store).getAll();
      rq.onsuccess = ()=>res(rq.result||[]); rq.onerror = ()=>res([]);
    }catch(e){ res([]); }
  });
}
function dbClear(){ if(!db) return; try{ const t=db.transaction(['photos','meta'],'readwrite'); t.objectStore('photos').clear(); t.objectStore('meta').clear(); }catch(e){} }
function saveMeta(){ dbPut('meta',{k:'s', lastFolder, recents, customFolders}); }
function savePhoto(p){ dbPut('photos',{id:p.id, blob:p.blob, folder:p.folder, order:p.order}); }

/* ===================== FOTO ALMA + KÜÇÜLTME ===================== */
function normalizeFile(file){
  return new Promise(resolve=>{
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        try{
          const w = img.naturalWidth||img.width, h = img.naturalHeight||img.height;
          if(!w||!h){ resolve(null); return; }
          const s = Math.min(1, MAX_SIDE/Math.max(w,h));
          const c = document.createElement('canvas');
          c.width = Math.round(w*s); c.height = Math.round(h*s);
          const ctx = c.getContext('2d');
          ctx.imageSmoothingEnabled = true;
          try{ ctx.imageSmoothingQuality='high'; }catch(err){}
          ctx.drawImage(img,0,0,c.width,c.height);   // EXIF yönü piksele işlenir
          if(c.toBlob) c.toBlob(b=>resolve(b), 'image/jpeg', JPEG_Q);
          else {
            const d = c.toDataURL('image/jpeg', JPEG_Q);
            fetch(d).then(r=>r.blob()).then(resolve).catch(()=>resolve(null));
          }
        }catch(err){ resolve(null); }
      };
      img.onerror = ()=>resolve(null);
      img.src = e.target.result;
    };
    reader.onerror = ()=>resolve(null);
    reader.readAsDataURL(file);
  });
}

async function ingestFiles(fileList){
  const files = Array.from(fileList).filter(f=>f.type.startsWith('image/'));
  if(!files.length) return;
  $('pickBtn').disabled = true;
  let startOrder = photos.length ? Math.max(...photos.map(p=>p.order))+1 : 0;
  for(let i=0;i<files.length;i++){
    $('ingestStatus').textContent = 'Fotoğraflar hazırlanıyor… '+(i+1)+' / '+files.length;
    const blob = await normalizeFile(files[i]);
    if(blob){
      const p = { id: Date.now()+'_'+Math.random().toString(36).slice(2,7),
                  blob, url: URL.createObjectURL(blob), folder: null, order: startOrder++ };
      photos.push(p); savePhoto(p);
    }
  }
  $('ingestStatus').textContent = '';
  $('pickBtn').disabled = false;
  if(photos.length){ gotoNextUnassigned(); showScreen('sortScreen'); renderAll(); }
}

/* ===================== SIRALAMA / ATAMA ===================== */
function unassignedCount(){ return photos.filter(p=>!p.folder).length; }
function gotoNextUnassigned(fromIdx){
  const n = photos.length;
  const start = (typeof fromIdx==='number' ? fromIdx : curIdx);
  for(let step=1; step<=n; step++){
    const i = (start+step+n) % n;
    if(!photos[i].folder){ curIdx = i; return; }
  }
  curIdx = Math.min(Math.max(curIdx,0), n-1);   // hepsi atanmış
}
function assign(folder){
  if(curIdx<0 || !photos[curIdx]) return;
  const p = photos[curIdx];
  undoStack.push({photoId:p.id, prevFolder:p.folder});
  p.folder = folder; savePhoto(p);
  lastFolder = folder;
  recents = [folder, ...recents.filter(f=>f!==folder)].slice(0,6);
  saveMeta();
  $('search').value = '';
  if(unassignedCount()===0){ openDone(); return; }
  gotoNextUnassigned(); renderAll();
}
function undo(){
  const u = undoStack.pop();
  if(!u) return;
  const i = photos.findIndex(p=>p.id===u.photoId);
  if(i<0) return;
  photos[i].folder = u.prevFolder; savePhoto(photos[i]);
  curIdx = i; renderAll();
}
function skip(){ gotoNextUnassigned(); renderAll(); }

/* ===================== ARAMA + LİSTE ===================== */
function allFolders(){ return FOLDERS.concat(customFolders); }
function folderCounts(){
  const m = {};
  photos.forEach(p=>{ if(p.folder) m[p.folder]=(m[p.folder]||0)+1; });
  return m;
}
function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function highlight(name, q){
  if(!q) return escapeHtml(name);
  const i = name.toLowerCase().indexOf(q.toLowerCase());
  if(i<0) return escapeHtml(name);
  return escapeHtml(name.slice(0,i)) + '<b>' + escapeHtml(name.slice(i,i+q.length)) + '</b>' + escapeHtml(name.slice(i+q.length));
}
function renderFolderList(){
  const q = $('search').value.trim();
  const counts = folderCounts();
  const box = $('folderList');
  let html = '';
  let list;
  if(q){
    const ql = q.toLowerCase();
    const starts = [], wordStarts = [], contains = [];
    allFolders().forEach(f=>{
      const fl = f.toLowerCase();
      if(fl.startsWith(ql)) starts.push(f);
      else if(fl.split(/[\s-]+/).some(w=>w.startsWith(ql))) wordStarts.push(f);
      else if(fl.includes(ql)) contains.push(f);
    });
    list = starts.concat(wordStarts, contains);
    if(!list.length){
      html += '<button class="add-folder-btn" data-add="'+escapeHtml(q)+'">➕ "'+escapeHtml(q)+'" adında yeni klasör ekle</button>';
    }
  } else {
    if(recents.length){
      html += '<div class="list-label">Son kullanılanlar</div>';
      recents.forEach(f=>{
        html += '<button class="folder-btn recent" data-f="'+escapeHtml(f)+'">'+escapeHtml(f)+(counts[f]?'<span class="cnt">'+counts[f]+' foto</span>':'')+'</button>';
      });
      html += '<div class="list-label">Tüm klasörler</div>';
    }
    list = allFolders();
  }
  (list||[]).forEach(f=>{
    html += '<button class="folder-btn" data-f="'+escapeHtml(f)+'">'+highlight(f,q)+(counts[f]?'<span class="cnt">'+counts[f]+' foto</span>':'')+'</button>';
  });
  box.innerHTML = html;
}
$('folderList').addEventListener('click', e=>{
  const add = e.target.closest('[data-add]');
  if(add){
    const name = add.getAttribute('data-add');
    if(!allFolders().includes(name)){ customFolders.push(name); saveMeta(); }
    assign(name); return;
  }
  const btn = e.target.closest('[data-f]');
  if(btn) assign(btn.getAttribute('data-f'));
});
$('search').addEventListener('input', renderFolderList);

/* ===================== EKRAN GÜNCELLEME ===================== */
function renderSorter(){
  if(curIdx<0 || !photos[curIdx]) return;
  const p = photos[curIdx];
  $('curPhoto').src = p.url;
  $('photoBadge').textContent = 'Foto '+(p.order+1)+' / '+photos.length;
  const tag = $('assignedTag');
  if(p.folder){ tag.style.display='block'; tag.textContent = '✓ '+p.folder+' (değiştirmek için yeni klasör seçin)'; }
  else tag.style.display='none';
  $('sameBtn').disabled = !lastFolder;
  $('sameBtn').textContent = lastFolder ? ('Öncekiyle aynı: '+lastFolder) : 'Öncekiyle aynı';
  $('undoBtn').disabled = !undoStack.length;
}
function renderProgress(){
  const total = photos.length, done = total - unassignedCount();
  $('progress').textContent = total ? (done+' / '+total+' atandı') : '–';
}
function renderAll(){ renderSorter(); renderProgress(); renderFolderList(); }

/* ===================== LİSTE (REVIEW) ===================== */
function openReview(){
  const box = $('reviewList');
  box.innerHTML = '';
  photos.slice().sort((a,b)=>a.order-b.order).forEach(p=>{
    const d = document.createElement('div');
    d.className = 'rev-item'+(p.folder?'':' unassigned');
    d.innerHTML = '<img src="'+p.url+'" alt=""><div class="lbl">'+(p.folder?escapeHtml(p.folder):'Atanmadı')+'</div>';
    d.addEventListener('click', ()=>{
      curIdx = photos.findIndex(x=>x.id===p.id);
      showScreen('sortScreen'); renderAll();
    });
    box.appendChild(d);
  });
  showScreen('reviewScreen');
}
$('reviewBtn').addEventListener('click', openReview);
$('backToSortBtn').addEventListener('click', ()=>{ showScreen('sortScreen'); renderAll(); });
$('addMoreBtn').addEventListener('click', ()=>$('fileInput').click());
$('finishBtn').addEventListener('click', openDone);

/* ===================== BİTİŞ + ZIP ===================== */
function grouped(){
  const g = {};
  photos.slice().sort((a,b)=>a.order-b.order).forEach(p=>{
    if(!p.folder) return;
    (g[p.folder] = g[p.folder]||[]).push(p);
  });
  const order = allFolders().filter(f=>g[f]);
  return {g, order};
}
function openDone(){
  const {g, order} = grouped();
  const un = unassignedCount();
  let html = '';
  order.forEach(f=>{ html += '<div>'+escapeHtml(f)+' — <b>'+g[f].length+'</b></div>'; });
  if(un) html += '<div style="color:#c0392b;font-weight:700;margin-top:6px;">⚠ '+un+' foto atanmadı (ZIP\'e girmez)</div>';
  if(!order.length) html = '<div>Henüz atama yapılmadı.</div>';
  $('doneSummary').innerHTML = html;
  $('zipBtn').disabled = !order.length;
  $('zipStatus').textContent = '';
  showScreen('doneScreen');
}
$('zipBtn').addEventListener('click', async ()=>{
  if(typeof JSZip === 'undefined'){ $('zipStatus').textContent = 'ZIP kütüphanesi yüklenemedi. İnternet bağlantısını kontrol edip sayfayı yenileyin.'; return; }
  $('zipBtn').disabled = true;
  $('zipStatus').textContent = 'ZIP hazırlanıyor…';
  try{
    const zip = new JSZip();
    const {g, order} = grouped();
    order.forEach(f=>{
      g[f].forEach((p,i)=>{
        const name = i===0 ? (f+'.jpg') : (f+'_'+(i+1)+'.jpg');
        zip.folder(f).file(name, p.blob);
      });
    });
    const blob = await zip.generateAsync({type:'blob', compression:'STORE'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    const d = new Date(), pad = n=>String(n).padStart(2,'0');
    a.download = 'foto_rapor_'+d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+'_'+pad(d.getHours())+pad(d.getMinutes())+'.zip';
    document.body.appendChild(a); a.click(); a.remove();
    $('zipStatus').textContent = 'ZIP indirildi ('+(blob.size/1048576).toFixed(1)+' MB). Dosyalar uygulamasından ulaşabilirsiniz.';
  }catch(e){
    $('zipStatus').textContent = 'ZIP oluşturulurken hata oluştu: '+e.message;
  }
  $('zipBtn').disabled = false;
});
$('backBtn').addEventListener('click', ()=>{
  if(unassignedCount()>0){ showScreen('sortScreen'); renderAll(); } else openReview();
});
$('newSessionBtn').addEventListener('click', ()=>{
  if(!confirm('Tüm fotoğraflar ve atamalar silinecek. Emin misiniz?')) return;
  photos.forEach(p=>URL.revokeObjectURL(p.url));
  photos = []; curIdx = -1; lastFolder = null; recents = []; undoStack = []; customFolders = [];
  dbClear();
  $('resumeBtn').style.display = 'none';
  showScreen('startScreen'); renderProgress();
});

/* ===================== BAŞLANGIÇ ===================== */
$('pickBtn').addEventListener('click', ()=>$('fileInput').click());
$('fileInput').addEventListener('change', e=>{ ingestFiles(e.target.files); e.target.value=''; });

/* çift dokunma yakınlaşmasını engelle */
let _lt = 0;
document.addEventListener('touchend', function(e){
  const now = Date.now();
  if(now-_lt < 350 && !e.target.closest('input')) e.preventDefault();
  _lt = now;
}, {passive:false});
document.addEventListener('dblclick', e=>e.preventDefault());

(async function init(){
  await openDB();
  const saved = await dbAll('photos');
  const meta = await dbAll('meta');
  if(meta.length && meta[0]){
    lastFolder = meta[0].lastFolder||null;
    recents = meta[0].recents||[];
    customFolders = meta[0].customFolders||[];
  }
  if(saved.length){
    photos = saved.sort((a,b)=>a.order-b.order).map(r=>({
      id:r.id, blob:r.blob, url:URL.createObjectURL(r.blob), folder:r.folder||null, order:r.order
    }));
    const done = photos.length - unassignedCount();
    const rb = $('resumeBtn');
    rb.style.display = '';
    rb.textContent = 'Devam et ('+photos.length+' foto, '+done+' atanmış)';
    rb.addEventListener('click', ()=>{
      gotoNextUnassigned(-1);
      showScreen('sortScreen'); renderAll();
    });
  }
  renderProgress();
})();
</script>
</body>
</html>
