<script>
(function() {
  const DOCS = {
    official: [
      { name: 'Trade registry gazette entry' },
      { name: 'Tax plate' },
      { name: 'Workplace opening and operating license', addable: true },
      { name: 'Fire department report', scope: 'ICS', addable: true },
      { name: 'Building permit', addable: true },
      { name: 'Occupancy permit', scope: 'ICS', addable: true },
      { name: 'Building registration certificate', addable: true },
    ],
    hs: [
      { name: 'Evacuation plan' },
      { name: 'Fire equipment control list', scope: 'ICS' },
      { name: 'Fire installation annual inspection report', scope: 'ICS', expiryRule: { type: 'edate', months: 12 } },
      { name: 'Fire extinguishing training records', scope: 'ICS', expiryRule: { type: 'edate', months: 12 } },
      { name: 'Emergency evacuation drill records', scope: 'ICS', expiryRule: { type: 'edate', months: 12 } },
      { name: 'Emergency plan and emergency team lists',
        expiryRule: { type: 'hazard', months: { 'low hazardous': 72, 'hazardous': 48, 'very hazardous': 24 } } },
      { name: 'Employee representative election records', scope: 'ICS' },
      { name: 'OHS board meeting minutes', scope: 'ICS' },
      { name: 'OHS specialist contract / assignment letter' },
      { name: 'Doctor contract / assignment letter' },
      { name: 'Risk assessment', scope: 'ICS',
        expiryRule: { type: 'hazard', months: { 'low hazardous': 72, 'hazardous': 48, 'very hazardous': 24 } } },
      { name: 'Steam boiler annual inspection report', scope: 'ICS', expiryRule: { type: 'edate', months: 12 } },
      { name: 'Compressor annual inspection report', scope: 'ICS', expiryRule: { type: 'edate', months: 12 } },
      { name: 'Hydrophore annual inspection report', scope: 'ICS', expiryRule: { type: 'edate', months: 12 } },
      { name: 'Elevator annual inspection report', expiryRule: { type: 'edate', months: 12 } },
      { name: 'Hoist annual inspection report', expiryRule: { type: 'edate', months: 12 } },
      { name: 'Crane annual inspection report', expiryRule: { type: 'edate', months: 12 } },
      { name: 'Forklift annual inspection report', scope: 'ICS', expiryRule: { type: 'edate', months: 12 } },
      { name: 'Pallet truck annual inspection report', scope: 'ICS', expiryRule: { type: 'edate', months: 12 } },
      { name: 'Industrial rack system annual inspection report', expiryRule: { type: 'edate', months: 12 } },
      { name: 'Other equipment maintenance and inspection reports', expiryRule: { type: 'edate', months: 12 } },
      { name: 'Ventilation installation annual inspection report', expiryRule: { type: 'edate', months: 12 } },
      { name: 'Electrical installation grounding report', scope: 'ICS', expiryRule: { type: 'edate', months: 12 } },
      { name: 'Lightning rod grounding report', expiryRule: { type: 'edate', months: 12 } },
      { name: 'Electrical internal installation control report', expiryRule: { type: 'edate', months: 12 } },
      { name: 'Drinking water analysis report', scope: 'ICS', expiryRule: { type: 'edate', months: 12 } },
      { name: 'Illumination indoor measurement report' },
      { name: 'Dust indoor measurement report' },
      { name: 'Noise indoor measurement report' },
      { name: 'Thermal comfort indoor measurement report' },
      { name: 'Volatile organic compound (VOC) indoor measurement report' },
      { name: 'Vibration indoor measurement report' },
      { name: 'Work accident records', scope: 'ICS' },
      { name: 'First aid certificates', scope: 'ICS', expiryRule: { type: 'edate', months: 36 } },
      { name: 'OHS training records — last periodic training date', scope: 'ICS',
        expiryRule: { type: 'hazard', months: { 'low hazardous': 36, 'hazardous': 24, 'very hazardous': 12 } } },
      { name: 'Boiler operator certificate' },
      { name: 'Forklift / crane operator certificate' },
      { name: 'Hygiene training records' },
      { name: 'Daycare agreement' },
      { name: 'Earthquake performance analysis report (for buildings pre-19.08.2008)' },
      { name: 'Hazardous material activity certificate' },
      { name: 'Explosion protection document' },
    ],
    env: [
      { name: 'Environmental permit or exemption letter',
        expiryRule: { type: 'conditional_exempt', months: 60 } },
      { name: 'EIA opinion' },
      { name: 'Environmental aspect analysis' },
      { name: 'Discharge quality control license', expiryRule: { type: 'edate', months: 36 } },
      { name: 'Wastewater analysis report' },
      { name: 'Emission report' },
      { name: 'Industrial waste management plan' },
      { name: 'Annual waste declaration' },
      { name: 'Temporary waste storage permit' },
      { name: 'MOTAT records' },
      { name: 'Environmental training', expiryRule: { type: 'edate', months: 12 } },
      { name: 'Zero waste certificate', expiryRule: { type: 'edate', months: 60 } },
      { name: 'Monthly evaluation report' },
      { name: 'Internal audit report' },
      { name: 'BEKRA declaration' },
    ],
    sc: [
      { name: 'Social compliance training' },
      { name: 'Meeting with employee representatives' },
      { name: 'Internal audit' },
      { name: 'Suggestion and complaint box records' },
    ],
    ics: [
      { name: 'Drill duration' },
      { name: 'Fire extinguisher count' },
      { name: 'Fire cabinet count' },
      { name: 'Internal control of smoke detectors' },
      { name: 'Internal control of hydrants' },
      { name: 'Province' },
      { name: 'Turnover rate' },
      { name: 'Tenure duration' },
      { name: 'Hiring rate' },
      { name: 'Highest weekly overtime hours' },
      { name: 'Month with highest overtime' },
      { name: 'Maximum consecutive working days' },
      { name: 'How many times occurred' },
    ],
    bsci: [
      { name: 'Annual management review meeting' },
      { name: 'BSCI committee meeting period' },
      { name: 'BSCI committee meeting' },
      { name: 'BSCI training' },
      { name: 'Internal audit' },
      { name: 'Employee satisfaction survey' },
    ],
  };

  function buildRow(sectionKey, idx, item, opts) {
    opts = opts || {};
    const rowId = opts.rowId || `${sectionKey}_${idx}`;
    const isExtra = !!opts.isExtra;
    const row = document.createElement('div');
    row.className = 'doc-row';
    row.dataset.rowId = rowId;
    if (isExtra) row.dataset.extra = '1';

    const nameCell = document.createElement('div');
    nameCell.className = 'doc-name';

    // OK tick (manuel "kontrol edildi" işareti)
    const okBtn = document.createElement('button');
    okBtn.type = 'button';
    okBtn.className = 'doc-ok';
    okBtn.dataset.docKey = `${rowId}_ok`;
    okBtn.title = 'Mark as checked (covered)';
    okBtn.innerHTML = '<svg viewBox="0 0 16 16"><path d="M3 8l3 3 7-7"/></svg>';
    okBtn.addEventListener('click', () => {
      const cur = okBtn.dataset.value === '1';
      okBtn.dataset.value = cur ? '' : '1';
      okBtn.classList.toggle('on', !cur);
      if (window.CAP && window.CAP.recalcAll) window.CAP.recalcAll();
    });

    const nameText = document.createElement('span');
    nameText.className = 'doc-name-text';
    nameText.innerHTML = (item.scope ? `<span class="scope-badge">${item.scope}</span>` : '') + item.name;

    nameCell.append(okBtn, nameText);

    // + butonu (sadece ana addable satırlarda, extra'larda gözükmez)
    if (item.addable && !isExtra) {
      const addBtn = document.createElement('button');
      addBtn.type = 'button';
      addBtn.className = 'doc-add';
      addBtn.title = 'Add another row';
      addBtn.textContent = '+';
      addBtn.addEventListener('click', () => addExtraRow(sectionKey, idx, item, row));
      nameCell.appendChild(addBtn);
    }
    // − butonu (sadece extra satırlarda)
    if (isExtra) {
      const delBtn = document.createElement('button');
      delBtn.type = 'button';
      delBtn.className = 'doc-del';
      delBtn.title = 'Remove this row';
      delBtn.textContent = '−';
      delBtn.addEventListener('click', () => {
        row.remove();
        if (window.CAP && window.CAP.recalcAll) window.CAP.recalcAll();
      });
      nameCell.appendChild(delBtn);
    }

    const issueIn = document.createElement('input');
    issueIn.type = 'text';
    issueIn.inputMode = 'decimal';
    issueIn.placeholder = 'dd.mm.yyyy';
    issueIn.dataset.docKey = `${rowId}_issue`;
    issueIn.dataset.row = rowId;
    issueIn.dataset.field = 'issue';
    issueIn.dataset.dateField = '1';
    issueIn.title = 'Issue date';

    let expCell;
    if (item.expiryRule) {
      expCell = document.createElement('div');
      expCell.className = 'computed-cell';
      expCell.dataset.row = rowId;
      expCell.dataset.expiryRule = JSON.stringify(item.expiryRule);
      expCell.title = 'Expiry (auto)';
    } else {
      expCell = document.createElement('input');
      expCell.type = 'text';
      expCell.inputMode = 'decimal';
      expCell.placeholder = 'dd.mm.yyyy';
      expCell.dataset.docKey = `${rowId}_expiry`;
      expCell.dataset.row = rowId;
      expCell.dataset.field = 'expiry';
      expCell.dataset.dateField = '1';
      expCell.title = 'Expiry date';
    }

    const numIn = document.createElement('textarea');
    numIn.rows = 1;
    numIn.dataset.docKey = `${rowId}_number`;
    numIn.dataset.row = rowId;
    numIn.dataset.field = 'number';
    numIn.placeholder = 'Number / period';
    numIn.title = 'Number / period';

    const notesIn = document.createElement('textarea');
    notesIn.rows = 1;
    notesIn.dataset.docKey = `${rowId}_notes`;
    notesIn.dataset.row = rowId;
    notesIn.dataset.field = 'notes';
    notesIn.placeholder = 'Notes';
    notesIn.title = 'Notes';

    row.append(nameCell, issueIn, expCell, numIn, notesIn);
    return row;
  }

  // Ekstra satır oluşturucusu - parent satırın hemen ALTINA ekler
  function addExtraRow(sectionKey, idx, item, afterRow) {
    // Aynı baseRowId'nin kaç ekstra satırı var, ona göre extra numarası
    const baseId = `${sectionKey}_${idx}`;
    const existing = document.querySelectorAll(`.doc-row[data-row-id^="${baseId}_extra"]`);
    const extraIdx = existing.length + 1;
    const extraRowId = `${baseId}_extra${extraIdx}`;
    const extraRow = buildRow(sectionKey, idx, item, { rowId: extraRowId, isExtra: true });
    afterRow.parentNode.insertBefore(extraRow, afterRow.nextSibling);
    // Yeni satır eklendi - bazı durumlarda parent + sonra eklenen sıralı satırlar arası
    // dağıtmak isteyebiliriz ama bu basit haliyle yeterli.
    if (window.CAP && window.CAP.recalcAll) window.CAP.recalcAll();
  }
  // Yükleme sırasında, store içinde "${baseId}_extra${n}_issue" gibi keyler varsa
  // ilgili satırları yeniden oluşturmamız gerek. Bunu init sonunda yapalım.
  window.__rebuildExtraRows = function() {
    const docs = (window.CAP && window.CAP.store && window.CAP.store.docs) || {};
    // baseId'leri topla
    const baseIds = {};
    Object.keys(docs).forEach(k => {
      const m = k.match(/^(.+)_extra(\d+)_(issue|expiry|number|notes|ok)$/);
      if (!m) return;
      const baseId = m[1];
      const ex = parseInt(m[2], 10);
      if (!baseIds[baseId] || ex > baseIds[baseId]) baseIds[baseId] = ex;
    });
    Object.keys(baseIds).forEach(baseId => {
      const parts = baseId.split('_');
      const sectionKey = parts[0];
      const idx = parseInt(parts[1], 10);
      const item = (DOCS[sectionKey] || [])[idx];
      if (!item || !item.addable) return;
      // Mevcut parent satırı bul
      const parent = document.querySelector(`.doc-row[data-row-id="${baseId}"]`);
      if (!parent) return;
      const need = baseIds[baseId];
      let after = parent;
      for (let i = 1; i <= need; i++) {
        const exRowId = `${baseId}_extra${i}`;
        if (document.querySelector(`.doc-row[data-row-id="${exRowId}"]`)) {
          after = document.querySelector(`.doc-row[data-row-id="${exRowId}"]`);
          continue;
        }
        const ex = buildRow(sectionKey, idx, item, { rowId: exRowId, isExtra: true });
        after.parentNode.insertBefore(ex, after.nextSibling);
        after = ex;
      }
    });
  };

  Object.entries(DOCS).forEach(([key, items]) => {
    const container = document.getElementById(`docs-${key}`);
    if (!container) return;
    items.forEach((item, idx) => container.appendChild(buildRow(key, idx, item)));
  });
})();
</script>
