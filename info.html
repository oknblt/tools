<!-- Satır 1: facility name (uzayan) + GPS -->
<div class="row m-2" style="grid-template-columns: 2fr 1fr;">
  <div class="field">
    <label>Facility name</label>
    <textarea data-key="facility_name" rows="1"></textarea>
  </div>
  <div class="field">
    <label>GPS coordinates</label>
    <input type="text" data-key="gps" placeholder="41.0082, 28.9784">
  </div>
</div>

<!-- Satır 2: facility address (uzayan, tam) -->
<div class="row m-1" style="grid-template-columns: 1fr;">
  <div class="field">
    <label>Facility address</label>
    <textarea data-key="facility_address" rows="1"></textarea>
  </div>
</div>

<!-- Satır 3: operation time + establishment date -->
<div class="row m-2" style="grid-template-columns: 2fr 1fr;">
  <div class="field">
    <label>Operation time / duration</label>
    <input type="text" list="dl_op" data-key="operation_time">
    <datalist id="dl_op"><option value="since the establishment date"></datalist>
  </div>
  <div class="field">
    <label>Establishment date</label>
    <input type="date" data-key="establishment_date">
  </div>
</div>

<!-- Product type ve Production processes textarea (uzayan) -->
<div class="row divider m-2" style="grid-template-columns: 1fr 2fr;">
  <div class="field">
    <label>Product type</label>
    <textarea data-key="product_type" rows="1"></textarea>
  </div>
  <div class="field">
    <label>Production processes</label>
    <textarea data-key="production_processes" rows="1"></textarea>
  </div>
</div>

<div class="row m-2" style="grid-template-columns: 1fr 1fr;">
  <div class="field">
    <label>Capacity / month</label>
    <input type="text" data-key="monthly_capacity" placeholder="50,000 pcs">
  </div>
  <div class="field">
    <label>Peak months</label>
    <input type="text" data-key="peak_months">
  </div>
</div>

<!-- Main equipment ve Certifications textarea (uzayan, tek satır başlar) -->
<div class="row m-1" style="grid-template-columns: 1fr 1fr;">
  <div class="field">
    <label>Main production equipment</label>
    <textarea data-key="main_equipment" rows="1"></textarea>
  </div>
  <div class="field">
    <label>Certifications</label>
    <textarea data-key="certifications" rows="1"></textarea>
  </div>
</div>

<!-- Shift toggle + alanlar:
     7 alan yan yana sığmadığı için 6+working days alt satıra (kullanıcı önerisi)
     toggle solda kompakt, hemen yanında start, end, break, dept, daily, weekly  -->
<div class="row divider m-toggle-then-3" style="grid-template-columns: 60px 70px 70px 60px 1fr 1fr 158px 158px;">
  <div class="field">
    <label>Shift?</label>
    <div class="toggle">
      <input type="radio" name="multiple_shifts" id="ms_yes" value="yes"><label for="ms_yes">Y</label>
      <input type="radio" name="multiple_shifts" id="ms_no" value="no" checked><label for="ms_no">N</label>
    </div>
  </div>
  <div class="field conditional-row cond-shifts">
    <label>Start</label>
    <input type="text" list="dl_start" data-key="shift_start">
    <datalist id="dl_start"><option value="07:00"><option value="07:30"><option value="08:00"><option value="08:30"></datalist>
  </div>
  <div class="field conditional-row cond-shifts">
    <label>End</label>
    <input type="text" data-key="shift_end">
  </div>
  <div class="field conditional-row cond-shifts">
    <label>Break</label>
    <input type="text" list="dl_break" data-key="shift_break">
    <datalist id="dl_break"><option value="30"><option value="45"><option value="60"><option value="75"><option value="90"></datalist>
  </div>
  <div class="field conditional-row cond-shifts span-mobile-full">
    <label>Working days</label>
    <input type="text" list="dl_wd" data-key="shift_workdays">
    <datalist id="dl_wd">
      <option value="from Monday to Saturday">
      <option value="6 days a week">
    </datalist>
  </div>
  <div class="field conditional-row cond-shifts span-mobile-full">
    <label>Department(s)</label>
    <input type="text" list="dl_dept" data-key="shift_departments">
    <datalist id="dl_dept"><option value="facility"><option value="knitting section"><option value="dyehouse"></datalist>
  </div>
  <div class="field conditional-row cond-shifts">
    <label>Daily (auto)</label>
    <div class="computed" id="shift_daily_total"></div>
  </div>
  <div class="field conditional-row cond-shifts">
    <label>Weekly /6 (auto)</label>
    <div class="computed" id="shift_weekly_total"></div>
  </div>
</div>

<!-- M-F satırı: Department(s) genişletildi, Daily ve Weekly daha geniş (49 hours 30 minutes sığsın) -->

<!-- Employees on audit + Male workers + Female workers TEK SATIR (kullanıcı talebi) -->
<div class="row m-3" style="grid-template-columns: 1fr 1fr 1fr;">
  <div class="field"><label>Employees on audit date</label><input type="number" data-key="employees_on_audit" min="0"></div>
  <div class="field"><label>Male workers — audit day</label><input type="number" data-key="audit_male" min="0"></div>
  <div class="field"><label>Female workers — audit day</label><input type="number" data-key="audit_female" min="0"></div>
</div>

<div class="row m-3" style="grid-template-columns: 1fr 1fr 1fr;">
  <div class="field"><label>SC responsible name</label><input type="text" data-key="sc_name"></div>
  <div class="field"><label>Title</label>
    <input type="text" list="dl_sct" data-key="sc_title">
    <datalist id="dl_sct"><option value="social compliance responsible"></datalist>
  </div>
  <div class="field"><label>Gender</label>
    <input type="text" list="dl_g" data-key="sc_gender">
    <datalist id="dl_g"><option value="male"><option value="female"></datalist>
  </div>
</div>
