<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Test</title></head>
<body style="background:#111;color:#fff;font-family:sans-serif;padding:30px">
<h1 id="out">JavaScript çalışıyor mu?</h1>
<script>
    document.getElementById('out').textContent = '✅ JavaScript çalışıyor!';
    const arr = ["a","b","c"];
    const obj = {};
    arr.forEach((x,i) => obj[x] = i+1);
    const p = document.createElement('p');
    p.textContent = 'Object: ' + JSON.stringify(obj);
    document.body.appendChild(p);
</script>
</body>
</html>
