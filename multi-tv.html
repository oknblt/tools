*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1a1a;color:#fff;display:flex;flex-direction:column}
.header{background:#001f3f;padding:8px 10px;padding-top:max(8px,env(safe-area-inset-top));box-shadow:0 2px 10px rgba(0,0,0,.3);flex-shrink:0}
.header-row{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.header h1{font-size:16px;display:flex;align-items:center;gap:6px;white-space:nowrap}
.brand-tag{font-size:10px;color:#7aafd4;letter-spacing:.08em;text-transform:uppercase}
.controls{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.btn{padding:8px 12px;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:13px;transition:background .2s;min-height:36px;white-space:nowrap}
.btn-layout{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.25)}
.btn-layout.active{background:#4CAF50;border-color:#4CAF50}
.btn-action{background:#fff;color:#001f3f}
.btn-action:active{background:#ddd}
.btn-voice{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.25);border-radius:6px;padding:8px 12px;font-size:18px;min-height:36px;cursor:pointer;transition:background .15s,box-shadow .15s;display:flex;align-items:center;gap:5px}
.btn-voice.listening{background:rgba(220,50,50,.7);border-color:#f66;animation:pulse-mic 1.2s ease-in-out infinite}
@keyframes pulse-mic{0%,100%{box-shadow:0 0 0 3px rgba(220,50,50,.3)}50%{box-shadow:0 0 0 7px rgba(220,50,50,.1)}}
.grid-container{flex:1;padding:6px;display:grid;gap:6px;min-height:0;overflow:hidden}
.grid-1x1{grid-template-columns:1fr;grid-template-rows:1fr}
.grid-1x2{grid-template-columns:1fr;grid-template-rows:repeat(2,1fr)}
.grid-2x2{grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(2,1fr)}
@media(min-width:700px) and (orientation:landscape){.grid-1x2{grid-template-columns:repeat(2,1fr);grid-template-rows:1fr}}
.tv-box{background:#2a2a2a;border-radius:8px;overflow:hidden;display:flex;flex-direction:column;border:1px solid #3a3a3a;min-height:0;min-width:0;position:relative}
.tv-header{background:#2f2f2f;padding:5px 6px;display:flex;justify-content:space-between;align-items:center;gap:6px;flex-shrink:0}
.tv-header select{background:#444;color:#fff;border:1px solid #555;padding:6px 8px;border-radius:5px;cursor:pointer;font-size:12px;flex:1;min-width:0;min-height:32px}
.tv-header select:focus{outline:none;border-color:#667eea}
.channel-badge{background:#4CAF50;padding:2px 6px;border-radius:3px;font-size:9px;font-weight:bold;flex-shrink:0}
.channel-badge.iptv{background:#ff9800}
.tv-screen{flex:1;background:#000;position:relative;display:flex;align-items:center;justify-content:center;min-height:0;overflow:hidden}
.tv-screen video{width:100%;height:100%;object-fit:contain;background:#000;display:block}
.overlay-controls{position:absolute;top:6px;right:6px;display:flex;gap:5px;z-index:10;opacity:.85}
.overlay-btn{background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.25);color:#fff;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;padding:0;backdrop-filter:blur(4px)}
.overlay-btn:active{background:rgba(102,126,234,.9)}
.placeholder{color:#888;font-size:13px;text-align:center;padding:16px}
.loading{color:#667eea;font-size:13px;display:flex;flex-direction:column;align-items:center;gap:8px}
.spinner{border:3px solid rgba(255,255,255,.2);border-top:3px solid #667eea;border-radius:50%;width:36px;height:36px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-message{color:#ff5252;text-align:center;padding:20px;font-size:13px}
.error-message button{margin-top:8px;background:#333;color:#fff;border:none;padding:6px 14px;border-radius:6px;cursor:pointer}
/* Channel nav bar */
.channel-nav{display:none;flex-shrink:0;align-items:center;justify-content:center;gap:6px;padding:6px 10px;padding-bottom:max(12px,env(safe-area-inset-bottom));background:#111;border-top:1px solid #2a2a2a}
.channel-nav.visible{display:flex}
.nav-btn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.75);width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:background .15s,color .15s;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.nav-btn:active,.nav-btn:hover{background:rgba(102,126,234,.35);border-color:rgba(102,126,234,.6);color:#fff}
.nav-btn.nav-edge{width:30px;font-size:11px;opacity:.65}
.drum-picker{flex:1;max-width:210px;height:36px;position:relative;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none;cursor:grab}
.drum-picker::before,.drum-picker::after{content:'';position:absolute;left:0;right:0;height:10px;z-index:3;pointer-events:none}
.drum-picker::before{top:0;background:linear-gradient(to bottom,#111,transparent)}
.drum-picker::after{bottom:0;background:linear-gradient(to top,#111,transparent)}
.drum-sel{position:absolute;top:50%;left:0;right:0;transform:translateY(-50%);height:28px;background:rgba(102,126,234,.15);border-top:1px solid rgba(102,126,234,.4);border-bottom:1px solid rgba(102,126,234,.4);border-radius:5px;pointer-events:none;z-index:2}
.drum-track{position:absolute;left:0;right:0;top:0;will-change:transform}
.drum-track.animated{transition:transform .2s cubic-bezier(.25,.46,.45,.94)}
.drum-item{height:36px;display:flex;align-items:center;justify-content:center;font-size:11.5px;color:rgba(255,255,255,.3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 6px;z-index:1}
.drum-item.active{color:#fff;font-size:12.5px;font-weight:600}
.drum-item.near{color:rgba(255,255,255,.6)}
/* Peer panel */
.peer-panel{position:fixed;bottom:70px;right:12px;background:rgba(15,15,25,.95);border:1px solid rgba(76,175,80,.5);border-radius:14px;padding:10px 16px;text-align:center;z-index:998;backdrop-filter:blur(10px);cursor:pointer;transition:all .2s;min-width:110px}
.peer-panel:hover{transform:scale(1.02)}
.peer-label{font-size:9px;color:#888;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.peer-code{font-size:26px;font-weight:700;letter-spacing:.15em;color:#4CAF50;font-family:monospace}
.peer-hint{font-size:9px;color:#555;margin-top:4px}
/* Toast */
#voiceToast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(20,20,30,.92);color:#fff;padding:10px 18px;border-radius:22px;font-size:13px;border:1px solid rgba(102,126,234,.4);backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:999;max-width:80vw;text-align:center}
#voiceToast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>

function getFlatChannelList() {

    for (var ci = 0; ci < chs.length; ci++) {

      if (TV_CHANNELS[n] && TV_CHANNELS[n].url) list.push(n);
    }
  }
  return list;
}

function generateChannelOptions() {
  var html = '<option value="">Kanal secin</option>';
  for (var gi = 0; gi < CHANNEL_GROUPS.length; gi++) {
    var g = CHANNEL_GROUPS[gi];
    html += '<optgroup label="' + g.label + '">';
    for (var ci = 0; ci < g.channels.length; ci++) {
      var name = g.channels[ci];
      if (TV_CHANNELS[name] && TV_CHANNELS[name].url) {
        html += '<option value="' + name + '">' + name + '</option>';
      }
    }
    html += '</optgroup>';
  }
  return html;
}

function createTVBoxes(count) {
  var container = document.getElementById('gridContainer');
  tvBoxes.forEach(function(box) {
    if (box.hls) { try { box.hls.destroy(); } catch(e){} }
    if (box.video) { try { box.video.pause(); box.video.src = ''; } catch(e){} }
  });
  container.innerHTML = '';
  tvBoxes = [];
  soloIndex = -1;
  for (var i = 0; i < count; i++) {
    var box = document.createElement('div');
    box.className = 'tv-box';
    box.innerHTML =
      '<div class="tv-header">' +
        '<select id="sel-' + i + '" onchange="changeChannel(' + i + ',this.value)">' + generateChannelOptions() + '</select>' +
        '<span class="channel-badge" id="badge-' + i + '" style="display:none">TRT</span>' +
      '</div>' +
      '<div class="tv-screen" id="scr-' + i + '">' +
        '<div class="overlay-controls">' +
          '<button class="overlay-btn" id="mute-' + i + '" onclick="toggleSolo(' + i + ')">&#128263;</button>' +
          '<button class="overlay-btn" onclick="fullscreen(' + i + ')">&#9638;</button>' +
        '</div>' +
        '<div class="placeholder">&#128250; Kanal secin</div>' +
      '</div>';
    container.appendChild(box);
    tvBoxes.push({
      element: box,
      screen: box.querySelector('#scr-' + i),
      select: box.querySelector('#sel-' + i),
      badge: box.querySelector('#badge-' + i),
      muteBtn: box.querySelector('#mute-' + i),
      currentChannel: null, video: null, hls: null
    });
  }
  updateMuteButtons();
}

function changeChannel(boxIndex, channelName) {
  var box = tvBoxes[boxIndex];
  var channel = TV_CHANNELS[channelName];
  if (box.hls) { try { box.hls.destroy(); } catch(e){} box.hls = null; }
  if (box.video) { try { box.video.pause(); box.video.src = ''; } catch(e){} box.video = null; }

  box.screen.innerHTML =
    '<div class="overlay-controls">' +
      '<button class="overlay-btn" id="mute-' + boxIndex + '" onclick="toggleSolo(' + boxIndex + ')">&#128263;</button>' +
      '<button class="overlay-btn" onclick="fullscreen(' + boxIndex + ')">&#9638;</button>' +
    '</div>';
  box.muteBtn = box.screen.querySelector('#mute-' + boxIndex);

  if (!channel || !channelName) {
    box.screen.insertAdjacentHTML('beforeend', '<div class="placeholder">&#128250; Kanal secin</div>');
    box.currentChannel = null;
    box.badge.style.display = 'none';
    if (soloIndex === boxIndex) soloIndex = -1;
    updateMuteButtons();
    updateChannelNav();
    return;
  }

  box.screen.insertAdjacentHTML('beforeend',
    '<div class="loading"><div class="spinner"></div><div>Yukleniyor...</div><small style="color:#999">' + channelName + '</small></div>');
  box.badge.textContent = channel.source;
  box.badge.className = 'channel-badge' + (channel.source === 'TRT' ? '' : ' iptv');
  box.badge.style.display = 'inline-block';

  var video = document.createElement('video');
  video.autoplay = true;
  video.muted = true;
  video.playsInline = true;
  video.setAttribute('playsinline', '');
  video.setAttribute('webkit-playsinline', '');
  video.style.cssText = 'width:100%;height:100%;object-fit:contain;display:none';
  video.addEventListener('click', function(){ toggleSolo(boxIndex); });

  var reqId = Date.now();
  box._reqId = reqId;

  var onReady = function() {
    if (box._reqId !== reqId) { try { video.pause(); video.src=''; } catch(e){} return; }
    var loader = box.screen.querySelector('.loading');
    if (loader) loader.remove();
    video.style.display = 'block';
    video.muted = (soloIndex !== boxIndex);
    video.play().then(function(){
      updateMuteButtons();
    }).catch(function(){
      video.muted = true;
      video.play().catch(function(){});
      updateMuteButtons();
    });
  };

  var onError = function(msg) {
    if (box._reqId !== reqId) return;
    var loader = box.screen.querySelector('.loading');
    if (loader) loader.remove();
    box.screen.insertAdjacentHTML('beforeend',
      '<div class="error-message">&#10060; ' + msg + '<br>' +
      '<button onclick="changeChannel(' + boxIndex + ',\'' + channelName + '\')">&#128260; Tekrar dene</button></div>');
  };

  if (window.Hls && Hls.isSupported()) {
    var hls = new Hls({ enableWorker: true, lowLatencyMode: false,
      manifestLoadingTimeOut: 12000, manifestLoadingMaxRetry: 2,
      fragLoadingTimeOut: 20000, fragLoadingMaxRetry: 3 });
    hls.loadSource(channel.url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, onReady);
    hls.on(Hls.Events.ERROR, function(e, data) {
      if (!data.fatal) return;
      if (data.type === Hls.ErrorTypes.NETWORK_ERROR) { try { hls.startLoad(); } catch(x){} }
      else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) { try { hls.recoverMediaError(); } catch(x){} }
      else { try { hls.destroy(); } catch(x){} onError('Yayin yuklenemedi'); }
    });
    box.hls = hls;
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = channel.url;
    video.addEventListener('loadedmetadata', onReady, { once: true });
    video.addEventListener('error', function(){ onError('Video yuklenemedi'); }, { once: true });
  } else {
    onError('HLS desteklenmiyor');
    return;
  }

  box.screen.appendChild(video);
  box.video = video;
  box.currentChannel = channelName;
  if (soloIndex === -1 && !userMutedAll) soloIndex = boxIndex;
  updateChannelNav();
}

function toggleSolo(boxIndex) {
  if (soloIndex === boxIndex) { soloIndex = -1; userMutedAll = true; }
  else { soloIndex = boxIndex; userMutedAll = false; }
  updateMuteButtons();
}

function updateMuteButtons() {
  tvBoxes.forEach(function(box, i) {
    var isSolo = (soloIndex === i);
    if (box.video) { box.video.muted = !isSolo; }
    if (box.muteBtn) {
      box.muteBtn.textContent = isSolo ? '\uD83D\uDD0A' : '\uD83D\uDD07';
      box.muteBtn.style.background = isSolo ? 'rgba(191,196,197,.85)' : 'rgba(0,0,0,.6)';
    }
  });
}

function muteAll() { soloIndex = -1; userMutedAll = true; updateMuteButtons(); }

function fullscreen(boxIndex) {
  var box = tvBoxes[boxIndex];
  if (!box || !box.video) return;
  var v = box.video;
  if (v.webkitEnterFullscreen) v.webkitEnterFullscreen();
  else if (v.requestFullscreen) v.requestFullscreen().catch(function(){});
  else if (v.webkitRequestFullscreen) v.webkitRequestFullscreen();
}

function refreshAll() {
  tvBoxes.forEach(function(box, i) { if (box.currentChannel) changeChannel(i, box.currentChannel); });
}

function resumeAll() {
  tvBoxes.forEach(function(box) {
    if (box.video && box.video.paused) {
      if (box.video.muted) { box.video.play().catch(function(){}); }
      else { box.video.play().catch(function(){ box.video.muted = true; box.video.play().catch(function(){}); }); }
    }
  });
}

function setGrid(layout, btn) {
  currentGrid = layout;
  document.getElementById('gridContainer').className = 'grid-container grid-' + layout;
  document.querySelectorAll('.btn-layout').forEach(function(b){ b.classList.remove('active'); });
  if (btn) btn.classList.add('active');
  var previous = tvBoxes.map(function(b){ return b.currentChannel; });
  var counts = { '1x1': 1, '1x2': 2, '2x2': 4 };
  createTVBoxes(counts[layout] || 1);
  for (var i = 0; i < Math.min(tvBoxes.length, previous.length); i++) {
    if (previous[i]) { tvBoxes[i].select.value = previous[i]; changeChannel(i, previous[i]); }
  }
  updateChannelNav();
}

// ================================================================
// DRUM ROLL PICKER
// ================================================================
function drumBuild() {
  drumChannels = getFlatChannelList();
  var track = document.getElementById('drumTrack');
  if (!track) return;
  track.innerHTML = '';
  var ghost = function(){ var d = document.createElement('div'); d.className = 'drum-item'; return d; };
  track.appendChild(ghost());
  drumChannels.forEach(function(name, i) {
    var el = document.createElement('div');
    el.className = 'drum-item';
    el.textContent = name;
    el.dataset.idx = String(i);
    track.appendChild(el);
  });
  track.appendChild(ghost());
  drumSetTo(0, false);
}

function drumSetTo(idx, animate) {
  idx = Math.max(0, Math.min(drumChannels.length - 1, idx));
  drumIdx = idx;
  drumOffset = -((1 + idx) * ITEM_H);
  var track = document.getElementById('drumTrack');
  if (!track) return;
  if (animate) track.classList.add('animated');
  else track.classList.remove('animated');
  track.style.transform = 'translateY(' + drumOffset + 'px)';
  drumHighlight(idx);
}

function drumHighlight(idx) {
  var items = document.querySelectorAll('#drumTrack .drum-item[data-idx]');
  items.forEach(function(el) {
    var d = Math.abs(parseInt(el.dataset.idx) - idx);
    el.classList.toggle('active', d === 0);
    el.classList.toggle('near', d === 1);
  });
}

function drumSetActive(channelName) {
  var i = drumChannels.indexOf(channelName);
  if (i >= 0) drumSetTo(i, true);
}

function drumCommit(idx) {
  var name = drumChannels[idx];
  if (!name || !tvBoxes[0] || name === tvBoxes[0].currentChannel) return;
  tvBoxes[0].select.value = name;
  changeChannel(0, name);
}

function drumPointerStart(e) {
  drumDragging = true;
  drumStartY = e.touches ? e.touches[0].clientY : e.clientY;
  drumStartOffset = drumOffset;
  clearTimeout(drumCommitTimer);
  var track = document.getElementById('drumTrack');
  if (track) track.classList.remove('animated');
  e.preventDefault();
}

function drumPointerMove(e) {
  if (!drumDragging) return;
  var y = e.touches ? e.touches[0].clientY : e.clientY;
  var delta = y - drumStartY;
  var minOff = -((1 + drumChannels.length - 1) * ITEM_H);
  var maxOff = -(1 * ITEM_H);
  drumOffset = Math.max(minOff, Math.min(maxOff, drumStartOffset + delta));
  var track = document.getElementById('drumTrack');
  if (track) track.style.transform = 'translateY(' + drumOffset + 'px)';
  var near = Math.max(0, Math.min(drumChannels.length - 1, Math.round((-drumOffset / ITEM_H) - 1)));
  drumHighlight(near);
  e.preventDefault();
}

function drumPointerEnd() {
  if (!drumDragging) return;
  drumDragging = false;
  var snapped = Math.max(0, Math.min(drumChannels.length - 1, Math.round((-drumOffset / ITEM_H) - 1)));
  drumSetTo(snapped, true);
  clearTimeout(drumCommitTimer);
  drumCommitTimer = setTimeout(function(){ drumCommit(snapped); }, 300);
}

function drumAttachEvents() {
  var picker = document.getElementById('drumPicker');
  if (!picker) return;
  picker.addEventListener('touchstart', drumPointerStart, { passive: false });
  picker.addEventListener('touchmove', drumPointerMove, { passive: false });
  picker.addEventListener('touchend', drumPointerEnd, { passive: false });
  picker.addEventListener('mousedown', drumPointerStart);
  window.addEventListener('mousemove', drumPointerMove);
  window.addEventListener('mouseup', drumPointerEnd);
}

function updateChannelNav() {
  var nav = document.getElementById('channelNav');
  if (!nav) return;
  if (currentGrid === '1x1') {
    nav.classList.add('visible');
    var ch = tvBoxes[0] && tvBoxes[0].currentChannel;
    if (ch) drumSetActive(ch);
  } else {
    nav.classList.remove('visible');
  }
}

function navChannel(direction) {
  if (currentGrid !== '1x1' || !tvBoxes[0]) return;
  var flat = getFlatChannelList();
  if (!flat.length) return;
  var current = tvBoxes[0].currentChannel;
  var idx = current ? flat.indexOf(current) : 0;
  if (direction === 'first') idx = 0;
  else if (direction === 'last') idx = flat.length - 1;
  else if (direction === 'next') idx = (idx + 1) % flat.length;
  else if (direction === 'prev') idx = (idx - 1 + flat.length) % flat.length;
  var name = flat[idx];
  tvBoxes[0].select.value = name;
  changeChannel(0, name);
  drumSetTo(idx, true);
}

// ================================================================
// PEER-TO-PEER REMOTE (PeerJS — no server needed)
// ================================================================
function peerInit() {
  var script = document.createElement('script');
  script.src = 'https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js';
  script.onload = function() { _peerStart(); };
  script.onerror = function() { console.warn('PeerJS CDN failed'); };
  document.head.appendChild(script);
}

function _peerStart() {
  var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  var shortId = '';
  for (var i = 0; i < 4; i++) shortId += chars[Math.floor(Math.random() * chars.length)];
  peer = new Peer(shortId, { debug: 0 });
  peer.on('open', function(id) { showPeerCode(id); });
  peer.on('connection', function(conn) {
    peerConn = conn;
    var panel = document.getElementById('peerPanel');
    if (panel) panel.style.display = 'none';
    showToast('📡 Kumanda bağlandı!', 3000);
    conn.on('data', function(data) {
      try { handleRemoteCommand(typeof data === 'string' ? JSON.parse(data) : data); } catch(e) {}
    });
    conn.on('close', function() {
      peerConn = null;
      showToast('📡 Kumanda bağlantısı kesildi');
      showPeerCode(peer.id);
    });
  });
  peer.on('error', function(e) { showToast('⚠ P2P hata: ' + e.type); });
}

function showPeerCode(id) {
  var panel = document.getElementById('peerPanel');
  if (!panel) {
    panel = document.createElement('div');
    panel.id = 'peerPanel';
    panel.className = 'peer-panel';
    document.body.appendChild(panel);
  }
  panel.innerHTML = 
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px">' +
      '<div class="peer-label">📱 KUMANDA KODU</div>' +
      '<button onclick="document.getElementById(\'peerPanel\').style.display=\'none\'" style="background:none;border:none;color:#666;font-size:14px;cursor:pointer;padding:0 2px;line-height:1">✕</button>' +
    '</div>' +
    '<div class="peer-code">' + id + '</div>' +
    '<div style="font-size:9px;color:#555;margin-top:4px"></div>';
  panel.style.display = 'block';
}

// ================================================================
// WEBSOCKET (server.js fallback)
// ================================================================
function wsConnect() {
  var host = location.hostname;
  if (!host || host === '') return;
  try {
    ws = new WebSocket('ws://' + host + ':8765');
    ws.onopen = function() { ws.send(JSON.stringify({ type: 'register', role: 'tv' })); };
    ws.onmessage = function(e) { try { handleRemoteCommand(JSON.parse(e.data)); } catch(x){} };
    ws.onclose = function() { ws = null; wsReconnectTimer = setTimeout(wsConnect, 4000); };
    ws.onerror = function() { try { ws.close(); } catch(x){} };
  } catch(e) {}
}

// ================================================================
// REMOTE COMMAND HANDLER (shared by PeerJS + WebSocket)
// ================================================================
function handleRemoteCommand(cmd) {
  switch (cmd.action) {
    case 'next':   navChannel('next'); showToast('\u23ED Sonraki kanal'); break;
    case 'prev':   navChannel('prev'); showToast('\u23EE Onceki kanal'); break;
    case 'first':  navChannel('first'); showToast('\u23EE\u23EE Ilk kanal'); break;
    case 'last':   navChannel('last'); showToast('\u23ED\u23ED Son kanal'); break;
    case 'mute':   muteAll(); showToast('\uD83D\uDD07 Ses kapatildi'); break;
    case 'unmute':
      if (soloIndex === -1) { soloIndex = 0; userMutedAll = false; updateMuteButtons(); }
      showToast('\uD83D\uDD0A Ses acildi'); break;
    case 'vol_up':
      if (tvBoxes[0] && tvBoxes[0].video) {
        tvBoxes[0].video.volume = Math.min(1, (tvBoxes[0].video.volume || 1) + 0.1);
        showToast('\uD83D\uDD0A ' + Math.round(tvBoxes[0].video.volume * 100) + '%');
      } break;
    case 'vol_down':
      if (tvBoxes[0] && tvBoxes[0].video) {
        tvBoxes[0].video.volume = Math.max(0, (tvBoxes[0].video.volume || 1) - 0.1);
        showToast('\uD83D\uDD09 ' + Math.round(tvBoxes[0].video.volume * 100) + '%');
      } break;
    case 'pause':
      tvBoxes.forEach(function(b){ if (b.video) b.video.pause(); });
      showToast('\u23F8 Durduruldu'); break;
    case 'play':
      resumeAll(); showToast('\u25B6 Devam ediyor'); break;
    case 'seek':
      tvBoxes.forEach(function(b) {
        if (b.video && isFinite(b.video.duration))
          b.video.currentTime = Math.max(0, Math.min(b.video.duration, b.video.currentTime + (cmd.delta || 0)));
      });
      showToast((cmd.delta > 0 ? '\u23E9 ' : '\u23EA ') + Math.abs(cmd.delta) + 'sn'); break;
    case 'channel':
      if (cmd.name && TV_CHANNELS[cmd.name]) {
        var flat = getFlatChannelList();
        var idx = flat.indexOf(cmd.name);
        if (tvBoxes[0]) { tvBoxes[0].select.value = cmd.name; changeChannel(0, cmd.name); }
        if (idx >= 0) drumSetTo(idx, true);
        showToast('\uD83D\uDCFA ' + cmd.name);
      } break;
    case 'layout':
      if (cmd.layout) {
        var btn = document.querySelector('[data-layout="' + cmd.layout + '"]');
        setGrid(cmd.layout, btn);
        showToast('\uD83D\uDCCF ' + cmd.layout);
      } break;
  }
}

  'now': 'NOW', 'kanal d': 'Kanal D', 'show': 'Show TV', 'show tv': 'Show TV',
  'atv': 'ATV', 'tv 8': 'TV8', 'tv sekiz': 'TV8',
  'teve': 'Teve2', 'beyaz': 'Beyaz TV', 'star': 'Star TV', 'star tv': 'Star TV',
  'ht spor': 'HT Spor', 'a spor': 'A Spor', 'aspor': 'A Spor', 'sports tv': 'Sports TV',
  'red bull': 'Redbull TV', 'redbull': 'Redbull TV', 'dmax': 'DMAX', 'tlc': 'TLC'
};

function matchChannel(t) {
  var keys = Object.keys(VOICE_ALIASES).sort(function(a,b){ return b.length - a.length; });
  for (var i = 0; i < keys.length; i++) {
    if (t.includes(keys[i])) return VOICE_ALIASES[keys[i]];
  }
  return null;
}

function handleVoiceCommand(transcript) {
  var t = transcript.toLowerCase().trim();
  showToast('\uD83C\uDF99 "' + transcript + '"', 3000);
  if (/ses kapat|mute|sustur/.test(t)) { muteAll(); showToast('\uD83D\uDD07 Ses kapatildi'); return; }
  if (/ses ac|unmute|sesi ac/.test(t)) {
    if (soloIndex === -1) { soloIndex = 0; userMutedAll = false; updateMuteButtons(); }
    showToast('\uD83D\uDD0A Ses acildi'); return;
  }
  if (/ses artir|volume up|sesi yuksel/.test(t)) { handleRemoteCommand({ action:'vol_up' }); return; }
  if (/ses azalt|volume down|sesi azalt/.test(t)) { handleRemoteCommand({ action:'vol_down' }); return; }
  if (/sonraki|next/.test(t)) { navChannel('next'); showToast('\u23ED Sonraki'); return; }
  if (/onceki|önceki|previous/.test(t)) { navChannel('prev'); showToast('\u23EE Onceki'); return; }
  if (/ilk kanal|first/.test(t)) { navChannel('first'); showToast('\u23EE\u23EE Ilk kanal'); return; }
  if (/son kanal|last/.test(t)) { navChannel('last'); showToast('\u23ED\u23ED Son kanal'); return; }
  if (/durdur|pause/.test(t)) { tvBoxes.forEach(function(b){ if(b.video) b.video.pause(); }); showToast('\u23F8 Durduruldu'); return; }
  if (/devam|play|oynat/.test(t)) { resumeAll(); showToast('\u25B6 Devam'); return; }
  if (/tam ekran|fullscreen/.test(t)) { fullscreen(0); showToast('\u26F6 Tam ekran'); return; }
  if (/geri sar|rewind/.test(t)) { tvBoxes.forEach(function(b){ if(b.video && isFinite(b.video.duration)) b.video.currentTime = Math.max(0, b.video.currentTime - SEEK_STEP); }); showToast('\u23EA ' + SEEK_STEP + 'sn'); return; }
  if (/ileri sar|forward/.test(t)) { tvBoxes.forEach(function(b){ if(b.video && isFinite(b.video.duration)) b.video.currentTime = Math.min(b.video.duration, b.video.currentTime + SEEK_STEP); }); showToast('\u23E9 ' + SEEK_STEP + 'sn'); return; }
  var ch = matchChannel(t);
  if (ch) {
    var flat = getFlatChannelList();
    var idx = flat.indexOf(ch);
    if (tvBoxes[0]) { tvBoxes[0].select.value = ch; changeChannel(0, ch); }
    if (idx >= 0) drumSetTo(idx, true);
    showToast('\uD83D\uDCFA ' + ch); return;
  }
  showToast('\u2753 Komut anlasilamadi');
}

function initVoice() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('\u26A0 Tarayici sesli komutu desteklemiyor', 4000); return null; }
  var r = new SR();
  r.lang = 'tr-TR'; r.continuous = false; r.interimResults = false; r.maxAlternatives = 3;
  r.onresult = function(e) { handleVoiceCommand(e.results[0][0].transcript); };
  r.onerror = function(e) {
    if (e.error === 'no-speech') showToast('\uD83C\uDF99 Ses algilanamadi');
    else if (e.error === 'not-allowed') showToast('\u26A0 Mikrofon izni reddedildi', 4000);
    else showToast('\u26A0 Hata: ' + e.error);
    stopVoice();
  };
  r.onend = stopVoice;
  return r;
}

function toggleVoice() {
  if (voiceActive) { stopVoice(); return; }
  if (!recognition) recognition = initVoice();
  if (!recognition) return;
  try {
    recognition.start(); voiceActive = true;
    document.getElementById('voiceBtn').classList.add('listening');
    showToast('\uD83C\uDF99 Dinleniyor...', 8000);
  } catch(e) { showToast('\u26A0 Mikrofon baslatillamadi'); }
}

function stopVoice() {
  voiceActive = false;
  var btn = document.getElementById('voiceBtn');
  if (btn) btn.classList.remove('listening');
  try { if (recognition) recognition.stop(); } catch(e) {}
}

// ================================================================
// INIT
// ================================================================
function init() {
  createTVBoxes(1);
  drumBuild();
  drumAttachEvents();
  updateChannelNav();
  peerInit();
  wsConnect();
}

document.addEventListener('DOMContentLoaded', init);
</script>
