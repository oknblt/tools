<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Photo Sorter</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
html{height:100%;}
body{height:100vh;height:100dvh;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#eef1f5;color:#1c2733;display:flex;flex-direction:column;overflow:hidden;}
button{font-family:inherit;border:none;cursor:pointer;}

/* ---------- header ---------- */
.top{background:#1a3a5c;color:#fff;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0;}
.top .title{font-size:15px;font-weight:700;}
.top .prog{font-size:12px;background:rgba(255,255,255,.15);padding:3px 8px;border-radius:12px;white-space:nowrap;}
.top .icon-btn{background:rgba(255,255,255,.15);color:#fff;border-radius:8px;padding:6px 8px;font-size:12px;font-weight:600;white-space:nowrap;}
.brand{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
.top-btns{display:flex;gap:6px;flex:1;justify-content:flex-end;}
.logo{display:none;}

/* ---------- screens ---------- */
.screen{flex:1;display:none;flex-direction:column;overflow:hidden;min-height:0;}
.screen.active{display:flex;}

/* ---------- start ---------- */
#startScreen{justify-content:center;align-items:center;padding:24px;gap:14px;text-align:center;}
#startScreen h1{font-size:20px;color:#1a3a5c;}
#startScreen p{font-size:14px;color:#5a6b7d;max-width:320px;line-height:1.5;}
.big-btn{background:#1a3a5c;color:#fff;font-size:15px;font-weight:700;padding:12px 20px;border-radius:10px;width:100%;max-width:300px;}
.big-btn.secondary{background:#fff;color:#1a3a5c;border:2px solid #1a3a5c;}
.big-btn:disabled{opacity:.5;}
#ingestStatus{font-size:13px;color:#5a6b7d;}

/* ---------- sorter ---------- */
#photoBox{flex-shrink:0;height:34vh;background:#0d1620;display:flex;align-items:center;justify-content:center;position:relative;}
#photoBox img{max-width:100%;max-height:100%;object-fit:contain;}
#photoBox .badge{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.55);color:#fff;font-size:12px;padding:3px 9px;border-radius:10px;}
#photoBox .assigned-tag{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);max-width:88%;background:rgba(0,0,0,.55);color:#fff;font-size:13px;font-weight:600;padding:5px 12px;border-radius:8px;text-align:center;display:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.quick-row{display:flex;gap:6px;padding:8px 10px 0 10px;flex-shrink:0;}
.quick-row button{flex:1;padding:10px 4px;border-radius:10px;font-size:12px;font-weight:700;}
#sameBtn{background:#fff;color:#1a3a5c;border:1.5px solid #b9c4cf;flex:1.8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#sameBtn:disabled{opacity:.5;}
#sameBtn.tapped{background:#0d7a4f;color:#fff;border-color:#0d7a4f;}
#removeBtn{background:#fff;color:#a03325;border:1.5px solid #d9a79f;}
.folder-btn.tapped,.add-folder-btn.tapped{background:#0d7a4f;color:#fff;border-color:#0d7a4f;}
.folder-btn.tapped b{color:#fff;}
.nav-arrow{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.35);color:#fff;font-size:24px;line-height:1;width:34px;height:46px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0;}
#prevArrow{left:6px;}
#nextArrow{right:6px;}
#undoBtn{background:#fff;color:#1a3a5c;border:1.5px solid #b9c4cf;}
#skipBtn{background:#fff;color:#1a3a5c;border:1.5px solid #b9c4cf;}
.search-wrap{padding:8px 10px;flex-shrink:0;}
#search{width:100%;font-size:16px;padding:9px 12px;border:2px solid #1a3a5c;border-radius:10px;background:#fff;outline:none;}
#folderList{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 10px 14px 10px;display:flex;flex-direction:column;gap:6px;}
.folder-btn{background:#fff;border:1px solid #d5dde5;border-radius:10px;padding:12px 14px;font-size:15px;text-align:left;color:#1c2733;flex-shrink:0;}
.folder-btn b{color:#0d7a4f;}
.folder-btn .cnt{float:right;color:#8394a5;font-size:13px;}
.folder-btn.recent{border-left:4px solid #0d7a4f;}
.add-folder-btn{background:#fff7e6;border:1.5px dashed #d49a2a;border-radius:10px;padding:12px 14px;font-size:14px;font-weight:600;color:#8a6410;text-align:left;flex-shrink:0;}
.list-label{font-size:12px;font-weight:700;color:#8394a5;text-transform:uppercase;letter-spacing:.5px;padding:6px 2px 0 2px;flex-shrink:0;}

/* ---------- review ---------- */
#reviewList{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;align-content:start;grid-auto-rows:max-content;}
.rev-item{background:#fff;border-radius:10px;overflow:hidden;border:1px solid #d5dde5;position:relative;}
.rev-item img{width:100%;height:110px;object-fit:cover;display:block;}
.rev-item .lbl{font-size:10px;padding:4px 5px;line-height:1.25;color:#1c2733;min-height:30px;word-break:break-word;}
.rev-item.unassigned .lbl{color:#c0392b;font-weight:700;}
.rev-bar{padding:10px;flex-shrink:0;display:flex;gap:8px;}
.rev-bar button{flex:1;padding:8px 6px;border-radius:9px;font-size:13px;font-weight:700;}

/* ---------- done ---------- */
#doneScreen{justify-content:center;align-items:center;padding:24px;gap:12px;text-align:center;}
#doneScreen h2{color:#1a3a5c;font-size:19px;}

/* ---------- photo editor (from stamper) ---------- */
.redact-modal {
  position: fixed; inset: 0;
  background: rgba(5, 12, 25, 0.96);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  display: none;
  flex-direction: column;
  z-index: 12000;
  overflow: hidden;
  touch-action: none;
}
.redact-modal.active { display: flex; }

.redact-topbar {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  background: #0f2040;
  border-bottom: 1px solid #2a4a6a;
  flex-shrink: 0;
  flex-wrap: wrap;
}
.redact-topbar h2 { font-size: 14px; font-weight: 600; color: #fff; flex: 1; min-width: 120px; }

.redact-tools { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

.rtool-btn {
  height: 30px; padding: 0 10px; border-radius: 8px;
  border: 1px solid #3a6090; background: #1a3558; color: #a8c8e8;
  font-size: 12px; cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; gap: 5px; flex-shrink: 0;
}
.rtool-btn:hover { background: #243f60; }
.rtool-btn.active { background: #4a9edd; color: #fff; border-color: #4a9edd; }
.rtool-btn svg { width: 14px; height: 14px; }

.redact-colors { display: flex; gap: 5px; align-items: center; }
.rcolor-btn {
  width: 22px; height: 22px; border-radius: 50%;
  border: 2px solid transparent; cursor: pointer;
  transition: border-color 0.15s, transform 0.1s; flex-shrink: 0;
}
.rcolor-btn:hover { transform: scale(1.15); }
.rcolor-btn.active { border-color: #fff; }
.rcolor-btn.custom { background: conic-gradient(red, yellow, lime, cyan, blue, magenta, red); position: relative; overflow: hidden; }
.rcolor-btn.custom input[type=color] {
  position: absolute; inset: 0; width: 100%; height: 100%;
  opacity: 0; cursor: pointer; border: none; padding: 0;
}

.redact-canvas-wrap {
  flex: 1;
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
  overflow: auto;
  background: #080f1e;
  position: relative;
  overscroll-behavior: none;
  touch-action: none;
  -webkit-overflow-scrolling: auto;
}
#redactCanvas {
  display: block;
  cursor: default;
  border-radius: 8px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.6);
  touch-action: none;
  transform-origin: top left;
  flex-shrink: 0;
}

.redact-bottombar {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px;
  background: #0f2040;
  border-top: 1px solid #2a4a6a;
  flex-shrink: 0; flex-wrap: wrap;
}
.redact-size-row { display: flex; align-items: center; gap: 6px; flex: 1; }
.redact-size-row label { font-size: 12px; color: #a8c8e8; white-space: nowrap; }
.redact-size-row input[type=range] { width: 80px; accent-color: #4a9edd; }
.redact-size-val { font-size: 12px; color: #d0e8f8; min-width: 24px; }

.btn-redact-save {
  height: 36px; padding: 0 16px; border-radius: 10px;
  border: none; background: #4a9edd; color: #fff;
  font-size: 13px; font-weight: 600; cursor: pointer;
  display: inline-flex; align-items: center; gap: 6px;
  transition: background 0.15s;
}
.btn-redact-save:hover { background: #3a8ecc; }
.btn-redact-cancel {
  height: 36px; padding: 0 14px; border-radius: 10px;
  border: 1px solid #3a6090; background: #1a3558; color: #a8c8e8;
  font-size: 13px; cursor: pointer; transition: background 0.15s;
}
.btn-redact-cancel:hover { background: #243f60; }
.btn-redact-undo {
  height: 36px; padding: 0 12px; border-radius: 10px;
  border: 1px solid #3a6090; background: #1a3558; color: #a8c8e8;
  font-size: 12px; cursor: pointer; transition: background 0.15s;
  display: inline-flex; align-items: center; gap: 5px;
}
.btn-redact-undo:hover { background: #243f60; }
.btn-redact-undo svg { width: 13px; height: 13px; }

/* Zoom controls */
.zoom-controls {
  display: flex; align-items: center; gap: 4px;
  background: #0f2040;
  border: 1px solid #2a4a6a;
  border-radius: 8px;
  padding: 2px 4px;
  flex-shrink: 0;
}
.zoom-btn {
  width: 28px; height: 28px; border-radius: 6px;
  border: none; background: transparent; color: #a8c8e8;
  font-size: 16px; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, color 0.15s;
  line-height: 1;
}
.zoom-btn:hover { background: #243f60; color: #fff; }
.zoom-label {
  font-size: 11px; color: #7aafd4; min-width: 38px;
  text-align: center; user-select: none; font-weight: 600;
}


#photoBox .edit-btn{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.45);color:#fff;border:none;border-radius:8px;padding:6px 11px;font-size:13px;font-weight:700;}

/* ---------- desktop ---------- */
@media(min-width:700px){
  .top{padding:5px 12px;}
  .logo{display:inline-block;font-size:10px;letter-spacing:1.6px;font-weight:800;color:#cfe3f7;border:1px solid rgba(255,255,255,.4);padding:3px 8px;border-radius:6px;white-space:nowrap;}
  #photoBox{height:56vh;}
  #search{font-size:14px;padding:7px 10px;}
  #doneScreen .big-btn{padding:9px 16px;font-size:14px;max-width:240px;}
  .quick-row,.search-wrap{width:100%;max-width:780px;margin-left:auto;margin-right:auto;}
  #folderList{width:100%;max-width:780px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:6px;align-content:start;}
  .folder-btn{padding:6px 10px;font-size:13px;border-radius:8px;}
  .add-folder-btn{padding:8px 10px;font-size:13px;grid-column:1 / -1;}
  .list-label{grid-column:1 / -1;}
  #reviewList{width:100%;max-width:1000px;margin:0 auto;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));}
  .rev-item .lbl{font-size:11px;}
  .rev-bar{width:100%;max-width:1000px;margin:0 auto;}
}
#doneSummary{font-size:14px;color:#5a6b7d;line-height:1.5;max-height:30vh;overflow-y:auto;background:#fff;border-radius:10px;padding:10px 14px;width:100%;max-width:340px;text-align:left;}
#zipStatus{font-size:13px;color:#5a6b7d;min-height:18px;}
</style>
</head>
<body>

<div class="top">
  <div class="brand"><span class="title">Photo Sorter</span><span class="logo">BULUT PROJECTS</span></div>
  <div class="prog" id="progress">–</div>
  <div class="top-btns">
    <button class="icon-btn" id="homeBtn" style="display:none;">&#8249; Back</button>
    <button class="icon-btn" id="reviewBtn" style="display:none;">List</button>
    <button class="icon-btn" id="clearBtn" style="display:none;background:#a03325;">&#10005; Clear</button>
  </div>
</div>

<!-- START -->
<div class="screen active" id="startScreen">
  <h1>Label &amp; rename photos</h1>
  <p>Quickly label your photos; each one is renamed automatically and all of them are combined into a single folder as a ZIP</p>
  <input type="file" id="fileInput" accept="image/*" multiple style="display:none;">
  <button class="big-btn" id="pickBtn">Select photos from gallery</button>
  <button class="big-btn secondary" id="resumeBtn" style="display:none;"></button>
  <div id="ingestStatus"></div>
</div>

<!-- SORTER -->
<div class="screen" id="sortScreen">
  <div id="photoBox">
    <img id="curPhoto" alt="">
    <div class="badge" id="photoBadge"></div>
    <div class="assigned-tag" id="assignedTag"></div>
    <button class="nav-arrow" id="prevArrow">&#8249;</button>
    <button class="nav-arrow" id="nextArrow">&#8250;</button>
    <button class="edit-btn" id="editBtn">&#9998; Edit</button>
  </div>
  <div class="quick-row">
    <button id="undoBtn">&#8617;</button>
    <button id="sameBtn" disabled>Same</button>
    <button id="skipBtn">Skip</button>
    <button id="removeBtn">Remove</button>
  </div>
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Search labels..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
  </div>
  <div id="folderList"></div>
</div>

<!-- REVIEW -->
<div class="screen" id="reviewScreen">
  <div id="reviewList"></div>
  <div class="rev-bar">
    <button style="background:#fff;color:#1a3a5c;border:1.5px solid #b9c4cf;" id="backToSortBtn">&#8249; Back to sorting</button>
    <button style="background:#fff;color:#1a3a5c;border:1.5px solid #b9c4cf;" id="addMoreBtn">+ Add photos</button>
    <button style="background:#1a3a5c;color:#fff;" id="finishBtn">Finish &#8594; ZIP</button>
  </div>
</div>

<div class="redact-modal" id="redactModal">
  <div class="redact-topbar">
    <h2 id="redactModalTitle">✏️ Edit</h2>
    <div class="redact-tools">
      <button class="rtool-btn" id="toolRotate" title="Rotate 90° clockwise">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        Rotate
      </button>
      <button class="rtool-btn" id="toolBrush">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
        </svg>
        Brush
      </button>
      <button class="rtool-btn" id="toolRect">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
        </svg>
        Rectangle
      </button>
      <div class="redact-colors" id="redactColors">
        <button class="rcolor-btn active" data-color="#000000" style="background:#000" title="Black"></button>
        <button class="rcolor-btn" data-color="#ffffff" style="background:#fff" title="White"></button>
        <button class="rcolor-btn" data-color="#888888" style="background:#888" title="Gray"></button>
        <button class="rcolor-btn custom" title="Custom color">
          <input type="color" id="customRedactColor" value="#ff0000">
        </button>
      </div>
    </div>
  </div>

  <div class="redact-canvas-wrap" id="redactCanvasWrap">
    <canvas id="redactCanvas"></canvas>
  </div>

  <div class="redact-bottombar">
    <div class="redact-size-row" id="brushSizeRow" style="display:none">
      <label>Size</label>
      <input type="range" id="brushSize" min="5" max="120" value="30">
      <span class="redact-size-val" id="brushSizeVal">30</span>
    </div>
    <div class="zoom-controls">
      <button class="zoom-btn" id="zoomOut" title="Zoom out">−</button>
      <span class="zoom-label" id="zoomLabel">100%</span>
      <button class="zoom-btn" id="zoomIn" title="Zoom in">+</button>
    </div>
    <button class="btn-redact-undo" id="btnUndo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 14L4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 0 11H11"/>
      </svg>
      Undo
    </button>
    <button class="btn-redact-cancel" id="btnRedactCancel">Cancel</button>
    <button class="btn-redact-save" id="btnRedactSave">Save</button>
  </div>
</div>

<!-- DONE -->
<div class="screen" id="doneScreen">
  <h2>Sorting completed</h2>
  <div id="doneSummary"></div>
  <div id="zipStatus"></div>
  <button class="big-btn" id="zipBtn">Download ZIP</button>
  <button class="big-btn secondary" id="backBtn">&#8249; Back</button>
  <button class="big-btn secondary" id="newSessionBtn" style="border-color:#c0392b;color:#c0392b;">New session (delete all)</button>
</div>

<script>
/* ===================== FOLDERS ===================== */
const FOLDERS = [
"Air conditioner","An employee with his PPE","Anti-slippery bands","Assembly point",
"Body and eye wash station","Boiler room","BSCI COC","BSCI Speak for Change poster",
"Chemical spill kit","Chemical warehouse","Compressor room","Cutting section",
"Disinfectant","Doctor room","Dye preparation section","Dyeing section",
"Ear plugs","Electricity meter","Electricity panel","Embroidery section",
"Emergency case equipment","Emergency exit door","Emergency exit route","Emergency exit sign",
"Emergency lighting","Emergency stop button","Evacuation plan","Eye guard on overlock machine",
"Eye wash solutions","Eye wash station","Facility sign","Finger guard on sewing machine",
"Finishing section","Fire alarm button","Fire alarm control panel","Fire extinguisher",
"Fire hose cabinet","Fire hydrant","Fire-escape stairs","Firefighting system for the hood",
"First aid box","First aid materials","Fixing machine","Flow-meter",
"Gas detector","Generator","Hazardous waste storage area","Ironing section",
"Kitchen","Knitting section","Loading / Unloading area","Locker room",
"Lunch hall","MSDS","Non-hazardous waste storage area","Notice board",
"Packaging section","Potable water","PPE","Prayer room",
"Printing section","Production area","Protective cover on the machine","Quality control section",
"Refrigerant device","Refrigerant gas","Rest area","Sampling section",
"SDS summaries","Secondary containment","Security checkpoint","Sewing section",
"Smoke detector","Spraying section","Sprinkler system","Stain removing section",
"Steel glove","Steel toe shoes","Stenter","Storage area",
"Stretcher","Suggestion box","The lateral view of the facility","The out view of the facility",
"The rear view of the facility","Time recording device","Toilet","Turnstiles with time recording device",
"Ventilation system","Visual fire alarm","Warehouse","Warning signs",
"Washing section","Waste boxes","Wastewater treatment unit","Water meter",
"Weaving section","Yarn production","Yarn removing section","Yarn transfer section"
];
let customFolders = [];   // user-added custom folders
const MAX_SIDE = 1400, JPEG_Q = 0.82;

/* ===================== STATE ===================== */
let photos = [];          // {id, blob, url, folder|null, order}
let curIdx = -1;
let lastFolder = null;
let recents = [];         // recently used folders
let undoStack = [];       // {photoId, prevFolder}

const $ = id => document.getElementById(id);
const screens = ['startScreen','sortScreen','reviewScreen','doneScreen'];
function showScreen(name){
  screens.forEach(s => $(s).classList.toggle('active', s===name));
  $('reviewBtn').style.display = (name==='sortScreen') ? '' : 'none';
  $('clearBtn').style.display = (name==='sortScreen'||name==='reviewScreen') ? '' : 'none';
  $('homeBtn').style.display = (name==='sortScreen'||name==='reviewScreen') ? '' : 'none';
}

/* ===================== INDEXEDDB (autosave) ===================== */
let db = null;
function openDB(){
  return new Promise((res)=>{
    const rq = indexedDB.open('fotoDagitici', 1);
    rq.onupgradeneeded = e => {
      const d = e.target.result;
      if(!d.objectStoreNames.contains('photos')) d.createObjectStore('photos',{keyPath:'id'});
      if(!d.objectStoreNames.contains('meta')) d.createObjectStore('meta',{keyPath:'k'});
    };
    rq.onsuccess = e => { db = e.target.result; res(true); };
    rq.onerror = () => res(false);
  });
}
function dbPut(store, obj){ if(!db) return; try{ db.transaction(store,'readwrite').objectStore(store).put(obj); }catch(e){} }
function dbDel(store, key){ if(!db) return; try{ db.transaction(store,'readwrite').objectStore(store).delete(key); }catch(e){} }
function dbAll(store){
  return new Promise(res=>{
    if(!db){ res([]); return; }
    try{
      const rq = db.transaction(store,'readonly').objectStore(store).getAll();
      rq.onsuccess = ()=>res(rq.result||[]); rq.onerror = ()=>res([]);
    }catch(e){ res([]); }
  });
}
function dbClear(){ if(!db) return; try{ const t=db.transaction(['photos','meta'],'readwrite'); t.objectStore('photos').clear(); t.objectStore('meta').clear(); }catch(e){} }
function saveMeta(){ dbPut('meta',{k:'s', lastFolder, recents, customFolders}); }
function savePhoto(p){ dbPut('photos',{id:p.id, blob:p.blob, folder:p.folder, order:p.order}); }

/* ===================== PHOTO INGEST + DOWNSCALE ===================== */
function normalizeFile(file){
  return new Promise(resolve=>{
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        try{
          const w = img.naturalWidth||img.width, h = img.naturalHeight||img.height;
          if(!w||!h){ resolve(null); return; }
          const s = Math.min(1, MAX_SIDE/Math.max(w,h));
          const c = document.createElement('canvas');
          c.width = Math.round(w*s); c.height = Math.round(h*s);
          const ctx = c.getContext('2d');
          ctx.imageSmoothingEnabled = true;
          try{ ctx.imageSmoothingQuality='high'; }catch(err){}
          ctx.drawImage(img,0,0,c.width,c.height);   // EXIF orientation baked into pixels
          if(c.toBlob) c.toBlob(b=>resolve(b), 'image/jpeg', JPEG_Q);
          else {
            const d = c.toDataURL('image/jpeg', JPEG_Q);
            fetch(d).then(r=>r.blob()).then(resolve).catch(()=>resolve(null));
          }
        }catch(err){ resolve(null); }
      };
      img.onerror = ()=>resolve(null);
      img.src = e.target.result;
    };
    reader.onerror = ()=>resolve(null);
    reader.readAsDataURL(file);
  });
}

async function ingestFiles(fileList){
  const files = Array.from(fileList).filter(f=>f.type.startsWith('image/'));
  if(!files.length) return;
  $('pickBtn').disabled = true;
  let startOrder = photos.length ? Math.max(...photos.map(p=>p.order))+1 : 0;
  for(let i=0;i<files.length;i++){
    $('ingestStatus').textContent = 'Preparing photos... '+(i+1)+' / '+files.length;
    const blob = await normalizeFile(files[i]);
    if(blob){
      const p = { id: Date.now()+'_'+Math.random().toString(36).slice(2,7),
                  blob, url: URL.createObjectURL(blob), folder: null, order: startOrder++ };
      photos.push(p); savePhoto(p);
    }
  }
  $('ingestStatus').textContent = '';
  $('pickBtn').disabled = false;
  if(photos.length){ gotoNextUnassigned(); showScreen('sortScreen'); renderAll(); }
}

/* ===================== SIRALAMA / ATAMA ===================== */
function unassignedCount(){ return photos.filter(p=>!p.folder).length; }
function gotoNextUnassigned(fromIdx){
  const n = photos.length;
  const start = (typeof fromIdx==='number' ? fromIdx : curIdx);
  for(let step=1; step<=n; step++){
    const i = (start+step+n) % n;
    if(!photos[i].folder){ curIdx = i; return; }
  }
  curIdx = Math.min(Math.max(curIdx,0), n-1);   // all assigned
}
function assign(folder){
  if(curIdx<0 || !photos[curIdx]) return;
  const p = photos[curIdx];
  undoStack.push({photoId:p.id, prevFolder:p.folder});
  p.folder = folder; savePhoto(p);
  lastFolder = folder;
  recents = [folder, ...recents.filter(f=>f!==folder)].slice(0,4);
  saveMeta();
  $('search').value = '';
  if(unassignedCount()===0){ renderProgress(); openDone(); return; }
  gotoNextUnassigned(); renderAll();
}
function undo(){
  const u = undoStack.pop();
  if(!u) return;
  const i = photos.findIndex(p=>p.id===u.photoId);
  if(i<0) return;
  photos[i].folder = u.prevFolder; savePhoto(photos[i]);
  curIdx = i; renderAll();
}
function skip(){
  for(let i=curIdx+1;i<photos.length;i++){
    if(!photos[i].folder){ curIdx=i; renderAll(); return; }
  }
  openReview();
}

/* ===================== SEARCH + FOLDER LIST ===================== */
function allFolders(){ return FOLDERS.concat(customFolders); }
function folderCounts(){
  const m = {};
  photos.forEach(p=>{ if(p.folder) m[p.folder]=(m[p.folder]||0)+1; });
  return m;
}
function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function highlight(name, q){
  if(!q) return escapeHtml(name);
  const i = name.toLowerCase().indexOf(q.toLowerCase());
  if(i<0) return escapeHtml(name);
  return escapeHtml(name.slice(0,i)) + '<b>' + escapeHtml(name.slice(i,i+q.length)) + '</b>' + escapeHtml(name.slice(i+q.length));
}
function renderFolderList(){
  const q = $('search').value.trim();
  const counts = folderCounts();
  const box = $('folderList');
  let html = '';
  let list;
  if(q){
    const ql = q.toLowerCase();
    const starts = [], wordStarts = [], contains = [];
    allFolders().forEach(f=>{
      const fl = f.toLowerCase();
      if(fl.startsWith(ql)) starts.push(f);
      else if(fl.split(/[\s-]+/).some(w=>w.startsWith(ql))) wordStarts.push(f);
      else if(fl.includes(ql)) contains.push(f);
    });
    list = starts.concat(wordStarts, contains);
    if(!list.length){
      html += '<button class="add-folder-btn" data-add="'+escapeHtml(q)+'">&#10133; Add new label "'+escapeHtml(q)+'"</button>';
    }
  } else {
    if(recents.length){
      html += '<div class="list-label">Recently used</div>';
      recents.forEach(f=>{
        html += '<button class="folder-btn recent" data-f="'+escapeHtml(f)+'">'+escapeHtml(f)+(counts[f]?'<span class="cnt">'+counts[f]+(counts[f]>1?' photos':' photo')+'</span>':'')+'</button>';
      });
      html += '<div class="list-label">All folders</div>';
    }
    list = allFolders();
  }
  (list||[]).forEach(f=>{
    html += '<button class="folder-btn" data-f="'+escapeHtml(f)+'">'+highlight(f,q)+(counts[f]?'<span class="cnt">'+counts[f]+(counts[f]>1?' photos':' photo')+'</span>':'')+'</button>';
  });
  box.innerHTML = html;
}
let assigning = false;
$('folderList').addEventListener('click', e=>{
  if(assigning) return;
  const add = e.target.closest('[data-add]');
  const btn = add || e.target.closest('[data-f]');
  if(!btn) return;
  const name = add ? add.getAttribute('data-add') : btn.getAttribute('data-f');
  assigning = true;
  btn.classList.add('tapped');
  setTimeout(()=>{
    assigning = false;
    if(add && !allFolders().includes(name)){ customFolders.push(name); saveMeta(); }
    assign(name);
  }, 250);
});
$('search').addEventListener('input', renderFolderList);
$('undoBtn').addEventListener('click', undo);
$('skipBtn').addEventListener('click', skip);
$('sameBtn').addEventListener('click', function(){
  if(!lastFolder || assigning) return;
  assigning = true;
  this.classList.add('tapped');
  setTimeout(()=>{
    assigning = false;
    this.classList.remove('tapped');
    assign(lastFolder);
  }, 250);
});
$('removeBtn').addEventListener('click', ()=>{
  if(curIdx<0 || !photos[curIdx] || !photos[curIdx].folder) return;
  const p = photos[curIdx];
  undoStack.push({photoId:p.id, prevFolder:p.folder});
  p.folder = null; savePhoto(p);
  renderAll();
});
$('prevArrow').addEventListener('click', ()=>{ if(curIdx>0){ curIdx--; renderAll(); } });
$('nextArrow').addEventListener('click', ()=>{ if(curIdx<photos.length-1){ curIdx++; renderAll(); } });

/* ===================== RENDERING ===================== */
function renderSorter(){
  if(curIdx<0 || !photos[curIdx]) return;
  const p = photos[curIdx];
  $('curPhoto').src = p.url;
  $('photoBadge').textContent = 'Photo '+(curIdx+1)+' / '+photos.length;

}

/* ===================== REVIEW LIST ===================== */
function openReview(){
  const box = $('reviewList');
  box.innerHTML = '';
  photos.slice().sort((a,b)=>a.order-b.order).forEach(p=>{
    const d = document.createElement('div');
    d.className = 'rev-item'+(p.folder?'':' unassigned');

/* ===================== FINISH + ZIP ===================== */
function grouped(){
  const g = {};
  photos.slice().sort((a,b)=>a.order-b.order).forEach(p=>{
    if(!p.folder) return;
    (g[p.folder] = g[p.folder]||[]).push(p);
  });
  const order = allFolders().filter(f=>g[f]);
  return {g, order};
}
function openDone(){
  const {g, order} = grouped();
  const un = unassignedCount();
  let html = '';
  order.forEach(f=>{ html += '<div>'+escapeHtml(f)+' — <b>'+g[f].length+'</b></div>'; });
  if(un) html += '<div style="color:#c0392b;font-weight:700;margin-top:6px;">! '+un+' photo(s) unassigned (not included in ZIP)</div>';
  if(!order.length) html = '<div>No assignments yet.</div>';
  $('doneSummary').innerHTML = html;
  $('zipBtn').disabled = !order.length;
  $('zipStatus').textContent = '';
  showScreen('doneScreen');
}
$('zipBtn').addEventListener('click', async ()=>{
  if(typeof JSZip === 'undefined'){ $('zipStatus').textContent = 'ZIP library could not be loaded. Check your internet connection and reload the page.'; return; }
  $('zipBtn').disabled = true;
  $('zipStatus').textContent = 'Preparing ZIP...';
  try{
    const zip = new JSZip();
    const {g, order} = grouped();
    order.forEach(f=>{
      g[f].forEach((p,i)=>{
        const name = i===0 ? (f+'.jpg') : (f+'_'+(i+1)+'.jpg');
        zip.folder('Combined').file(name, p.blob);
      });
    });
    const blob = await zip.generateAsync({type:'blob', compression:'STORE'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    const d = new Date(), pad = n=>String(n).padStart(2,'0');
    a.download = 'foto_rapor_'+d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+'_'+pad(d.getHours())+pad(d.getMinutes())+'.zip';
    document.body.appendChild(a); a.click(); a.remove();
    $('zipStatus').textContent = 'ZIP downloaded ('+(blob.size/1048576).toFixed(1)+' MB). You can find it in the Files app.';
    dbClear();   // report done -> release stored photos (current session stays until the page closes)
  }catch(e){
    $('zipStatus').textContent = 'Error while creating ZIP: '+e.message;
  }
  $('zipBtn').disabled = false;
});
$('backBtn').addEventListener('click', ()=>{
  if(unassignedCount()>0){ showScreen('sortScreen'); renderAll(); } else openReview();
});
function clearSession(){
  if(!confirm('All photos and assignments will be deleted. Are you sure?')) return;
  photos.forEach(p=>URL.revokeObjectURL(p.url));
  photos = []; curIdx = -1; lastFolder = null; recents = []; undoStack = []; customFolders = [];

$('newSessionBtn').addEventListener('click', clearSession);
$('clearBtn').addEventListener('click', clearSession);
$('homeBtn').addEventListener('click', ()=>{

$('pickBtn').addEventListener('click', ()=>$('fileInput').click());

/* ===================== PHOTO EDITOR (from stamper) ===================== */
const redactModal   = document.getElementById('redactModal');
const redactCanvas  = document.getElementById('redactCanvas');
// desynchronized: lower input-to-paint latency while drawing (where supported)
const redactCtx     = redactCanvas.getContext('2d', { desynchronized: true });
const canvasWrap    = document.getElementById('redactCanvasWrap');

let redactState = {
  photoIdx: -1,
  tool: null,          // no tool active by default — tap Brush/Rectangle to enable
  color: '#000000',
  brushSize: 30,
  drawing: false,
  rectStart: null,
  snapshots: [],       // canvas copies (GPU-fast restore) — bounded for memory
};
let _prevX = 0, _prevY = 0, _rectPreviewSnap = null;
const MAX_SNAPSHOTS = 10;

// Fast snapshot: canvas copy via drawImage instead of getImageData.
// getImageData forced a full GPU→CPU readback of the whole image on every
// stroke, which is what made the brush lag behind the cursor.
function cloneCanvas() {
  const c = document.createElement('canvas');
  c.width = redactCanvas.width; c.height = redactCanvas.height;
  c.getContext('2d').drawImage(redactCanvas, 0, 0);
  return c;
}
function restoreCanvas(snap) {
  const resized = (redactCanvas.width !== snap.width || redactCanvas.height !== snap.height);
  if (resized) { redactCanvas.width = snap.width; redactCanvas.height = snap.height; }
  else redactCtx.clearRect(0, 0, redactCanvas.width, redactCanvas.height);
  redactCtx.drawImage(snap, 0, 0);
  return resized;
}

// ============================================================
// ZOOM (multiplicative steps; minimum adapts to fit-to-screen,
// so the whole image is always reachable — even on small phones)
// ============================================================
let zoomLevel = 1.0;
let zoomMinDyn = 0.05;
const ZOOM_MAX = 5.0, ZOOM_FACTOR = 1.25;

function applyZoom() {
  const cw = redactCanvas.width;
  const ch = redactCanvas.height;
  redactCanvas.style.width  = Math.round(cw * zoomLevel) + 'px';
  redactCanvas.style.height = Math.round(ch * zoomLevel) + 'px';
  document.getElementById('zoomLabel').textContent = Math.round(zoomLevel * 100) + '%';
  const wrapW = canvasWrap.clientWidth  - 32;
  const wrapH = canvasWrap.clientHeight - 32;
  canvasWrap.style.justifyContent = cw * zoomLevel < wrapW ? 'center' : 'flex-start';
  canvasWrap.style.alignItems     = ch * zoomLevel < wrapH ? 'center' : 'flex-start';
}

function setZoom(level) {
  zoomLevel = Math.min(ZOOM_MAX, Math.max(zoomMinDyn, level));
  applyZoom();
}

function fitToScreen() {
  const aw = Math.max(60, (canvasWrap.clientWidth  || window.innerWidth) - 32);
  const ah = Math.max(60, (canvasWrap.clientHeight || window.innerHeight * 0.7) - 32);
  const fs = Math.min(1.0, aw / redactCanvas.width, ah / redactCanvas.height);
  zoomMinDyn = Math.min(0.25, fs);
  setZoom(fs);
  canvasWrap.scrollLeft = 0; canvasWrap.scrollTop = 0;
}

document.getElementById('zoomIn').addEventListener('click',  () => setZoom(zoomLevel * ZOOM_FACTOR));
document.getElementById('zoomOut').addEventListener('click', () => setZoom(zoomLevel / ZOOM_FACTOR));

// Mouse wheel zoom on the canvas wrap
canvasWrap.addEventListener('wheel', e => {
  if (!redactState.drawing) {
    e.preventDefault();
    setZoom(e.deltaY < 0 ? zoomLevel * 1.1 : zoomLevel / 1.1);
  }
}, { passive: false });

let editorPhoto = null;
function openPhotoEditor(p) {
  if (!p) return;
  editorPhoto = p;
  redactState.snapshots = [];
  redactState.drawing = false;
  redactState.rectStart = null;
  _pinch = null;
  setTool(null);
  document.getElementById('redactModalTitle').textContent = '\u270F Edit \u00B7 ' + (p.folder || ('Photo ' + (curIdx + 1)));
  const img = new Image();
  img.onload = () => {
    redactCanvas.width  = img.naturalWidth || img.width;
    redactCanvas.height = img.naturalHeight || img.height;
    redactCtx.drawImage(img, 0, 0);
    saveSnap();
    redactModal.classList.add('active');
    document.body.style.overflow = 'hidden';
    fitToScreen();
    requestAnimationFrame(fitToScreen);
  };
  img.src = p.url;
}

function closeRedactModal() {
  redactModal.classList.remove('active');
  document.body.style.overflow = '';
  redactState.snapshots = []; // free undo memory
  _rectPreviewSnap = null;
}

function saveSnap() {
  redactState.snapshots.push(cloneCanvas());
  if (redactState.snapshots.length > MAX_SNAPSHOTS) redactState.snapshots.shift();
}

function undoRedact() {
  if (redactState.snapshots.length <= 1) return;
  redactState.snapshots.pop();
  const resized = restoreCanvas(redactState.snapshots[redactState.snapshots.length - 1]);
  if (resized) fitToScreen();
}

// Rotate 90° clockwise (image + any drawn redactions together)
function rotateEditor() {
  const w = redactCanvas.width, h = redactCanvas.height;
  const tmp = document.createElement('canvas');
  tmp.width = h; tmp.height = w;
  const tctx = tmp.getContext('2d');
  tctx.translate(h, 0);
  tctx.rotate(Math.PI / 2);
  tctx.drawImage(redactCanvas, 0, 0);
  redactCanvas.width = h; redactCanvas.height = w;
  redactCtx.drawImage(tmp, 0, 0);
  saveSnap();
  fitToScreen();
}
document.getElementById('toolRotate').addEventListener('click', rotateEditor);

// Convert pointer/touch position to canvas pixel coordinates (accounting for zoom)
function toCanvasXY(clientX, clientY) {
  const rect = redactCanvas.getBoundingClientRect();
  return {
    x: (clientX - rect.left) * (redactCanvas.width  / rect.width),
    y: (clientY - rect.top)  * (redactCanvas.height / rect.height)
  };
}

// ---------- Pinch zoom / pan (two fingers = zoom the image, never draw) ----------
let _pinch = null;
function touchDist(t) { return Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY); }

function cancelActiveStroke() {
  if (!redactState.drawing) return;
  // Remove the accidental dot/line made by the first finger before the pinch
  if (redactState.tool === 'rect' && _rectPreviewSnap) {
    restoreCanvas(_rectPreviewSnap);
  } else {
    const s = redactState.snapshots[redactState.snapshots.length - 1];
    if (s) restoreCanvas(s);
  }
  redactState.drawing = false;
  redactState.rectStart = null;
  _rectPreviewSnap = null;
}

function startPinch(e) {
  cancelActiveStroke();
  const t = e.touches;
  const rect = redactCanvas.getBoundingClientRect();
  const midX = (t[0].clientX + t[1].clientX) / 2;
  const midY = (t[0].clientY + t[1].clientY) / 2;
  _pinch = {
    startDist: touchDist(t),
    startZoom: zoomLevel,
    cx: (midX - rect.left) / zoomLevel,  // canvas point under the fingers
    cy: (midY - rect.top)  / zoomLevel
  };
}

function movePinch(e) {
  const t = e.touches;
  const nz = Math.min(ZOOM_MAX, Math.max(zoomMinDyn, _pinch.startZoom * touchDist(t) / _pinch.startDist));
  zoomLevel = nz;
  applyZoom();
  // Keep the pinched point under the fingers (zoom + pan combined)
  const midX = (t[0].clientX + t[1].clientX) / 2;
  const midY = (t[0].clientY + t[1].clientY) / 2;
  const wr = canvasWrap.getBoundingClientRect();
  canvasWrap.scrollLeft = redactCanvas.offsetLeft + _pinch.cx * nz - (midX - wr.left);
  canvasWrap.scrollTop  = redactCanvas.offsetTop  + _pinch.cy * nz - (midY - wr.top);
}

// Block native page pinch-zoom while the editor is open (iOS Safari)
['gesturestart','gesturechange','gestureend'].forEach(ev => {
  document.addEventListener(ev, e => {
    if (redactModal.classList.contains('active')) e.preventDefault();
  }, { passive: false });
});

// ---------- Drawing core ----------
function strokeStart(clientX, clientY) {
  const {x, y} = toCanvasXY(clientX, clientY);
  redactState.drawing = true;
  _prevX = x; _prevY = y;
  if (redactState.tool === 'brush') {
    paintDot(x, y);
  } else {
    redactState.rectStart = {x, y};
    _rectPreviewSnap = cloneCanvas();
  }
}
function strokeMove(clientX, clientY) {
  const {x, y} = toCanvasXY(clientX, clientY);
  if (redactState.tool === 'brush') {
    paintLine(_prevX, _prevY, x, y);
    _prevX = x; _prevY = y;
  } else if (redactState.rectStart) {
    restoreCanvas(_rectPreviewSnap);
    redactCtx.fillStyle = redactState.color;
    redactCtx.fillRect(
      Math.min(redactState.rectStart.x, x), Math.min(redactState.rectStart.y, y),
      Math.abs(x - redactState.rectStart.x), Math.abs(y - redactState.rectStart.y)
    );
  }
}
function strokeEnd() {
  if (!redactState.drawing) return;
  redactState.drawing = false;
  redactState.rectStart = null; _rectPreviewSnap = null;
  saveSnap();
}

function paintDot(x, y) {
  redactCtx.fillStyle = redactState.color;
  redactCtx.beginPath();
  redactCtx.arc(x, y, redactState.brushSize / 2, 0, Math.PI * 2);
  redactCtx.fill();
}
function paintLine(x0, y0, x1, y1) {
  redactCtx.strokeStyle = redactState.color;
  redactCtx.lineWidth = redactState.brushSize;
  redactCtx.lineCap = 'round'; redactCtx.lineJoin = 'round';
  redactCtx.beginPath(); redactCtx.moveTo(x0, y0); redactCtx.lineTo(x1, y1); redactCtx.stroke();
}

// ---------- Mouse / pen via Pointer Events ----------
// Pointer capture keeps the stroke alive outside the canvas, and
// getCoalescedEvents() feeds in every intermediate point the browser
// batched between frames — the line stays right under the cursor.
redactCanvas.addEventListener('pointerdown', e => {
  if (e.pointerType === 'touch') return;   // fingers use the touch handlers below
  if (!redactState.tool) return;           // no tool selected → nothing happens
  e.preventDefault();
  try { redactCanvas.setPointerCapture(e.pointerId); } catch {}
  strokeStart(e.clientX, e.clientY);
});
redactCanvas.addEventListener('pointermove', e => {
  if (e.pointerType === 'touch') return;
  if (!redactState.drawing) return;
  e.preventDefault();
  if (redactState.tool === 'brush' && e.getCoalescedEvents) {
    const evs = e.getCoalescedEvents();
    if (evs.length) { for (const ev of evs) strokeMove(ev.clientX, ev.clientY); return; }
  }
  strokeMove(e.clientX, e.clientY);
});
redactCanvas.addEventListener('pointerup', e => {
  if (e.pointerType === 'touch') return;
  strokeEnd();
});
redactCanvas.addEventListener('pointercancel', e => {
  if (e.pointerType === 'touch') return;
  strokeEnd();
});

// ---------- Touch (draw with one finger, pinch with two) ----------
redactCanvas.addEventListener('touchstart', e => {
  if (e.touches.length >= 2) { e.preventDefault(); startPinch(e); return; }
  if (!redactState.tool) return;           // no tool selected → touch never draws
  e.preventDefault();
  strokeStart(e.touches[0].clientX, e.touches[0].clientY);
}, {passive:false});
redactCanvas.addEventListener('touchmove', e => {
  if (e.touches.length >= 2) {
    e.preventDefault();
    if (!_pinch) startPinch(e); else movePinch(e);
    return;
  }
  e.preventDefault();
  if (_pinch || !redactState.drawing) return;
  strokeMove(e.touches[0].clientX, e.touches[0].clientY);
}, {passive:false});
function onTouchEnd(e) {
  if (_pinch) {
    if (!e.touches || e.touches.length < 2) _pinch = null;
    return;
  }
  strokeEnd();
}
redactCanvas.addEventListener('touchend',    onTouchEnd, {passive:false});
redactCanvas.addEventListener('touchcancel', onTouchEnd, {passive:false});

// Tools — OFF by default; tap to enable, tap the active one again to disable.
// The brush-size slider only applies to the brush, so it hides for Rectangle.
function setTool(tool) {
  if (redactState.tool === tool) tool = null; // toggle off
  redactState.tool = tool;
  document.getElementById('toolBrush').classList.toggle('active', tool === 'brush');
  document.getElementById('toolRect').classList.toggle('active',  tool === 'rect');
  document.getElementById('brushSizeRow').style.display = tool === 'brush' ? 'flex' : 'none';
  redactCanvas.style.cursor = tool ? 'crosshair' : 'default';
}
document.getElementById('toolBrush').addEventListener('click', () => setTool('brush'));
document.getElementById('toolRect').addEventListener('click',  () => setTool('rect'));

document.getElementById('redactColors').addEventListener('click', e => {
  const btn = e.target.closest('.rcolor-btn');
  if (!btn || btn.classList.contains('custom')) return;
  document.querySelectorAll('.rcolor-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  redactState.color = btn.dataset.color;
});
document.getElementById('customRedactColor').addEventListener('input', e => {
  redactState.color = e.target.value;
  document.querySelectorAll('.rcolor-btn').forEach(b => b.classList.remove('active'));
  e.target.closest('.rcolor-btn').classList.add('active');
});
document.getElementById('brushSize').addEventListener('input', e => {
  redactState.brushSize = +e.target.value;
  document.getElementById('brushSizeVal').textContent = e.target.value;
});
document.getElementById('btnUndo').addEventListener('click', undoRedact);
document.getElementById('btnRedactCancel').addEventListener('click', closeRedactModal);
document.getElementById('btnRedactSave').addEventListener('click', () => {
  const p = editorPhoto;
  if (!p) { closeRedactModal(); return; }
  redactCanvas.toBlob(b => {
    if (b) {
      try { URL.revokeObjectURL(p.url); } catch (e) {}
      p.blob = b;
      p.url = URL.createObjectURL(b);
      savePhoto(p);
      renderAll();
    }
    closeRedactModal();
  }, 'image/jpeg', 0.9);
});


document.getElementById('editBtn').addEventListener('click', ()=>{ if(curIdx>=0 && photos[curIdx]) openPhotoEditor(photos[curIdx]); });

/* prevent double-tap zoom */
let _lt = 0;
document.addEventListener('touchend', function(e){
  const now = Date.now();
  if(now-_lt < 350 && !e.target.closest('input')) e.preventDefault();
  _lt = now;
}, {passive:false});
document.addEventListener('dblclick', e=>e.preventDefault());

(async function init(){
  if(typeof window!=='undefined' && window.matchMedia && window.matchMedia('(min-width:700px)').matches){
    $('pickBtn').textContent = 'Select photos from files';
  }
  await openDB();
  const saved = await dbAll('photos');
  const meta = await dbAll('meta');
  if(meta.length && meta[0]){
    lastFolder = meta[0].lastFolder||null;
    recents = meta[0].recents||[];
    customFolders = meta[0].customFolders||[];
  }
  if(saved.length){
    photos = saved.sort((a,b)=>a.order-b.order).map(r=>({
      id:r.id, blob:r.blob, url:URL.createObjectURL(r.blob), folder:r.folder||null, order:r.order
    }));
    const done = photos.length - unassignedCount();
    const rb = $('resumeBtn');
    rb.style.display = '';
    rb.textContent = 'Resume ('+photos.length+' photos, '+done+' assigned)';
  }
  renderProgress();
})();
</script>
</body>
</html>
